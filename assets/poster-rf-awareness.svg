  <g transform="translate(22,26)" stroke="#4ade80" stroke-width="1.6" fill="none" stroke-linecap="round"><line x1="7" y1="14" x2="7" y2="4"/><circle cx="7" cy="4" r="1.6" fill="#4ade80" stroke="none"/><path d="M2 4 a7 7 0 0 1 10 0"/><path d="M4 8 a4 4 0 0 1 6 0"/></g>
  <text x="44" y="40" fill="#ffffff" font-size="23" font-weight="700">RF Awareness</text>
  <text x="22" y="60" fill="#a9d9be" font-size="8.5" letter-spacing="1.1">EXCLUSION ZONES · MPE · FCC / OSHA</text>
  <text x="22" y="150" fill="#7fae93" font-size="8.5">Exposición a RF en sitios celulares · Seguridad</text>
