<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" font-family="system-ui,Segoe UI,Roboto,sans-serif">
  <defs><linearGradient id="bgr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#12592f"/><stop offset="1" stop-color="#0a140e"/></linearGradient></defs>
  <rect width="320" height="180" fill="url(#bgr)"/>
  <g stroke="#2f5a42" stroke-width="0.6" opacity="0.4"><line x1="0" y1="70" x2="320" y2="70"/><line x1="0" y1="110" x2="320" y2="110"/><line x1="0" y1="150" x2="320" y2="150"/></g>
  <!-- monopole tower with sector antennas -->
