    <g stroke="#6b7682" stroke-width="2.4" stroke-linecap="round"><line x1="0" y1="-34" x2="-22" y2="-40"/><line x1="0" y1="-34" x2="22" y2="-40"/></g>
    <rect x="-30" y="-52" width="7" height="22" rx="2.5" fill="#e3e8ee" stroke="#9aa7b4" stroke-width="0.8"/>
    <rect x="23" y="-52" width="7" height="22" rx="2.5" fill="#e3e8ee" stroke="#9aa7b4" stroke-width="0.8"/>
    <rect x="-3.5" y="-58" width="7" height="22" rx="2.5" fill="#e3e8ee" stroke="#9aa7b4" stroke-width="0.8"/>
    <circle cx="0" cy="-40" r="2.4" fill="#ff5a4d"/>
  </g>
  <!-- RF waves emanating -->
  <g fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <path d="M316 120 a26 26 0 0 0 -20 -24"/>
    <path d="M316 120 a40 40 0 0 0 -30 -37"/>
    <path d="M316 120 a54 54 0 0 0 -40 -50"/>
  </g>
  <rect x="0" y="0" width="320" height="4" fill="#15803D"/>
