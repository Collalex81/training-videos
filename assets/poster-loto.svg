  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#12592f"/><stop offset="1" stop-color="#0a140e"/></linearGradient></defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <g stroke="#2f5a42" stroke-width="0.6" opacity="0.4"><line x1="0" y1="70" x2="320" y2="70"/><line x1="0" y1="110" x2="320" y2="110"/><line x1="0" y1="150" x2="320" y2="150"/></g>
