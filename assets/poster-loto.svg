  </g>
  <rect x="0" y="0" width="320" height="4" fill="#15803D"/>
  <g transform="translate(22,26)"><rect x="0" y="4" width="14" height="10" rx="1.5" fill="none" stroke="#4ade80" stroke-width="1.6"/><path d="M2,4 v-2 a5 5 0 0 1 10 0 v2" fill="none" stroke="#4ade80" stroke-width="1.6"/></g>
  <text x="44" y="40" fill="#ffffff" font-size="24" font-weight="700">Lockout / Tagout</text>
