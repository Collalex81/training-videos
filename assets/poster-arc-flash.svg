<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" font-family="system-ui,Segoe UI,Roboto,sans-serif" role="img" aria-label="Arc Flash and NFPA 70E">
  <defs>
    <linearGradient id="bgAF" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#12592f"/><stop offset="1" stop-color="#0a140e"/></linearGradient>
    <radialGradient id="flash" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#fff7cf" stop-opacity="0.95"/><stop offset="0.35" stop-color="#ffd23f" stop-opacity="0.7"/><stop offset="0.7" stop-color="#f97316" stop-opacity="0.28"/><stop offset="1" stop-color="#f97316" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bgAF)"/>
  <g stroke="#2f5a42" stroke-width="0.6" opacity="0.4"><line x1="0" y1="70" x2="320" y2="70"/><line x1="0" y1="110" x2="320" y2="110"/><line x1="0" y1="150" x2="320" y2="150"/></g>

  <!-- arc-flash burst on the right -->
  <g transform="translate(248,100)">
    <ellipse cx="0" cy="0" rx="72" ry="60" fill="url(#flash)"/>
    <!-- electrodes / bus bars -->
    <path d="M-70 -4 L-22 -3 L-22 3 L-70 4 Z" fill="#9aa7b4"/>
    <path d="M70 -4 L22 -3 L22 3 L70 4 Z" fill="#9aa7b4"/>
    <rect x="-78" y="-10" width="10" height="20" rx="2" fill="#5b6672"/>
    <rect x="68" y="-10" width="10" height="20" rx="2" fill="#5b6672"/>
    <!-- arc bolt (glow behind, white front) -->
    <path d="M-22 0 L-10 -16 L-2 8 L8 -14 L16 12 L22 0" fill="none" stroke="#ffd23f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M-22 0 L-10 -16 L-2 8 L8 -14 L16 12 L22 0" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- spark rays -->
    <g stroke="#ffe37a" stroke-width="1.6" stroke-linecap="round" opacity="0.9"><line x1="0" y1="-18" x2="0" y2="-30"/><line x1="14" y1="-12" x2="24" y2="-22"/><line x1="18" y1="6" x2="30" y2="12"/><line x1="-14" y1="10" x2="-24" y2="18"/><line x1="-16" y1="-10" x2="-26" y2="-18"/></g>
  </g>

  <rect x="0" y="0" width="320" height="4" fill="#15803D"/>
  <!-- header bolt icon -->
  <g transform="translate(22,24)"><path d="M8 0 L2 9 L7 9 L5 16 L12 6 L7 6 Z" fill="none" stroke="#4ade80" stroke-width="1.6" stroke-linejoin="round"/></g>
  <text x="42" y="40" fill="#ffffff" font-size="24" font-weight="700">Arc Flash</text>
  <text x="22" y="60" fill="#a9d9be" font-size="8.5" letter-spacing="1.1">NFPA 70E · IEEE 1584 · OSHA</text>
  <text x="22" y="150" fill="#7fae93" font-size="8.5">Arco eléctrico y NFPA 70E · Seguridad</text>
</svg>
