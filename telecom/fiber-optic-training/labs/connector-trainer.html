<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connector & End-Face Trainer — Lab</title>
<!-- TELECOM (azul) — Lab: microscopio de inspección de cara de fibra (IEC 61300-3-35) + escenarios de decisión. Refuerza Módulo 1. -->
<style>
  :root{
    --pg:#f3f6fc; --card:#ffffff; --ink:#0c1c34; --sub:#51618a; --line:#dde5f3;
    --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.12); --bad:#dc2626; --badt:rgba(220,38,38,.12);
    --amber:#b45309; --ambt:rgba(180,83,9,.14);
    --radius:16px; --shadow:0 1px 2px rgba(12,28,52,.05),0 10px 26px rgba(12,28,52,.08);
  }
  html[data-theme="dark"]{
    --pg:#0a1120; --card:#141d30; --ink:#e9f0ff; --sub:#9db0d6; --line:#243149;
    --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.16); --bad:#f87171; --badt:rgba(248,113,113,.16);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.16);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  a{color:inherit;text-decoration:none}
  .shell{max-width:900px;margin:0 auto;padding:14px 18px 60px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#1e3a8a);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:700;display:block;line-height:1.15}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}

  h1{font-size:20px;margin:14px 2px 4px}
  .lead{color:var(--sub);font-size:13.5px;margin:0 2px 14px;max-width:660px}

  /* mode toggle */
  .modeseg{display:inline-flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;margin:0 0 16px}
  .modeseg button{border:0;background:transparent;color:var(--sub);cursor:pointer;padding:9px 18px;border-radius:9px;font-size:13.5px;font-weight:700;font-family:inherit;display:flex;align-items:center;gap:7px}
  .modeseg button.on{background:var(--accent);color:#fff}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  @media(max-width:720px){ .grid{grid-template-columns:1fr} }
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  .card h2{font-size:14px;margin:0 0 14px;text-transform:uppercase;letter-spacing:.03em;color:var(--sub)}

  .canvaswrap{display:flex;justify-content:center;margin:0 0 12px}
  canvas{width:100%;max-width:320px;aspect-ratio:1/1;border-radius:14px;background:radial-gradient(circle at 50% 45%,#10151c,#05070b);border:1px solid var(--line)}

  .legend{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px}
  .lg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--sub);border:1px solid var(--line);border-radius:999px;padding:3px 9px}
  .lg i{width:11px;height:11px;border-radius:3px;flex:none}

  .ctrl{margin-bottom:14px}
  .ctrl .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .ctrl label{font-size:13px;font-weight:600}
  .ctrl .val{font-size:13px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:var(--accent);height:26px}
  .hint{font-size:11.5px;color:var(--sub);margin-top:2px}
  .clab{font-size:13px;font-weight:600;margin:0 0 6px}

  .seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .seg button{border:1px solid var(--line);background:var(--pg);color:var(--ink);cursor:pointer;padding:8px 12px;border-radius:9px;font-size:12.5px;font-family:inherit;font-weight:600}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .seg button .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:-1px;border:1px solid rgba(0,0,0,.25)}

  .verdict{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:13.5px;padding:8px 14px;border-radius:999px;margin:0 0 12px}
  .verdict.ok{background:var(--okt);color:var(--ok)}
  .verdict.no{background:var(--badt);color:var(--bad)}
  .verdict.amb{background:var(--ambt);color:var(--amber)}

  .zrow{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
  .zrow:last-child{border-bottom:0}
  .zbadge{flex:none;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
  .zbody{flex:1;min-width:0}
  .zbody .zt{font-size:13px;font-weight:700;display:flex;justify-content:space-between;gap:8px;align-items:center}
  .zbody .zr{font-size:11.5px;color:var(--sub);margin-top:1px}
  .pill{font-size:10.5px;font-weight:800;letter-spacing:.03em;padding:2px 8px;border-radius:999px;flex:none;text-transform:uppercase}
  .pill.ok{background:var(--okt);color:var(--ok)}
  .pill.no{background:var(--badt);color:var(--bad)}
  .pill.na{background:var(--tint);color:var(--sub)}

  .note{font-size:12px;color:var(--sub);margin-top:12px;border-left:3px solid var(--accent);padding-left:11px}
  .note.warn{border-left-color:var(--amber)}

  .cleanrow{display:flex;gap:8px;flex-wrap:wrap}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:13.5px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn[disabled]{opacity:.45;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--accent)}
  .btn.ghost:hover{background:var(--tint)}
  .btn.sub{border-color:var(--line);color:var(--ink);background:var(--pg)}

  /* reference */
  .ref{font-size:13px}
  .ref .rrow{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .ref .rrow:last-child{border-bottom:0}
  .ref .rk{color:var(--sub)} .ref .rv{font-weight:600;text-align:right}
  .swrow{display:flex;align-items:center;gap:10px;margin:0 0 10px}
  .swbig{width:44px;height:44px;border-radius:10px;border:1px solid var(--line);flex:none}
  .tia{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:10px}
  .tia .tc{display:flex;align-items:center;gap:7px;font-size:11.5px}
  .tia .tc i{width:15px;height:15px;border-radius:4px;border:1px solid rgba(0,0,0,.2);flex:none}

  /* scenarios */
  .qcat{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:3px 9px;border-radius:999px;display:inline-block;margin-bottom:12px}
  .scncap{font-size:12px;color:var(--sub);text-align:center;margin:0 0 12px}
  .qtext{font-size:16.5px;font-weight:700;line-height:1.35;margin-bottom:14px}
  .opts{display:grid;gap:9px}
  .opt{border:1px solid var(--line);background:var(--pg);color:var(--ink);cursor:pointer;padding:12px 14px;border-radius:11px;font-size:14px;font-family:inherit;text-align:left}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad);font-weight:600}
  .opt[disabled]{cursor:default}
  .fb{margin-top:13px;font-size:13px;color:var(--sub);border-left:3px solid var(--accent);padding-left:11px;display:none}
  .fb.show{display:block} .fb b{color:var(--ink)}
  .fb .trap{display:block;margin-top:7px;color:var(--amber);font-weight:600}
  .row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:8px;flex-wrap:wrap}
  .score{font-size:13px;color:var(--sub)} .score b{color:var(--ink)}

  .foot{margin-top:24px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--sub);text-align:center}
</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <div class="top">
      <div class="brand">
        <span class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg></span>
        <div><b id="brand"></b><small id="brandsub"></small></div>
      </div>
      <div class="tools">
        <a class="tbtn" id="home" href="index.html" target="_top"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg><span id="homeTxt"></span></a>
        <a class="tbtn" id="suggestBtn" href="../../../suggestions/" target="_top"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span id="suggestTxt"></span></a>
        <button class="tbtn" id="tema"><span id="temaIco"></span><span id="temaTxt"></span></button>
        <div class="lang" id="lang"><button data-l="en">EN</button><button data-l="es">ES</button></div>
      </div>
    </div>
  </div>

  <h1 id="title"></h1>
  <p class="lead" id="lead"></p>
  <div class="modeseg" id="modeseg"></div>

  <!-- ===================== SANDBOX ===================== -->
  <div id="sandbox">
    <div class="grid">
      <div class="card">
        <h2 id="scopeTitle"></h2>
        <div class="canvaswrap"><canvas id="face" width="300" height="300"></canvas></div>
        <div class="legend" id="legend"></div>
        <div class="cleanrow">
          <button class="btn ghost" id="cleanBtn"></button>
          <button class="btn sub" id="resetBtn"></button>
        </div>
        <div class="note warn" id="cleanNote"></div>
      </div>

      <div class="card">
        <h2 id="ctrlTitle"></h2>

        <div class="clab" id="lConn"></div>
        <div class="seg" id="connSeg"></div>

        <div class="clab" id="lPol"></div>
        <div class="seg" id="polSeg"></div>

        <div class="ctrl">
          <div class="row"><label id="lNScr"></label><span class="val" id="vNScr"></span></div>
          <input type="range" id="nScr" min="0" max="8" step="1" value="0">
        </div>
        <div class="ctrl">
          <div class="row"><label id="lWScr"></label><span class="val" id="vWScr"></span></div>
          <input type="range" id="wScr" min="0.5" max="8" step="0.5" value="2">
          <div class="hint" id="hWScr"></div>
        </div>
        <div class="ctrl">
          <div class="row"><label id="lNDig"></label><span class="val" id="vNDig"></span></div>
          <input type="range" id="nDig" min="0" max="8" step="1" value="0">
        </div>
        <div class="ctrl">
          <div class="row"><label id="lSDig"></label><span class="val" id="vSDig"></span></div>
          <input type="range" id="sDig" min="0.5" max="15" step="0.5" value="4">
          <div class="hint" id="hSDig"></div>
        </div>
        <div class="ctrl">
          <div class="row"><label id="lNDust"></label><span class="val" id="vNDust"></span></div>
          <input type="range" id="nDust" min="0" max="40" step="1" value="0">
        </div>
        <div class="seg" id="toggles"></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2 id="verdictTitle"></h2>
        <div id="verdictBox"></div>
        <div id="zoneBox"></div>
      </div>
      <div class="card">
        <h2 id="refTitle"></h2>
        <div class="swrow"><span class="swbig" id="polSwatch"></span><div><div style="font-weight:700" id="polName"></div><div class="hint" id="polSub"></div></div></div>
        <div class="ref" id="refBox"></div>
        <button class="btn sub" id="tiaBtn" style="margin-top:12px;width:100%"></button>
        <div id="tiaBox" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- ===================== SCENARIOS ===================== -->
  <div id="scenarios" style="display:none">
    <div class="card">
      <span class="qcat" id="scnCat"></span>
      <div class="canvaswrap"><canvas id="scnCanvas" width="300" height="300"></canvas></div>
      <div class="scncap" id="scnCap"></div>
      <div class="qtext" id="scnPrompt"></div>
      <div class="opts" id="scnOpts"></div>
      <div class="fb" id="scnFb"></div>
      <div class="row">
        <span class="score" id="scnProg"></span>
        <span style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn ghost" id="scnRetry"></button>
          <button class="btn" id="scnNext"></button>
        </span>
      </div>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script src="../scripts/progress.js"></script>
<script>
(function(){
  function $(id){ return document.getElementById(id); }
  var LANG=(window.FOT&&FOT.getLang)?FOT.getLang():"en";
  var THEME=(window.FOT&&FOT.getTheme)?FOT.getTheme():"light";
  function X(en,es){ return LANG==="es"?es:en; }
  function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }

  var ICO={
    sun:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    moon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    scope:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
    brain:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3a3 3 0 0 0-3 3 3 3 0 0 0-1 5 3 3 0 0 0 1 5 3 3 0 0 0 3 3M15 3a3 3 0 0 1 3 3 3 3 0 0 1 1 5 3 3 0 0 1-1 5 3 3 0 0 1-3 3M12 3v18"/></svg>',
    ok:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    no:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
    drop:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2s6 7 6 11a6 6 0 0 1-12 0c0-4 6-11 6-11z"/></svg>'
  };

  /* ---------- IEC 61300-3-35 geometry (diameters -> radii, µm) ----------
     Zone A Core   0–25µm   -> r 0–12.5
     Zone B Clad  25–120µm  -> r 12.5–60
     Zone C Adh  120–130µm  -> r 60–65
     Zone D Cont 130–250µm  -> r 65–125                                    */
  var RA=12.5, RB=60, RC=65, RD=125;
  var LU=140/RD;                 // logical px per µm (canvas 300, center 150, edge 140)
  var CX=150, CY=150;
  function zoneOf(r){ if(r<=RA)return"A"; if(r<=RB)return"B"; if(r<=RC)return"C"; if(r<=RD)return"D"; return null; }

  var ZCOL={A:"#e0533b",B:"#3f86ff",C:"#c98a20",D:"#8aa0bd"};

  /* ---------- connector / polish reference ---------- */
  var CONN={
    LC:{n:"LC",ferrule:["1.25 mm ceramic","1.25 mm cerámica"],coupling:["Push-latch (RJ-style)","Pestillo push (tipo RJ)"],use:["SFP/QSFP, high-density","SFP/QSFP, alta densidad"]},
    SC:{n:"SC",ferrule:["2.5 mm ceramic","2.5 mm cerámica"],coupling:["Push-pull square","Cuadrado push-pull"],use:["Patch panels, GPON/FTTH","Patch panels, GPON/FTTH"]},
    FC:{n:"FC",ferrule:["2.5 mm ceramic","2.5 mm cerámica"],coupling:["Threaded metal","Roscado metálico"],use:["Test gear, high vibration","Equipos de prueba, vibración"]},
    ST:{n:"ST",ferrule:["2.5 mm ceramic","2.5 mm cerámica"],coupling:["Bayonet twist-lock","Bayoneta de giro"],use:["Legacy multimode LAN","LAN multimodo antiguo"]},
    MPO:{n:"MPO",ferrule:["Rectangular multi-fiber","Multifibra rectangular"],coupling:["Push-on, keyed","Push-on, con llave"],use:["8–24 fibers, 40/100G parallel","8–24 fibras, 40/100G paralelo"]}
  };
  var POL={
    PC:{n:"PC",color:"#1a1a1a",rl:["≥ 35 dB","≥ 35 dB"],geo:["Domed physical contact","Contacto físico curvo"],note:["Legacy / multimode","Antiguo / multimodo"]},
    UPC:{n:"UPC",color:"#2f6fed",rl:["≥ 50 dB","≥ 50 dB"],geo:["Ultra PC, near-flat dome","UPC, cúpula casi plana"],note:["Blue body (single-mode)","Cuerpo azul (monomodo)"]},
    APC:{n:"APC",color:"#1f9d55",rl:["≥ 60 dB","≥ 60 dB"],geo:["8° angled end-face","Cara angulada 8°"],note:["Green body — never mate to UPC","Cuerpo verde — nunca con UPC"]}
  };
  var TIA=[["Blue","Azul","#2f6fed"],["Orange","Naranja","#e8802b"],["Green","Verde","#1f9d55"],["Brown","Café","#7a4a1e"],
    ["Slate","Gris","#8a8f98"],["White","Blanco","#f3f4f6"],["Red","Rojo","#dc2626"],["Black","Negro","#111827"],
    ["Yellow","Amarillo","#f2d024"],["Violet","Violeta","#8b5cf6"],["Rose","Rosa","#f7a8c0"],["Aqua","Aqua","#4fd6d6"]];

  /* ---------- sandbox state ---------- */
  var S={conn:"LC",pol:"UPC",nScr:0,wScr:2,nDig:0,sDig:4,nDust:0,oil:false,overlay:true,
         scr:[],dig:[],dust:[]};
  var mode="sandbox";

  function rnd(a,b){ return a+Math.random()*(b-a); }
  function genScratch(){
    // 45% cross the core (small perpendicular offset), else land on cladding/edge
    var off = Math.random()<0.45 ? rnd(-11,11) : rnd(-118,118);
    return { off:off, ang:rnd(0,Math.PI), len:rnd(120,160) };
  }
  function genDig(){ return { r:rnd(2,118), ang:rnd(0,Math.PI*2) }; }
  function genDust(){ return { r:rnd(4,72), ang:rnd(0,Math.PI*2), s:rnd(1.2,3.2) }; }
  function fit(arr,n,gen){ while(arr.length<n) arr.push(gen()); arr.length=n; }

  /* ---------- canvas helpers ---------- */
  function setup(cv){
    var dpr=window.devicePixelRatio||1, L=300;
    cv.width=L*dpr; cv.height=L*dpr;
    var ctx=cv.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,L,L);
    return ctx;
  }

  function drawFace(ctx,cfg){
    var pol=cfg.pol||"UPC";
    // ferrule (zone D) ceramic
    var gd=ctx.createRadialGradient(CX-20,CY-20,10,CX,CY,RD*LU);
    gd.addColorStop(0,"#b9c2cc"); gd.addColorStop(1,"#7d8794");
    ctx.beginPath(); ctx.arc(CX,CY,RD*LU,0,7); ctx.fillStyle=gd; ctx.fill();
    // adhesive ring (zone C)
    ctx.beginPath(); ctx.arc(CX,CY,RC*LU,0,7); ctx.fillStyle="#6f7480"; ctx.fill();
    // cladding glass (zone B)
    var gb=ctx.createRadialGradient(CX-14,CY-14,4,CX,CY,RB*LU);
    gb.addColorStop(0,"#39424e"); gb.addColorStop(1,"#232a33");
    ctx.beginPath(); ctx.arc(CX,CY,RB*LU,0,7); ctx.fillStyle=gb; ctx.fill();
    // core (zone A)
    var gc=ctx.createRadialGradient(CX-3,CY-3,1,CX,CY,RA*LU);
    gc.addColorStop(0,"#5b6b86"); gc.addColorStop(1,"#38475f");
    ctx.beginPath(); ctx.arc(CX,CY,RA*LU,0,7); ctx.fillStyle=gc; ctx.fill();
    // APC tilt hint: directional sheen across the glass
    if(pol==="APC"){
      ctx.save(); ctx.beginPath(); ctx.arc(CX,CY,RB*LU,0,7); ctx.clip();
      var lg=ctx.createLinearGradient(CX-RB*LU,CY-RB*LU,CX+RB*LU,CY+RB*LU);
      lg.addColorStop(0,"rgba(120,220,150,.16)"); lg.addColorStop(.5,"rgba(0,0,0,0)"); lg.addColorStop(1,"rgba(0,0,0,.22)");
      ctx.fillStyle=lg; ctx.fillRect(CX-RB*LU,CY-RB*LU,RB*LU*2,RB*LU*2); ctx.restore();
    }

    // permanent scratches
    (cfg.scr||[]).forEach(function(s){
      var d=[Math.cos(s.ang),Math.sin(s.ang)], n=[-Math.sin(s.ang),Math.cos(s.ang)];
      var fx=CX+n[0]*s.off*LU, fy=CY+n[1]*s.off*LU;
      var w=Math.max(1,(cfg.wScr||2)*LU);
      ctx.save(); ctx.beginPath(); ctx.arc(CX,CY,RD*LU,0,7); ctx.clip();
      ctx.lineCap="round";
      ctx.strokeStyle="rgba(0,0,0,.5)"; ctx.lineWidth=w+1.5;
      ctx.beginPath(); ctx.moveTo(fx-d[0]*s.len,fy-d[1]*s.len); ctx.lineTo(fx+d[0]*s.len,fy+d[1]*s.len); ctx.stroke();
      ctx.strokeStyle="rgba(225,235,245,.85)"; ctx.lineWidth=w;
      ctx.beginPath(); ctx.moveTo(fx-d[0]*s.len,fy-d[1]*s.len); ctx.lineTo(fx+d[0]*s.len,fy+d[1]*s.len); ctx.stroke();
      ctx.restore();
    });
    // permanent digs / pits
    (cfg.dig||[]).forEach(function(g){
      var x=CX+Math.cos(g.ang)*g.r*LU, y=CY+Math.sin(g.ang)*g.r*LU;
      var rad=Math.max(2.2,(cfg.sDig||4)*LU/2);
      var pg=ctx.createRadialGradient(x,y,0.5,x,y,rad);
      pg.addColorStop(0,"#02040a"); pg.addColorStop(.7,"#0a0f16"); pg.addColorStop(1,"rgba(20,26,34,0)");
      ctx.beginPath(); ctx.arc(x,y,rad,0,7); ctx.fillStyle=pg; ctx.fill();
    });
    // contamination: oil / fingerprint smear
    if(cfg.oil){
      ctx.save(); ctx.beginPath(); ctx.arc(CX,CY,RB*LU,0,7); ctx.clip();
      var o=ctx.createRadialGradient(CX+8,CY+6,4,CX+8,CY+6,RB*LU*0.9);
      o.addColorStop(0,"rgba(210,170,80,.34)"); o.addColorStop(.6,"rgba(180,150,90,.20)"); o.addColorStop(1,"rgba(150,130,90,0)");
      ctx.fillStyle=o; ctx.beginPath(); ctx.ellipse(CX+6,CY+4,RB*LU*0.85,RB*LU*0.6,0.6,0,7); ctx.fill();
      ctx.restore();
    }
    // contamination: dust specks
    (cfg.dust||[]).forEach(function(u){
      var x=CX+Math.cos(u.ang)*u.r*LU, y=CY+Math.sin(u.ang)*u.r*LU;
      ctx.beginPath(); ctx.arc(x,y,u.s,0,7); ctx.fillStyle="rgba(235,225,205,.75)"; ctx.fill();
      ctx.beginPath(); ctx.arc(x+0.5,y+0.5,u.s*0.6,0,7); ctx.fillStyle="rgba(0,0,0,.25)"; ctx.fill();
    });

    // zone overlay
    if(cfg.overlay){
      var rings=[["A",RA],["B",RB],["C",RC],["D",RD]];
      ctx.setLineDash([4,4]); ctx.lineWidth=1.4;
      rings.forEach(function(z){
        ctx.beginPath(); ctx.arc(CX,CY,z[1]*LU,0,7); ctx.strokeStyle=ZCOL[z[0]]; ctx.stroke();
      });
      ctx.setLineDash([]);
      ctx.font="700 12px system-ui,sans-serif"; ctx.textAlign="center";
      ctx.fillStyle=ZCOL.A; ctx.fillText("A",CX,CY+4);
      ctx.fillStyle="#dfe7f0";
      ctx.fillText("B",CX,CY-RA*LU-8*0+ (RA*LU+ (RB-RA)*LU*0.5));
      // clean B/C/D labels along top axis
      ctx.fillStyle=ZCOL.B; ctx.fillText("B",CX,CY-(RA+RB)/2*LU);
      ctx.fillStyle=ZCOL.C; ctx.fillText("C",CX+(RB+RC)/2*LU*0.72,CY-(RB+RC)/2*LU*0.72);
      ctx.fillStyle=ZCOL.D; ctx.fillText("D",CX,CY-(RC+RD)/2*LU);
    }
  }

  /* ---------- IEC grading (simplified single-mode ≥45 dB) ---------- */
  function grade(){
    var zs={A:{s:[],d:[]},B:{s:[],d:[]},C:{s:[],d:[]},D:{s:[],d:[]}};
    S.scr.forEach(function(s){ var z=zoneOf(Math.abs(s.off)); if(z) zs[z].s.push(S.wScr); });
    S.dig.forEach(function(g){ var z=zoneOf(g.r); if(z) zs[z].d.push(S.sDig); });

    function big(arr,th){ return arr.filter(function(v){return v>th;}).length; }
    function band(arr,a,b){ return arr.filter(function(v){return v>=a&&v<=b;}).length; }

    var zones=[];
    // Zone A — Core
    (function(){ var z=zs.A, f=[];
      if(big(z.s,3)>0) f.push(X("scratch > 3 µm across core","rayón > 3 µm sobre el núcleo"));
      if(z.d.length>0) f.push(X("defect in the core","defecto en el núcleo"));
      zones.push({z:"A",pass:f.length===0,ns:z.s.length,nd:z.d.length,fail:f,na:false}); })();
    // Zone B — Cladding
    (function(){ var z=zs.B, f=[];
      if(big(z.s,3)>0) f.push(X("scratch > 3 µm","rayón > 3 µm"));
      if(big(z.d,5)>0) f.push(X("defect > 5 µm","defecto > 5 µm"));
      if(band(z.d,2,5)>5) f.push(X("more than 5 defects 2–5 µm","más de 5 defectos 2–5 µm"));
      zones.push({z:"B",pass:f.length===0,ns:z.s.length,nd:z.d.length,fail:f,na:false}); })();
    // Zone C — Adhesive
    zones.push({z:"C",pass:true,ns:zs.C.s.length,nd:zs.C.d.length,fail:[],na:true});
    // Zone D — Contact
    (function(){ var z=zs.D, f=[];
      if(big(z.d,9.999)>0) f.push(X("defect ≥ 10 µm","defecto ≥ 10 µm"));
      zones.push({z:"D",pass:f.length===0,ns:z.s.length,nd:z.d.length,fail:f,na:false}); })();

    var dirty = S.dust.length>0 || S.oil;
    var permFail = zones.some(function(z){return !z.pass;});
    var status = dirty ? "dirty" : (permFail ? "fail" : "pass");
    return { zones:zones, status:status, dirty:dirty, permFail:permFail };
  }

  var ZR={  // human-readable rule per zone
    A:["No scratches > 3 µm · no defects","Sin rayones > 3 µm · sin defectos"],
    B:["No scratches > 3 µm · defects: none > 5 µm, max 5 of 2–5 µm","Sin rayones > 3 µm · defectos: ninguno > 5 µm, máx 5 de 2–5 µm"],
    C:["Adhesive — no requirement","Adhesivo — sin requisito"],
    D:["Contact — no defects ≥ 10 µm","Contacto — sin defectos ≥ 10 µm"]
  };
  var ZN={ A:["Zone A · Core","Zona A · Núcleo"],B:["Zone B · Cladding","Zona B · Revestimiento"],
           C:["Zone C · Adhesive","Zona C · Adhesivo"],D:["Zone D · Contact","Zona D · Contacto"] };

  /* ---------- render sandbox ---------- */
  function drawSandboxFace(){
    var ctx=setup($("face"));
    drawFace(ctx,{pol:S.pol,scr:S.scr,wScr:S.wScr,dig:S.dig,sDig:S.sDig,dust:S.dust,oil:S.oil,overlay:S.overlay});
  }

  function renderVerdict(){
    var g=grade();
    var v=$("verdictBox"), cls, txt;
    if(g.status==="pass"){ cls="ok"; txt=X("PASS — meets IEC 61300-3-35","APROBADO — cumple IEC 61300-3-35"); }
    else if(g.status==="dirty"){ cls="amb"; txt=X("CONTAMINATED — clean, then re-inspect","CONTAMINADO — limpia y vuelve a inspeccionar"); }
    else { cls="no"; txt=X("FAIL — permanent damage, re-terminate","FALLA — daño permanente, reterminar"); }
    var ic = g.status==="pass"?ICO.ok:(g.status==="dirty"?ICO.drop:ICO.no);
    v.innerHTML='<span class="verdict '+cls+'">'+ic+' '+txt+'</span>';

    var html="";
    g.zones.forEach(function(z){
      var pill = z.na ? '<span class="pill na">'+X("N/A","N/A")+'</span>'
                      : (z.pass? '<span class="pill ok">'+X("Pass","OK")+'</span>'
                               : '<span class="pill no">'+X("Fail","Falla")+'</span>');
      var counts=X("Scr","Ray")+" "+z.ns+" · "+X("Def","Def")+" "+z.nd;
      var reason = z.fail.length? '<div class="zr" style="color:var(--bad)">'+esc(z.fail.join("; "))+'</div>' : "";
      html+='<div class="zrow">'+
        '<span class="zbadge" style="background:'+ZCOL[z.z]+'">'+z.z+'</span>'+
        '<div class="zbody"><div class="zt"><span>'+X(ZN[z.z][0],ZN[z.z][1])+'</span>'+pill+'</div>'+
        '<div class="zr">'+X(ZR[z.z][0],ZR[z.z][1])+' — <b style="color:var(--ink)">'+counts+'</b></div>'+
        reason+'</div></div>';
    });
    // contamination line
    if(g.dirty){
      var parts=[]; if(S.dust.length>0) parts.push(S.dust.length+" "+X("dust particles","partículas de polvo")); if(S.oil) parts.push(X("oil / fingerprint","aceite / huella"));
      html+='<div class="note warn" style="margin-top:12px">'+ICO.drop+' '+
        X("Contamination present ("+parts.join(", ")+"). You cannot grade a dirty end-face — clean it and inspect again (Inspect–Clean–Inspect).",
          "Hay contaminación ("+parts.join(", ")+"). No se puede evaluar una cara sucia — límpiala e inspecciona de nuevo (Inspeccionar–Limpiar–Inspeccionar).")+'</div>';
    } else if(g.permFail){
      html+='<div class="note" style="margin-top:12px">'+X("These are permanent scratches/digs — cleaning will not remove them. Replace or re-terminate the connector.",
          "Son rayones/picaduras permanentes — la limpieza no los quita. Reemplaza o retermina el conector.")+'</div>';
    } else {
      html+='<div class="note" style="margin-top:12px">'+X("Clean end-face within limits. In the field, confirm with the microscope before every mating.",
          "Cara limpia dentro de límites. En campo, confirma con el microscopio antes de cada acople.")+'</div>';
    }
    $("zoneBox").innerHTML=html;
  }

      [X("Ferrule","Férula"),X(c.ferrule[0],c.ferrule[1])],
      [X("Coupling","Acople"),X(c.coupling[0],c.coupling[1])],
      [X("Typical use","Uso típico"),X(c.use[0],c.use[1])],
      [X("Polish","Pulido"),X(p.geo[0],p.geo[1])],

    $("resetBtn").onclick=function(){ S.nScr=0;S.nDig=0;S.nDust=0;S.oil=false;S.scr=[];S.dig=[];S.dust=[];S.wScr=2;S.sDig=4; renderSegs(); updateSandbox(); };

  /* ===================== SCENARIOS ===================== */
  // draw helpers for scenarios
  function drawMate(ctx,colL,colR,touch){
    ctx.clearRect(0,0,300,300);
    ctx.fillStyle="rgba(255,255,255,.02)"; ctx.fillRect(0,0,300,300);
    function body(x,dir,col){
      ctx.fillStyle=col; roundRect(ctx,x,110,70,80,10); ctx.fill();
      ctx.fillStyle="rgba(0,0,0,.25)"; ctx.fillRect(dir>0?x+62:x, 128, 8, 44); // boot line
      // ferrule
      ctx.fillStyle="#e7ebf0";
      var fx = dir>0 ? x+70 : x;
      ctx.fillRect(dir>0?fx:fx-24, 138, 24, 24);
      ctx.fillStyle="#9aa4b2"; ctx.beginPath();
      ctx.arc(dir>0?fx+ (touch?24:24):fx-(touch?24:24), 150, 11, 0,7); ctx.fill();
    }
    body(45,1,colL);
    body(185,-1,colR);
    // gap / warning spark
    ctx.strokeStyle="#f2d024"; ctx.lineWidth=2; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(150,120); ctx.lineTo(150,180); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle="#f2d024"; ctx.font="700 26px system-ui"; ctx.textAlign="center";
    ctx.fillText("!",150,158);
  }
  function drawBulkhead(ctx){
    ctx.clearRect(0,0,300,300);
    // adapter
    ctx.fillStyle="#2b3442"; roundRect(ctx,110,100,80,100,10); ctx.fill();
    ctx.fillStyle="#1b2230"; ctx.fillRect(140,100,20,100);
    // inserted connector (left, visible/clean)
    ctx.fillStyle="#2f6fed"; roundRect(ctx,20,120,90,60,9); ctx.fill();
    ctx.fillStyle="#e7ebf0"; ctx.fillRect(110,140,20,20);
    // far side hidden — dust specks
    for(var i=0;i<14;i++){ var x=200+Math.random()*70,y=120+Math.random()*60;
      ctx.beginPath(); ctx.arc(x,y,1.6,0,7); ctx.fillStyle="rgba(235,225,205,.85)"; ctx.fill(); }
    ctx.fillStyle="#8aa0bd"; ctx.font="700 34px system-ui"; ctx.textAlign="center";
    ctx.fillText("?",235,162);
    ctx.fillStyle="#8aa0bd"; ctx.font="600 11px system-ui";
    ctx.fillText(X("hidden side","lado oculto"),235,190);
  }
  function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

    { cat:["Inspect both sides","Inspeccionar ambos lados"],
      render:function(ctx){ drawBulkhead(ctx); },
      cap:["You cleaned your patch cord, but the bulkhead's far side is hidden inside the adapter.","Limpiaste tu patch cord, pero el lado lejano del bulkhead está oculto dentro del adaptador."],
      prompt:["You cannot see the port side of a bulkhead. Before mating you should…","No ves el lado del puerto de un bulkhead. Antes de acoplar debes…"],
      opts:[["Inspect BOTH sides first","Inspecciona AMBOS lados primero"],["Just mate — your cord is clean","Solo acopla — tu cable está limpio"],["Inspect only your patch cord","Inspecciona solo tu patch cord"],["Blow into the port","Sopla dentro del puerto"]],
      correct:0,
      why:["A clean connector mated to a dirty port gets contaminated instantly. Use a bulkhead/port scope to inspect the hidden side too. Never blow on it — breath adds moisture and oil.",
           "Un conector limpio acoplado a un puerto sucio se contamina al instante. Usa una sonda de puerto para inspeccionar el lado oculto. Nunca soples — el aliento agrega humedad y aceite."],
      trap:["Trap: assuming a clean cord is enough — the port you cannot see is often the dirty one.","Trampa: creer que basta un cable limpio — el puerto que no ves suele ser el sucio."] },

    { cat:["Still failing after cleaning","Sigue fallando tras limpiar"],
      render:function(ctx){ drawFace(ctx,faceCfg({dig:[{r:4,ang:1.2}],sDig:6})); },
      cap:["After several cleanings the face still shows one dark pit in the core (zone A).","Tras varias limpiezas la cara sigue mostrando una picadura oscura en el núcleo (zona A)."],
      prompt:["It still fails after repeated cleaning. Why, and what next?","Sigue fallando tras limpiar varias veces. ¿Por qué y qué haces?"],
      opts:[["Clean harder with more alcohol","Limpia más fuerte con más alcohol"],["It is a permanent dig — replace it","Es una picadura permanente — reemplázalo"],["Ignore it and mate","Ignóralo y acopla"],["Re-inspect at lower magnification","Reinspecciona a menor aumento"]],
      correct:1,
      why:["If cleaning does not change the image, the flaw is a dig/pit in the glass, not contamination. A defect in the core fails IEC 61300-3-35 — replace or re-terminate.",
           "Si la limpieza no cambia la imagen, es una picadura en el vidrio, no suciedad. Un defecto en el núcleo reprueba IEC 61300-3-35 — reemplaza o retermina."],
      trap:["Trap: over-cleaning permanent damage — extra alcohol will not fix broken glass.","Trampa: sobre-limpiar un daño permanente — más alcohol no repara el vidrio."] },

    { cat:["Inspect before mating","Inspeccionar antes de acoplar"],
      render:function(ctx){ drawMate(ctx,"#2f6fed","#2f6fed",false); },
      cap:["Two connectors, never inspected, about to be pushed together to save time.","Dos conectores, sin inspeccionar, a punto de unirse para ahorrar tiempo."],
      prompt:["Under time pressure, you are tempted to mate without inspecting. Do you…","Con prisa, te tienta acoplar sin inspeccionar. ¿Qué haces?"],
      opts:[["Mate quickly to save time","Acopla rápido para ganar tiempo"],["Inspect first, clean if needed, then mate","Inspecciona, limpia si hace falta, luego acopla"],["Wipe it on your sleeve","Límpialo en la manga"],["Blow on it and mate","Sopla y acopla"]],
      correct:1,
      why:["Mating a dirty connector presses debris into both faces, creating permanent pits on two connectors at once. Inspect–Clean–Inspect every time — it is faster than re-terminating two ends.",
           "Acoplar un conector sucio incrusta partículas en ambas caras, creando picaduras permanentes en dos conectores a la vez. Inspeccionar–Limpiar–Inspeccionar siempre — es más rápido que reterminar dos extremos."],
      trap:["Trap: 'saving time' by skipping inspection usually costs two connectors and a truck roll.","Trampa: 'ahorrar tiempo' saltando la inspección suele costar dos conectores y una visita."] }
  ];

  var scnOrder=[], scnI=0, scnAnswered=false;
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
  function scnBuild(){ scnOrder=shuffle(SCN.map(function(_,i){return i;})); scnI=0; }

  function renderScenario(){
    var sc=SCN[scnOrder[scnI]]; scnAnswered=false;
    $("scnCat").textContent=X(sc.cat[0],sc.cat[1]);
    var ctx=setup($("scnCanvas")); sc.render(ctx);
    $("scnCap").textContent=X(sc.cap[0],sc.cap[1]);
    $("scnPrompt").textContent=X(sc.prompt[0],sc.prompt[1]);
    var order=shuffle(sc.opts.map(function(_,i){return i;}));
    $("scnOpts").innerHTML=order.map(function(oi){
      return '<button class="opt" data-oi="'+oi+'">'+esc(X(sc.opts[oi][0],sc.opts[oi][1]))+'</button>';
    }).join("");
    $("scnOpts").querySelectorAll(".opt").forEach(function(b){
      b.onclick=function(){ scnPick(+b.getAttribute("data-oi")); };
    });
    $("scnFb").classList.remove("show"); $("scnFb").innerHTML="";
    $("scnRetry").style.display="none";
    $("scnRetry").textContent=X("Retry","Reintentar");
    $("scnNext").textContent=X("New scenario","Nuevo escenario");
    $("scnProg").textContent=X("Scenario","Escenario")+" "+(scnI+1)+"/"+SCN.length;
  }
  function scnPick(oi){
    if(scnAnswered) return; scnAnswered=true;
    var sc=SCN[scnOrder[scnI]];
    $("scnOpts").querySelectorAll(".opt").forEach(function(b){
      var bi=+b.getAttribute("data-oi"); b.disabled=true;
      if(bi===sc.correct) b.classList.add("correct");
      else if(bi===oi) b.classList.add("wrong");
    });
    var right=oi===sc.correct;
    var html='<b>'+(right?X("Correct.","Correcto."):X("Not the best choice.","No es la mejor opción."))+'</b> '+esc(X(sc.why[0],sc.why[1]));
    if(!right) html+='<span class="trap">'+esc(X(sc.trap[0],sc.trap[1]))+'</span>';
    $("scnFb").innerHTML=html; $("scnFb").classList.add("show");
    $("scnRetry").style.display="inline-flex";
  }

  /* ===================== chrome / mode ===================== */
  function applyTheme(){ document.documentElement.setAttribute("data-theme",THEME);
    $("temaIco").innerHTML=THEME==="dark"?ICO.sun:ICO.moon;
    $("temaTxt").textContent=THEME==="dark"?X("Light","Claro"):X("Dark","Oscuro"); }

  function renderModeSeg(){
    $("modeseg").innerHTML=
      '<button data-m="sandbox" class="'+(mode==="sandbox"?"on":"")+'">'+ICO.scope+' '+X("Sandbox","Práctica libre")+'</button>'+
      '<button data-m="scenarios" class="'+(mode==="scenarios"?"on":"")+'">'+ICO.brain+' '+X("Scenarios","Escenarios")+'</button>';
    $("modeseg").querySelectorAll("button").forEach(function(b){
      b.onclick=function(){ mode=b.getAttribute("data-m"); showMode(); };
    });
  }
  function showMode(){
    renderModeSeg();
    if(mode==="sandbox"){ $("sandbox").style.display=""; $("scenarios").style.display="none";
      renderSegs(); renderLegend(); renderRef(); renderTIA(); updateSandbox(); }
    else { $("sandbox").style.display="none"; $("scenarios").style.display="";
      renderScenario(); }
  }

  function chrome(){
    applyTheme(); document.documentElement.lang=LANG;
    $("brand").textContent=X("End-Face Trainer","Entrenador de caras");
    $("brandsub").textContent=X("Lab · Module 1","Lab · Módulo 1");
    $("homeTxt").textContent=X("Labs","Labs"); $("suggestTxt").textContent=X("Suggestions","Sugerencias"); $("suggestBtn").title=X("Send a suggestion","Enviar una sugerencia");
    $("lang").querySelectorAll("button").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-l")===LANG); });
    $("title").textContent=X("Connector & end-face inspection trainer","Entrenador de inspección de conectores y caras");
    $("lead").textContent=X("Practise fiber end-face inspection to IEC 61300-3-35. Build defects in the Sandbox and read the pass/fail zones, or work real decision Scenarios to master Inspect–Clean–Inspect.",
                           "Practica la inspección de caras de fibra según IEC 61300-3-35. Crea defectos en la Práctica libre y lee las zonas de aprobado/reprobado, o resuelve Escenarios reales para dominar Inspeccionar–Limpiar–Inspeccionar.");

    // sandbox static labels
    $("scopeTitle").textContent=X("Inspection microscope","Microscopio de inspección");
    $("ctrlTitle").textContent=X("Controls","Controles");
    $("verdictTitle").textContent=X("IEC 61300-3-35 verdict","Veredicto IEC 61300-3-35");
    $("refTitle").textContent=X("Connector reference","Referencia del conector");
    $("lConn").textContent=X("Connector type","Tipo de conector");
    $("lPol").textContent=X("Polish (end-face)","Pulido (cara)");
    $("lNScr").textContent=X("Scratches","Rayones");
    $("lWScr").textContent=X("Scratch width","Ancho de rayón");
    $("hWScr").textContent=X("> 3 µm fails in core & cladding","> 3 µm reprueba en núcleo y revestimiento");
    $("lNDig").textContent=X("Digs / pits / chips","Picaduras / astillas");
    $("lSDig").textContent=X("Defect size","Tamaño de defecto");
    $("hSDig").textContent=X("Any defect in the core fails","Cualquier defecto en el núcleo reprueba");
    $("lNDust").textContent=X("Contamination — dust","Contaminación — polvo");
    $("cleanBtn").innerHTML=ICO.drop+' '+X("Clean","Limpiar");
    $("resetBtn").textContent=X("Reset","Reiniciar");
    $("cleanNote").innerHTML=X("Clean removes contamination only — dry-clean first (cleaning tool/cassette), wet-clean (99% IPA) only if needed. Scratches and digs are permanent and stay.",
                              "Limpiar quita solo la contaminación — limpieza en seco primero (herramienta/casete), en húmedo (IPA 99%) solo si hace falta. Rayones y picaduras son permanentes y quedan.");
    $("tiaBtn").textContent=($("tiaBox").style.display!=="none")?X("Hide TIA-598-C color code","Ocultar código TIA-598-C"):X("Show TIA-598-C color code","Ver código de color TIA-598-C");

    $("foot").innerHTML=X("References: IEC 61300-3-35 (end-face zones &amp; limits), IEC 61755 (APC/UPC/PC), TIA-598-C (color code). Simplified single-mode limits for training.",
                          "Referencias: IEC 61300-3-35 (zonas y límites de cara), IEC 61755 (APC/UPC/PC), TIA-598-C (código de color). Límites monomodo simplificados para entrenamiento.");
    renderTIA();
    showMode();
  }

  $("tema").onclick=function(){ THEME=THEME==="dark"?"light":"dark"; if(window.FOT&&FOT.setTheme)FOT.setTheme(THEME);
    applyTheme(); if(mode==="sandbox") drawSandboxFace(); else { var ctx=setup($("scnCanvas")); SCN[scnOrder[scnI]].render(ctx); } };
  $("lang").querySelectorAll("button").forEach(function(b){
    b.onclick=function(){ LANG=b.getAttribute("data-l"); if(window.FOT&&FOT.setLang)FOT.setLang(LANG); chrome(); };
  });
  $("scnRetry").onclick=function(){ renderScenario(); };
  $("scnNext").onclick=function(){ scnI=(scnI+1)%scnOrder.length; if(scnI===0) scnOrder=shuffle(scnOrder); renderScenario(); };

  wireSliders();
  scnBuild();
  chrome();
})();
</script>
</body>
