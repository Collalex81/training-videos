<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connector & Color Trainer — Lab</title>
<!-- TELECOM (azul) — Lab: flashcards de conectores, pulido y color TIA-598-C. Refuerza Módulo 1. -->
<style>
  :root{
    --pg:#f3f6fc; --card:#ffffff; --ink:#0c1c34; --sub:#51618a; --line:#dde5f3;
    --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.12); --bad:#dc2626; --badt:rgba(220,38,38,.12);
    --radius:16px; --shadow:0 1px 2px rgba(12,28,52,.05),0 10px 26px rgba(12,28,52,.08);
  }
  html[data-theme="dark"]{
    --pg:#0a1120; --card:#141d30; --ink:#e9f0ff; --sub:#9db0d6; --line:#243149;
    --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.16); --bad:#f87171; --badt:rgba(248,113,113,.16);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  a{color:inherit;text-decoration:none}
  .shell{max-width:720px;margin:0 auto;padding:14px 18px 60px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#1e3a8a);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:700;display:block;line-height:1.15}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}

  h1{font-size:20px;margin:14px 2px 4px}
  .lead{color:var(--sub);font-size:13.5px;margin:0 2px 14px}
  .decks{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--sub);cursor:pointer;padding:8px 13px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
  .qcat{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:3px 9px;border-radius:999px;display:inline-block;margin-bottom:12px}
  .swatch{width:100%;height:64px;border-radius:12px;border:1px solid var(--line);margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;color:rgba(0,0,0,.55)}
  .qtext{font-size:17px;font-weight:700;line-height:1.35;margin-bottom:14px}
  .opts{display:grid;gap:9px}
  .opt{border:1px solid var(--line);background:var(--pg);color:var(--ink);cursor:pointer;padding:12px 14px;border-radius:11px;font-size:14.5px;font-family:inherit;text-align:left}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad);font-weight:600}
  .opt[disabled]{cursor:default}
  .fb{margin-top:13px;font-size:13px;color:var(--sub);border-left:3px solid var(--accent);padding-left:11px;display:none}
  .fb.show{display:block} .fb b{color:var(--ink)}
  .row{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
  .score{font-size:13px;color:var(--sub)} .score b{color:var(--ink)}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .foot{margin-top:24px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--sub);text-align:center}
</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <div class="top">
      <div class="brand">
        <span class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg></span>
        <div><b id="brand"></b><small id="brandsub"></small></div>
      </div>
      <div class="tools">
        <a class="tbtn" id="home" href="index.html" target="_top"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg><span id="homeTxt"></span></a>
        <button class="tbtn" id="tema"><span id="temaIco"></span><span id="temaTxt"></span></button>
        <div class="lang" id="lang"><button data-l="en">EN</button><button data-l="es">ES</button></div>
      </div>
    </div>
  </div>

  <h1 id="title"></h1>
  <p class="lead" id="lead"></p>
  <div class="decks" id="decks"></div>

  <div class="card">
    <span class="qcat" id="qcat"></span>
    <div class="swatch" id="swatch" style="display:none"></div>
    <div class="qtext" id="qtext"></div>
    <div class="opts" id="opts"></div>
    <div class="fb" id="fb"></div>
    <div class="row"><span class="score" id="score"></span><button class="btn" id="next"></button></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script src="../scripts/progress.js"></script>
<script>
(function(){
  function $(id){ return document.getElementById(id); }
  var LANG=(window.FOT&&FOT.getLang)?FOT.getLang():"en";
  var THEME=(window.FOT&&FOT.getTheme)?FOT.getTheme():"light";
  function X(en,es){ return LANG==="es"?es:en; }
  function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }

  var ICO={
    sun:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    moon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
  };

  var DECKS=[
    {k:"all",  t:["All","Todas"]},
    {k:"conn", t:["Connectors","Conectores"]},
    {k:"pol",  t:["Polish","Pulido"]},
    {k:"col",  t:["Color code","Código de color"]}
  ];
  var DL={}; DECKS.forEach(function(d){ DL[d.k]=d.t; });

  // sw = color de swatch (opcional). o = opciones, a = índice correcto, e = explicación
  var CARDS=[
    // Connectors
    {c:"conn", q:["Which connector uses a 1.25 mm ferrule and a small latch, and is the most common in high-density gear?",
                  "¿Qué conector usa férula de 1.25 mm y un pequeño pestillo, y es el más común en equipos de alta densidad?"],
     o:[["LC","LC"],["SC","SC"],["ST","ST"],["FC","FC"]], a:0,
     e:["LC (Lucent Connector) — small 1.25 mm ferrule, push-latch, dominant in modern SFP/QSFP gear.",
        "LC (Lucent Connector) — férula pequeña de 1.25 mm, con pestillo, dominante en equipos SFP/QSFP modernos."]},
    {c:"conn", q:["A square 2.5 mm push-pull connector, common in patch panels and older equipment, is the…",
                  "Un conector cuadrado push-pull de 2.5 mm, común en patch panels y equipos antiguos, es el…"],
     o:[["LC","LC"],["SC","SC"],["MPO","MPO"],["E2000","E2000"]], a:1,
     e:["SC (Subscriber Connector) — 2.5 mm ferrule, push-pull square body.",
        "SC (Subscriber Connector) — férula de 2.5 mm, cuerpo cuadrado push-pull."]},
    {c:"conn", q:["Which connector carries many fibers (8–24) in one ferrule for 40G/100G parallel optics and trunks?",
                  "¿Qué conector lleva muchas fibras (8–24) en una férula para óptica paralela 40G/100G y troncales?"],
     o:[["FC","FC"],["ST","ST"],["MPO / MTP","MPO / MTP"],["LC","LC"]], a:2,
     e:["MPO/MTP — multi-fiber push-on, used for parallel optics and high-density trunk cabling.",
        "MPO/MTP — push-on multifibra, para óptica paralela y cableado troncal de alta densidad."]},
    {c:"conn", q:["A metal connector with a threaded (screw-on) coupling is the…",
                  "Un conector metálico con acople roscado (a tornillo) es el…"],
     o:[["FC","FC"],["LC","LC"],["SC","SC"],["MPO","MPO"]], a:0,
     e:["FC (Ferrule Connector) — threaded metal coupling, once common on test gear and in high-vibration settings.",
        "FC (Ferrule Connector) — acople metálico roscado, antes común en equipos de prueba y entornos con vibración."]},

    // Polish
    {c:"pol", q:["A GREEN connector body indicates which end-face polish?","Un cuerpo de conector VERDE indica ¿qué pulido de cara?"],
     sw:"#1f9d55", swt:["Green","Verde"],
     o:[["UPC (flat)","UPC (plano)"],["APC (8° angled)","APC (angulado 8°)"],["PC","PC"],["MPO","MPO"]], a:1,
     e:["Green = APC: an 8° angled end-face with ≥60 dB return loss. Never mate it to a UPC.",
        "Verde = APC: cara angulada 8° con ≥60 dB de pérdida de retorno. Nunca lo acoples a un UPC."]},
    {c:"pol", q:["A BLUE single-mode connector body indicates which polish?","Un cuerpo de conector monomodo AZUL indica ¿qué pulido?"],
     sw:"#2563EB", swt:["Blue","Azul"],
     o:[["APC","APC"],["UPC (flat, ~50 dB RL)","UPC (plano, ~50 dB RL)"],["Angled 8°","Angulado 8°"],["MTP","MTP"]], a:1,
     e:["Blue = UPC: an ultra physical-contact flat polish, ~50 dB return loss.",
        "Azul = UPC: pulido ultra de contacto físico plano, ~50 dB de pérdida de retorno."]},
    {c:"pol", q:["What happens if you mate an APC connector to a UPC connector?","¿Qué pasa si acoplas un conector APC con uno UPC?"],
     o:[["Nothing, they're compatible","Nada, son compatibles"],["Better return loss","Mejor pérdida de retorno"],["High loss and possible end-face damage","Alta pérdida y posible daño de la cara"],["Wavelength conversion","Conversión de longitud de onda"]], a:2,
     e:["The 8° angle vs. flat geometry can't make proper contact — high loss and physical damage.",
        "La geometría 8° vs. plana no logra buen contacto — alta pérdida y daño físico."]},
    {c:"pol", q:["Which polish has the HIGHEST (best) return loss?","¿Qué pulido tiene la MAYOR (mejor) pérdida de retorno?"],
     o:[["PC","PC"],["UPC","UPC"],["APC","APC"],["All equal","Todos iguales"]], a:2,
     e:["APC ≥60 dB > UPC ~50 dB > PC ~40 dB. Higher return loss = less reflection.",
        "APC ≥60 dB > UPC ~50 dB > PC ~40 dB. Mayor pérdida de retorno = menos reflexión."]},

    // Color code (TIA-598-C)
    {c:"col", q:["A YELLOW cable jacket most likely means…","Una chaqueta de cable AMARILLA probablemente significa…"],
     sw:"#f2d024", swt:["Yellow","Amarillo"],
     o:[["OM3/OM4 multimode","OM3/OM4 multimodo"],["Single-mode (OS1/OS2)","Monomodo (OS1/OS2)"],["OM1 multimode","OM1 multimodo"],["Power cable","Cable de energía"]], a:1,
     e:["Per TIA-598-C, yellow jacket = single-mode. Always confirm with the printed legend.",
        "Según TIA-598-C, chaqueta amarilla = monomodo. Confirma siempre con la leyenda impresa."]},
    {c:"col", q:["An AQUA cable jacket indicates…","Una chaqueta de cable AQUA indica…"],
     sw:"#4fd6d6", swt:["Aqua","Aqua"],
     o:[["Single-mode","Monomodo"],["OM3 / OM4 multimode","OM3 / OM4 multimodo"],["OM1 62.5 µm","OM1 62.5 µm"],["Copper","Cobre"]], a:1,
     e:["Aqua = laser-optimized OM3/OM4 multimode. (Lime green = OM5.)",
        "Aqua = multimodo OM3/OM4 optimizado para láser. (Verde lima = OM5.)"]},
    {c:"col", q:["In the TIA-598-C fiber color code, fiber #1 is…","En el código de color TIA-598-C, la fibra #1 es…"],
     o:[["Orange","Naranja"],["Blue","Azul"],["Green","Verde"],["Brown","Café"]], a:1,
     e:["The sequence starts Blue, Orange, Green, Brown, Slate, White, Red, Black, Yellow, Violet, Rose, Aqua.",
        "La secuencia empieza Azul, Naranja, Verde, Café, Gris, Blanco, Rojo, Negro, Amarillo, Violeta, Rosa, Aqua."]},
    {c:"col", q:["In the TIA-598-C fiber color code, fiber #2 is…","En el código de color TIA-598-C, la fibra #2 es…"],
     sw:"#e8802b", swt:["Orange","Naranja"],
     o:[["Green","Verde"],["Orange","Naranja"],["Blue","Azul"],["Slate","Gris"]], a:1,
     e:["#1 Blue, #2 Orange, #3 Green… a handy memory hook is 'Blue Orange Green'.",
        "#1 Azul, #2 Naranja, #3 Verde… un truco es recordar 'Azul Naranja Verde'."]},
    {c:"col", q:["An ORANGE jacket on older multimode usually means…","Una chaqueta NARANJA en multimodo antiguo suele significar…"],
     sw:"#e8802b", swt:["Orange","Naranja"],
     o:[["Single-mode","Monomodo"],["OM1/OM2 multimode (62.5/50 µm)","Multimodo OM1/OM2 (62.5/50 µm)"],["OM4","OM4"],["APC patch","Patch APC"]], a:1,
     e:["Legacy multimode (OM1/OM2) commonly used an orange jacket; OM3/OM4 moved to aqua.",
        "El multimodo antiguo (OM1/OM2) usaba comúnmente chaqueta naranja; OM3/OM4 pasó a aqua."]}
  ];

  var deck="all", queue=[], idx=0, answered=false, score=0, done=0;

  function applyTheme(){ document.documentElement.setAttribute("data-theme",THEME);
    $("temaIco").innerHTML=THEME==="dark"?ICO.sun:ICO.moon;
    $("temaTxt").textContent=THEME==="dark"?X("Light","Claro"):X("Dark","Oscuro"); }

  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildQueue(){
    var pool=CARDS.filter(function(c){ return deck==="all"||c.c===deck; });
    queue=shuffle(pool); idx=0; score=0; done=0; answered=false;
  }

  function renderDecks(){
    $("decks").innerHTML=DECKS.map(function(d){
      return '<button class="chip'+(d.k===deck?" on":"")+'" data-k="'+d.k+'">'+X(d.t[0],d.t[1])+'</button>';
    }).join("");
    $("decks").querySelectorAll(".chip").forEach(function(b){
      b.onclick=function(){ deck=b.getAttribute("data-k"); renderDecks(); buildQueue(); renderCard(); };
    });
  }

  function renderCard(){
    if(idx>=queue.length){ renderSummary(); return; }
    var card=queue[idx]; answered=false;
    $("qcat").textContent=X(DL[card.c][0],DL[card.c][1]);
    if(card.sw){ $("swatch").style.display="flex"; $("swatch").style.background=card.sw;
      $("swatch").textContent=X(card.swt[0],card.swt[1]); }
    else { $("swatch").style.display="none"; }
    $("qtext").textContent=X(card.q[0],card.q[1]);
    // barajar opciones manteniendo el índice correcto
    var order=shuffle(card.o.map(function(_,i){ return i; }));
    $("opts").innerHTML=order.map(function(oi){
      return '<button class="opt" data-oi="'+oi+'">'+esc(X(card.o[oi][0],card.o[oi][1]))+'</button>';
    }).join("");
    $("opts").querySelectorAll(".opt").forEach(function(b){
      b.onclick=function(){ pick(+b.getAttribute("data-oi")); };
    });
    $("fb").classList.remove("show"); $("fb").innerHTML="";
    $("next").textContent=X("Skip","Saltar");
    $("next").disabled=false;
    $("next").onclick=advance;
    updateScore();
  }

  function pick(oi){
    if(answered) return;
    answered=true; done++;
    var card=queue[idx];
    $("opts").querySelectorAll(".opt").forEach(function(b){
      var bi=+b.getAttribute("data-oi"); b.disabled=true;
      if(bi===card.a) b.classList.add("correct");
      else if(bi===oi) b.classList.add("wrong");
    });
    if(oi===card.a) score++;
    $("fb").innerHTML='<b>'+(oi===card.a?X("Correct.","Correcto."):X("Not quite.","No exactamente."))+'</b> '+esc(X(card.e[0],card.e[1]));
    $("fb").classList.add("show");
    $("next").textContent=(idx<queue.length-1)?X("Next","Siguiente"):X("See results","Ver resultados");
    updateScore();
  }

  function advance(){ idx++; renderCard(); }

  function updateScore(){ $("score").innerHTML=X("Score","Puntaje")+': <b>'+score+'/'+done+'</b> · '+
    (idx<queue.length?X("Card","Tarjeta")+' '+(idx+1)+'/'+queue.length:''); }

  function renderSummary(){
    var pct=done?Math.round(score/done*100):0;
    $("qcat").textContent=X("Deck complete","Mazo completo");
    $("swatch").style.display="none";
    $("qtext").textContent=X("You scored "+score+"/"+done+" ("+pct+"%).","Obtuviste "+score+"/"+done+" ("+pct+"%).");
    $("opts").innerHTML="";
    $("fb").innerHTML='<b>'+X("Nice work.","Buen trabajo.")+'</b> '+X("Practice again or switch decks any time — this lab is ungraded.",
                                                                        "Practica de nuevo o cambia de mazo cuando quieras — este laboratorio no se califica.");
    $("fb").classList.add("show");
    $("score").innerHTML="";
    $("next").textContent=X("Restart deck","Reiniciar mazo");
    $("next").disabled=false;
    $("next").onclick=function(){ buildQueue(); renderCard(); };
  }

  function chrome(){
    applyTheme(); document.documentElement.lang=LANG;
    $("brand").textContent=X("Connector Trainer","Entrenador de conectores");
    $("brandsub").textContent=X("Lab · Module 1","Lab · Módulo 1");
    $("homeTxt").textContent=X("Labs","Labs");
    $("lang").querySelectorAll("button").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-l")===LANG); });
    $("title").textContent=X("Connector & color trainer","Entrenador de conectores y colores");
    $("lead").textContent=X("Flashcards on connector types, PC/UPC/APC polish and the TIA-598-C color code. Pick a deck and go.",
                           "Flashcards de tipos de conector, pulido PC/UPC/APC y el código de color TIA-598-C. Elige un mazo y empieza.");
    $("foot").innerHTML=X("Reference: TIA-598-C color coding, IEC 61755 (APC/UPC/PC end-faces).",
                          "Referencia: código de color TIA-598-C, IEC 61755 (caras APC/UPC/PC).");
    renderDecks();
  }

  $("tema").onclick=function(){ THEME=THEME==="dark"?"light":"dark"; if(window.FOT&&FOT.setTheme)FOT.setTheme(THEME); applyTheme(); };
  $("lang").querySelectorAll("button").forEach(function(b){
    b.onclick=function(){ LANG=b.getAttribute("data-l"); if(window.FOT&&FOT.setLang)FOT.setLang(LANG);
      chrome();
      // re-render tarjeta actual en el nuevo idioma
      if(idx<queue.length) renderCard(); else renderSummary();
    };
  });

  chrome();
  buildQueue();
  renderCard();
})();
</script>
</body>
</html>
