<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTDR Trace Reader — Lab</title>
<!-- TELECOM (azul) — Lab: OTDR realista (Sandbox + Escenarios) en canvas. Refuerza Módulo 4. -->
<style>
  :root{
    --pg:#f3f6fc; --card:#ffffff; --ink:#0c1c34; --sub:#51618a; --line:#dde5f3;
    --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.12); --bad:#dc2626; --badt:rgba(220,38,38,.12);
    --amber:#b45309; --ambt:rgba(180,83,9,.14);
    --radius:16px; --shadow:0 1px 2px rgba(12,28,52,.05),0 10px 26px rgba(12,28,52,.08);
    --scr:#08152b; --grid:#123a63; --trace:#31d67a;
  }
  html[data-theme="dark"]{
    --pg:#0a1120; --card:#141d30; --ink:#e9f0ff; --sub:#9db0d6; --line:#243149;
    --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.16); --bad:#f87171; --badt:rgba(248,113,113,.16);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.16);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
    --scr:#020b18; --grid:#0f3057; --trace:#31d67a;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  a{color:inherit;text-decoration:none}
  .shell{max-width:960px;margin:0 auto;padding:14px 18px 60px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#1e3a8a);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:700;display:block;line-height:1.15}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}

  h1{font-size:20px;margin:14px 2px 4px}
  .lead{color:var(--sub);font-size:13.5px;margin:0 2px 14px;max-width:680px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
  .card h2{font-size:12.5px;margin:0 0 12px;text-transform:uppercase;letter-spacing:.04em;color:var(--sub)}

  /* mode toggle */
  .modebar{display:flex;justify-content:center;margin:2px 0 16px}
  .modeseg{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px}
  .modeseg button{border:0;background:transparent;color:var(--sub);cursor:pointer;padding:9px 18px;border-radius:999px;font-size:13.5px;font-weight:700;font-family:inherit;display:flex;align-items:center;gap:7px}
  .modeseg button.on{background:var(--accent);color:#fff}

  .screen{background:var(--scr);border-radius:12px;padding:10px;position:relative}
  canvas{width:100%;height:auto;display:block;border-radius:8px;touch-action:none;cursor:crosshair}
  .scrhint{font-size:11px;color:#7fa8d6;text-align:center;margin-top:6px}

  /* controls */
  .panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:14px;margin-top:14px}
  .ctrl .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:8px}
  .ctrl label{font-size:12.5px;font-weight:700}
  .ctrl .val{font-size:12.5px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:var(--accent);height:26px}
  .seg{display:flex;gap:5px;flex-wrap:wrap}
  .seg button{border:1px solid var(--line);background:var(--pg);color:var(--ink);cursor:pointer;padding:7px 11px;border-radius:9px;font-size:12px;font-family:inherit;font-weight:600}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .hint{font-size:11px;color:var(--sub);margin-top:4px}
  .toggles{display:flex;gap:8px;flex-wrap:wrap}

  /* readouts */
  .reads{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px}
  .rd{background:var(--pg);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  .rd small{display:block;font-size:10.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
  .rd b{font-size:16px;font-variant-numeric:tabular-nums}
  .rd.a b{color:var(--accent)} .rd.b b{color:var(--amber)}

  /* table */
  .tblwrap{overflow-x:auto;margin-top:6px;border:1px solid var(--line);border-radius:10px}
  table{border-collapse:collapse;width:100%;font-size:12.5px;min-width:460px}
  th,td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;font-variant-numeric:tabular-nums}
  th:first-child,td:first-child{text-align:left}
  th:nth-child(2),td:nth-child(2){text-align:left}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--sub);font-weight:700}
  tr:last-child td{border-bottom:0}
  .evdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:baseline}
  .ghostrow td{color:var(--sub);font-style:italic}
  .tnote{font-size:11.5px;color:var(--amber);margin-top:8px}

  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:9px 14px;border-radius:9px;font-size:13px;font-weight:600;font-family:inherit;min-height:38px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn.ghost{background:transparent;color:var(--accent)}
  .btn.mini{padding:7px 12px;min-height:34px;font-size:12.5px}
  .rowbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;align-items:center}

  /* scenarios */
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:var(--pg);color:var(--ink);cursor:pointer;padding:9px 12px;border-radius:10px;font-size:12.5px;font-family:inherit;font-weight:600;display:flex;gap:8px;align-items:center;text-align:left}
  .chip:hover{border-color:var(--accent)}
  .chip.on{border-color:var(--accent);background:var(--tint);color:var(--accent)}
  .chip .cic{width:20px;height:20px;flex:none;display:flex;align-items:center;justify-content:center}
  .symptom{display:flex;gap:11px;background:var(--ambt);border:1px solid var(--amber);border-radius:12px;padding:12px 13px;margin-bottom:14px}
  .symptom .sic{flex:none;color:var(--amber)}
  .symptom b{color:var(--ink)}
  .symptom .st{font-size:13px;color:var(--ink)}
  .stepmeta{font-size:11.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;font-weight:700}
  .qtext{font-size:14.5px;font-weight:600;margin-bottom:4px}
  .qhint{font-size:12.5px;color:var(--sub);margin-bottom:11px}
  .opts{display:grid;grid-template-columns:1fr;gap:8px}
  .opt{border:1px solid var(--line);background:var(--pg);color:var(--ink);cursor:pointer;padding:11px 12px;border-radius:10px;font-size:13.5px;font-family:inherit;text-align:left;display:flex;gap:10px;align-items:flex-start;line-height:1.4}
  .opt:hover{border-color:var(--accent)}
  .opt .mk{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);flex:none;margin-top:1px}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.correct .mk{border-color:var(--ok);background:var(--ok)}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad);font-weight:600}
  .opt.wrong .mk{border-color:var(--bad);background:var(--bad)}
  .opt[disabled]{cursor:default}
  .fb{margin-top:12px;font-size:13px;color:var(--sub);border-left:3px solid var(--accent);padding:2px 0 2px 12px;display:none}
  .fb.show{display:block}
  .fb b{color:var(--ink)}
  .fb.good{border-color:var(--ok)} .fb.bad{border-color:var(--bad)}

  .foot{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);font-size:11.5px;color:var(--sub);text-align:center;line-height:1.7}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:11.5px;color:var(--sub)}
  .legend span{display:flex;align-items:center;gap:5px}
</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <div class="top">
      <div class="brand">
        <span class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h3l2-7 3 15 2-9 2 4h6"/></svg></span>
        <div><b id="brand"></b><small id="brandsub"></small></div>
      </div>
      <div class="tools">
        <a class="tbtn" id="home" href="index.html" target="_top"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg><span id="homeTxt"></span></a>
        <a class="tbtn" id="suggestBtn" href="../../../suggestions/" target="_top"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span id="suggestTxt"></span></a>
        <button class="tbtn" id="tema"><span id="temaIco"></span><span id="temaTxt"></span></button>
        <div class="lang" id="lang"><button data-l="en">EN</button><button data-l="es">ES</button></div>
      </div>
    </div>
  </div>

  <h1 id="title"></h1>
  <p class="lead" id="lead"></p>

  <div class="modebar">
    <div class="modeseg" id="modeseg">
      <button data-m="sandbox" id="mSand"></button>
      <button data-m="scenarios" id="mScen"></button>
    </div>
  </div>

  <!-- INSTRUMENT (shared) -->
  <div class="card">
    <div class="screen">
      <canvas id="cv"></canvas>
    </div>
    <div class="scrhint" id="scrhint"></div>

    <div class="reads" id="reads"></div>

    <div class="panel" id="panel"></div>

    <div class="rowbtns" id="sandbtns"></div>
    <div class="legend" id="legend"></div>
  </div>

  <!-- EVENT TABLE (shared) -->
  <div class="card">
    <h2 id="tblTitle"></h2>
    <div class="tblwrap"><table id="tbl"></table></div>
    <div class="tnote" id="tnote"></div>
  </div>

  <!-- SCENARIO PICKER -->
  <div class="card" id="scenPick" style="display:none">
    <h2 id="scenPickTitle"></h2>
    <div class="chips" id="chips"></div>
  </div>

  <!-- SCENARIO WORKFLOW -->
  <div class="card" id="scard" style="display:none"></div>

  <div class="foot" id="foot"></div>
</div>

<script src="../scripts/progress.js"></script>
<script>
(function(){
  "use strict";
  function $(id){ return document.getElementById(id); }
  var LANG=(window.FOT&&FOT.getLang)?FOT.getLang():"en";
  var THEME=(window.FOT&&FOT.getTheme)?FOT.getTheme():"light";
  function X(en,es){ return LANG==="es"?es:en; }
  function L(pair){ return pair[LANG==="es"?1:0]; }

  var ICO={
    sun:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    moon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    refresh:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>',
    scope:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h3l2-7 3 15 2-9 2 4h6"/></svg>',
    bug:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="8" height="14" rx="4"/><path d="M12 2v4M5 8l2 2M19 8l-2 2M3 14h3M18 14h3M5 20l2-2M19 20l-2-2"/></svg>',
    alert:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>'
  };

  /* ---------- physics constants (field-realistic, G.652) ---------- */
  var ATTEN={ "1310":0.35, "1550":0.22, "1625":0.25 };   // dB/km
  var MACRO={ "1310":0.22, "1550":1.00, "1625":1.65 };   // macrobend loss scaling vs 1550
  var PULSE={
    short:{ dz:0.05, noise:0.55, lbl:["Short","Corto"] },
    medium:{ dz:0.18, noise:0.30, lbl:["Medium","Medio"] },
    long:{ dz:0.55, noise:0.16, lbl:["Long","Largo"] }
  };
  var AVG={ low:{k:1.6,lbl:["Low","Bajo"]}, med:{k:3,lbl:["Med","Medio"]}, high:{k:6,lbl:["High","Alto"]} };
  var RANGES=[5,10,25,50,100];
  var IOR_FIBER=1.4682;       // true fiber index (sandbox default)
  var START=-5, DBTOP=3, DBBOT=-40;

  var TYPE={
    connector:{ c:"#4d8bff", l:["Connector","Conector"] },
    fusion:{ c:"#31d67a", l:["Fusion splice","Empalme por fusión"] },
    mechanical:{ c:"#a78bfa", l:["Mechanical splice","Empalme mecánico"] },
    macrobend:{ c:"#fbbf24", l:["Macrobend","Macrocurvatura"] },
    gainer:{ c:"#f472b6", l:["Gainer (MFD)","Ganador (MFD)"] },
    ghost:{ c:"#94a3b8", l:["Ghost (artifact)","Fantasma (artefacto)"] },
    end:{ c:"#f87171", l:["End / break","Fin / rotura"] }
  };

  /* ---------- instrument state ---------- */
  var MODE="sandbox";
  var state={ wl:"1550", pulse:"medium", range:25, avg:"med", ior:1.4682, launch:false, recv:false, mA:6, mB:15 };
  var IOR_TRUE=IOR_FIBER;

  var cv=$("cv"), ctx=cv.getContext("2d");
  var GEO={x0:0,x1:0,y0:0,y1:0,range:25};
  var EVTS=[], FEATS=[], ENDMEAS=25, LEADDZ=0.18, HIDDEN=0;

  function rnd(a,b){ return a+Math.random()*(b-a); }
  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
  function fmt(n,d){ return (n>=0?"":"")+n.toFixed(d); }
  function cssv(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

  /* ---------- link builders ---------- */
  function sandboxLink(){
    var base=[
      {type:"connector", dist:0.0,  loss:0.35, refl:-42},
      {type:"fusion",    dist:3.5,  loss:0.06, refl:null},
      {type:"connector", dist:6.0,  loss:0.50, refl:-35},   // dirty -> strong reflection -> ghost @12
      {type:"macrobend", dist:9.2,  macro:0.80, loss:0, refl:null},
      {type:"fusion",    dist:14.0, loss:0.05, refl:null},
      {type:"connector", dist:17.8, loss:0.40, refl:-45},
      {type:"gainer",    dist:19.5, loss:-0.15, refl:null},  // MFD mismatch apparent gain
      {type:"end",       dist:22.0, loss:0, refl:-14}
    ];
    if(state.launch){
      base=base.map(function(e){ var c=Object.assign({},e); c.dist=e.dist+1.0; return c; });
      base.unshift({type:"connector", dist:0.0, loss:0.30, refl:-42}); // launch cord front connector
    }
    if(state.recv){
      var end=base[base.length-1];
      end.type="connector"; end.loss=0.40; end.refl=-45; // far connector now measurable
      base.push({type:"end", dist:end.dist+1.0, loss:0, refl:-14});
    }
    return base;
  }

  /* ---------- process link into measured events + reflective features ---------- */
  function reflHeight(refl){ return clamp((refl+60)*0.28, 0.8, 15); }
  function featDZ(refl){ return LEADDZ*(refl>-30?1.6:(refl>-42?1.15:0.9)); }
  function effLoss(e){
    if(e.type==="ghost") return 0;
    if(e.type==="macrobend") return (e.macro||0)*MACRO[state.wl];
    return e.loss||0;
  }

  function processLink(raw){
    var ratio=IOR_TRUE/state.ior;
    LEADDZ=PULSE[state.pulse].dz;
    var evs=raw.map(function(e){ var c=Object.assign({},e); c.mdist=e.dist*ratio; return c; });
    // ghosts from strong reflectors
    var ghosts=[];
    evs.forEach(function(e){
      if(e.refl!==null && e.refl>=-40 && e.mdist>0.5 && e.type!=="ghost" && e.type!=="end"){
        var g=2*e.mdist;
        if(g<=state.range){ ghosts.push({type:"ghost", mdist:g, dist:g, loss:0, refl:e.refl-16, ghostOf:e.mdist}); }
      }
    });
    evs=evs.concat(ghosts);
    evs.sort(function(a,b){ return a.mdist-b.mdist; });

    // reflective features (spikes) — incl. leading OTDR pulse at 0
    var feats=[{pos:0, height:13, dz:LEADDZ*1.4, ghost:false}];
    evs.forEach(function(e){
      if(e.refl!==null){ feats.push({pos:e.mdist, height:reflHeight(e.refl), dz:featDZ(e.refl), ghost:e.type==="ghost"}); }
    });

    // hidden events (dead zones): near launch pulse or inside a prior reflection's dead zone
    var hidden=0;
    evs.forEach(function(e){
      e.hidden=false;
      if(e.type==="ghost") return;
      if(e.mdist>0 && e.mdist<LEADDZ){ e.hidden=true; hidden++; return; }
      for(var i=0;i<feats.length;i++){
        var f=feats[i];
        if(f.pos<e.mdist-1e-6 && e.mdist<f.pos+f.dz){ e.hidden=true; hidden++; return; }
      }
    });

    // last real end / break
    var endMeas=state.range;
    for(var i=evs.length-1;i>=0;i--){ if(evs[i].type==="end"){ endMeas=evs[i].mdist; break; } }

    EVTS=evs; FEATS=feats; ENDMEAS=endMeas; HIDDEN=hidden;
  }

  // clean backscatter level (dB) at measured distance d — no noise / no spikes
  function backscatter(d){
    var lvl=START - ATTEN[state.wl]*d;
    for(var i=0;i<EVTS.length;i++){
      var e=EVTS[i];
      if(e.type==="ghost") continue;
      if(e.mdist<=d+1e-9) lvl-=effLoss(e);
      else break;
    }
    return lvl;
  }
  function overlay(d){
    var s=0;
    for(var i=0;i<FEATS.length;i++){
      var f=FEATS[i];
      if(d>=f.pos && d<f.pos+f.dz*2.4){ s+=f.height*Math.exp(-(d-f.pos)/(f.dz*0.5)); }
    }
    return s;
  }
  function pnoise(i){ var x=Math.sin(i*12.9898)*43758.5453; return (x-Math.floor(x))*2-1; }

  /* ---------- canvas fit + draw ---------- */
  function fit(){
    var w=cv.clientWidth||cv.parentNode.clientWidth-20; if(!w) w=640;
    var h=Math.max(260,Math.round(w*0.52));
    var dpr=window.devicePixelRatio||1;
    cv.width=Math.round(w*dpr); cv.height=Math.round(h*dpr); cv.style.height=h+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    return {w:w,h:h};
  }

  function draw(){
    var s=fit(), w=s.w, h=s.h;
    var padL=44, padR=14, padT=16, padB=30;
    GEO.x0=padL; GEO.x1=w-padR; GEO.y0=padT; GEO.y1=h-padB; GEO.range=state.range;
    var x0=GEO.x0,x1=GEO.x1,y0=GEO.y0,y1=GEO.y1;
    var kmToX=function(km){ return x0+(km/state.range)*(x1-x0); };
    var dbToY=function(db){ return y0+((DBTOP-db)/(DBTOP-DBBOT))*(y1-y0); };

    ctx.clearRect(0,0,w,h);

    // dead zone band (launch pulse)
    ctx.fillStyle="rgba(248,113,113,.10)";
    ctx.fillRect(x0,y0, kmToX(Math.min(LEADDZ,state.range))-x0, y1-y0);

    // grid
    ctx.strokeStyle=cssv("--grid"); ctx.lineWidth=1; ctx.fillStyle="#7fa8d6"; ctx.font="10px system-ui";
    ctx.textAlign="right"; ctx.textBaseline="middle";
    for(var db=0; db>=DBBOT; db-=8){ var yy=dbToY(db); ctx.globalAlpha=.5; ctx.beginPath(); ctx.moveTo(x0,yy); ctx.lineTo(x1,yy); ctx.stroke(); ctx.globalAlpha=1; ctx.fillText(db+"", x0-6, yy); }
    ctx.textAlign="center"; ctx.textBaseline="top";
    var kstep=state.range<=10?2:(state.range<=25?5:(state.range<=50?10:20));
    for(var km=0; km<=state.range+0.001; km+=kstep){ var xx=kmToX(km); ctx.globalAlpha=.5; ctx.beginPath(); ctx.moveTo(xx,y0); ctx.lineTo(xx,y1); ctx.stroke(); ctx.globalAlpha=1; ctx.fillText(km.toFixed(0), xx, y1+5); }
    ctx.fillText("km", x1-4, y1+16);
    // y axis label
    ctx.save(); ctx.translate(12,(y0+y1)/2); ctx.rotate(-Math.PI/2); ctx.textAlign="center"; ctx.fillText("dB", 0,0); ctx.restore();

    // trace polyline (backscatter + reflections + noise)
    var noiseAmp=PULSE[state.pulse].noise/AVG[state.avg].k;
    var floorLvl=backscatter(ENDMEAS)-7;
    var seed=(state.wl.length*7+state.pulse.length*13+state.avg.length*3+Math.round(state.range)+ (state.launch?31:0)+(state.recv?17:0))*97;
    ctx.strokeStyle=cssv("--trace"); ctx.lineWidth=1.8; ctx.lineJoin="round"; ctx.lineCap="round";
    ctx.beginPath();
    var first=true;
    for(var px=x0; px<=x1; px++){
      var km2=(px-x0)/(x1-x0)*state.range;
      var base=(km2<=ENDMEAS)?backscatter(km2):floorLvl;
      var val=base+overlay(km2);
      var amp=(km2>ENDMEAS)?Math.max(noiseAmp*6,0.9):noiseAmp;
      val+=amp*pnoise(px+seed);
      var yv=clamp(dbToY(val),y0,y1);
      if(first){ ctx.moveTo(px,yv); first=false; } else ctx.lineTo(px,yv);
    }
    ctx.stroke();

    // event markers on top axis (visible, non-hidden)
    ctx.textAlign="center"; ctx.textBaseline="bottom"; ctx.font="bold 10px system-ui";
    var idx=0;
    EVTS.forEach(function(e){
      if(e.hidden) return;
      if(e.mdist>state.range) return;
      idx++;
      var mx=kmToX(e.mdist);
      var col=TYPE[e.type].c;
      ctx.strokeStyle=col; ctx.globalAlpha=.35; ctx.setLineDash([3,4]); ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(mx,y0+8); ctx.lineTo(mx,y1); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha=1;
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.moveTo(mx,y0+9); ctx.lineTo(mx-5,y0+1); ctx.lineTo(mx+5,y0+1); ctx.closePath(); ctx.fill();
      ctx.fillStyle="#fff"; ctx.fillText(idx+"", mx, y0+8);
    });

    // markers A / B (draggable)
    drawMarker(kmToX(state.mA), state.mA, "A", cssv("--accent"), backscatter(Math.min(state.mA,ENDMEAS)), dbToY, y0, y1);
    drawMarker(kmToX(state.mB), state.mB, "B", cssv("--amber"), backscatter(Math.min(state.mB,ENDMEAS)), dbToY, y0, y1);
  }

  function drawMarker(mx, km, name, col, lvl, dbToY, y0, y1){
    mx=clamp(mx,GEO.x0,GEO.x1);
    ctx.strokeStyle=col; ctx.lineWidth=1.6; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(mx,y0); ctx.lineTo(mx,y1); ctx.stroke(); ctx.setLineDash([]);
    // level dot
    var yv=clamp(dbToY(lvl),y0,y1);
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(mx,yv,3.5,0,6.283); ctx.fill();
    // bottom handle
    ctx.beginPath(); ctx.moveTo(mx,y1); ctx.lineTo(mx-6,y1+9); ctx.lineTo(mx+6,y1+9); ctx.closePath(); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 9px system-ui"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(name,mx,y1+6);
  }

  /* ---------- marker dragging ---------- */
  var DRAG=null;
  function xToKm(cssX){ return clamp((cssX-GEO.x0)/(GEO.x1-GEO.x0)*state.range,0,state.range); }
  function pointerKm(e){ var r=cv.getBoundingClientRect(); return xToKm(e.clientX-r.left); }
  cv.addEventListener("pointerdown",function(e){
    var km=pointerKm(e);
    DRAG=(Math.abs(km-state.mA)<=Math.abs(km-state.mB))?"A":"B";
    if(DRAG==="A") state.mA=km; else state.mB=km;
    cv.setPointerCapture(e.pointerId); draw(); renderReadouts();
  });
  cv.addEventListener("pointermove",function(e){
    if(!DRAG) return; e.preventDefault();
    var km=pointerKm(e);
    if(DRAG==="A") state.mA=km; else state.mB=km;
    draw(); renderReadouts();
  });
  cv.addEventListener("pointerup",function(){ DRAG=null; });
  cv.addEventListener("pointercancel",function(){ DRAG=null; });

  /* ---------- readouts ---------- */
  function nearestRefl(km){
    var best=null,bd=0.45;
    EVTS.forEach(function(e){ if(e.refl!==null){ var d=Math.abs(e.mdist-km); if(d<bd){ bd=d; best=e; } } });
    return best;
  }
  function renderReadouts(){
    var a=Math.min(state.mA,state.mB), b=Math.max(state.mA,state.mB);
    var la=backscatter(Math.min(a,ENDMEAS)), lb=backscatter(Math.min(b,ENDMEAS));
    var dist=b-a;
    var loss=la-lb;                 // dB drop from A to B
    var atten=dist>0.02?loss/dist:0;
    var rEv=nearestRefl(state.mA)||nearestRefl(state.mB);
    var refl=rEv?rEv.refl:null;
    var box=[
      { cls:"a", s:X("Marker A","Marcador A"), v:state.mA.toFixed(3)+" km" },
      { cls:"b", s:X("Marker B","Marcador B"), v:state.mB.toFixed(3)+" km" },
      { cls:"", s:X("Distance A↔B","Distancia A↔B"), v:dist.toFixed(3)+" km" },
      { cls:"", s:X("Loss A→B","Pérdida A→B"), v:fmt(loss,2)+" dB" },
      { cls:"", s:X("Section atten.","Atenuación tramo"), v:fmt(atten,3)+" dB/km" },
      { cls:"", s:X("Reflectance","Reflectancia"), v: refl!==null?fmt(refl,1)+" dB":"—" }
    ];
    $("reads").innerHTML=box.map(function(r){
      return '<div class="rd '+r.cls+'"><small>'+r.s+'</small><b>'+r.v+'</b></div>';
    }).join("");
  }

  /* ---------- event table ---------- */
  function renderTable(){
    var head='<tr><th>#</th><th>'+X("Type","Tipo")+'</th><th>'+X("Dist. (km)","Dist. (km)")+'</th><th>'+X("Loss (dB)","Pérd. (dB)")+'</th><th>'+X("Refl. (dB)","Refl. (dB)")+'</th><th>'+X("Cumul. (dB)","Acum. (dB)")+'</th></tr>';
    var rows="", idx=0;
    EVTS.forEach(function(e){
      if(e.hidden || e.mdist>state.range) return;
      idx++;
      var isGhost=e.type==="ghost";
      var lossTxt = isGhost?"—":(e.type==="end"?"—":fmt(effLoss(e),2));
      var reflTxt = e.refl!==null?fmt(e.refl,1):"—";
      var cumTxt = isGhost?"—":fmt(START-backscatter(e.mdist),2);
      rows+='<tr'+(isGhost?' class="ghostrow"':'')+'><td>'+idx+'</td><td><span class="evdot" style="background:'+TYPE[e.type].c+'"></span>'+L(TYPE[e.type].l)+'</td><td>'+e.mdist.toFixed(3)+'</td><td>'+lossTxt+'</td><td>'+reflTxt+'</td><td>'+cumTxt+'</td></tr>';
    });
    $("tbl").innerHTML=head+rows;
    var notes=[];
    if(HIDDEN>0) notes.push(X(HIDDEN+" event(s) fall inside a dead zone and are not resolved — a shorter pulse or a launch fiber may reveal them.",
                             HIDDEN+" evento(s) caen en una zona muerta y no se resuelven — un pulso más corto o un cable de lanzamiento puede revelarlos."));
    if(Math.abs(state.ior-IOR_TRUE)>0.0005) notes.push(X("IOR is set to "+state.ior.toFixed(4)+" but the fiber is "+IOR_TRUE.toFixed(4)+" — measured distances are biased by "+((IOR_TRUE/state.ior-1)*100).toFixed(2)+"%.",
                             "El IOR está en "+state.ior.toFixed(4)+" pero la fibra es "+IOR_TRUE.toFixed(4)+" — las distancias medidas tienen un sesgo de "+((IOR_TRUE/state.ior-1)*100).toFixed(2)+"%."));
    $("tnote").innerHTML=notes.join("<br>");
  }

  /* ---------- controls panel ---------- */

    html+='<div class="ctrl"><div class="row"><label>'+X("Test leads","Cables de prueba")+'</label></div><div class="toggles"><div class="seg" data-seg="launch"><button data-v="on" class="'+(state.launch?"on":"")+'">'+X("Launch fiber","Cable lanzamiento")+'</button></div><div class="seg" data-seg="recv"><button data-v="on" class="'+(state.recv?"on":"")+'">'+X("Receive fiber","Cable recepción")+'</button></div></div><div class="hint">'+X("A launch fiber moves the first connector out of the dead zone; a receive fiber lets you measure the last connector.","Un cable de lanzamiento saca el primer conector de la zona muerta; uno de recepción permite medir el último conector.")+'</div></div>';

  function bindPanel(){
    $("panel").querySelectorAll(".seg[data-seg]").forEach(function(seg){
      var key=seg.getAttribute("data-seg");
      seg.querySelectorAll("button").forEach(function(b){
        b.onclick=function(){
          var v=b.getAttribute("data-v");
          if(key==="wl"){ state.wl=v; }
          else if(key==="pulse"){ state.pulse=v; }
          else if(key==="avg"){ state.avg=v; }
          else if(key==="range"){ state.range=+v; state.mA=clamp(state.mA,0,state.range); state.mB=clamp(state.mB,0,state.range); }
          else if(key==="launch"){ state.launch=!state.launch; }
          else if(key==="recv"){ state.recv=!state.recv; }
          refreshInstrument(); renderPanel();
        };
      });
    });
    var ior=$("ior");
    if(ior){ ior.oninput=function(){ state.ior=+ior.value; $("vIor").textContent=state.ior.toFixed(4); refreshInstrument(); }; }
  }

  function getLink(){
    if(MODE==="sandbox"){ IOR_TRUE=IOR_FIBER; return sandboxLink(); }

  /* ---------- scenario rendering ---------- */
  function renderChips(){
    $("chips").innerHTML=SCEN.map(function(s,i){
      return '<button class="chip'+(currentSc&&currentSc.id===s.id?" on":"")+'" data-i="'+i+'"><span class="cic">'+s.ic+'</span>'+L(s.name)+'</button>';
    }).join("");
    $("chips").querySelectorAll(".chip").forEach(function(b){
      b.onclick=function(){ startScenario(+b.getAttribute("data-i")); };
    });
  }
  function startScenario(i){
    currentSc=SCEN[i];
    currentSc.setup();
    SR={ step:0, answered:false, chosen:null, scored:false, correctFirst:0 };
    state.mA=clamp(state.range*0.25,0,state.range); state.mB=clamp(state.range*0.6,0,state.range);
    renderChips(); renderPanel(); refreshInstrument(); renderScenarioCard();
    $("scard").scrollIntoView({behavior:"smooth",block:"nearest"});
  }

  function renderScenarioCard(){
    if(!currentSc){ $("scard").style.display="none"; return; }
    $("scard").style.display="block";
    var sc=currentSc, n=sc.steps.length;
    var html="";
    html+='<div class="symptom"><span class="sic">'+ICO.alert+'</span><div><div class="stepmeta" style="color:var(--amber)">'+L(sc.name)+' · '+X("Reported symptom","Síntoma reportado")+'</div><div class="st">'+L(sc.symptom)+'</div></div></div>';

    if(SR.step>=n){
      // summary
      html+='<div class="stepmeta">'+X("Debrief","Cierre")+'</div>';
      html+='<div class="qtext">'+X("Nicely reasoned — you worked the trace like a field tech.","Bien razonado — trabajaste la traza como un técnico de campo.")+'</div>';
      html+='<div class="qhint">'+X("First-try correct on "+SR.correctFirst+" of "+n+" decisions. This is practice, not a grade — the goal is the reasoning, not the score.","Aciertos al primer intento en "+SR.correctFirst+" de "+n+" decisiones. Esto es práctica, no una nota — la meta es el razonamiento, no el puntaje.")+'</div>';
      html+='<div class="fb good show"><b>'+X("What to carry to the field:","Qué llevar al campo:")+'</b> '+L(sc.takeaway||["","" ])+'</div>';
      html+='<div class="rowbtns"><button class="btn" id="scRestart">'+X("Restart scenario","Reiniciar escenario")+'</button><button class="btn ghost" id="scAnother">'+X("Try another","Probar otro")+'</button></div>';
      $("scard").innerHTML=html;
      $("scRestart").onclick=function(){ var i=SCEN.indexOf(currentSc); startScenario(i); };
      $("scAnother").onclick=function(){ currentSc=null; SR=null; renderChips(); $("scard").style.display="none"; $("scenPick").scrollIntoView({behavior:"smooth",block:"nearest"}); };
      return;
    }

    var step=sc.steps[SR.step];
    html+='<div class="stepmeta">'+X("Step","Paso")+' '+(SR.step+1)+' / '+n+'</div>';
    html+='<div class="qtext">'+L(step.q)+'</div>';
    if(step.hint) html+='<div class="qhint">'+L(step.hint)+'</div>';
    html+='<div class="opts">'+step.opts.map(function(o,oi){
      var cls="opt";
      if(SR.answered){
        if(o.correct) cls+=" correct";
        else if(SR.chosen===oi) cls+=" wrong";
      }
      return '<button class="'+cls+'" data-oi="'+oi+'"'+(SR.answered?" disabled":"")+'><span class="mk"></span><span>'+L(o.t)+'</span></button>';
    }).join("")+'</div>';

    var fbCls="fb";
    if(SR.answered){
      var ch=step.opts[SR.chosen];
      fbCls+=ch.correct?" good show":" bad show";
      html+='<div class="'+fbCls+'"><b>'+(ch.correct?X("Good call. ","Buena decisión. "):X("Watch this one. ","Cuidado con esto. "))+'</b>'+L(ch.fb)+'</div>';
    } else {
      html+='<div class="fb"></div>';
    }

    html+='<div class="rowbtns">';
    if(SR.answered){
      var last=(SR.step===n-1);
      html+='<button class="btn" id="scNext">'+(last?X("Finish","Terminar"):X("Continue","Continuar"))+'</button>';
      if(!step.opts[SR.chosen].correct) html+='<button class="btn ghost" id="scRetry">'+X("Try again","Intentar de nuevo")+'</button>';
    }
    html+='<button class="btn ghost mini" id="scAnother2">'+X("Try another scenario","Probar otro escenario")+'</button>';
    html+='</div>';

    $("scard").innerHTML=html;
    $("scard").querySelectorAll(".opt").forEach(function(b){
      b.onclick=function(){ if(SR.answered) return; answerStep(+b.getAttribute("data-oi")); };
    });
    var nx=$("scNext"); if(nx) nx.onclick=function(){ SR.step++; SR.answered=false; SR.chosen=null; SR.scored=false; renderScenarioCard(); };
    var rt=$("scRetry"); if(rt) rt.onclick=function(){ SR.answered=false; SR.chosen=null; renderScenarioCard(); };
    $("scAnother2").onclick=function(){ currentSc=null; SR=null; renderChips(); $("scard").style.display="none"; $("scenPick").scrollIntoView({behavior:"smooth",block:"nearest"}); };
  }

  function answerStep(oi){
    var step=currentSc.steps[SR.step];
    var o=step.opts[oi];
    SR.chosen=oi; SR.answered=true;
    if(!SR.scored){ SR.scored=true; if(o.correct) SR.correctFirst++; }
    if(o.apply){ o.apply(); renderPanel(); refreshInstrument(); }
    renderScenarioCard();
  }

  /* takeaways */
  SCEN[0].takeaway=["Always set the range past the expected end; a trace ending at the range edge is not a fault. Give repair crews IOR-correct distance plus slack.","Siempre ajusta el rango más allá del fin esperado; una traza que termina en el borde del rango no es una falla. Da a las cuadrillas distancia con IOR correcto más reserva."];
  SCEN[1].takeaway=["Isolate loss splice-by-splice with a short pulse and markers; don't hide small events under a long pulse.","Aísla la pérdida empalme por empalme con pulso corto y marcadores; no ocultes eventos pequeños bajo un pulso largo."];
  SCEN[2].takeaway=["Bends are wavelength-dependent — always compare 1310 vs 1550/1625 nm to confirm a macrobend.","Los dobleces dependen de la longitud de onda — siempre compara 1310 vs 1550/1625 nm para confirmar un macrobend."];
  SCEN[3].takeaway=["A reflection past the end with no loss, at a multiple of a strong reflector, is a ghost — not a place to dig.","Una reflexión tras el fin, sin pérdida, en un múltiplo de un reflector fuerte, es un fantasma — no un lugar para excavar."];
  SCEN[4].takeaway=["Passive fiber can't add power. Gainers come from MFD mismatch; use the bidirectional average for true splice loss.","La fibra pasiva no agrega potencia. Los ganadores vienen de desajuste de MFD; usa el promedio bidireccional para la pérdida real."];
  SCEN[5].takeaway=["Set the IOR from the cable spec before quoting any distance; a small IOR error becomes hundreds of meters on the ground.","Fija el IOR de la hoja del cable antes de citar cualquier distancia; un pequeño error de IOR se vuelve cientos de metros en terreno."];

  /* =====================================================================
     MODE + CHROME
  ===================================================================== */
  function setMode(m){
    MODE=m;
    $("mSand").classList.toggle("on",m==="sandbox");
    $("mScen").classList.toggle("on",m==="scenarios");
    if(m==="sandbox"){
      $("sandbtns").style.display="flex";
      $("scenPick").style.display="none";
      $("scard").style.display="none";
      currentSc=null; SR=null;
      state.wl="1550"; state.range=25; state.ior=IOR_FIBER;
      state.mA=6; state.mB=15;
      $("scrhint").textContent=X("Drag markers A and B along the trace to measure distance, loss and reflectance.","Arrastra los marcadores A y B por la traza para medir distancia, pérdida y reflectancia.");
    } else {
      $("sandbtns").style.display="none";
      $("scenPick").style.display="block";
      if(!currentSc) startScenario(0);
      $("scrhint").textContent=X("Use the controls to investigate, then drag markers A and B to read the trace.","Usa los controles para investigar, luego arrastra A y B para leer la traza.");
    }
    renderPanel(); refreshInstrument();
    if(m==="scenarios") renderScenarioCard();
  }

  function renderSandBtns(){
    $("sandbtns").innerHTML='<button class="btn ghost" id="reseed">'+ICO.refresh+' '+X("Reset instrument","Reiniciar instrumento")+'</button>'+
      '<span class="hint" style="margin:0">'+X("Tip: enable the Launch fiber to move the near connector out of the dead zone.","Consejo: activa el cable de lanzamiento para sacar el conector cercano de la zona muerta.")+'</span>';
    $("reseed").onclick=function(){ state.wl="1550"; state.pulse="medium"; state.range=25; state.avg="med"; state.ior=IOR_FIBER; state.launch=false; state.recv=false; state.mA=6; state.mB=15; renderPanel(); refreshInstrument(); };
  }

  function applyTheme(){ document.documentElement.setAttribute("data-theme",THEME);
    $("temaIco").innerHTML=THEME==="dark"?ICO.sun:ICO.moon;
    $("temaTxt").textContent=THEME==="dark"?X("Light","Claro"):X("Dark","Oscuro"); }

  function chrome(){
    applyTheme(); document.documentElement.lang=LANG;
    $("brand").textContent=X("OTDR Reader","Lector OTDR");
    $("brandsub").textContent=X("Lab · Module 4","Lab · Módulo 4");
    $("homeTxt").textContent=X("Labs","Labs"); $("suggestTxt").textContent=X("Suggestions","Sugerencias"); $("suggestBtn").title=X("Send a suggestion","Enviar una sugerencia");
    $("lang").querySelectorAll("button").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-l")===LANG); });
    $("title").textContent=X("OTDR trace reader","Lector de traza OTDR");
    $("lead").textContent=X("A field-realistic OTDR. Read backscatter (dB) vs distance (km), measure with two cursors, and diagnose faults. Switch between a free Sandbox and guided fault Scenarios.",
                           "Un OTDR realista de campo. Lee la retrodispersión (dB) vs distancia (km), mide con dos cursores y diagnostica fallas. Cambia entre un Sandbox libre y Escenarios guiados de falla.");
    $("mSand").innerHTML=ICO.scope+' '+X("Sandbox","Sandbox");
    $("mScen").innerHTML=ICO.bug+' '+X("Scenarios","Escenarios");
    $("tblTitle").textContent=X("Detected events","Eventos detectados");
    $("scenPickTitle").textContent=X("Pick a field scenario","Elige un escenario de campo");
    $("foot").innerHTML=X("Grounded in G.652 field values: ~0.35 dB/km @1310, ~0.22 @1550 nm; fusion splices 0.02–0.1 dB; UPC connector reflectance −40 to −55 dB. Distance = c·t / (2·IOR). Reference practice: TIA-526-7 (OLTS insertion loss), IEC 61280-4-2 (multimode/singlemode OTDR), Telcordia GR-196 (OTDR requirements).",
                          "Basado en valores de campo G.652: ~0.35 dB/km @1310, ~0.22 @1550 nm; empalmes por fusión 0.02–0.1 dB; reflectancia de conector UPC −40 a −55 dB. Distancia = c·t / (2·IOR). Práctica de referencia: TIA-526-7 (pérdida por inserción OLTS), IEC 61280-4-2 (OTDR mono/multimodo), Telcordia GR-196 (requisitos OTDR).");
    renderLegend(); renderSandBtns();
    renderPanel();
    if(MODE==="scenarios"){ renderChips(); renderScenarioCard(); }
    refreshInstrument();
  }

  // wire header
  $("modeseg").querySelectorAll("button").forEach(function(b){
    b.onclick=function(){ setMode(b.getAttribute("data-m")); };
  });
  $("tema").onclick=function(){ THEME=THEME==="dark"?"light":"dark"; if(window.FOT&&FOT.setTheme)FOT.setTheme(THEME); applyTheme(); draw(); };
  $("lang").querySelectorAll("button").forEach(function(b){
    b.onclick=function(){ LANG=b.getAttribute("data-l"); if(window.FOT&&FOT.setLang)FOT.setLang(LANG);
      chrome();
      if(MODE==="sandbox"){ $("scrhint").textContent=X("Drag markers A and B along the trace to measure distance, loss and reflectance.","Arrastra los marcadores A y B por la traza para medir distancia, pérdida y reflectancia."); }
      else { $("scrhint").textContent=X("Use the controls to investigate, then drag markers A and B to read the trace.","Usa los controles para investigar, luego arrastra A y B para leer la traza."); }
    };
  });

  window.addEventListener("resize", function(){ draw(); renderReadouts(); });

  // init
  setMode("sandbox");
  chrome();
})();
</script>
</body>
</html>
