<title>Module 1 — Layer 1 & Fiber Components / Layer 1 y componentes de fibra</title>
<!--
  TELECOM (azul) — Fiber Optic Training · Módulo 1: Fundamentos de Layer 1 y componentes de fibra óptica.
  TELECOM (blue) — Module 1: Layer 1 fundamentals and fiber-optic components.
  Fuentes / Sources: ITU-T G.651.1/G.652/G.657/G.655; IEC 60793-2 (fiber), IEC 61753-1 (connector IL grades),
  IEC 61755-2/-3 (interfaces/return loss), IEC 61300-3-35 (end-face inspection); TIA-598-C (color code),
  TIA-568 / TIA-492; IEEE 802.3; The Fiber Optic Association (FOA).
  Motor de módulos del proyecto + guardado de progreso vía ../scripts/progress.js.
-->
<style>
  :root{
    --pg:#f3f6fc; --card:#ffffff; --ink:#0c1c34; --sub:#51618a; --line:#dde5f3;
    --bar:#0b2e59; --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.12); --radius:14px;
    --shadow:0 1px 2px rgba(12,28,52,.05),0 10px 26px rgba(12,28,52,.08);
  }
  html[data-theme="dark"]{
    --pg:#0a1120; --card:#141d30; --ink:#e9f0ff; --sub:#9db0d6; --line:#243149;
    --bar:#0a1526; --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  .shell{max-width:940px;margin:0 auto;padding:14px 16px 34px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0 8px;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}
  .prog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 4px}
  .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;min-height:380px}
  .step-ico{width:44px;height:44px;border-radius:12px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  h1{font-size:clamp(20px,3.3vw,26px);margin:0 0 8px;font-weight:700;line-height:1.2}
  h2{font-size:15.5px;margin:16px 0 8px;font-weight:600}
  p{margin:0 0 12px}
  .lead{color:var(--sub);font-size:15px}
  ul,ol{margin:6px 0 12px;padding-left:20px}
  li{margin:6px 0}
  .pill{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:5px 11px;border-radius:999px;margin-bottom:10px}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:12px;margin:8px 0}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:12px;margin:8px 0}
  .box{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px}
  .box h3{margin:0 0 6px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
  .box p{margin:0;font-size:12.5px;color:var(--sub)}
  .num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:var(--accent);color:#fff;font-weight:800;font-size:14px;flex:none}
  .stat3{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0}
  .stat3 .s{flex:1;min-width:120px;background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;text-align:center}
  .stat3 .s b{display:block;font-size:22px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
  .stat3 .s span{font-size:12px;color:var(--sub)}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center;text-decoration:none}
  .btn.ghost{background:transparent;color:var(--accent)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:0;cursor:pointer;padding:0}
  .dot.on{background:var(--accent);transform:scale(1.3)}
  .dot.seen{background:var(--sub)}
  .note{font-size:13px;color:var(--sub);border-left:3px solid var(--accent);background:var(--tint);padding:9px 12px;margin:12px 0;border-radius:0 8px 8px 0}
  .warn{border-left-color:var(--amber);color:var(--amber);background:var(--ambt)}
  .bad{border-left-color:var(--bad);color:var(--bad);background:var(--badt)}
  .good{border-left-color:var(--ok);color:var(--ink);background:var(--okt)}
  .good b{color:var(--ok)}
  .illus{position:relative;aspect-ratio:16/10;background:#071120;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .illus canvas,.illus svg{width:100%;height:100%;display:block}
  .mcap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);margin:8px 2px 2px;justify-content:center}
  table.tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:8px 0;overflow:hidden;border-radius:10px}
  table.tbl th,table.tbl td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top}
  table.tbl th{background:var(--tint);color:var(--ink);font-weight:700;font-size:11.5px}
  table.tbl td b{color:var(--accent)}
  .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px}
  .steps .st{display:flex;gap:12px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:7px 0}
  .steps .st .txt b{font-size:13.5px}.steps .st .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .swatch{display:inline-block;width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,.25);vertical-align:-2px;margin-right:5px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 14px;border-radius:10px;margin:7px 0;cursor:pointer;font-size:14px;font-family:inherit}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad)}
  .opt:disabled{cursor:default}
  .q{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
  .q h3{margin:0 0 10px;font-size:14px}
  .explain{font-size:12.5px;color:var(--sub);margin-top:8px;padding:9px 11px;border-left:3px solid var(--accent);background:var(--tint);border-radius:0 8px 8px 0;display:none}
  .explain.show{display:block}
  .score{font-size:16px;font-weight:700;text-align:center;padding:10px}
  .verdict{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-weight:700;font-size:15px}
  .verdict.ok{background:var(--okt);color:var(--ok)}
  .verdict.no{background:var(--badt);color:var(--bad)}
  .ref{font-size:12.5px;color:var(--sub);border-bottom:1px solid var(--line);padding:8px 0}
  .ref b{color:var(--ink)}
  .obj{display:flex;gap:10px;align-items:flex-start;margin:7px 0;font-size:13.5px}
  .obj svg{color:var(--accent);flex:none;margin-top:2px}
  .term{display:inline-block;background:var(--pg);border:1px solid var(--line);border-radius:7px;padding:2px 8px;font-size:12px;margin:3px 4px 0 0}
  .term b{color:var(--accent)}
  @media(max-width:520px){ .card{padding:15px} .shell{padding:12px 12px 28px} .brand small{display:none} }
</style>
</head>

/* ---------------- Canvas engine (analyzer-style) ---------------- */
var anims=[]; // active rAF ids
function stopAnim(){ anims.forEach(function(id){ cancelAnimationFrame(id); }); anims=[]; }
function fitCanvas(cv){
  var r=cv.getBoundingClientRect();
  var dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=Math.max(2,Math.round(r.width*dpr));
  cv.height=Math.max(2,Math.round(r.height*dpr));
  var ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0);
  return {ctx:ctx,w:r.width,h:r.height};
}
function bgGrid(ctx,w,h){
  ctx.fillStyle="#071120"; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle="rgba(80,120,190,.16)"; ctx.lineWidth=1;
  for(var x=0;x<=w;x+=26){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for(var y=0;y<=h;y+=26){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
}
function label(ctx,x,y,txt,col){ ctx.fillStyle=col||"#9fb6e6"; ctx.font="11px system-ui,Segoe UI,Arial"; ctx.fillText(txt,x,y); }

/* Animation: electrical → optical → electrical (TX/RX) */
function animEO(cv){
  var d=fitCanvas(cv),ctx=d.ctx,w=d.w,h=d.h,t=0;
  function frame(){
    bgGrid(ctx,w,h);
    var midY=h*0.5;
    // TX block, fiber, RX block
    var txX=w*0.13, rxX=w*0.87, fy=midY;
    // electrical square wave in (left)
    ctx.strokeStyle="#f4b53f"; ctx.lineWidth=2; ctx.beginPath();
    var bits=[1,0,1,1,0,1,0,0];
    for(var i=0;i<bits.length;i++){
      var x0=8+i*((txX-16)/bits.length), x1=8+(i+1)*((txX-16)/bits.length);
      var yy=fy-14 - bits[i]*16;
      if(i===0) ctx.moveTo(x0,yy); else ctx.lineTo(x0,yy);
      ctx.lineTo(x1,yy);
    }
    ctx.stroke();
    label(ctx,8,fy-40,X("electrical bits","bits eléctricos"),"#f4b53f");
    // TX (laser/LED)
    ctx.fillStyle="#123"; ctx.strokeStyle="#4d8bff"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(txX-14,fy-16,28,32,5); ctx.fill(); ctx.stroke();
    label(ctx,txX-12,fy+30,"TX","#8fb4ff");
    // fiber line
    ctx.strokeStyle="#274574"; ctx.lineWidth=8; ctx.beginPath(); ctx.moveTo(txX+14,fy); ctx.lineTo(rxX-14,fy); ctx.stroke();
    ctx.strokeStyle="#0a1a30"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(txX+14,fy); ctx.lineTo(rxX-14,fy); ctx.stroke();
    // light pulses traveling
    for(var p=0;p<4;p++){
      var prog=((t*0.012)+p*0.25)%1;
      var px=txX+14+prog*(rxX-txX-28);
      var glow=ctx.createRadialGradient(px,fy,0,px,fy,12);
      glow.addColorStop(0,"rgba(120,190,255,.95)"); glow.addColorStop(1,"rgba(120,190,255,0)");
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(px,fy,12,0,7); ctx.fill();
    }
    label(ctx,(txX+rxX)/2-46,fy-16,X("light pulses in fiber","pulsos de luz en la fibra"),"#7fc4ff");
    // RX (photodiode)
    ctx.fillStyle="#123"; ctx.strokeStyle="#4ade80"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(rxX-14,fy-16,28,32,5); ctx.fill(); ctx.stroke();
    label(ctx,rxX-12,fy+30,"RX","#7ef0a8");
    // electrical out (right)
    ctx.strokeStyle="#4ade80"; ctx.lineWidth=2; ctx.beginPath();
    for(var j=0;j<bits.length;j++){
      var xa=rxX+14+j*((w-rxX-20)/bits.length), xb=rxX+14+(j+1)*((w-rxX-20)/bits.length);
      var yb=fy-14 - bits[j]*16;
      if(j===0) ctx.moveTo(xa,yb); else ctx.lineTo(xa,yb);
      ctx.lineTo(xb,yb);
    }
    ctx.stroke();
    label(ctx,rxX+14,fy-40,X("bits recovered","bits recuperados"),"#4ade80");
    t++; anims.push(requestAnimationFrame(frame));
  }
  frame();
}

/* Animation: single-mode vs multimode ray paths */
function animModes(cv){
  var d=fitCanvas(cv),ctx=d.ctx,w=d.w,h=d.h,t=0;
  function frame(){
    bgGrid(ctx,w,h);
    var topY=h*0.28, botY=h*0.72, coreTop, coreBot;
    // ---- Multimode (top half) ----
    coreTop=topY-22; coreBot=topY+22;
    ctx.fillStyle="rgba(77,139,255,.10)"; ctx.fillRect(20,coreTop,w-40,coreBot-coreTop);
    ctx.strokeStyle="#3b5c93"; ctx.lineWidth=1; ctx.strokeRect(20,coreTop,w-40,coreBot-coreTop);
    label(ctx,24,coreTop-6,X("Multimode 50/62.5 µm core — many ray paths","Multimodo núcleo 50/62.5 µm — muchos caminos"),"#9fb6e6");
    // several bouncing rays
    var cols=["#f4b53f","#7fc4ff","#4ade80"];
    for(var r=0;r<3;r++){
      ctx.strokeStyle=cols[r]; ctx.lineWidth=1.6; ctx.beginPath();
      var amp=(coreBot-coreTop)/2-3, per=48+r*22, ph=r*1.1;
      for(var x=20;x<=w-20;x+=4){
        var yy=topY + Math.asin(Math.sin((x/per)+ph))*(2/Math.PI)*amp;
        if(x===20) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
      }
      ctx.stroke();
      // moving pulse
      var pr=((t*0.01)+r*0.2)%1, ppx=20+pr*(w-40);
      var pyy=topY + Math.asin(Math.sin((ppx/per)+ph))*(2/Math.PI)*amp;
      ctx.fillStyle=cols[r]; ctx.beginPath(); ctx.arc(ppx,pyy,3,0,7); ctx.fill();
    }
    // ---- Single-mode (bottom half) ----
    coreTop=botY-7; coreBot=botY+7;
    ctx.fillStyle="rgba(74,222,128,.10)"; ctx.fillRect(20,coreTop,w-40,coreBot-coreTop);
    ctx.strokeStyle="#2f6f4f"; ctx.strokeRect(20,coreTop,w-40,coreBot-coreTop);
    label(ctx,24,coreTop-6,X("Single-mode ~9 µm core — one straight path","Monomodo núcleo ~9 µm — un solo camino"),"#9fe6c0");
    ctx.strokeStyle="#7fffb0"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(20,botY); ctx.lineTo(w-20,botY); ctx.stroke();
    var sp=((t*0.014))%1, spx=20+sp*(w-40);
    var g=ctx.createRadialGradient(spx,botY,0,spx,botY,10); g.addColorStop(0,"rgba(160,255,200,.95)"); g.addColorStop(1,"rgba(160,255,200,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(spx,botY,10,0,7); ctx.fill();
    t++; anims.push(requestAnimationFrame(frame));
  }
  frame();
}

/* Animation: UPC vs APC end-face reflection */
function animPolish(cv){
  var d=fitCanvas(cv),ctx=d.ctx,w=d.w,h=d.h,t=0;
  function frame(){
    bgGrid(ctx,w,h);
    var yU=h*0.30, yA=h*0.72, xc=w*0.5;
    // UPC (flat) top
    drawFerrule(ctx,xc,yU,0,"#4d8bff",X("UPC — flat/domed polish · reflection ~-50 dB back to source","UPC — pulido plano/curvo · reflexión ~-50 dB al emisor"),t,false);
    // APC (8°) bottom
    drawFerrule(ctx,xc,yA,8,"#22c55e",X("APC — 8° angle · reflection sent into cladding · ~-60 dB","APC — ángulo 8° · reflexión hacia el cladding · ~-60 dB"),t,true);
    t++; anims.push(requestAnimationFrame(frame));
  }
  function drawFerrule(ctx,xc,y,ang,col,txt,t,angled){
    var fw=34,fh=26;
    // two ferrules meeting
    ctx.fillStyle="#16233c"; ctx.strokeStyle=col; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.roundRect(xc-fw-6,y-fh/2,fw,fh,4); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.roundRect(xc+6,y-fh/2,fw,fh,4); ctx.fill(); ctx.stroke();
    // interface line (angled or flat)
    var dy=angled?9:0;
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(xc-dy,y-fh/2-4); ctx.lineTo(xc+dy,y+fh/2+4); ctx.stroke();
    // incoming ray
    var prog=(t*0.02)%1;
    var ix=xc-fw-6+prog*(fw);
    ctx.strokeStyle="#f4b53f"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(xc-fw-6,y); ctx.lineTo(Math.min(ix,xc),y); ctx.stroke();
    if(ix>=xc){
      // reflection
      if(angled){
        // reflect downward into cladding
        ctx.strokeStyle="#ff6b6b"; ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(xc,y); ctx.lineTo(xc-16,y+fh/2+8); ctx.stroke();
        // transmitted forward (most light)
        ctx.strokeStyle="#7fffb0"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(xc,y); ctx.lineTo(xc+fw+6,y); ctx.stroke();
      } else {
        // reflect straight back to source (bad)
        ctx.strokeStyle="#ff6b6b"; ctx.lineWidth=1.8; ctx.beginPath(); ctx.moveTo(xc,y-3); ctx.lineTo(xc-fw,y-3); ctx.stroke();
        ctx.strokeStyle="#7fc4ff"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(xc,y); ctx.lineTo(xc+fw+6,y); ctx.stroke();
      }
    }
    label(ctx,xc-fw-6,y-fh/2-10,txt,"#c9d8f5");
  }
  frame();
}

/* Animation: fusion splice process (staged) */
var fusionStage=0;
function animFusion(cv){
  var d=fitCanvas(cv),ctx=d.ctx,w=d.w,h=d.h,t=0;
  var stagesEN=["1 · Strip coating","2 · Clean (IPA)","3 · Cleave (flat 90°)","4 · Align cores","5 · Electric arc — fuse","6 · Heat-shrink sleeve"];
  var stagesES=["1 · Pelar recubrimiento","2 · Limpiar (IPA)","3 · Cortar (plano 90°)","4 · Alinear núcleos","5 · Arco eléctrico — fusión","6 · Manguito termocontraíble"];
  function frame(){
    bgGrid(ctx,w,h);
    var midY=h*0.52, gap= (fusionStage>=4?2:20);
    var lx=w*0.5-70, rx=w*0.5+70;
    // stage auto-advances slowly
    var st=Math.floor((t/90))%6; fusionStage=st;
    // fibers
    // coating (stage 0 has coating)
    function fiber(x0,x1,coated){
      if(coated){ ctx.strokeStyle="#3a5a2a"; ctx.lineWidth=12; ctx.beginPath(); ctx.moveTo(x0,midY); ctx.lineTo(x1,midY); ctx.stroke(); }
      ctx.strokeStyle="#9fb6e6"; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(x0,midY); ctx.lineTo(x1,midY); ctx.stroke(); // cladding
      ctx.strokeStyle="#7fc4ff"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x0,midY); ctx.lineTo(x1,midY); ctx.stroke(); // core
    }
    var coated = st===0;
    var meetL = (st>=4? w*0.5-gap/2 : lx+ (st>=3?60:52));
    var meetR = (st>=4? w*0.5+gap/2 : rx- (st>=3?60:52));
    fiber(30,meetL,coated); fiber(meetR,w-30,coated);
    // electrodes + arc at stage 4
    if(st>=4){
      ctx.strokeStyle="#8aa0c8"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(w*0.5,midY-30); ctx.lineTo(w*0.5,midY-12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w*0.5,midY+30); ctx.lineTo(w*0.5,midY+12); ctx.stroke();
      if(st===4){
        var fl=0.5+0.5*Math.abs(Math.sin(t*0.4));
        var g=ctx.createRadialGradient(w*0.5,midY,0,w*0.5,midY,20);
        g.addColorStop(0,"rgba(180,225,255,"+fl+")"); g.addColorStop(1,"rgba(120,180,255,0)");
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(w*0.5,midY,20,0,7); ctx.fill();
      }
    }
    // sleeve at stage 5
    if(st>=5){
      ctx.fillStyle="rgba(0,0,0,.35)"; ctx.strokeStyle="#c9d8f5"; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.roundRect(w*0.5-46,midY-11,92,22,7); ctx.fill(); ctx.stroke();
      label(ctx,w*0.5-40,midY+4,X("protector","protector"),"#c9d8f5");
    }
    label(ctx,20,24,X(stagesEN[st],stagesES[st]),"#7fc4ff");
    t++; anims.push(requestAnimationFrame(frame));
  }
  frame();
}

function practiceOpt(en,es){ return '<button class="opt">'+X(en,es)+'</button>'; }
function wirePractice(){
  var qs=document.querySelectorAll("#card .q");
  qs.forEach(function(q){
    var correct=parseInt(q.getAttribute("data-correct"),10);
    var opts=q.querySelectorAll(".opt"), ex=q.querySelector(".explain");
    opts.forEach(function(o,i){
      o.onclick=function(){
        opts.forEach(function(x){ x.disabled=true; });
        if(i===correct){ o.classList.add("correct"); }
        else { o.classList.add("wrong"); opts[correct].classList.add("correct"); }
        ex.classList.add("show");
      };
    });
  });
}

var quizAnswered=0, quizCorrect=0, quizDone=false;
function renderQuiz(){
  var host=$("quizHost"); if(!host) return;
  quizAnswered=0; quizCorrect=0; quizDone=false;
  host.innerHTML=QUIZ.map(function(item,qi){
    var opts=item.o.map(function(o,oi){ return '<button class="opt" data-q="'+qi+'" data-o="'+oi+'">'+X(o[0],o[1])+'</button>'; }).join("");
    return '<div class="q"><h3>'+(qi+1)+'. '+X(item.q[0],item.q[1])+'</h3>'+opts+'<div class="explain" id="ex'+qi+'"></div></div>';
  }).join("");
  host.querySelectorAll(".opt").forEach(function(btn){
    btn.onclick=function(){
      var qi=+btn.getAttribute("data-q"), oi=+btn.getAttribute("data-o");
      var group=host.querySelectorAll('.opt[data-q="'+qi+'"]');
      if(group[0].disabled) return;
      var a=QUIZ[qi].a;
      group.forEach(function(g){ g.disabled=true; });
      if(oi===a){ btn.classList.add("correct"); quizCorrect++; }
      else { btn.classList.add("wrong"); group[a].classList.add("correct"); }
      var ex=$("ex"+qi); ex.textContent=X(QUIZ[qi].e[0],QUIZ[qi].e[1]); ex.classList.add("show");
      quizAnswered++;
      if(quizAnswered===QUIZ.length) finishQuiz();
    };
  });
  $("quizResult").innerHTML="";
}
function finishQuiz(){
  if(quizDone) return; quizDone=true;
  var pct=Math.round((quizCorrect/QUIZ.length)*100);
  var pass=pct>=80;
  var res=window.FOT?FOT.recordQuiz(MODULE_ID,pct):{best:pct,passed:pass};
  var host=$("quizResult");
  host.innerHTML='<div class="score"><span class="verdict '+(pass?"ok":"no")+'">'+(pass?ICO.check:"")+' '+quizCorrect+'/'+QUIZ.length+' — '+pct+'%</span></div>'+
    '<p style="text-align:center;color:var(--sub);font-size:13.5px">'+
      (pass? X("Passed! Module 2 is now unlocked on the dashboard.","¡Aprobado! El Módulo 2 quedó desbloqueado en el panel.")
           : X("You need 80% to pass. Review the lessons and try again.","Necesitas 80% para aprobar. Repasa las lecciones e inténtalo de nuevo."))+'</p>'+
    '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:6px">'+
      '<button class="btn ghost" id="retry">'+X("Retry quiz","Reintentar quiz")+'</button>'+
      '<a class="btn" href="../index.html" target="_top">'+X("Back to dashboard","Volver al panel")+'</a></div>';
  $("retry").onclick=function(){ renderQuiz(); };
}
function renderDone(){
  var box=$("doneBox"); if(!box||!window.FOT) return;
  var rec=FOT.moduleRecord(MODULE_ID);
  if(rec.completedAt){
    box.innerHTML='<div class="note good"><b>'+X("Module 1 complete","Módulo 1 completado")+'</b> — '+X("Best score","Mejor nota")+': '+rec.best+'%. '+
      X("Module 2 is unlocked.","El Módulo 2 está desbloqueado.")+'</div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn" href="../index.html" target="_top">'+X("Back to dashboard","Volver al panel")+'</a>'+
      '<a class="btn ghost" href="../module-02-optical-physics/index.html" target="_top">'+X("Go to Module 2","Ir al Módulo 2")+'</a></div>';
  } else {
    box.innerHTML='<div class="note warn">'+X("Take the quiz (80%) to complete this module and unlock Module 2.","Haz el quiz (80%) para completar este módulo y desbloquear el Módulo 2.")+'</div>'+
      '<a class="btn" href="#" id="goQuiz">'+X("Go to the quiz","Ir al quiz")+'</a>';
    var g=$("goQuiz"); if(g) g.onclick=function(e){ e.preventDefault(); go(STEPS.length-2); };
  }
}

/* ---------------- Engine: nav, theme, lang, progress ---------------- */
var cur=0, seen={}, tStart=Date.now();
function applyTheme(){ document.documentElement.setAttribute("data-theme",THEME);
  $("temaIco").innerHTML=THEME==="dark"?ICO.sun:ICO.moon;
  $("temaTxt").textContent=THEME==="dark"?X("Light","Claro"):X("Dark","Oscuro"); }
function chrome(){
  document.documentElement.lang=LANG;
  $("brand").textContent=X(CONFIG.brand[0],CONFIG.brand[1]);
  $("brandsub").textContent=X(CONFIG.subtitle[0],CONFIG.subtitle[1]);
  $("homeTxt").textContent=X("Dashboard","Panel");
  $("prev").innerHTML="‹ "+X("Back","Atrás");
  $("next").innerHTML=(cur===STEPS.length-1?X("Finish","Terminar"):X("Next","Siguiente"))+" ›";
  $("lang").querySelectorAll("button").forEach(function(b){ b.classList.toggle("on",b.getAttribute("data-l")===LANG); });
  applyTheme();
}
function render(){
  stopAnim();
  seen[cur]=true;
  var st=STEPS[cur];
  $("card").innerHTML=st.html();
  $("mStep").textContent=X("Lesson","Lección")+" "+(cur+1)+" / "+STEPS.length;
  $("mDur").textContent=CONFIG.duration;
  $("progbar").style.width=((cur+1)/STEPS.length*100)+"%";
  // dots
  $("dots").innerHTML=STEPS.map(function(_,i){ return '<button class="dot '+(i===cur?"on":(seen[i]?"seen":""))+'" data-i="'+i+'"></button>'; }).join("");
  $("dots").querySelectorAll(".dot").forEach(function(d){ d.onclick=function(){ go(+d.getAttribute("data-i")); }; });
  $("prev").style.visibility=cur===0?"hidden":"visible";
  $("next").innerHTML=(cur===STEPS.length-1?X("Finish","Terminar"):X("Next","Siguiente"))+" ›";
  if(st.init) try{ st.init(); }catch(e){}
  if(window.FOT) FOT.recordProgress(MODULE_ID,cur,STEPS.length);
  window.scrollTo({top:0,behavior:"smooth"});
}
function go(i){ if(i<0||i>=STEPS.length) return; cur=i; render(); }
$("prev").onclick=function(){ go(cur-1); };
$("next").onclick=function(){ if(cur===STEPS.length-1){ if(window.FOT){ location.href="../index.html"; } } else go(cur+1); };
$("tema").onclick=function(){ THEME=THEME==="dark"?"light":"dark"; if(window.FOT)FOT.setTheme(THEME); applyTheme(); };
$("lang").querySelectorAll("button").forEach(function(b){ b.onclick=function(){ LANG=b.getAttribute("data-l"); if(window.FOT)FOT.setLang(LANG); chrome(); render(); }; });
document.addEventListener("keydown",function(e){ if(e.key==="ArrowRight")go(cur+1); if(e.key==="ArrowLeft")go(cur-1); });
window.addEventListener("resize",function(){ /* re-fit any canvas by re-render */ if(STEPS[cur].init){ stopAnim(); try{STEPS[cur].init();}catch(e){} } });
function flushTime(){ if(window.FOT){ FOT.recordTime(MODULE_ID, Date.now()-tStart); tStart=Date.now(); } }
document.addEventListener("visibilitychange",function(){ if(document.hidden) flushTime(); });
window.addEventListener("pagehide",flushTime);
window.addEventListener("beforeunload",flushTime);

chrome(); render();
</script>
