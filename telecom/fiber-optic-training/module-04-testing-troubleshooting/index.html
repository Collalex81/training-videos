<title>Module 4 — Testing, Certification & Troubleshooting / Pruebas y troubleshooting</title>
<!--
  TELECOM (azul) — Fiber Optic Training · Módulo 4: Pruebas, certificación y troubleshooting.
  Fuentes / Sources: ANSI/TIA-526-7 (OFSTP-7, SMF), TIA-526-14 (OFSTP-14, MMF), IEC 61280-4-1/-4-2 (loss);
  Telcordia GR-196 / IEC 61746 (OTDR); IEC 60825 (laser safety); FOA; VIAVI/EXFO/Fluke Networks app notes.
  Motor de módulos + guardado de progreso vía ../scripts/progress.js.
-->
<style>
  :root{
    --pg:#f3f6fc; --card:#ffffff; --ink:#0c1c34; --sub:#51618a; --line:#dde5f3;
    --bar:#0b2e59; --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.12); --radius:14px;
    --shadow:0 1px 2px rgba(12,28,52,.05),0 10px 26px rgba(12,28,52,.08);
  }
  html[data-theme="dark"]{
    --pg:#0a1120; --card:#141d30; --ink:#e9f0ff; --sub:#9db0d6; --line:#243149;
    --bar:#0a1526; --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  .shell{max-width:940px;margin:0 auto;padding:14px 16px 34px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0 8px;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}
  .prog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 4px}
  .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;min-height:380px}
  .step-ico{width:44px;height:44px;border-radius:12px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  h1{font-size:clamp(20px,3.3vw,26px);margin:0 0 8px;font-weight:700;line-height:1.2}
  h2{font-size:15.5px;margin:16px 0 8px;font-weight:600}
  p{margin:0 0 12px}
  .lead{color:var(--sub);font-size:15px}
  ul,ol{margin:6px 0 12px;padding-left:20px}
  li{margin:6px 0}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:12px;margin:8px 0}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:12px;margin:8px 0}
  .box{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px}
  .box h3{margin:0 0 6px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
  .box p{margin:0;font-size:12.5px;color:var(--sub)}
  .num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:var(--accent);color:#fff;font-weight:800;font-size:14px;flex:none}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center;text-decoration:none}
  .btn.ghost{background:transparent;color:var(--accent)}
  .btn.sm{padding:8px 12px;min-height:36px;font-size:12.5px}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:0;cursor:pointer;padding:0}
  .dot.on{background:var(--accent);transform:scale(1.3)}
  .dot.seen{background:var(--sub)}
  .note{font-size:13px;color:var(--sub);border-left:3px solid var(--accent);background:var(--tint);padding:9px 12px;margin:12px 0;border-radius:0 8px 8px 0}
  .warn{border-left-color:var(--amber);color:var(--amber);background:var(--ambt)}
  .bad{border-left-color:var(--bad);color:var(--bad);background:var(--badt)}
  .good{border-left-color:var(--ok);color:var(--ink);background:var(--okt)}
  .good b{color:var(--ok)}
  .illus{position:relative;aspect-ratio:16/10;background:#071120;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .illus canvas,.illus svg{width:100%;height:100%;display:block}
  .mcap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);margin:8px 2px 2px;justify-content:center;text-align:center}
  table.tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:8px 0;border-radius:10px;overflow:hidden}
  table.tbl th,table.tbl td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top}
  table.tbl th{background:var(--tint);color:var(--ink);font-weight:700;font-size:11.5px}
  table.tbl td b{color:var(--accent)}
  .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px}
  .steps .st{display:flex;gap:12px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin:6px 0}
  .steps .st .txt b{font-size:13.5px}.steps .st .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  select{border:1px solid var(--line);background:var(--pg);color:var(--ink);border-radius:8px;padding:9px 10px;font-size:13.5px;font-family:inherit;width:100%}
  .row{display:flex;align-items:center;gap:12px;margin:9px 0;flex-wrap:wrap}
  .row span.lbl{min-width:130px;font-size:13px;color:var(--sub)}
  .calc{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:14px;margin:10px 0}
  .evbtns{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0}
  .evbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;padding:8px 11px;font-size:12.5px;font-family:inherit;cursor:pointer}
  .evbtn:hover{border-color:var(--accent)}
  .evbtn.on{border-color:var(--accent);background:var(--tint);color:var(--accent);font-weight:600}
  .evinfo{font-size:12.5px;color:var(--sub);border-left:3px solid var(--accent);background:var(--tint);padding:10px 12px;border-radius:0 8px 8px 0;margin-top:6px;min-height:20px}
  .tree{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:8px}
  .tree .st{display:flex;gap:10px;align-items:flex-start;margin:7px 0;font-size:13px}
  .tree .st .n{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none}
  .chk{display:flex;gap:11px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin:7px 0;cursor:pointer}
  .chk .bx{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;margin-top:1px}
  .chk.done .bx{background:var(--ok);border-color:var(--ok)}
  .chk.done .txt b{text-decoration:line-through;opacity:.7}
  .chk .txt b{font-size:13.5px}.chk .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 14px;border-radius:10px;margin:7px 0;cursor:pointer;font-size:14px;font-family:inherit}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad)}
  .opt:disabled{cursor:default}
  .q{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
  .q h3{margin:0 0 10px;font-size:14px}
  .explain{font-size:12.5px;color:var(--sub);margin-top:8px;padding:9px 11px;border-left:3px solid var(--accent);background:var(--tint);border-radius:0 8px 8px 0;display:none}
  .explain.show{display:block}
  .score{font-size:16px;font-weight:700;text-align:center;padding:10px}
  .verdict{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-weight:700;font-size:15px}
  .verdict.ok{background:var(--okt);color:var(--ok)}
  .verdict.no{background:var(--badt);color:var(--bad)}
  .ref{font-size:12.5px;color:var(--sub);border-bottom:1px solid var(--line);padding:8px 0}
  .ref b{color:var(--ink)}
  .obj{display:flex;gap:10px;align-items:flex-start;margin:7px 0;font-size:13.5px}
  .obj svg{color:var(--accent);flex:none;margin-top:2px}
  @media(max-width:520px){ .card{padding:15px} .shell{padding:12px 12px 28px} .brand small{display:none} .row span.lbl{min-width:100px} }
</style>
</head>

/* ---------------- Canvas engine ---------------- */
var anims=[];
function stopAnim(){ anims.forEach(function(id){ cancelAnimationFrame(id); }); anims=[]; }
function fitCanvas(cv){ var r=cv.getBoundingClientRect(); var dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=Math.max(2,Math.round(r.width*dpr)); cv.height=Math.max(2,Math.round(r.height*dpr));
  var ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0); return {ctx:ctx,w:r.width,h:r.height}; }
function bgGrid(ctx,w,h){ ctx.fillStyle="#071120"; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle="rgba(80,120,190,.16)"; ctx.lineWidth=1;
  for(var x=0;x<=w;x+=26){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for(var y=0;y<=h;y+=26){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); } }
function label(ctx,x,y,txt,col){ ctx.fillStyle=col||"#9fb6e6"; ctx.font="11px system-ui,Segoe UI,Arial"; ctx.fillText(txt,x,y); }

/* VFL animation: red light leaks at a bend and a break */
function animVFL(cv){
  var d=fitCanvas(cv),ctx=d.ctx,w=d.w,h=d.h,t=0;
  function frame(){
    bgGrid(ctx,w,h);
    var y=h*0.5, bendX=w*0.5, breakX=w*0.82;
    // fiber with a sharp bend
    ctx.strokeStyle="#274574"; ctx.lineWidth=7; ctx.beginPath();
    ctx.moveTo(20,y); ctx.lineTo(bendX-30,y); ctx.quadraticCurveTo(bendX,y-26,bendX+30,y); ctx.lineTo(breakX,y); ctx.stroke();
    // red core light up to break
    ctx.strokeStyle="rgba(255,70,70,.9)"; ctx.lineWidth=2; ctx.beginPath();
    ctx.moveTo(20,y); ctx.lineTo(bendX-30,y); ctx.quadraticCurveTo(bendX,y-26,bendX+30,y); ctx.lineTo(breakX,y); ctx.stroke();
    // leak glow at bend
    var fl=0.5+0.5*Math.abs(Math.sin(t*0.12));
    var g=ctx.createRadialGradient(bendX,y-20,0,bendX,y-20,16); g.addColorStop(0,"rgba(255,80,80,"+fl+")"); g.addColorStop(1,"rgba(255,80,80,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(bendX,y-20,16,0,7); ctx.fill();
    label(ctx,bendX-24,y-32,X("bend leaks","fuga en curva"),"#ff8a8a");
    // break at end glowing
    var g2=ctx.createRadialGradient(breakX,y,0,breakX,y,18); g2.addColorStop(0,"rgba(255,80,80,"+fl+")"); g2.addColorStop(1,"rgba(255,80,80,0)");

var TRACE_EVENTS=[
  { x:0.10, ref:true,  en:["Launch connector (OTDR port)","Big spike + dead zone at the start — use a launch cable so the first real event is measurable."],
                        es:["Conector de lanzamiento (puerto OTDR)","Gran pico + zona muerta al inicio — usa un cable de lanzamiento para poder medir el primer evento real."] },
  { x:0.34, ref:true,  en:["Reflective event = connector / mechanical splice","Sharp spike with a small loss step. Clean connectors keep the spike low."],
                        es:["Evento reflectivo = conector / empalme mecánico","Pico agudo con un pequeño escalón de pérdida. Conectores limpios mantienen el pico bajo."] },
  { x:0.52, ref:false, en:["Non-reflective event = fusion splice / macrobend","A small drop in the slope with no spike. Good fusion splices are ≤0.1 dB."],
                        es:["Evento no reflectivo = empalme por fusión / macrobend","Una pequeña caída en la pendiente sin pico. Un buen empalme por fusión es ≤0.1 dB."] },
  { x:0.66, ref:false, en:["Macrobend","Loss that is worse at 1550 than 1310 — compare wavelengths to confirm a bend."],
                        es:["Macrobend","Pérdida peor a 1550 que a 1310 — compara longitudes de onda para confirmar una curva."] },
  { x:0.86, ref:true,  en:["Fiber end / break","Large Fresnel reflection then the trace drops into noise. That's the end (or a break)."],
                        es:["Fin de fibra / rotura","Gran reflexión de Fresnel y luego la traza cae al ruido. Ese es el final (o una rotura)."] }
];
function drawTrace(cv,hi){
  var d=fitCanvas(cv),ctx=d.ctx,w=d.w,h=d.h;
  bgGrid(ctx,w,h);
  var x0=30,x1=w-16,y0=20,y1=h-24;
  // axes
  ctx.strokeStyle="#3b5c93"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x0,y1); ctx.lineTo(x1,y1); ctx.stroke();
  label(ctx,x0+4,y0+10,"dB","#7f9fd0"); label(ctx,x1-70,y1-4,X("distance →","distancia →"),"#7f9fd0");
  function px(fx){ return x0+fx*(x1-x0); } function py(level){ return y0+level*(y1-y0); }
  // build trace: descending slope with events
  var slope=0.55; // over full width
  var pts=[]; var lvl=0.12;
  var prevx=0;
  // start reflective spike
  pts.push([0.0,lvl]);
  for(var i=0;i<TRACE_EVENTS.length;i++){
    var ev=TRACE_EVENTS[i];
    // slope up to event
    lvl += (ev.x-prevx)*slope;
    if(ev.ref){
      pts.push([ev.x-0.005, lvl]);
      pts.push([ev.x, Math.max(0.04, lvl-0.10)]); // spike up (toward top = less loss visually)
      pts.push([ev.x+0.005, lvl+0.03]);
      lvl+=0.03;
    } else {
      pts.push([ev.x, lvl]);
      lvl+=0.05; // non-reflective drop
      pts.push([ev.x+0.004, lvl]);
    }
    prevx=ev.x;
  }
  // after last event (end): drop to noise
  pts.push([TRACE_EVENTS[TRACE_EVENTS.length-1].x+0.02, 0.95]);
  pts.push([1.0,0.95]);
  // draw
  ctx.strokeStyle="#7fc4ff"; ctx.lineWidth=2; ctx.beginPath();
  for(var p=0;p<pts.length;p++){ var X2=px(pts[p][0]), Y2=py(pts[p][1]); if(p===0)ctx.moveTo(X2,Y2); else ctx.lineTo(X2,Y2); }
  ctx.stroke();
  // event markers
  for(var e=0;e<TRACE_EVENTS.length;e++){
    var ev2=TRACE_EVENTS[e]; var mx=px(ev2.x);
    var on=(hi===e);
    ctx.strokeStyle=on?"#f4b53f":"rgba(200,220,255,.35)"; ctx.lineWidth=on?2:1;
    ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(mx,y0); ctx.lineTo(mx,y1); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=on?"#f4b53f":(ev2.ref?"#ff9b6b":"#7fffb0");
    ctx.beginPath(); ctx.arc(mx,py(0.06),on?5:3.5,0,7); ctx.fill();
    ctx.fillStyle=on?"#f4b53f":"#9fb6e6"; ctx.font="10px system-ui"; ctx.fillText((e+1),mx-3,py(0.06)-8);
  }
}

/* ---------- trace interactive ---------- */
function wireTrace(){
  var cv=$("cvTrace"); drawTrace(cv,-1);
  var host=$("evBtns"); var names=["1","2","3","4","5"];
  host.innerHTML=TRACE_EVENTS.map(function(ev,i){ return '<button class="evbtn" data-i="'+i+'">'+(i+1)+' · '+X(ev.en[0].split(" = ")[0],ev.es[0].split(" = ")[0])+'</button>'; }).join("");
  host.querySelectorAll(".evbtn").forEach(function(b){
    b.onclick=function(){
      host.querySelectorAll(".evbtn").forEach(function(x){ x.classList.remove("on"); }); b.classList.add("on");
      var i=+b.getAttribute("data-i"); drawTrace(cv,i);
      $("evInfo").innerHTML="<b>"+X(TRACE_EVENTS[i].en[0],TRACE_EVENTS[i].es[0])+"</b><br>"+X(TRACE_EVENTS[i].en[1],TRACE_EVENTS[i].es[1]);
    };
  });
}
/* ---------- troubleshooting trees ---------- */

          es:["Revisa DDM: ¿hay potencia TX en el extremo lejano?","Inspecciona y limpia ambos conectores; verifica polaridad (intercambia duplex).","Dispara un VFL / OTDR para hallar rotura o curva.","Confirma compatibilidad del SFP (velocidad, λ, SMF/MMF, BiDi A/B)."]},
  rxlow:{en:["Clean & re-inspect connectors (dirt is #1).","Compare RX vs expected budget; measure with a power meter.","OTDR the span: look for a macrobend (worse at 1550) or bad splice.","Check length/wavelength and any extra patches."],
         es:["Limpia y reinspecciona conectores (la suciedad es #1).","Compara RX vs presupuesto esperado; mide con power meter.","Haz OTDR del tramo: busca macrobend (peor a 1550) o mal empalme.","Verifica longitud/longitud de onda y patches extra."]},
  rxhigh:{en:["Link is too short / TX too strong for the receiver.","Add an inline optical attenuator (e.g., 5–10 dB).","Re-check RX is within the receiver's min/max window."],
          es:["El enlace es muy corto / TX muy fuerte para el receptor.","Agrega un atenuador óptico en línea (p. ej. 5–10 dB).","Verifica que RX esté dentro del rango mín/máx del receptor."]},
  flap:{en:["Measure RX — marginal power causes intermittent errors.","Check return loss/reflections (open or UPC where APC belongs).","Clean connectors; reseat SFP; check temperature/DDM alarms.","Confirm both ends agree on speed/FEC/auto-neg."],
        es:["Mide RX — potencia marginal causa errores intermitentes.","Revisa pérdida de retorno/reflexiones (abierto o UPC donde va APC).","Limpia conectores; reasienta el SFP; revisa temperatura/alarmas DDM.","Confirma que ambos extremos coincidan en velocidad/FEC/auto-neg."]},
  cpri:{en:["Remember: CPRI ≠ Ethernet — don't test it as Ethernet.","Verify dedicated fiber/wavelength and correct SFP line rate.","Check RX power and reflections; CPRI is timing-sensitive.","For eCPRI, verify PTP/SyncE timing and QoS/latency."],
        es:["Recuerda: CPRI ≠ Ethernet — no lo pruebes como Ethernet.","Verifica fibra/longitud de onda dedicada y tasa de línea del SFP correcta.","Revisa potencia RX y reflexiones; CPRI es sensible al tiempo.","Para eCPRI, verifica temporización PTP/SyncE y QoS/latencia."]}

var quizAnswered=0, quizCorrect=0, quizDone=false;
function renderQuiz(){
  var host=$("quizHost"); if(!host) return;
  quizAnswered=0; quizCorrect=0; quizDone=false;
  host.innerHTML=QUIZ.map(function(item,qi){
    var opts=item.o.map(function(o,oi){ return '<button class="opt" data-q="'+qi+'" data-o="'+oi+'">'+X(o[0],o[1])+'</button>'; }).join("");
    return '<div class="q"><h3>'+(qi+1)+'. '+X(item.q[0],item.q[1])+'</h3>'+opts+'<div class="explain" id="ex'+qi+'"></div></div>';
  }).join("");
  host.querySelectorAll(".opt").forEach(function(btn){
    btn.onclick=function(){
      var qi=+btn.getAttribute("data-q"), oi=+btn.getAttribute("data-o");
      var group=host.querySelectorAll('.opt[data-q="'+qi+'"]');
      if(group[0].disabled) return;
      var a=QUIZ[qi].a;
      group.forEach(function(g){ g.disabled=true; });
      if(oi===a){ btn.classList.add("correct"); quizCorrect++; }
      else { btn.classList.add("wrong"); group[a].classList.add("correct"); }
      var ex=$("ex"+qi); ex.textContent=X(QUIZ[qi].e[0],QUIZ[qi].e[1]); ex.classList.add("show");
      quizAnswered++;
      if(quizAnswered===QUIZ.length) finishQuiz();
    };
  });
  $("quizResult").innerHTML="";
}
function finishQuiz(){
  if(quizDone) return; quizDone=true;
  var pct=Math.round((quizCorrect/QUIZ.length)*100);
  var pass=pct>=80;
  if(window.FOT) FOT.recordQuiz(MODULE_ID,pct);
  var host=$("quizResult");
  host.innerHTML='<div class="score"><span class="verdict '+(pass?"ok":"no")+'">'+(pass?ICO.check:"")+' '+quizCorrect+'/'+QUIZ.length+' — '+pct+'%</span></div>'+
    '<p style="text-align:center;color:var(--sub);font-size:13.5px">'+
      (pass? X("Passed! Module 5 is now unlocked on the dashboard.","¡Aprobado! El Módulo 5 quedó desbloqueado en el panel.")
           : X("You need 80% to pass. Review and try again.","Necesitas 80% para aprobar. Repasa e inténtalo de nuevo."))+'</p>'+
    '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:6px">'+
      '<button class="btn ghost" id="retry">'+X("Retry quiz","Reintentar quiz")+'</button>'+
      '<a class="btn" href="../index.html" target="_top">'+X("Back to dashboard","Volver al panel")+'</a></div>';
  $("retry").onclick=function(){ renderQuiz(); };
}
function renderDone(){
  var box=$("doneBox"); if(!box||!window.FOT) return;
  var rec=FOT.moduleRecord(MODULE_ID);
  if(rec.completedAt){
    box.innerHTML='<div class="note good"><b>'+X("Module 4 complete","Módulo 4 completado")+'</b> — '+X("Best score","Mejor nota")+': '+rec.best+'%. '+X("Module 5 is unlocked.","El Módulo 5 está desbloqueado.")+'</div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn" href="../index.html" target="_top">'+X("Back to dashboard","Volver al panel")+'</a>'+
      '<a class="btn ghost" href="../module-05-safety/index.html" target="_top">'+X("Go to Module 5","Ir al Módulo 5")+'</a></div>';
  } else {
    box.innerHTML='<div class="note warn">'+X("Take the quiz (80%) to complete this module and unlock Module 5.","Haz el quiz (80%) para completar este módulo y desbloquear el Módulo 5.")+'</div>'+
      '<a class="btn" href="#" id="goQuiz">'+X("Go to the quiz","Ir al quiz")+'</a>';
    var g=$("goQuiz"); if(g) g.onclick=function(e){ e.preventDefault(); go(STEPS.length-2); };
  }
}

/* ---------------- Engine ---------------- */
var cur=0, seen={}, tStart=Date.now();
function applyTheme(){ document.documentElement.setAttribute("data-theme",THEME);
  $("temaIco").innerHTML=THEME==="dark"?ICO.sun:ICO.moon; $("temaTxt").textContent=THEME==="dark"?X("Light","Claro"):X("Dark","Oscuro"); }
function chrome(){
  document.documentElement.lang=LANG;
  $("brand").textContent=X(CONFIG.brand[0],CONFIG.brand[1]);
  $("brandsub").textContent=X(CONFIG.subtitle[0],CONFIG.subtitle[1]);
  $("homeTxt").textContent=X("Dashboard","Panel");
  $("prev").innerHTML="‹ "+X("Back","Atrás");
  $("lang").querySelectorAll("button").forEach(function(b){ b.classList.toggle("on",b.getAttribute("data-l")===LANG); });
  applyTheme();
}
function render(){
  stopAnim(); seen[cur]=true;
  var st=STEPS[cur];
  $("card").innerHTML=st.html();
  $("mStep").textContent=X("Lesson","Lección")+" "+(cur+1)+" / "+STEPS.length;
  $("mDur").textContent=CONFIG.duration;
  $("progbar").style.width=((cur+1)/STEPS.length*100)+"%";
  $("dots").innerHTML=STEPS.map(function(_,i){ return '<button class="dot '+(i===cur?"on":(seen[i]?"seen":""))+'" data-i="'+i+'"></button>'; }).join("");
  $("dots").querySelectorAll(".dot").forEach(function(d){ d.onclick=function(){ go(+d.getAttribute("data-i")); }; });
  $("prev").style.visibility=cur===0?"hidden":"visible";
  $("next").innerHTML=(cur===STEPS.length-1?X("Finish","Terminar"):X("Next","Siguiente"))+" ›";
  if(st.init) try{ st.init(); }catch(e){}
  if(window.FOT) FOT.recordProgress(MODULE_ID,cur,STEPS.length);
  window.scrollTo({top:0,behavior:"smooth"});
}
function go(i){ if(i<0||i>=STEPS.length) return; cur=i; render(); }
$("prev").onclick=function(){ go(cur-1); };
$("next").onclick=function(){ if(cur===STEPS.length-1){ location.href="../index.html"; } else go(cur+1); };
$("tema").onclick=function(){ THEME=THEME==="dark"?"light":"dark"; if(window.FOT)FOT.setTheme(THEME); applyTheme(); };
$("lang").querySelectorAll("button").forEach(function(b){ b.onclick=function(){ LANG=b.getAttribute("data-l"); if(window.FOT)FOT.setLang(LANG); chrome(); render(); }; });
document.addEventListener("keydown",function(e){ if(e.key==="ArrowRight")go(cur+1); if(e.key==="ArrowLeft")go(cur-1); });
window.addEventListener("resize",function(){ if(STEPS[cur].init){ stopAnim(); try{STEPS[cur].init();}catch(e){} } });
function flushTime(){ if(window.FOT){ FOT.recordTime(MODULE_ID, Date.now()-tStart); tStart=Date.now(); } }
document.addEventListener("visibilitychange",function(){ if(document.hidden) flushTime(); });
window.addEventListener("pagehide",flushTime); window.addEventListener("beforeunload",flushTime);

chrome(); render();
</script>
