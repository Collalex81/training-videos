<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Exam — Fiber Optic Training</title>
<!--
  TELECOM (azul) — Examen final acumulativo de la plataforma de fibra óptica.
  TELECOM (blue) — Cumulative final exam for the fiber-optic training platform.
  Banco de 50 preguntas (10 por módulo, con fuentes). Cada intento toma 6 al azar
  por módulo = 30 preguntas barajadas. 80% para aprobar (>=24). Al aprobar registra
  FOT.recordFinalExam(pct) y habilita el certificado. Bilingüe EN/ES, responsivo.
-->
<style>
  :root{
    --pg:#f3f6fc; --card:#ffffff; --ink:#0c1c34; --sub:#51618a; --line:#dde5f3;
    --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.12);
    --radius:16px; --shadow:0 1px 2px rgba(12,28,52,.05),0 10px 26px rgba(12,28,52,.08);
  }
  html[data-theme="dark"]{
    --pg:#0a1120; --card:#141d30; --ink:#e9f0ff; --sub:#9db0d6; --line:#243149;
    --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  a{color:inherit}
  .shell{max-width:820px;margin:0 auto;padding:14px 18px 60px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#1e3a8a);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:700;display:block;line-height:1.15}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-top:16px}
  .center{text-align:center}
  .ic{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:2px auto 14px}
  .ic.exam{background:var(--ambt);color:var(--amber)} .ic.lock{background:var(--tint);color:var(--accent)}
  .ic.ok{background:var(--okt);color:var(--ok)} .ic.bad{background:var(--badt);color:var(--bad)}
  h1{font-size:22px;margin:0 0 8px} h2{font-size:16px;margin:0 0 6px}
  .lead{color:var(--sub);font-size:14.5px;margin:0 auto 18px;max-width:560px}
  .facts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:0 0 20px}
  .fact{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:10px 14px;min-width:110px}
  .fact b{display:block;font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
  .fact span{font-size:11.5px;color:var(--sub)}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:11px 18px;border-radius:10px;font-size:14.5px;font-weight:600;font-family:inherit;min-height:44px;display:inline-flex;align-items:center;gap:8px;justify-content:center;text-decoration:none}
  .btn.ghost{background:transparent;color:var(--accent)}
  .btn.sm{padding:9px 14px;min-height:38px;font-size:13px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

  /* progress bar during exam */
  .exbar{position:sticky;top:56px;z-index:20;background:var(--pg);padding:6px 0 10px}
  .exbar .lbl{display:flex;justify-content:space-between;font-size:12.5px;color:var(--sub);margin-bottom:6px}
  .exbar .lbl b{color:var(--ink)}
  .prog{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
  .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#22c55e);width:0;transition:width .35s}

  /* questions */
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px 16px 14px;margin-top:14px}
  .q .tagm{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:3px 9px;border-radius:999px;margin-bottom:9px}
  .q h3{margin:0 0 12px;font-size:15.5px;font-weight:700;line-height:1.35}
  .q h3 .n{color:var(--sub);font-weight:800;margin-right:4px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--pg);color:var(--ink);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;cursor:pointer;margin-top:8px;transition:border-color .12s,background .12s}
  .opt:hover{border-color:var(--accent)}
  .opt.sel{border-color:var(--accent);background:var(--tint);font-weight:600}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad);font-weight:600}
  .opt[disabled]{cursor:default}
  .explain{margin-top:10px;font-size:13px;color:var(--sub);border-left:3px solid var(--accent);padding:6px 0 6px 11px;display:none}
  .explain.show{display:block}
  .explain b{color:var(--ink)}

  /* results */
  .verdict{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;margin:4px 0 2px}
  .verdict.ok{color:var(--ok)} .verdict.no{color:var(--bad)}
  .subv{color:var(--sub);font-size:14px;margin:0 0 6px}
  .brk{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:14px 0 4px}
  .brk .m{background:var(--pg);border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:12px;min-width:88px}
  .brk .m b{display:block;font-size:15px;font-weight:800}
  .note{font-size:12.5px;color:var(--sub);margin-top:14px}

  .foot{margin-top:26px;padding-top:16px;border-top:1px solid var(--line);font-size:12px;color:var(--sub);text-align:center}
  @media(max-width:520px){ .shell{padding:12px 12px 40px} .card{padding:18px 15px} }
</style>
</head>

<script>

    sun:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',

  var PER_MODULE = 6, PASS = FOT.PASS; // 80

  var QBANK = {
    M1: [
     { q:["At which OSI layer does an optical fiber operate?","¿En qué capa OSI opera una fibra óptica?"],

       e:["Inspect–Clean–Inspect per IEC 61300-3-35, every mate.","Inspeccionar–Limpiar–Inspeccionar según IEC 61300-3-35, en cada acople."] },
     { q:["Which cable construction is best for outdoor / OSP with water resistance?","¿Qué construcción es mejor para exterior / OSP con resistencia al agua?"],

     { q:["A high-density MPO/MTP connector is normally used for…","Un conector MPO/MTP de alta densidad se usa normalmente para…"],

     { q:["Refractive index n is defined as…","El índice de refracción n se define como…"],

       e:["C-band ≈ 1530–1565 nm (around 1550 nm).","Banda C ≈ 1530–1565 nm (alrededor de 1550 nm)."] },

    ],

  var MOD_LABEL = {
    M1:["M1 · Layer 1","M1 · Layer 1"], M2:["M2 · Physics","M2 · Física"],
    M3:["M3 · Transport","M3 · Transporte"], M4:["M4 · Testing","M4 · Pruebas"],
    M5:["M5 · Safety","M5 · Seguridad"]
  };
  var MOD_ORDER = ["M1","M2","M3","M4","M5"];
  var TOTAL = PER_MODULE * MOD_ORDER.length; // 30

  function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  function buildExam(){
    var picked=[];
    MOD_ORDER.forEach(function(mk){
      shuffle(QBANK[mk]).slice(0,PER_MODULE).forEach(function(item){
        picked.push({ mod:mk, item:item, choice:null });
      });
    });
    return shuffle(picked);
  }

  var exam=null, answered=0;

  /* ---------------- theme / lang chrome ---------------- */
  function applyTheme(){ document.documentElement.setAttribute("data-theme",THEME);
    $("temaIco").innerHTML = THEME==="dark"?ICO.sun:ICO.moon;
    $("temaTxt").textContent = THEME==="dark"?X("Light","Claro"):X("Dark","Oscuro"); }
  function chrome(){
    applyTheme(); document.documentElement.lang=LANG;
    $("brand").textContent = X("Final Exam","Examen final");
    $("brandsub").textContent = X("Fiber Optic Training","Entrenamiento de fibra óptica");
    $("homeTxt").textContent = X("Dashboard","Panel"); $("suggestTxt").textContent = X("Suggestions","Sugerencias"); $("suggestBtn").title = X("Send a suggestion","Enviar una sugerencia");
    $("lang").querySelectorAll("button").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-l")===LANG); });
    $("foot").innerHTML = X(
      "30 questions drawn at random from all five modules · "+PASS+"% to pass · unlimited retakes.",
      "30 preguntas tomadas al azar de los cinco módulos · "+PASS+"% para aprobar · reintentos ilimitados.");
  }

  /* ---------------- screens ---------------- */
  function screenLocked(){
    var done = FOT.MODULES.filter(function(m){ return FOT.statusOf(m.id)==="completed"; }).length;
    $("app").innerHTML =
      '<div class="card center"><div class="ic lock">'+ICO.lock+'</div>'+
      '<h1>'+X("Final exam is locked","El examen final está bloqueado")+'</h1>'+
      '<p class="lead">'+X("Complete and pass all five modules first. The exam draws its questions from every module.",
                          "Primero completa y aprueba los cinco módulos. El examen toma sus preguntas de todos los módulos.")+'</p>'+
      '<div class="facts"><div class="fact"><b>'+done+'/5</b><span>'+X("Modules passed","Módulos aprobados")+'</span></div>'+
      '<div class="fact"><b>'+PASS+'%</b><span>'+X("To pass each","Para aprobar cada uno")+'</span></div></div>'+
      '<div class="btnrow"><a class="btn" href="../index.html" target="_top">'+X("Back to dashboard","Volver al panel")+'</a></div></div>';
  }

  function screenIntro(){
    var fx = FOT.get().finalExam;
    var prior = fx.attempts.length
      ? '<div class="facts"><div class="fact"><b>'+fx.best+'%</b><span>'+X("Best score","Mejor nota")+'</span></div>'+
        '<div class="fact"><b>'+fx.attempts.length+'</b><span>'+X("Attempts","Intentos")+'</span></div>'+
        '<div class="fact"><b>'+(fx.passed?X("Passed","Aprobado"):X("Not yet","Aún no"))+'</b><span>'+X("Status","Estado")+'</span></div></div>'
      : '';
    $("app").innerHTML =
      '<div class="card center"><div class="ic exam">'+ICO.exam+'</div>'+
      '<h1>'+X("Cumulative Final Exam","Examen final acumulativo")+'</h1>'+
      '<p class="lead">'+X("30 questions selected at random from all five modules (6 per module). Pick the best answer for each. You need "+PASS+"% to pass, which issues your certificate.",
                          "30 preguntas seleccionadas al azar de los cinco módulos (6 por módulo). Elige la mejor respuesta en cada una. Necesitas "+PASS+"% para aprobar, lo que emite tu certificado.")+'</p>'+
      '<div class="facts"><div class="fact"><b>'+TOTAL+'</b><span>'+X("Questions","Preguntas")+'</span></div>'+
      '<div class="fact"><b>'+PASS+'%</b><span>'+X("To pass","Para aprobar")+'</span></div>'+
      '<div class="fact"><b>≥'+Math.ceil(TOTAL*PASS/100)+'</b><span>'+X("Correct needed","Aciertos necesarios")+'</span></div></div>'+

      '<div class="btnrow"><button class="btn" id="start">'+X("Start exam","Iniciar examen")+'</button>'+
      '<a class="btn ghost" href="../index.html" target="_top">'+X("Cancel","Cancelar")+'</a></div></div>';
    $("start").onclick=function(){ exam=buildExam(); answered=0; screenExam(); window.scrollTo(0,0); };
  }

  function screenExam(){
    var html = '<div class="exbar"><div class="lbl"><span>'+X("Progress","Progreso")+'</span>'+
               '<span><b id="acount">0</b>/'+TOTAL+'</span></div>'+
               '<div class="prog"><i id="pbar"></i></div></div>';
    exam.forEach(function(row,qi){
      var opts = row.item.o.map(function(o,oi){
        return '<button class="opt" data-q="'+qi+'" data-o="'+oi+'">'+esc(X(o[0],o[1]))+'</button>';
      }).join("");
      html += '<div class="q" id="q'+qi+'">'+
              '<span class="tagm">'+X(MOD_LABEL[row.mod][0],MOD_LABEL[row.mod][1])+'</span>'+
              '<h3><span class="n">'+(qi+1)+'.</span>'+esc(X(row.item.q[0],row.item.q[1]))+'</h3>'+
              opts+'</div>';
    });
    html += '<div class="card center" style="margin-top:18px"><button class="btn" id="submit" disabled>'+
            X("Submit exam","Entregar examen")+'</button>'+
            '<p class="note" id="subnote">'+X("Answer all questions to submit.","Responde todas las preguntas para entregar.")+'</p></div>';
    $("app").innerHTML = html;

    $("app").querySelectorAll(".opt").forEach(function(btn){
      btn.onclick=function(){
        var qi=+btn.getAttribute("data-q"), oi=+btn.getAttribute("data-o");
        var group=$("app").querySelectorAll('.opt[data-q="'+qi+'"]');
        var wasNull = exam[qi].choice===null;
        group.forEach(function(g){ g.classList.remove("sel"); });
        btn.classList.add("sel");
        exam[qi].choice=oi;
        if(wasNull) answered++;
        $("acount").textContent=answered;
        $("pbar").style.width=Math.round(answered/TOTAL*100)+"%";
        var done = answered===TOTAL;
        $("submit").disabled=!done;
        $("subnote").textContent = done
          ? X("All answered — you can submit.","Todas respondidas — puedes entregar.")
          : X("Answer all questions to submit.","Responde todas las preguntas para entregar.")+" ("+answered+"/"+TOTAL+")";
      };
    });
    $("submit").onclick=grade;
  }

  function grade(){
    var correct=0; var byMod={};
    MOD_ORDER.forEach(function(m){ byMod[m]={c:0,t:0}; });
    exam.forEach(function(row){
      byMod[row.mod].t++;
      if(row.choice===row.item.a){ correct++; byMod[row.mod].c++; }
    });
    var pct=Math.round(correct/TOTAL*100);
    var res=FOT.recordFinalExam(pct);        // registra intento + marca passed si best>=PASS
    var pass=pct>=PASS;
    var cert=null;
    if(res.passed){ cert=FOT.issueCertificate(); } // emite certificado (idempotente)
    screenResults(pct,correct,byMod,pass,cert);
    window.scrollTo(0,0);
  }

  function screenResults(pct,correct,byMod,pass,cert){
    var brk = MOD_ORDER.map(function(m){
      return '<div class="m"><b>'+byMod[m].c+'/'+byMod[m].t+'</b>'+X(MOD_LABEL[m][0],MOD_LABEL[m][1])+'</div>';
    }).join("");
    var certBlock="";
    if(pass && cert){
      certBlock =
        '<div class="facts"><div class="fact"><b>'+esc(cert.number)+'</b><span>'+X("Certificate no.","Certificado n.°")+'</span></div></div>'+
        '<div class="btnrow"><a class="btn" href="../certificates/certificate.html" target="_top">'+ICO.cert+' '+X("View certificate","Ver certificado")+'</a>'+
        '<a class="btn ghost" href="../index.html" target="_top">'+X("Back to dashboard","Volver al panel")+'</a></div>';
    } else {
      certBlock =
        '<div class="btnrow"><button class="btn" id="retry">'+X("Retake exam","Reintentar examen")+'</button>'+
        '<a class="btn ghost" href="../index.html" target="_top">'+X("Back to dashboard","Volver al panel")+'</a></div>';
    }
    $("app").innerHTML =
      '<div class="card center">'+
      '<div class="ic '+(pass?"ok":"bad")+'">'+(pass?ICO.ok:ICO.bad)+'</div>'+
      '<div class="verdict '+(pass?"ok":"no")+'">'+pct+'%</div>'+
      '<p class="subv">'+correct+'/'+TOTAL+' '+X("correct","correctas")+' · '+
        (pass?X("You passed — certificate issued.","Aprobaste — certificado emitido.")
             :X("Not passed yet — you need "+PASS+"%. Review and try again.","Aún no apruebas — necesitas "+PASS+"%. Repasa e inténtalo otra vez."))+'</p>'+
      '<div class="brk">'+brk+'</div>'+
      certBlock+
      '<p class="note">'+X("Answer key with explanations is shown below.","Abajo se muestra la clave de respuestas con explicaciones.")+'</p>'+
      '</div>'+
      '<div id="review"></div>';
    renderReview();
    var rt=$("retry"); if(rt) rt.onclick=function(){ screenIntro(); window.scrollTo(0,0); };
  }

  function renderReview(){
    var host=$("review"); var html="";
    exam.forEach(function(row,qi){
      var opts = row.item.o.map(function(o,oi){
        var cls="opt";
        if(oi===row.item.a) cls+=" correct";
        else if(oi===row.choice) cls+=" wrong";
        return '<button class="'+cls+'" disabled>'+esc(X(o[0],o[1]))+'</button>';
      }).join("");
      var ok = row.choice===row.item.a;
      html += '<div class="q">'+
              '<span class="tagm">'+X(MOD_LABEL[row.mod][0],MOD_LABEL[row.mod][1])+(ok?' ✓':' ✗')+'</span>'+
              '<h3><span class="n">'+(qi+1)+'.</span>'+esc(X(row.item.q[0],row.item.q[1]))+'</h3>'+
              opts+
              '<div class="explain show"><b>'+X("Why","Por qué")+':</b> '+esc(X(row.item.e[0],row.item.e[1]))+'</div>'+
              '</div>';
    });
    host.innerHTML=html;
  }

  /* ---------------- routing ---------------- */
  function route(){
    chrome();
    if(!FOT.finalExamUnlocked()){ screenLocked(); return; }
    screenIntro();
  }

  $("tema").onclick=function(){ THEME=THEME==="dark"?"light":"dark"; FOT.setTheme(THEME); chrome(); };
  $("lang").querySelectorAll("button").forEach(function(b){
    b.onclick=function(){ LANG=b.getAttribute("data-l"); FOT.setLang(LANG);
      // re-render current screen in new language from a clean intro/lock (exam in progress restarts)
      route(); window.scrollTo(0,0); };
  });

  route();
})();
</script>
</body>
</html>
