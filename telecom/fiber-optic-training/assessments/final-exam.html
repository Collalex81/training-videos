<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Exam — Fiber Optic Training</title>
<style>
  :root{--pg:#f3f6fc;--card:#fff;--ink:#0c1c34;--sub:#51618a;--line:#dde5f3;--accent:#2563EB;--tint:rgba(37,99,235,.10);--amber:#b45309;--ambt:rgba(180,83,9,.12)}
  html[data-theme="dark"]{--pg:#0a1120;--card:#141d30;--ink:#e9f0ff;--sub:#9db0d6;--line:#243149;--accent:#4d8bff;--tint:rgba(77,139,255,.14);--amber:#fbbf24;--ambt:rgba(251,191,36,.14)}
  *{box-sizing:border-box}body{margin:0;background:var(--pg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{max-width:560px;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px 26px;box-shadow:0 10px 26px rgba(12,28,52,.08)}
  .ic{width:64px;height:64px;border-radius:16px;background:var(--ambt);color:var(--amber);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  h1{font-size:22px;margin:0 0 6px}.tag{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:4px 11px;border-radius:999px;display:inline-block;margin-bottom:14px}
  p{color:var(--sub);font-size:14.5px;margin:0 0 20px}
  a{display:inline-flex;gap:8px;align-items:center;text-decoration:none;background:var(--accent);color:#fff;padding:11px 18px;border-radius:10px;font-weight:600;font-size:14px}
  .lang{margin-top:16px;font-size:12px;color:var(--sub)}.lang button{background:none;border:0;color:var(--accent);cursor:pointer;text-decoration:underline;font-family:inherit;font-size:12px}
</style>
</head>
<body>
<div class="box">
  <div class="ic"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg></div>
  <span class="tag" id="tag">Final exam</span>
  <h1 id="t">Cumulative Final Exam</h1>
  <p id="p">The final exam unlocks after you complete and pass all five modules. It draws questions from every module and requires 80% to pass, which then issues your certificate.</p>
  <a id="back" href="../index.html">← <span id="b">Back to dashboard</span></a>
  <div class="lang"><button data-l="en">English</button> · <button data-l="es">Español</button></div>
</div>
<script src="../scripts/progress.js"></script>
<script>
  var L=FOT.getLang(); document.documentElement.setAttribute("data-theme",FOT.getTheme());
  function set(){ document.documentElement.lang=L;
    document.getElementById("t").textContent = L==="es"?"Examen final acumulativo":"Cumulative Final Exam";
    document.getElementById("p").textContent = L==="es"
      ? "El examen final se desbloquea cuando completas y apruebas los cinco módulos. Toma preguntas de todos los módulos y requiere 80% para aprobar, lo que emite tu certificado."
      : "The final exam unlocks after you complete and pass all five modules. It draws questions from every module and requires 80% to pass, which then issues your certificate.";
    document.getElementById("b").textContent = L==="es"?"Volver al panel":"Back to dashboard"; }
  set();
  document.querySelectorAll(".lang button").forEach(function(x){x.onclick=function(){L=x.getAttribute("data-l");FOT.setLang(L);set();};});
</script>
</body>
</html>
