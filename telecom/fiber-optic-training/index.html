<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Optic Telecommunications Training</title>
<!--
  TELECOM (azul) — Dashboard de la plataforma de entrenamiento en fibra óptica.
  TELECOM (blue) — Fiber Optic Telecommunications Training dashboard.
  Desbloqueo progresivo + guardado de progreso vía scripts/progress.js (localStorage).
  Bilingüe EN/ES (EN por defecto). Motor de diseño alineado al proyecto.
-->
<style>
  :root{
    --pg:#f3f6fc; --card:#ffffff; --ink:#0c1c34; --sub:#51618a; --line:#dde5f3;
    --bar:#0b2e59; --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.12); --lock:#64748b; --lockt:rgba(100,116,139,.12);
    --radius:16px; --shadow:0 1px 2px rgba(12,28,52,.05),0 10px 26px rgba(12,28,52,.08);
  }
  html[data-theme="dark"]{
    --pg:#0a1120; --card:#141d30; --ink:#e9f0ff; --sub:#9db0d6; --line:#243149;
    --bar:#0a1526; --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14); --lock:#94a3b8; --lockt:rgba(148,163,184,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  a{color:inherit}
  .shell{max-width:1060px;margin:0 auto;padding:14px 18px 46px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0 10px;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#1e3a8a);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:16px;font-weight:700;display:block;line-height:1.15}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}

  /* HERO */
  .hero{background:linear-gradient(135deg,#0b2e59,#12356b 55%,#1e3a8a);color:#eaf1ff;border-radius:var(--radius);padding:26px 24px;margin:16px 0 18px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
  .hero:after{content:"";position:absolute;right:-40px;top:-40px;width:260px;height:260px;background:radial-gradient(circle,rgba(77,139,255,.35),transparent 70%)}
  .hero h1{font-size:clamp(21px,3.4vw,30px);margin:0 0 8px;font-weight:800;line-height:1.15;position:relative}
  .hero p{margin:0;max-width:640px;color:#c9d8f5;font-size:14.5px;position:relative}
  .hero .kpis{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;position:relative}
  .kpi{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:10px 14px;min-width:120px}
  .kpi b{display:block;font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
  .kpi span{font-size:11.5px;color:#bcd0f4}

  /* Employee bar */
  .who{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
  .who .av{width:40px;height:40px;border-radius:50%;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;flex:none}
  .who .info{flex:1;min-width:180px}
  .who .info b{font-size:15px}
  .who .info span{display:block;font-size:12px;color:var(--sub)}
  .who input{flex:1;min-width:180px;border:1px solid var(--line);background:var(--pg);color:var(--ink);border-radius:9px;padding:10px 12px;font-size:14px;font-family:inherit}
  .who .bigprog{flex:1;min-width:220px}
  .who .bigprog .lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:5px}
  .prog{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
  .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#22c55e);width:0;transition:width .5s}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center;text-decoration:none}
  .btn.ghost{background:transparent;color:var(--accent)}
  .btn.sm{padding:8px 13px;min-height:36px;font-size:13px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .sechead{display:flex;align-items:center;gap:9px;margin:22px 2px 12px}
  .sechead h2{font-size:15px;margin:0;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--sub)}
  .sechead .ln{flex:1;height:1px;background:var(--line)}

  /* Module cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,320px),1fr));gap:16px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:0;overflow:hidden;display:flex;flex-direction:column;position:relative;transition:transform .15s,border-color .15s}
  .mcard:hover{transform:translateY(-2px);border-color:var(--accent)}
  .mcard.locked{opacity:.72}
  .mcard.locked:hover{transform:none;border-color:var(--line)}
  .mtop{display:flex;align-items:flex-start;gap:12px;padding:16px 16px 8px}
  .mnum{width:46px;height:46px;border-radius:12px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;flex:none}
  .mcard.completed .mnum{background:var(--okt);color:var(--ok)}
  .mcard.locked .mnum{background:var(--lockt);color:var(--lock)}
  .mtitle{flex:1;min-width:0}
  .mtitle h3{margin:0;font-size:16px;font-weight:700;line-height:1.2}
  .mtitle .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:3px 9px;border-radius:999px;margin-top:6px}
  .badge.available{background:var(--tint);color:var(--accent)}
  .badge.in_progress{background:var(--ambt);color:var(--amber)}
  .badge.completed{background:var(--okt);color:var(--ok)}
  .badge.locked{background:var(--lockt);color:var(--lock)}
  .mbody{padding:0 16px 12px;flex:1}
  .mbody p{margin:6px 0 0;font-size:13px;color:var(--sub)}
  .mfoot{padding:12px 16px 16px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .mmini{font-size:12px;color:var(--sub)}
  .mmini b{color:var(--ink)}
  .mprog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:10px 16px 0}
  .mprog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .5s}
  .mcard.completed .mprog>i{background:var(--ok)}

  .two{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,300px),1fr));gap:16px}
  .wide{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;display:flex;gap:14px;align-items:center}
  .wide .ic{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none}
  .wide.exam .ic{background:var(--ambt);color:var(--amber)}
  .wide.cert .ic{background:var(--okt);color:var(--ok)}
  .wide.gloss .ic{background:var(--tint);color:var(--accent)}
  .wide.labs .ic{background:var(--tint);color:var(--accent)}
  .wide a.mini{margin-left:auto;flex:none}
  .wide .tx{flex:1;min-width:0}
  .wide .tx b{font-size:15px}
  .wide .tx span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}

  .foot{margin-top:26px;padding-top:16px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--sub)}
  .foot a{color:var(--accent);text-decoration:none}
  .linkbtn{background:none;border:0;color:var(--sub);text-decoration:underline;cursor:pointer;font-family:inherit;font-size:12px}
  @media(max-width:520px){ .shell{padding:12px 12px 30px} .hero{padding:20px 16px} }
</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <div class="top">
      <div class="brand">
        <span class="logo"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"/><path d="M12 5v2M12 17v2"/></svg></span>
        <div><b id="brand"></b><small id="brandsub"></small></div>
      </div>
      <div class="tools">
        <a class="tbtn" id="home" href="../../index.html" target="_top"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span id="homeTxt"></span></a>
        <button class="tbtn" id="tema"><span id="temaIco"></span><span id="temaTxt"></span></button>
        <div class="lang" id="lang"><button data-l="en">EN</button><button data-l="es">ES</button></div>
      </div>
    </div>
  </div>

  <div class="hero">
    <h1 id="heroTitle"></h1>
    <p id="heroLead"></p>
    <div class="kpis">
      <div class="kpi"><b>5</b><span id="kpiMods"></span></div>
      <div class="kpi"><b id="kpiPct">0%</b><span id="kpiProg"></span></div>
      <div class="kpi"><b id="kpiDone">0/5</b><span id="kpiComp"></span></div>
      <div class="kpi"><b>80%</b><span id="kpiPass"></span></div>
    </div>
  </div>

  <div class="who" id="who"></div>

  <div class="sechead"><h2 id="secMods"></h2><span class="ln"></span></div>
  <div class="cards" id="cards"></div>

  <div class="sechead"><h2 id="secFinal"></h2><span class="ln"></span></div>
  <div class="two">
    <div class="wide exam" id="examCard"></div>
    <div class="wide cert" id="certCard"></div>
  </div>

  <div class="sechead"><h2 id="secRes"></h2><span class="ln"></span></div>
  <div class="two">
    <div class="wide gloss" id="glossCard"></div>
    <div class="wide labs" id="labsCard"></div>
  </div>

  <div class="foot">
    <div id="footNote"></div>
    <div><button class="linkbtn" id="reset"></button></div>
  </div>
</div>

<script src="scripts/progress.js"></script>
<script>
(function(){
  function $(id){ return document.getElementById(id); }
  var LANG  = FOT.getLang();
  var THEME = FOT.getTheme();
  function X(en,es){ return LANG==="es"?es:en; }

  var ICO = {
    sun:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    moon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    lock:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>',
    check:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    play:'<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
    exam:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M20 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>',
    cert:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="6"/><path d="M9 13.5 8 22l4-2 4 2-1-8.5"/></svg>',
    book:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
    flask:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v6l-5 9a2 2 0 0 0 1.7 3h12.6a2 2 0 0 0 1.7-3l-5-9V3"/><path d="M8 3h8"/></svg>',
    arrow:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>'
  };

  function applyTheme(){ document.documentElement.setAttribute("data-theme",THEME);
    $("temaIco").innerHTML = THEME==="dark"?ICO.sun:ICO.moon;
    $("temaTxt").textContent = THEME==="dark"?X("Light","Claro"):X("Dark","Oscuro"); }

  function initials(n){ n=(n||"").trim(); if(!n) return "?";
    var p=n.split(/\s+/); return (p[0][0]+(p[1]?p[1][0]:"")).toUpperCase(); }

  function fmtTime(ms){ if(!ms) return "0m"; var m=Math.round(ms/60000);
    if(m<60) return m+"m"; return Math.floor(m/60)+"h "+(m%60)+"m"; }

  var STAT = { locked:X("Locked","Bloqueado"), available:X("Available","Disponible"),
               in_progress:X("In progress","En progreso"), completed:X("Completed","Completado") };

  function render(){
    applyTheme();
    document.documentElement.lang = LANG;
    $("brand").textContent = "Fiber Optic Training";
    $("brandsub").textContent = X("Telecommunications · Layer 1 → Safety","Telecomunicaciones · Layer 1 → Seguridad");
    $("homeTxt").textContent = X("Gallery","Galería");
    // language buttons
    var lb = $("lang").querySelectorAll("button");
    lb.forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-l")===LANG); });

    $("heroTitle").textContent = X("Fiber Optic Telecommunications Training","Entrenamiento de fibra óptica para telecomunicaciones");
    $("heroLead").textContent = X("A progressive, field-oriented program for technicians, installers and telecom engineers. Five modules unlock one after another — from the physical layer to safety.",
                                  "Un programa progresivo y orientado al campo para técnicos, instaladores e ingenieros de telecomunicaciones. Cinco módulos se desbloquean uno tras otro — de la capa física a la seguridad.");
    $("kpiMods").textContent = X("Modules","Módulos");
    $("kpiProg").textContent = X("Overall progress","Progreso general");
    $("kpiComp").textContent = X("Modules completed","Módulos completados");
    $("kpiPass").textContent = X("Passing score","Nota para aprobar");
    $("secMods").textContent = X("Training modules","Módulos de entrenamiento");
    $("secFinal").textContent = X("Final exam & certificate","Examen final y certificado");
    $("secRes").textContent = X("Study resources","Recursos de estudio");

    var pct = FOT.overallPercent();
    $("kpiPct").textContent = pct+"%";
    var doneCount = FOT.MODULES.filter(function(m){ return FOT.statusOf(m.id)==="completed"; }).length;
    $("kpiDone").textContent = doneCount+"/5";

    renderWho(pct, doneCount);
    renderCards();
    renderFinal(doneCount);
    renderResources();

    $("footNote").innerHTML = X(
      "Progress is saved in this browser. Use the same device to continue where you left off.",
      "El progreso se guarda en este navegador. Usa el mismo dispositivo para continuar donde lo dejaste.");
    $("reset").textContent = X("Reset my progress","Reiniciar mi progreso");
  }

  function renderWho(pct, doneCount){
    var emp = FOT.employee();
    if(!emp.name){
      $("who").innerHTML =
        '<div class="av">'+ICO_person()+'</div>'+
        '<div class="info"><b>'+X("Welcome — let’s begin","Bienvenido — empecemos")+'</b>'+
        '<span>'+X("Enter your name to start and track your progress.","Escribe tu nombre para iniciar y guardar tu progreso.")+'</span></div>'+
        '<input id="empName" placeholder="'+X("Your full name","Tu nombre completo")+'" autocomplete="name">'+
        '<button class="btn sm" id="empStart">'+X("Start","Iniciar")+'</button>';
      var go=function(){ var v=$("empName").value.trim(); if(v.length<2){$("empName").focus();return;} FOT.setEmployee(v); render(); };
      $("empStart").onclick=go;
      $("empName").addEventListener("keydown",function(e){ if(e.key==="Enter") go(); });
    } else {
      var start = emp.startedAt ? new Date(emp.startedAt).toLocaleDateString(LANG==="es"?"es":"en") : "—";
      $("who").innerHTML =
        '<div class="av">'+initials(emp.name)+'</div>'+
        '<div class="info"><b>'+esc(emp.name)+'</b><span>'+X("Started","Inicio")+': '+start+'</span></div>'+
        '<div class="bigprog"><div class="lbl"><span>'+X("Overall progress","Progreso general")+'</span><span>'+pct+'%</span></div>'+
        '<div class="prog"><i style="width:'+pct+'%"></i></div></div>';
    }
  }
  function ICO_person(){ return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>'; }
  function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }

  function renderCards(){
    var host = $("cards"); host.innerHTML="";
    FOT.MODULES.forEach(function(m, i){
      var st = FOT.statusOf(m.id);
      var rec = FOT.moduleRecord(m.id);
      var card = document.createElement("div");
      card.className = "mcard "+st;
      var badgeTxt = STAT[st];
      var badgeIco = st==="completed"?ICO.check:(st==="locked"?ICO.lock:"");
      var pctm = st==="completed"?100:(rec.percent||0);

      var actionBtn;
      if(st==="locked"){
        actionBtn = '<button class="btn ghost sm" disabled>'+ICO.lock+' '+X("Locked","Bloqueado")+'</button>';
      } else if(!m.ready){
        actionBtn = '<button class="btn ghost sm" disabled>'+X("Coming soon","Próximamente")+'</button>';
      } else if(st==="completed"){
        actionBtn = '<a class="btn ghost sm" href="'+m.file+'" target="_top">'+X("Review","Repasar")+'</a>';
      } else if(st==="in_progress"){
        actionBtn = '<a class="btn sm" href="'+m.file+'" target="_top">'+ICO.play+' '+X("Continue","Continuar")+'</a>';
      } else {
        actionBtn = '<a class="btn sm" href="'+m.file+'" target="_top">'+ICO.play+' '+X("Start","Empezar")+'</a>';
      }

      var mini;
      if(st==="completed"){ mini = X("Best score","Mejor nota")+': <b>'+rec.best+'%</b> · '+fmtTime(rec.timeMs); }
      else if(st==="in_progress"){ mini = pctm+'% · '+X("Lesson","Lección")+' '+(rec.lastLesson+1)+(rec.total?('/'+rec.total):''); }
      else if(st==="locked"){ mini = X("Pass Module","Aprueba el Módulo")+' '+(i)+' '+X("to unlock","para desbloquear"); }
      else { mini = m.ready? X("Not started","Sin empezar") : X("In development","En desarrollo"); }

      card.innerHTML =
        '<div class="mtop"><div class="mnum">'+m.code+'</div>'+
        '<div class="mtitle"><h3>'+X(m.title.en,m.title.es)+'</h3>'+
        '<span class="badge '+st+'">'+badgeIco+' '+badgeTxt+'</span></div></div>'+
        '<div class="mbody"><p>'+X(m.desc.en,m.desc.es)+'</p></div>'+
        '<div class="mprog"><i style="width:'+pctm+'%"></i></div>'+
        '<div class="mfoot"><span class="mmini">'+mini+'</span>'+actionBtn+'</div>';
      host.appendChild(card);
    });
  }

  function renderFinal(doneCount){
    var examOpen = FOT.finalExamUnlocked();
    var fx = FOT.get().finalExam;
    var examBtn = examOpen
      ? '<a class="btn sm" href="assessments/final-exam.html" target="_top">'+(fx.passed?X("Review","Repasar"):X("Start exam","Iniciar examen"))+'</a>'
      : '<button class="btn ghost sm" disabled>'+ICO.lock+' '+X("Locked","Bloqueado")+'</button>';
    $("examCard").innerHTML =
      '<div class="ic">'+ICO.exam+'</div>'+
      '<div class="tx"><b>'+X("Final exam","Examen final")+'</b>'+
      '<span>'+(examOpen
         ? (fx.passed? X("Passed","Aprobado")+' — '+fx.best+'%' : X("Ready — 80% to pass","Listo — 80% para aprobar"))
         : X("Complete the 5 modules to unlock","Completa los 5 módulos para desbloquear")+' ('+doneCount+'/5)')+'</span></div>'+
      examBtn;

    var certOK = FOT.certificateReady();
    var certBtn = certOK
      ? '<a class="btn sm" href="certificates/certificate.html" target="_top">'+ICO.cert+' '+X("View certificate","Ver certificado")+'</a>'
      : '<button class="btn ghost sm" disabled>'+ICO.lock+' '+X("Locked","Bloqueado")+'</button>';
    $("certCard").innerHTML =
      '<div class="ic">'+ICO.cert+'</div>'+
      '<div class="tx"><b>'+X("Certificate","Certificado")+'</b>'+
      '<span>'+(certOK? X("Available — pass the final exam earned it","Disponible — aprobaste el examen final")
                       : X("Pass the final exam to unlock","Aprueba el examen final para desbloquear"))+'</span></div>'+
      certBtn;
  }

  function renderResources(){
    $("glossCard").innerHTML =
      '<div class="ic">'+ICO.book+'</div>'+
      '<div class="tx"><b>'+X("Glossary","Glosario")+'</b>'+
      '<span>'+X("Bilingual reference of key fiber terms — search or filter by topic.","Referencia bilingüe de términos clave de fibra — busca o filtra por tema.")+'</span></div>'+
      '<a class="btn sm mini" href="glossary/index.html" target="_top">'+X("Open","Abrir")+' '+ICO.arrow+'</a>';
    $("labsCard").innerHTML =
      '<div class="ic">'+ICO.flask+'</div>'+
      '<div class="tx"><b>'+X("Labs & simulators","Laboratorios y simuladores")+'</b>'+
      '<span>'+X("Optical budget, OTDR reader and connector trainer — ungraded practice.","Presupuesto óptico, lector OTDR y entrenador de conectores — práctica sin calificar.")+'</span></div>'+
      '<a class="btn sm mini" href="labs/index.html" target="_top">'+X("Open","Abrir")+' '+ICO.arrow+'</a>';
  }

  // events
  $("tema").onclick = function(){ THEME = THEME==="dark"?"light":"dark"; FOT.setTheme(THEME); render(); };
  $("lang").querySelectorAll("button").forEach(function(b){
    b.onclick = function(){ LANG = b.getAttribute("data-l"); FOT.setLang(LANG); render(); };
  });
  document.addEventListener("click", function(e){
    if(e.target && e.target.id==="reset"){
      if(confirm(X("This will erase your name, scores and progress on this browser. Continue?",
                   "Esto borrará tu nombre, notas y progreso en este navegador. ¿Continuar?"))){
        FOT.reset(); LANG="en"; THEME="light"; render();
      }
    }
  });

  render();
})();
</script>
</body>
</html>
