<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugerencias / Suggestions — Centro de Capacitación</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231f6feb'/><text x='32' y='44' font-family='Segoe UI,Arial,sans-serif' font-size='30' font-weight='700' fill='white' text-anchor='middle'>LE</text></svg>">
<script>try{var _t=localStorage.getItem("tema");document.documentElement.setAttribute("data-theme",_t==="dark"?"dark":"light");}catch(e){}</script>
<style>
  :root{
    --pg:#f4f6fb; --card:#ffffff; --ink:#0f2544; --sub:#5b6b84;
    --line:#e6ebf5; --bar:#0b2e59; --barink:#ffffff; --brand:#1f6feb;
    --tint:rgba(31,111,235,.10); --shadow:0 1px 2px rgba(16,37,68,.05),0 10px 26px rgba(16,37,68,.07);
    --radius:14px; --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.12);
  }
  html[data-theme="dark"]{
    --pg:#0b1220; --card:#151d30; --ink:#eaf0ff; --sub:#9fb0cc;
    --line:#243149; --bar:#0a1526; --barink:#ffffff; --brand:#4d8bff;
    --tint:rgba(77,139,255,.14); --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  svg{display:block}
  .topbar{position:sticky;top:0;z-index:40;background:linear-gradient(100deg,var(--bar),#124a86);color:var(--barink);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 20px;flex-wrap:wrap;box-shadow:0 2px 14px rgba(0,0,0,.18)}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--brand),#4f46e5);display:flex;align-items:center;justify-content:center;flex:none;color:#fff;font-weight:800;font-size:15px;letter-spacing:.5px}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.15}
  .brand small{font-size:10.5px;opacity:.75;letter-spacing:.06em}
  .tb-actions{display:flex;align-items:center;gap:8px}
  .btn-ico{border:1px solid rgba(255,255,255,.25);background:transparent;color:var(--barink);cursor:pointer;padding:0 12px;height:36px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit;text-decoration:none}
  .btn-ico:hover{background:rgba(255,255,255,.1)}
  .btn-ico svg{width:15px;height:15px}
  .lang{display:flex;gap:3px;background:rgba(255,255,255,.12);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--barink);cursor:pointer;min-width:38px;height:30px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--brand);color:#fff}
  .wrap{max-width:680px;margin:0 auto;padding:26px 20px 60px}
  .head{text-align:center;margin-bottom:18px}
  .badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--brand);background:var(--tint);padding:6px 12px;border-radius:999px;font-weight:700}
  h1{font-size:clamp(22px,4vw,28px);margin:12px 0 6px}
  .lead{color:var(--sub);font-size:15px;margin:0 auto;max-width:560px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-top:18px}
  .field{margin-bottom:16px}
  label{display:block;font-size:13.5px;font-weight:600;margin-bottom:6px}
  label .opt{font-weight:400;color:var(--sub);font-size:12.5px}
  .req{color:var(--bad);font-weight:700}
  input[type=text],input[type=url],textarea,select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--pg);color:var(--ink);font-size:14.5px;font-family:inherit}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--tint)}
  textarea{min-height:120px;resize:vertical}
  .hint{font-size:12px;color:var(--sub);margin-top:5px}
  .file{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .filebtn{display:inline-flex;align-items:center;gap:8px;border:1px dashed var(--line);background:var(--pg);color:var(--ink);border-radius:10px;padding:11px 14px;cursor:pointer;font-size:14px;font-weight:600}
  .filebtn:hover{border-color:var(--brand);color:var(--brand)}
  .flist{margin-top:8px;display:flex;flex-direction:column;gap:5px}
  .fitem{display:flex;align-items:center;gap:8px;font-size:13px;background:var(--pg);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
  .fitem .x{margin-left:auto;cursor:pointer;color:var(--sub);border:0;background:transparent;font-size:16px;line-height:1;font-family:inherit}
  .fitem .x:hover{color:var(--bad)}
  .ftot{font-size:12.5px;color:var(--sub);margin-top:6px}
  .ftot.over{color:var(--bad);font-weight:600}
  .btn{border:0;background:var(--brand);color:#fff;cursor:pointer;padding:13px 20px;border-radius:11px;font-size:15px;font-weight:700;font-family:inherit;width:100%;min-height:50px;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn:disabled{opacity:.6;cursor:default}
  .msg{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:14px;display:none}
  .msg.ok{display:block;background:var(--okt);color:var(--ok);border:1px solid var(--ok)}
  .msg.bad{display:block;background:var(--badt);color:var(--bad);border:1px solid var(--bad)}
  .note{font-size:12.5px;color:var(--sub);border-left:3px solid var(--brand);background:var(--tint);padding:10px 12px;border-radius:0 8px 8px 0;margin-top:16px}
  .foot{text-align:center;color:var(--sub);font-size:12px;margin-top:24px}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="logo">LE</span><div><b id="tbBrand"></b><small id="tbSub"></small></div></div>
  <div class="tb-actions">
    <a class="btn-ico" id="back" href="../index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg><span id="backTxt"></span></a>
    <button class="btn-ico" id="tema"><span id="temaIco"></span><span id="temaTxt"></span></button>
    <div class="lang" id="lang"><button data-l="es">ES</button><button data-l="en">EN</button></div>
  </div>
</div>

<div class="wrap">
  <div class="head">
    <span class="badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span id="bTxt"></span></span>
    <h1 id="title"></h1>
    <p class="lead" id="lead"></p>
  </div>

  <div class="card">
    <form id="form" novalidate>
      <div class="field">
        <label id="lName"></label>
        <input type="text" id="fName" autocomplete="name" maxlength="80">
      </div>
      <div class="field">
        <label id="lArea"></label>
        <select id="fArea"></select>
      </div>
      <div class="field">
        <label id="lSug"></label>
        <textarea id="fSug" maxlength="4000" required></textarea>
      </div>
      <div class="field">
        <label id="lLink"></label>
        <input type="url" id="fLink" placeholder="https://..." maxlength="500">
        <div class="hint" id="hLink"></div>
      </div>
      <div class="field">
        <label id="lFile"></label>
        <div class="file">
          <label class="filebtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a5 5 0 0 1-7.07-7.07l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg><span id="fileBtnTxt"></span><input type="file" id="fFile" multiple style="display:none"></label>
        </div>
        <div class="flist" id="flist"></div>
        <div class="ftot" id="ftot"></div>
        <div class="hint" id="hFile"></div>
      </div>
      <button type="submit" class="btn" id="send"><span id="sendTxt"></span></button>
      <div class="msg" id="msg"></div>
    </form>
    <div class="note" id="privacy"></div>
  </div>
  <div class="foot" id="foot"></div>
</div>

<script>
/* ============================================================================
   OWNER / DUEÑO:  pega aquí la URL /exec de tu Web App de Apps Script.
   Paste your Apps Script Web App /exec URL here (see suggestions/README.md).
   ==========================================================================*/
var SUGGEST_URL = "https://script.google.com/macros/s/AKfycbxDfVtsc1czCNcbwpODnjQKv4DYiG7sz3ToRk3MjJTPWofuO578SQAK2KQapb3hPUsp/exec";
var MAX_FILES = 3;
var MAX_TOTAL_MB = 12;

var T = {
  es:{ brand:"Sugerencias", sub:"CENTRO DE CAPACITACIÓN", back:"Volver", badge:"Buzón del equipo",
       title:"Comparte una sugerencia", lead:"¿Una idea para mejorar el entrenamiento? ¿Archivos o un link útil? Cuéntanos. Va directo a Luis.",
       name:"Nombre", nameOpt:"(opcional)", area:"Área / Módulo", areaOpt:"(opcional)",
       sug:"Tu sugerencia", link:"Link (video, artículo, etc.)", linkOpt:"(opcional)",
       hLink:"Pega un enlace a algo útil: un video, un documento de Drive, un artículo…",
       file:"Adjuntar archivos", fileOpt:"(opcional)", fileBtn:"Elegir archivos",
       hFile:"Hasta "+MAX_FILES+" archivos, "+MAX_TOTAL_MB+" MB en total. Para más o más grandes, comparte un link de Drive.",
       send:"Enviar sugerencia", sending:"Enviando…",
       total:"Total: ", of:" de ", mb:" MB",
       okMsg:"¡Gracias! Tu sugerencia se envió correctamente.",
       errReq:"Escribe tu sugerencia antes de enviar.",
       errCount:"Máximo "+MAX_FILES+" archivos. Quita alguno.",
       errBig:"El tamaño combinado supera "+MAX_TOTAL_MB+" MB. Quita algún archivo o comparte un link.",
       errNet:"No se pudo enviar. Revisa tu conexión e intenta de nuevo.",
       errCfg:"El buzón de sugerencias aún no está activo. (Configuración pendiente del administrador.)",
       privacy:"Tus datos van directo a Luis (privado). Identificarte es opcional; si dejas tu nombre, es solo para dar seguimiento.",
       tema:"Oscuro", claro:"Claro",
       foot:"Centro de Capacitación · Construido y diseñado por Luis Estevez" },
  en:{ brand:"Suggestions", sub:"TRAINING CENTER", back:"Back", badge:"Team inbox",
       title:"Share a suggestion", lead:"Have an idea to improve the training? Useful files or a link? Tell us. It goes straight to Luis.",
       name:"Name", nameOpt:"(optional)", area:"Area / Module", areaOpt:"(optional)",
       sug:"Your suggestion", link:"Link (video, article, etc.)", linkOpt:"(optional)",
       hLink:"Paste a link to something useful: a video, a Drive document, an article…",
       file:"Attach files", fileOpt:"(optional)", fileBtn:"Choose files",
       hFile:"Up to "+MAX_FILES+" files, "+MAX_TOTAL_MB+" MB total. For more or larger, share a Drive link.",
       send:"Send suggestion", sending:"Sending…",
       total:"Total: ", of:" of ", mb:" MB",
       okMsg:"Thank you! Your suggestion was sent successfully.",
       errReq:"Please write your suggestion before sending.",
       errCount:"Max "+MAX_FILES+" files. Please remove one.",
       errBig:"Combined size is over "+MAX_TOTAL_MB+" MB. Remove a file or share a link.",
       errNet:"Could not send. Check your connection and try again.",
       errCfg:"The suggestion inbox is not active yet. (Pending administrator setup.)",
       privacy:"Your entry goes straight to Luis (private). Identifying yourself is optional; a name just helps with follow-up.",
       tema:"Dark", claro:"Light",
       foot:"Training Center · Built and designed by Luis Estevez" }
};
var AREAS = [
  {v:"general", es:"General / Todo el portal", en:"General / Whole portal"},
  {v:"seguridad", es:"Seguridad", en:"Safety"},
  {v:"telecom", es:"Telecom", en:"Telecom"},
  {v:"electricidad", es:"Electricidad", en:"Electrical"},
  {v:"construccion", es:"Construcción", en:"Construction"},
  {v:"induccion", es:"Inducción", en:"Onboarding"}
];
function $(id){ return document.getElementById(id); }
var LANG="es"; try{ var l=localStorage.getItem("lang"); if(l==="en"||l==="es") LANG=l; }catch(e){}
if(!localStorage.getItem("lang")){ LANG=(navigator.language||"es").toLowerCase().startsWith("en")?"en":"es"; }
var files=[]; // array of File

function mb(bytes){ return (bytes/1048576); }
function totalBytes(){ return files.reduce(function(s,f){return s+f.size;},0); }

function renderFiles(){
  var t=T[LANG], wrap=$("flist"); wrap.innerHTML="";
  files.forEach(function(f,idx){
    var row=document.createElement("div"); row.className="fitem";
    row.innerHTML='<span>📎</span><span>'+f.name+'</span><span style="color:var(--sub)">'+mb(f.size).toFixed(1)+' MB</span><button type="button" class="x" data-i="'+idx+'" aria-label="quitar">×</button>';
    wrap.appendChild(row);
  });
  wrap.querySelectorAll(".x").forEach(function(b){ b.onclick=function(){ files.splice(+b.dataset.i,1); renderFiles(); }; });
  var tot=$("ftot");
  if(files.length){ var over=totalBytes()>MAX_TOTAL_MB*1048576 || files.length>MAX_FILES;
    tot.textContent=t.total+mb(totalBytes()).toFixed(1)+t.of+MAX_TOTAL_MB+t.mb+" · "+files.length+"/"+MAX_FILES;
    tot.className="ftot"+(over?" over":""); }
  else { tot.textContent=""; tot.className="ftot"; }
}

function paint(){
  var t=T[LANG]; document.documentElement.lang=LANG;
  $("tbBrand").textContent=t.brand; $("tbSub").textContent=t.sub;
  $("backTxt").textContent=t.back; $("bTxt").textContent=t.badge;
  $("title").textContent=t.title; $("lead").textContent=t.lead;
  $("lName").innerHTML=t.name+' <span class="opt">'+t.nameOpt+'</span>';
  $("lArea").innerHTML=t.area+' <span class="opt">'+t.areaOpt+'</span>';
  $("lSug").innerHTML=t.sug+' <span class="req">*</span>';
  $("lLink").innerHTML=t.link+' <span class="opt">'+t.linkOpt+'</span>';
  $("hLink").textContent=t.hLink;
  $("lFile").innerHTML=t.file+' <span class="opt">'+t.fileOpt+'</span>';
  $("fileBtnTxt").textContent=t.fileBtn; $("hFile").textContent=t.hFile;
  $("sendTxt").textContent=t.send; $("privacy").textContent=t.privacy; $("foot").textContent=t.foot;
  $("fSug").setAttribute("placeholder", LANG==="es"?"Escribe aquí tu idea, comentario o mejora…":"Write your idea, comment or improvement here…");
  var sel=$("fArea"); var cur=sel.value; sel.innerHTML=AREAS.map(function(a){return '<option value="'+a.v+'">'+(LANG==="es"?a.es:a.en)+'</option>';}).join(""); if(cur) sel.value=cur;
  var dark=document.documentElement.getAttribute("data-theme")==="dark";
  $("temaIco").innerHTML=dark
    ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>'
    : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  $("temaTxt").textContent=dark?t.claro:t.tema;
  document.querySelectorAll("#lang button").forEach(function(b){ b.classList.toggle("on", b.dataset.l===LANG); });
  document.title=t.brand+" / Suggestions";
  renderFiles();
}
document.querySelectorAll("#lang button").forEach(function(b){ b.onclick=function(){ LANG=b.dataset.l; try{localStorage.setItem("lang",LANG);}catch(e){} paint(); }; });
$("tema").onclick=function(){ var d=document.documentElement.getAttribute("data-theme")==="dark"; document.documentElement.setAttribute("data-theme", d?"light":"dark"); try{localStorage.setItem("tema", d?"light":"dark");}catch(e){} paint(); };

$("fFile").addEventListener("change", function(){
  var t=T[LANG];
  var picked=Array.prototype.slice.call(this.files||[]);
  // merge, avoiding duplicates by name+size
  picked.forEach(function(f){ if(!files.some(function(x){return x.name===f.name&&x.size===f.size;})) files.push(f); });
  this.value=""; // allow re-picking same file / adding more
  if(files.length>MAX_FILES){ files=files.slice(0,MAX_FILES); showMsg("bad",t.errCount); }
  else if(totalBytes()>MAX_TOTAL_MB*1048576){ showMsg("bad",t.errBig); }
  else { showMsg("",""); }
  renderFiles();
});

function showMsg(kind,text){ var m=$("msg"); m.className="msg "+(kind||""); m.textContent=text; if(!kind) m.style.display="none"; }

function fileToB64(file){ return new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(){ var s=String(r.result||""); var i=s.indexOf(","); res(i>=0?s.slice(i+1):s); }; r.onerror=rej; r.readAsDataURL(file); }); }

$("form").addEventListener("submit", async function(e){
  e.preventDefault();
  var t=T[LANG];
  var sug=$("fSug").value.trim();
  if(!sug){ showMsg("bad", t.errReq); $("fSug").focus(); return; }
  if(files.length>MAX_FILES){ showMsg("bad", t.errCount); return; }
  if(totalBytes()>MAX_TOTAL_MB*1048576){ showMsg("bad", t.errBig); return; }
  if(!SUGGEST_URL){ showMsg("bad", t.errCfg); return; }
  var btn=$("send"); btn.disabled=true; $("sendTxt").textContent=t.sending; showMsg("","");
  try{
    var payloadFiles=[];
    for(var i=0;i<files.length;i++){ payloadFiles.push({ name:files[i].name, type:files[i].type||"application/octet-stream", b64:await fileToB64(files[i]) }); }
    var payload={ ts:new Date().toISOString(), name:$("fName").value.trim(), area:$("fArea").value,
      suggestion:sug, link:$("fLink").value.trim(), lang:LANG, page:location.href, files:payloadFiles };
    await fetch(SUGGEST_URL, { method:"POST", mode:"no-cors", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body:JSON.stringify(payload) });
    showMsg("ok", t.okMsg);
    $("form").reset(); files=[]; renderFiles();
  }catch(err){
    showMsg("bad", t.errNet);
  }finally{
    btn.disabled=false; $("sendTxt").textContent=t.send;
  }
});
paint();
</script>
</body>
</html>
