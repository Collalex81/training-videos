<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animación de ejemplo / Sample animation</title>
<style>
  /* ====== CONFIGURA TU CLIP AQUÍ / CONFIGURE YOUR CLIP HERE ====== */
  :root{
    --marca:#6c8cff;      /* color principal / primary brand color */
    --marca2:#54e0c7;     /* color secundario / secondary color */
    --fondo:#0f1220;
  }
  /* =============================================================== */

  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--fondo);overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:#fff}

  .escena{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:6vw}
  .marco{position:absolute;inset:5%;border:1px solid rgba(255,255,255,.08);border-radius:24px}

  h1{font-size:clamp(28px,7vw,72px);font-weight:800;line-height:1.05;
    opacity:0;transform:translateY(30px);
    animation:entra .9s cubic-bezier(.2,.8,.2,1) .3s forwards}
  h1 .grad{background:linear-gradient(90deg,var(--marca),var(--marca2));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{margin-top:20px;font-size:clamp(15px,2.6vw,24px);color:#9aa3c7;
    opacity:0;transform:translateY(20px);
    animation:entra .9s cubic-bezier(.2,.8,.2,1) .8s forwards}
  .linea{margin-top:34px;height:4px;width:0;border-radius:4px;
    background:linear-gradient(90deg,var(--marca),var(--marca2));
    animation:crece 1s ease 1.3s forwards}

  .punto{position:absolute;width:14px;height:14px;border-radius:50%;
    background:var(--marca);opacity:0;animation:flota 6s ease-in-out infinite}
  .p1{top:22%;left:16%;animation-delay:.2s}
  .p2{top:70%;left:24%;background:var(--marca2);animation-delay:1.4s}
  .p3{top:30%;right:18%;background:var(--marca2);animation-delay:.8s}
  .p4{bottom:24%;right:22%;animation-delay:2s}

  @keyframes entra{to{opacity:1;transform:translateY(0)}}
  @keyframes crece{to{width:min(240px,40vw)}}
  @keyframes flota{
    0%{opacity:0;transform:translateY(0)}25%{opacity:.5}
    50%{opacity:.8;transform:translateY(-18px)}75%{opacity:.4}
    100%{opacity:0;transform:translateY(0)}
  }

  .barra{position:absolute;bottom:18px;right:18px;z-index:10;display:flex;gap:8px}
  .barra button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    color:#fff;padding:8px 14px;border-radius:999px;cursor:pointer;font-size:13px}
  .barra button.activo{background:var(--marca);border-color:var(--marca)}
  @media print{.barra{display:none}}
</style>
</head>
<body>
  <div class="escena" id="escena"></div>

  <div class="barra">
    <button data-lang="es" id="bes">ES</button>
    <button data-lang="en" id="ben">EN</button>
    <button onclick="reiniciar()">&#8635;</button>
  </div>

  <script>
    /* ====== EDITA TU TEXTO AQUÍ / EDIT YOUR TEXT HERE ====== */
    var TEXTOS = {
      es: { titulo:'Módulo 1:', destacado:'Primeros pasos',
            sub:'Una serie de entrenamiento clara, corta y al grano.' },
      en: { titulo:'Module 1:', destacado:'Getting started',
            sub:'A clear, short and to-the-point training series.' }
    };
    /* ====================================================== */

    var params = new URLSearchParams(location.search);
    var LANG = params.get('lang') || (navigator.language||'es').slice(0,2);
    if(!TEXTOS[LANG]) LANG = 'es';

    function pintar(){
      var t = TEXTOS[LANG];
      document.getElementById('escena').innerHTML =
        '<div class="marco"></div>'+
        '<span class="punto p1"></span><span class="punto p2"></span>'+
        '<span class="punto p3"></span><span class="punto p4"></span>'+
        '<h1>'+t.titulo+' <span class="grad">'+t.destacado+'</span></h1>'+
        '<p class="sub">'+t.sub+'</p>'+
        '<div class="linea"></div>';
      document.getElementById('bes').classList.toggle('activo', LANG==='es');
      document.getElementById('ben').classList.toggle('activo', LANG==='en');
      document.documentElement.lang = LANG;
    }
    function reiniciar(){ pintar(); }
    var botones = document.querySelectorAll('.barra button[data-lang]');
    for(var i=0;i<botones.length;i++){
      botones[i].onclick = (function(b){ return function(){ LANG=b.dataset.lang; pintar(); }; })(botones[i]);
    }
    pintar();
  </script>
</body>
</html>
