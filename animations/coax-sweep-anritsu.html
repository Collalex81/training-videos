<html lang="en" data-theme="light">
<head>

<title>Coax Sweep · Anritsu / Barrido de coaxial · Anritsu</title>
<!--
  =============================================================================
  TECHNICAL TRAINING — Coax sweep with Anritsu Site Master
  VSWR · Return Loss · DTF (Distance-to-Fault) · Cable Loss
  Bilingual EN/ES (EN default) · Responsive · sticky header · 23 slides
  -----------------------------------------------------------------------------
  REAL PHOTOS: drop images in assets/ with the names in the IMG object below
  (paths are ../assets/ because this file lives in animations/). JPG, no double
  extension. If a file is missing, a technical illustration is shown instead.
  =============================================================================
-->
<style>
  :root{
    --pg:#f4f6fb; --card:#ffffff; --ink:#0f2544; --sub:#5b6b84; --line:#e6ebf5;
    --bar:#0b2e59; --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.10); --radius:14px;
    --shadow:0 1px 2px rgba(16,37,68,.05),0 10px 26px rgba(16,37,68,.07);
  }
  html[data-theme="dark"]{
    --pg:#0b1220; --card:#151d30; --ink:#eaf0ff; --sub:#9fb0cc; --line:#243149;
    --bar:#0a1526; --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;
    -webkit-font-smoothing:antialiased}
  svg{display:block}
  .shell{max-width:940px;margin:0 auto;padding:14px 16px 34px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0 8px;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .head .meta{margin-bottom:0}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;
    height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}
  .prog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 4px}
  .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;min-height:340px}
  .step-ico{width:44px;height:44px;border-radius:12px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  h1{font-size:clamp(20px,3.3vw,26px);margin:0 0 8px;font-weight:700;line-height:1.2}
  h2{font-size:15.5px;margin:18px 0 8px;font-weight:600}
  p{margin:0 0 12px}
  .lead{color:var(--sub);font-size:15px}
  ul{margin:6px 0 12px;padding-left:20px}
  li{margin:5px 0}
  .pill{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    color:var(--accent);background:var(--tint);padding:5px 11px;border-radius:999px;margin-bottom:10px}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:12px;margin:8px 0}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,170px),1fr));gap:12px;margin:8px 0}
  .box{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px}
  .box h3{margin:0 0 6px;font-size:14.5px;font-weight:600}
  .box p{margin:0;font-size:13px;color:var(--sub)}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn.ghost{background:transparent;color:var(--accent)}
  .btn:disabled{opacity:.4;cursor:default}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:0;cursor:pointer;padding:0}
  .dot.on{background:var(--accent);transform:scale(1.3)}
  .note{font-size:13px;color:var(--sub);border-left:3px solid var(--accent);background:var(--tint);padding:9px 12px;margin:12px 0;border-radius:0 8px 8px 0}
  .warn{border-left-color:var(--amber);color:var(--amber);background:var(--ambt)}
  .good{border-left-color:var(--ok);color:var(--ink);background:var(--okt)}
  .good b{color:var(--ok)}
  .illus{position:relative;aspect-ratio:16/9;background:#0a1424;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .illus svg{width:100%;height:100%}
  .illus canvas{width:100%;height:100%;display:block}
  .illus img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#0a1424}
  .mcap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);margin:6px 2px 2px}
  .thumb{aspect-ratio:4/3}
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0}
  .tbl th,.tbl td{text-align:left;padding:8px 9px;border-bottom:1px solid var(--line)}
  .tbl th{color:var(--sub);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  .tbl td b{color:var(--accent)}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  .row{display:flex;align-items:center;gap:12px;margin:12px 0}
  input[type=range]{flex:1;accent-color:var(--accent)}
  .val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;min-width:120px;text-align:right}
  .readout{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
  .stat{background:var(--pg);border:1px solid var(--line);border-radius:10px;padding:10px 14px;flex:1;min-width:110px}
  .stat b{display:block;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat span{font-size:11.5px;color:var(--sub)}
  .verdict{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-weight:700;font-size:15px}
  .verdict.ok{background:var(--okt);color:var(--ok)}
  .verdict.bad{background:var(--badt);color:var(--bad)}
  .chk{display:flex;gap:11px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:8px 0;cursor:pointer}
  .chk .bx{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;margin-top:1px}
  .chk.done .bx{background:var(--ok);border-color:var(--ok)}
  .chk.done .txt b{text-decoration:line-through;opacity:.7}
  .chk .txt b{font-size:13.5px}.chk .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .phase{border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden}
  .phase>h3{margin:0;font-size:14px;font-weight:700;background:var(--pg);padding:11px 13px;display:flex;gap:8px;align-items:center}
  .phase>h3 .n{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none}
  .phase .chk{border:0;border-top:1px solid var(--line);border-radius:0;margin:0;background:transparent}
  .faults{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:12px;margin:8px 0}
  .fault{background:var(--pg);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;text-align:left;padding:0;font-family:inherit;color:inherit}
  .fault .illus{border:0;border-radius:0;border-bottom:1px solid var(--line)}
  .fault .ft{padding:10px 11px}.fault .ft b{font-size:13px}.fault .ft span{display:block;font-size:11.5px;color:var(--sub);margin-top:2px}
  .reveal{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:12px;min-height:64px;font-size:13.5px}
  .photo{display:flex;gap:12px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px;margin:9px 0}
  .photo .cam{width:44px;height:44px;border-radius:10px;background:var(--tint);color:var(--accent);flex:none;display:flex;align-items:center;justify-content:center}
  .photo.done .cam{background:var(--okt);color:var(--ok)}
  .photo .pt{flex:1;min-width:0}.photo .pt b{font-size:14px}.photo .pt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .photo .req{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--bad);background:var(--badt);padding:3px 8px;border-radius:999px;display:inline-block;margin-top:6px}
  .photo.done .req{color:var(--ok);background:var(--okt)}
  .snap{border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:9px;padding:8px 12px;font-size:12.5px;cursor:pointer;font-family:inherit;white-space:nowrap;min-height:40px}
  .photo.done .snap{background:var(--ok);border-color:var(--ok);color:#fff}
  .q{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
  .q h3{margin:0 0 10px;font-size:14px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 14px;border-radius:10px;margin:7px 0;cursor:pointer;font-size:14px;font-family:inherit}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad)}
  .opt:disabled{cursor:default}
  .score{font-size:16px;font-weight:700;text-align:center;padding:10px}
  @media(max-width:520px){ .card{padding:15px} .shell{padding:12px 12px 28px} .brand small{display:none} }
</style>
</head>

/* ===== Canvas animation engine (analyzer-style graphics) ===== */
var _gen = 0;
function stopAnim(){ _gen++; }
function fitCanvas(cv){ var r=cv.getBoundingClientRect(); var dpr=window.devicePixelRatio||1; cv.width=Math.max(1,Math.round(r.width*dpr)); cv.height=Math.max(1,Math.round(r.height*dpr)); var ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0); return {ctx:ctx,w:r.width,h:r.height}; }
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function screen(type, capEn, capEs, photoKey){
  var ph = photoKey && IMG[photoKey] ? '<img src="'+IMG[photoKey]+'" alt="" onerror="this.remove()">' : '';
  var cap = X(capEn,capEs) + (photoKey&&IMG[photoKey]?' · '+IMG[photoKey].replace("../",""):'');
  return '<div class="illus"><canvas class="cv" data-cv="'+type+'"></canvas>'+ph+'</div><div class="mcap">'+I.img+' '+cap+'</div>';
}
function screenBg(ctx,w,h){
  ctx.fillStyle="#08111f"; ctx.fillRect(0,0,w,h);
  var padL=40,padR=14,padT=18,padB=26, pw=w-padL-padR, ph=h-padT-padB, i;
  ctx.strokeStyle="rgba(90,120,175,.16)"; ctx.lineWidth=1;
  for(i=0;i<=8;i++){ var x=padL+pw*i/8+.5; ctx.beginPath(); ctx.moveTo(x,padT); ctx.lineTo(x,padT+ph); ctx.stroke(); }
  for(i=0;i<=5;i++){ var y=padT+ph*i/5+.5; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(padL+pw,y); ctx.stroke(); }
  ctx.strokeStyle="rgba(120,150,200,.35)"; ctx.strokeRect(padL+.5,padT+.5,pw,ph);
  return {padL:padL,padT:padT,pw:pw,ph:ph};
}
function gau(x,mu,s,a){ return a*Math.exp(-((x-mu)*(x-mu))/(2*s*s)); }
function rlV(fx,t,seed){ var v=24+3*Math.sin(fx*7+seed)+1.6*Math.sin(fx*17+seed*1.6)+1.0*Math.sin(t*0.7+fx*4); return Math.max(16,Math.min(31,v)); }
function dtfV(fx,seed){ var v=5+gau(fx,0.16,0.03,6)+gau(fx,0.40,0.025,5)+gau(fx,0.58,0.02,26)+gau(fx,0.82,0.03,4)+0.6*Math.sin(fx*40+seed); return Math.max(2,Math.min(38,v)); }
function animTrace(cv,mode){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, gen=_gen, seed=Math.random()*10, start=performance.now();
  function frame(now){
    if(gen!==_gen) return;
    var t=(now-start)/1000, prog=Math.min(1,t/2.0), P=screenBg(ctx,w,h), i;
    ctx.font="10px system-ui,sans-serif"; ctx.fillStyle="#7fa8e8"; ctx.textAlign="right"; ctx.textBaseline="middle";
    for(i=0;i<=4;i++){ var db=i*10; var y=P.padT+P.ph*(1-db/40); ctx.fillText(db, P.padL-6, y); }
    ctx.textAlign="center"; ctx.textBaseline="top";
    var xl = mode==="rl"?["1690","1735","1780 MHz"]:["0","30","60 m"];
    ctx.fillText(xl[0], P.padL+14, P.padT+P.ph+6); ctx.fillText(xl[1], P.padL+P.pw/2, P.padT+P.ph+6); ctx.fillText(xl[2], P.padL+P.pw-16, P.padT+P.ph+6);
    ctx.textAlign="left"; ctx.fillStyle="#9fb0cc"; ctx.textBaseline="alphabetic";
    ctx.fillText(mode==="rl"?"Return Loss (dB)":"DTF — Return Loss (dB) vs distance", P.padL, 13);
    if(mode==="rl"){ var yl=P.padT+P.ph*(1-15/40); ctx.strokeStyle="rgba(245,158,11,.9)"; ctx.setLineDash([6,4]); ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(P.padL,yl); ctx.lineTo(P.padL+P.pw,yl); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle="#f59e0b"; ctx.textAlign="right"; ctx.fillText("limit 15 dB", P.padL+P.pw-4, yl-4); }
    var N=170; ctx.beginPath();
    for(i=0;i<=N*prog;i++){ var fx=i/N; var v=mode==="rl"?rlV(fx,t,seed):dtfV(fx,seed); var x=P.padL+P.pw*fx; var yy=P.padT+P.ph*(1-v/40); if(i===0)ctx.moveTo(x,yy); else ctx.lineTo(x,yy); }
    ctx.strokeStyle=mode==="rl"?"#54e0c7":"#4d8bff"; ctx.lineWidth=2; ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
    if(prog<1){ var cx=P.padL+P.pw*prog; ctx.strokeStyle="rgba(255,255,255,.5)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(cx,P.padT); ctx.lineTo(cx,P.padT+P.ph); ctx.stroke(); }
    else if(mode==="dtf"){ var fmu=0.58, mx=P.padL+P.pw*fmu, mv=dtfV(fmu,seed), my=P.padT+P.ph*(1-mv/40); ctx.fillStyle="#f87171"; ctx.beginPath(); ctx.arc(mx,my,4,0,7); ctx.fill(); ctx.textAlign="center"; ctx.fillText("fault  34.8 m", mx, my-8); }
    else { ctx.fillStyle="#4ade80"; ctx.textAlign="right"; ctx.fillText("PASS", P.padL+P.pw-4, P.padT+22); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function pulse(ctx,x,y,col){ var r=17, grd=ctx.createRadialGradient(x,y,0,x,y,r); grd.addColorStop(0,col); grd.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,3.5,0,7); ctx.fill(); }
function animReflection(cv){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, gen=_gen, start=performance.now();
  var y=h*0.55, x0=w*0.14, xf=w*0.78;
  function frame(now){
    if(gen!==_gen) return;
    var t=((now-start)/1000)%2.6;
    ctx.fillStyle="#08111f"; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle="#2b3c63"; ctx.lineWidth=11; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(xf,y); ctx.stroke();
    ctx.strokeStyle="#16233c"; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(xf,y); ctx.stroke();
    ctx.fillStyle="#2563EB"; roundRect(ctx,x0-30,y-18,22,36,4); ctx.fill();
    ctx.fillStyle="#0a1730"; roundRect(ctx,x0-26,y-13,14,10,2); ctx.fill();
    ctx.fillStyle="#f87171"; roundRect(ctx,xf-4,y-14,11,28,2); ctx.fill();
    ctx.fillStyle="#7fa8e8"; ctx.font="11px system-ui"; ctx.textAlign="center"; ctx.fillText("fault", xf+2, y+32); ctx.textAlign="left"; ctx.fillText("Site Master", x0-30, y-26);
    if(t<1.3){ var p=t/1.3, px=x0+(xf-x0)*p; pulse(ctx,px,y,"#4d8bff"); ctx.fillStyle="#4d8bff"; ctx.textAlign="center"; ctx.fillText("incident →", (x0+xf)/2, y-30); }
    else { var p2=(t-1.3)/1.3, px2=xf-(xf-x0)*p2; pulse(ctx,px2,y,"#54e0c7"); ctx.fillStyle="#54e0c7"; ctx.textAlign="center"; ctx.fillText("← reflected", (x0+xf)/2, y+44); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function plotWave(ctx,x0,x1,midY,amp,fn,col,lw,glow){ ctx.beginPath(); for(var x=x0;x<=x1;x+=2){ var yy=midY-amp*fn(x); if(x===x0)ctx.moveTo(x,yy); else ctx.lineTo(x,yy);} ctx.strokeStyle=col; ctx.lineWidth=lw; if(glow){ctx.shadowColor=col;ctx.shadowBlur=9;} ctx.stroke(); ctx.shadowBlur=0; }
function animStanding(cv){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, gen=_gen, start=performance.now();
  var midY=h*0.52, amp=h*0.26, x0=w*0.08, x1=w*0.95, waves=2.4, k=(waves*Math.PI*2)/(x1-x0), GG=0.6;
  function frame(now){
    if(gen!==_gen) return;
    var wt=((now-start)/1000)*2.3;
    ctx.fillStyle="#08111f"; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle="rgba(90,120,175,.18)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x0,midY); ctx.lineTo(x1,midY); ctx.stroke();
    plotWave(ctx,x0,x1,midY,amp*0.55,function(x){return Math.sin(k*(x-x0)-wt);},"rgba(77,139,255,.30)",1.2,false);
    plotWave(ctx,x0,x1,midY,amp*0.55*GG,function(x){return Math.sin(k*(x-x0)+wt);},"rgba(84,224,199,.30)",1.2,false);
    plotWave(ctx,x0,x1,midY,amp,function(x){var ph=k*(x-x0); return (Math.sin(ph-wt)+GG*Math.sin(ph+wt))/(1+GG);},"#4d8bff",2.6,true);
    ctx.fillStyle="#f87171"; for(var m=0;m<7;m++){ var xN=x0+(Math.PI/k)*(m+0.5); if(xN<=x1){ ctx.beginPath(); ctx.arc(xN,midY,3,0,7); ctx.fill(); } }
    ctx.fillStyle="#7fa8e8"; ctx.font="11px system-ui"; ctx.textAlign="center"; ctx.fillText("Vmax", x0+(Math.PI/k)*0.5, midY-amp-6); ctx.fillText("node (Vmin)", x0+(Math.PI/k)*1.5, midY+amp+16);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function drawCableLoss(cv,f){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, P=screenBg(ctx,w,h), maxL=3.6*Math.sqrt(2700/900), fx, i;
  ctx.font="10px system-ui"; ctx.fillStyle="#7fa8e8"; ctx.textAlign="right"; ctx.textBaseline="middle";
  for(i=0;i<=4;i++){ var lv=maxL*1.1*i/4; var y=P.padT+P.ph*(1-i/4); ctx.fillText(lv.toFixed(1), P.padL-6, y); }
  ctx.beginPath();
  for(fx=0;fx<=1.0001;fx+=0.02){ var fr=700+fx*2000, loss=3.6*Math.sqrt(fr/900), x=P.padL+P.pw*fx, y=P.padT+P.ph*(1-loss/(maxL*1.1)); if(fx===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); }
  ctx.strokeStyle="#54e0c7"; ctx.lineWidth=2.5; ctx.shadowColor="#54e0c7"; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
  var mfx=(f-700)/2000, mloss=3.6*Math.sqrt(f/900), mx=P.padL+P.pw*mfx, my=P.padT+P.ph*(1-mloss/(maxL*1.1));
  ctx.strokeStyle="rgba(255,255,255,.4)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(mx,P.padT); ctx.lineTo(mx,P.padT+P.ph); ctx.stroke();
  ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(mx,my,4,0,7); ctx.fill();
  ctx.fillStyle="#eaf0ff"; ctx.textAlign="center"; ctx.textBaseline="alphabetic"; ctx.fillText(mloss.toFixed(1)+" dB", mx, my-10);
  ctx.fillStyle="#9fb0cc"; ctx.textAlign="left"; ctx.fillText("dB/100 m  vs  GHz", P.padL, 13);
}

    '<p class="lead">'+X("Γ (gamma) is the fraction of the wave that reflects: Γ = reflected / incident. Γ = 0 is a perfect match (nothing reflects); Γ = 1 is total reflection (open or short). Return Loss and VSWR are just two ways to express Γ.","Γ (gamma) es la fracción de la onda que se refleja: Γ = reflejada / incidente. Γ = 0 es adaptación perfecta (no refleja nada); Γ = 1 es reflexión total (abierto o corto). Return Loss y VSWR son dos formas de expresar Γ.")+'</p>'+
    screen("reflection","Reflection at a fault: part of the wave returns to the analyzer.","Reflexión en una falla: parte de la onda regresa al analizador.")+
    '<p class="note">'+X("From Γ we get both numbers: Return Loss (dB) = −20·log₁₀(Γ) and VSWR = (1+Γ)/(1−Γ).","De Γ salen ambos números: Return Loss (dB) = −20·log₁₀(Γ) y VSWR = (1+Γ)/(1−Γ).")+'</p>';
}

/* ---------- 3 Return Loss ---------- */
function s_rl(){
  return tit("Return Loss","Return Loss")+
    '<p class="lead">'+X("Return Loss is the reflected power expressed in dB below the incident power. It is always positive (by convention) and HIGHER is BETTER — more dB means less reflection.","Return Loss es la potencia reflejada expresada en dB por debajo de la incidente. Por convención es positivo y MÁS ALTO es MEJOR — más dB significa menos reflexión.")+'</p>'+
    '<div class="grid2">'+
      '<div class="box"><h3>'+X("Formula","Fórmula")+'</h3><p>RL(dB) = −20·log₁₀(Γ)</p></div>'+
      '<div class="box"><h3>'+X("Rule of thumb","Regla")+'</h3><p>'+X("20 dB = 1% of power reflected. 15 dB ≈ 3%. 10 dB = 10%.","20 dB = 1% de potencia reflejada. 15 dB ≈ 3%. 10 dB = 10%.")+'</p></div>'+
    '</div>'+
    '<p class="note good"><b>'+X("Good:","Bueno:")+'</b> '+X("higher RL (e.g. 25 dB) = clean line. Low RL (e.g. 8 dB) = bad match / fault.","RL alto (ej. 25 dB) = línea limpia. RL bajo (ej. 8 dB) = mala adaptación / falla.")+'</p>';
}

/* ---------- 4 VSWR ---------- */
function s_vswr(){
  return tit("VSWR","VSWR")+
    '<p class="lead">'+X("Reflections add and subtract with the forward wave and create a standing wave along the cable. VSWR is the ratio of the maximum voltage to the minimum voltage. 1.0 is perfect; higher is worse.","Las reflexiones se suman y restan con la onda directa y crean una onda estacionaria en el cable. VSWR es la razón entre el voltaje máximo y el mínimo. 1.0 es perfecto; más alto es peor.")+'</p>'+
    screen("standing","Standing wave: fixed maxima (Vmax) and nodes (Vmin).","Onda estacionaria: máximos fijos (Vmax) y nodos (Vmin).")+
    '<p class="note">VSWR = Vmax / Vmin = (1+Γ)/(1−Γ). '+X("It carries the same information as Return Loss, just in a different form.","Lleva la misma información que Return Loss, en otra forma.")+'</p>';
}

/* ---------- 5 Converter ---------- */
function s_conv(){
  return tit("VSWR ↔ Return Loss","VSWR ↔ Return Loss")+
    '<p class="lead">'+X("They are two views of the same reflection. Move Return Loss and watch VSWR and the reflected power.","Son dos vistas de la misma reflexión. Mueve el Return Loss y observa el VSWR y la potencia reflejada.")+'</p>'+
    '<div class="row"><span style="min-width:96px;font-size:13px;color:var(--sub)">Return Loss</span><input type="range" id="rl" min="6" max="40" step="1" value="20"><span class="val" id="rlv"></span></div>'+
    '<div class="readout"><div class="stat"><b id="oVswr"></b><span>VSWR</span></div><div class="stat"><b id="oGamma"></b><span>Γ</span></div><div class="stat"><b id="oPwr"></b><span>'+X("reflected power","potencia reflejada")+'</span></div></div>'+
    '<div class="tbl-wrap" style="margin-top:14px"><table class="tbl"><tr><th>Return Loss</th><th>VSWR</th><th>%</th></tr>'+
    '<tr><td>30 dB</td><td>1.065</td><td>0.1%</td></tr><tr><td>20 dB</td><td>1.22</td><td>1%</td></tr><tr><td>15 dB</td><td>1.43</td><td>3.2%</td></tr><tr><td>14 dB</td><td>1.50</td><td>4%</td></tr><tr><td>10 dB</td><td>1.92</td><td>10%</td></tr></table></div>';
}
function i_conv(){
  var rl=$("rl");
  function upd(){ var d=+rl.value; var g=Math.pow(10,-d/20); var vswr=(1+g)/(1-g); var pwr=g*g*100;
    $("rlv").textContent=d+" dB"; $("oVswr").textContent=vswr.toFixed(2); $("oGamma").textContent=g.toFixed(3); $("oPwr").textContent=pwr.toFixed(1)+"%"; }
  rl.oninput=upd; upd();
}

  {k:"f_water",g:G.dtfspike,en:"Water ingress",es:"Entrada de agua",d_en:"Rising reflection along a length of cable (not a single connector). Cause: moisture in the feeder. Fix: replace the wet section and re-seal.",d_es:"Reflexión creciente a lo largo de un tramo (no un solo conector). Causa: humedad en el feeder. Solución: reemplazar el tramo mojado y re-sellar."},
  {k:"f_conn",g:G.dtfspike,en:"Kink / crush",es:"Doblez / aplastón",d_en:"A spike where the cable was bent too sharply or crushed. Fix: replace the damaged section.",d_es:"Un pico donde el cable se dobló demasiado o se aplastó. Solución: reemplazar el tramo dañado."}
];
function s_dtffaults(){
  var cards=FA.map(function(f,i){return '<button class="fault" data-i="'+i+'"><div class="illus">'+f.g+(IMG[f.k]?'<img src="'+IMG[f.k]+'" alt="" onerror="this.remove()">':'')+'</div><div class="ft"><b>'+(i+1)+'. '+X(f.en,f.es)+'</b><span>'+X("Tap for detail","Toca para el detalle")+'</span></div></button>';}).join("");
  return tit("Interpreting DTF faults","Interpretar fallas DTF")+
    '<p class="lead">'+X("Learn the common signatures. Tap each to see the cause and fix.","Aprende las firmas comunes. Toca cada una para ver causa y solución.")+'</p>'+
    '<div class="faults">'+cards+'</div><div class="reveal" id="rev">'+X("Select a fault (1–4).","Selecciona una falla (1–4).")+'</div>';
}
function i_dtffaults(){ document.querySelectorAll(".fault").forEach(function(b){ b.onclick=function(){ var f=FA[+b.dataset.i]; $("rev").innerHTML='<b>'+(+b.dataset.i+1)+'. '+X(f.en,f.es)+'</b><br>'+X(f.d_en,f.d_es); }; }); }

/* ---------- 20 Procedure ---------- */
var PHASES=[
  {en:"Preparation & safety",es:"Preparación y seguridad",steps:[
    {en:"Permit, harness, LOTO. Confirm the sector is OFF (no Tx).",es:"Permiso, arnés, LOTO. Confirma que el sector esté APAGADO (sin Tx)."},
    {en:"Identify the line, band and cable type/length.",es:"Identifica la línea, banda y tipo/largo de cable."},
    {en:"Warm up the Site Master ~5 min.",es:"Calienta el Site Master ~5 min."}
  ]},
  {en:"Calibration (OSL)",es:"Calibración (OSL)",steps:[
    {en:"Set the frequency range for the job.",es:"Ajusta el rango de frecuencia del trabajo."},
    {en:"Calibrate Open / Short / Load at the end of the test cable.",es:"Calibra Open/Short/Load al final del cable de prueba."},
    {en:"Verify with the load (RL very high).",es:"Verifica con la carga (RL muy alto)."}
  ]},
  {en:"Return Loss / VSWR",es:"Return Loss / VSWR",steps:[
    {en:"Connect to the system, torque the connector.",es:"Conecta al sistema, torquea el conector."},
    {en:"Sweep; set the limit line at the spec (≥15 dB).",es:"Barre; pon la línea de límite en la especificación (≥15 dB)."},
    {en:"Peak-search the worst point; record the value.",es:"Busca el peor punto; anota el valor."}
  ]},
  {en:"Cable Loss",es:"Pérdida del cable",steps:[
    {en:"Short/open the far end; measure one-way loss.",es:"Corto/abierto en el extremo lejano; mide pérdida en un sentido."},
    {en:"Compare to the cable datasheet.",es:"Compara con la hoja de datos del cable."}
  ]},
  {en:"DTF",es:"DTF",steps:[
    {en:"Enter cable type / Vf / loss; set Dmax.",es:"Ingresa tipo de cable / Vf / pérdida; pon Dmax."},
    {en:"Run; mark and record the distance to any fault.",es:"Ejecuta; marca y anota la distancia a cada falla."}
  ]},
  {en:"Evaluate, repair, re-test",es:"Evaluar, reparar, re-probar",steps:[
    {en:"If it fails, use DTF to locate; repair (clean/re-torque/replace).",es:"Si falla, usa DTF para localizar; repara (limpia/re-torquea/reemplaza)."},
    {en:"Re-sweep until PASS and stable.",es:"Vuelve a barrer hasta PASA y estable."}
  ]},
  {en:"Save & report",es:"Guardar y reportar",steps:[
    {en:"Save traces (RL, DTF, cable loss) on the instrument.",es:"Guarda las trazas (RL, DTF, cable loss) en el equipo."},
    {en:"Take the photos and fill the report (band, values, distances, corrections).",es:"Toma las fotos y llena el reporte (banda, valores, distancias, correcciones)."}
  ]}
];
function s_proc(){
  var n=0, html=PHASES.map(function(ph,pi){var items=ph.steps.map(function(s){var id=n++;return '<div class="chk" data-i="'+id+'"><span class="bx">✓</span><span class="txt"><b>'+X(s.en,s.es)+'</b></span></div>';}).join("");return '<div class="phase"><h3><span class="n">'+(pi+1)+'</span>'+X(ph.en,ph.es)+'</h3>'+items+'</div>';}).join("");
  return tit("Detailed procedure","Procedimiento detallado")+
    '<p class="lead">'+X("7 phases. Check each action as you perform it on site.","7 fases. Marca cada acción a medida que la ejecutas en el sitio.")+'</p>'+html+'<p class="note" id="procMsg"></p>';
}
function i_proc(){ var total=document.querySelectorAll(".chk").length;
  function upd(){ var d=document.querySelectorAll(".chk.done").length; $("procMsg").textContent = d<total ? (X("Actions: ","Acciones: ")+d+"/"+total) : X("Procedure complete. Line certified.","Procedimiento completo. Línea certificada."); }
  document.querySelectorAll(".chk").forEach(function(c){ c.onclick=function(){ c.classList.toggle("done"); upd(); }; }); upd();
}

/* ---------- 21 Photos ---------- */
var PHOTOS=[
  {en:"Return Loss / VSWR trace (with limit line)",es:"Traza Return Loss / VSWR (con línea de límite)",d_en:"Site Master screen showing the sweep and pass/fail vs the limit.",d_es:"Pantalla del Site Master con el barrido y pasa/falla vs el límite."},
  {en:"DTF trace",es:"Traza DTF",d_en:"Screen showing distance to fault (or a clean trace if it passed).",d_es:"Pantalla con la distancia a la falla (o traza limpia si pasó)."},
  {en:"Cable Loss result",es:"Resultado de pérdida del cable",d_en:"Screen with the measured one-way cable loss.",d_es:"Pantalla con la pérdida del cable medida en un sentido."},
  {en:"Corrections made",es:"Correcciones hechas",d_en:"Before/after of any repair (connector cleaned, re-torqued or replaced).",d_es:"Antes/después de cualquier reparación (conector limpio, re-torqueado o cambiado)."}
];
function s_photos(){
  var items=PHOTOS.map(function(p,i){return '<div class="photo" data-i="'+i+'"><span class="cam">'+I.camera+'</span><div class="pt"><b>'+(i+1)+'. '+X(p.en,p.es)+'</b><span>'+X(p.d_en,p.d_es)+'</span><span class="req">'+X("Required","Obligatoria")+'</span></div><button class="snap">'+X("Photo taken","Foto tomada")+'</button></div>';}).join("");
  return tit("Report photos","Fotos del reporte")+
    '<p class="lead">'+X("Each technician MUST upload these photos to the site report.","Cada técnico DEBE subir estas fotos al reporte del sitio.")+'</p>'+items+'<p class="note" id="phMsg"></p>'+
    '<p class="note warn">'+X("Without the photos and saved traces the sweep is not accepted.","Sin las fotos y las trazas guardadas el barrido no se acepta.")+'</p>';
}
function i_photos(){ function upd(){ var n=document.querySelectorAll(".photo.done").length; $("phMsg").textContent = n<PHOTOS.length ? (X("Photos: ","Fotos: ")+n+"/"+PHOTOS.length) : X("All photos ready. Attach them to the report.","Todas las fotos listas. Adjúntalas al reporte."); }
  document.querySelectorAll(".photo").forEach(function(c){ c.querySelector(".snap").onclick=function(){ c.classList.toggle("done"); this.textContent=c.classList.contains("done")?X("✓ Taken","✓ Tomada"):X("Photo taken","Foto tomada"); upd(); }; }); upd();
}

/* ---------- 22 Quiz ---------- */
var QUIZ=[
  {en:"Higher Return Loss means…",es:"Un Return Loss más alto significa…",o_en:["More reflection (worse)","Less reflection (better)","Higher power","Longer cable"],o_es:["Más reflexión (peor)","Menos reflexión (mejor)","Más potencia","Cable más largo"],a:1},
  {en:"Typical system acceptance is…",es:"La aprobación típica del sistema es…",o_en:["RL ≥ 15 dB (VSWR ≤ 1.43)","RL ≥ 3 dB","VSWR ≥ 2","RL = 0 dB"],o_es:["RL ≥ 15 dB (VSWR ≤ 1.43)","RL ≥ 3 dB","VSWR ≥ 2","RL = 0 dB"],a:0},
  {en:"DTF tells you…",es:"El DTF te dice…",o_en:["If the line is bad","Where the fault is (distance)","The transmit power","The temperature"],o_es:["Si la línea está mal","Dónde está la falla (distancia)","La potencia de transmisión","La temperatura"],a:1},
  {en:"The #1 DTF error is…",es:"El error #1 en DTF es…",o_en:["Low battery","Wrong cable type / Vf","Too many photos","Short cable"],o_es:["Batería baja","Tipo de cable / Vf incorrecto","Muchas fotos","Cable corto"],a:1},
  {en:"Cable loss is measured with the far end…",es:"La pérdida del cable se mide con el extremo lejano…",o_en:["Open to air","Terminated in a SHORT or OPEN","Connected to the BBU","Cut off"],o_es:["Abierto al aire","Terminado en CORTO o ABIERTO","Conectado al BBU","Cortado"],a:1},
  {en:"You must calibrate (OSL) …",es:"Debes calibrar (OSL) …",o_en:["Never","At the end of the test cable before sweeping","Only after the sweep","Once a year only"],o_es:["Nunca","Al final del cable de prueba antes de barrer","Solo después del barrido","Solo una vez al año"],a:1}
];
function s_quiz(){
  var qs=QUIZ.map(function(q,i){var opts=(LANG==="es"?q.o_es:q.o_en).map(function(o,j){return '<button class="opt" data-q="'+i+'" data-o="'+j+'">'+o+'</button>';}).join("");return '<div class="q"><h3>'+(i+1)+'. '+X(q.en,q.es)+'</h3>'+opts+'</div>';}).join("");
  return tit("Quiz","Evaluación")+'<p class="lead">'+X("6 technical questions.","6 preguntas técnicas.")+'</p>'+qs+'<div class="score" id="score"></div>';
}
function i_quiz(){ var answered={}, correct=0;
  document.querySelectorAll(".opt").forEach(function(b){ b.onclick=function(){ var qi=+b.dataset.q; if(answered[qi])return; answered[qi]=1; var a=QUIZ[qi].a;
    document.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(function(x){ x.disabled=true; if(+x.dataset.o===a)x.classList.add("correct"); });
    if(+b.dataset.o===a)correct++; else b.classList.add("wrong");
    if(Object.keys(answered).length===QUIZ.length){ $("score").textContent=X("Score: ","Puntaje: ")+correct+"/"+QUIZ.length+(correct>=5?X(" · Passed"," · Aprobado"):X(" · Review"," · Repasa")); } }; });
}

  return tit("Wrap-up","Cierre")+
    '<ul>'+
    '<li>'+X("A sweep certifies the RF path: Return Loss, VSWR, Cable Loss and DTF.","El barrido certifica la línea de RF: Return Loss, VSWR, pérdida del cable y DTF.")+'</li>'+

    '</ul>'+
    '<p class="note warn"><b>'+X("Safety","Seguridad")+':</b> '+X("sector OFF while connecting; work at height per permit.","sector APAGADO al conectar; trabajo en altura según permiso.")+'</p>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px"><span class="verdict ok">✓ '+X("Training completed","Entrenamiento completado")+'</span><a class="btn ghost" href="../index.html" target="_top">'+X("Back to portal","Volver al portal")+'</a></div>';
}

/* ===== Engine ===== */
function pintarChrome(){
  document.documentElement.lang=LANG;
  $("brand").textContent=X("Coax Sweep","Barrido de coaxial");
  $("brandsub").textContent=X("Telecom · Anritsu Site Master","Telecom · Anritsu Site Master");
  $("homeTxt").textContent=X("Home","Inicio");
  document.querySelectorAll("#lang button").forEach(function(b){ b.classList.toggle("on", b.dataset.l===LANG); });
  var dark=document.documentElement.getAttribute("data-theme")==="dark";
  $("temaIco").innerHTML=dark?I.sun:I.moon; $("temaTxt").textContent=dark?X("Light","Claro"):X("Dark","Oscuro");
  $("prev").innerHTML="‹ "+X("Back","Anterior");
  $("next").innerHTML=(cur>=STEPS.length-1?X("Restart","Reiniciar"):X("Next","Siguiente")+" ›");
}
function render(){
  stopAnim();
  pintarChrome();
  var s=STEPS[cur];
  $("card").innerHTML=s.b();
  if(s.i) s.i();
  initCanvases();
  $("progbar").style.width=((cur+1)/STEPS.length*100)+"%";
  $("mStep").textContent=X("Step ","Paso ")+(cur+1)+" / "+STEPS.length+" · "+X(s.t[0],s.t[1]);
  $("mDur").textContent="≈ 8 min";
  $("prev").disabled=(cur===0);
  $("dots").innerHTML=STEPS.map(function(_,i){return '<button class="dot'+(i===cur?' on':'')+'" data-i="'+i+'" aria-label="'+(i+1)+'"></button>';}).join("");
  document.querySelectorAll(".dot").forEach(function(d){ d.onclick=function(){ cur=+d.dataset.i; render(); }; });
  window.scrollTo(0,0);
}
$("prev").onclick=function(){ if(cur>0){cur--;render();} };
$("next").onclick=function(){ cur=(cur>=STEPS.length-1)?0:cur+1; render(); };
document.querySelectorAll("#lang button").forEach(function(b){ b.onclick=function(){ LANG=b.dataset.l; render(); }; });
$("tema").onclick=function(){ var d=document.documentElement.getAttribute("data-theme")==="dark"; document.documentElement.setAttribute("data-theme", d?"light":"dark"); pintarChrome(); };
render();
</script>
