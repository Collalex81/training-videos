<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIM Testing · Kaelus / Prueba de PIM · Kaelus</title>
<!--
  =============================================================================
  TECHNICAL TRAINING — PIM testing on telecom towers (Kaelus)
  Bilingual EN/ES (EN default) · Responsive · sticky header · canvas animations
  -----------------------------------------------------------------------------
  REAL PHOTOS: drop images in assets/ with the names in IMG (paths ../assets/).
  =============================================================================
-->
<style>
  :root{
    --pg:#f4f6fb; --card:#ffffff; --ink:#0f2544; --sub:#5b6b84; --line:#e6ebf5;
    --bar:#0b2e59; --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.10); --radius:14px;
    --shadow:0 1px 2px rgba(16,37,68,.05),0 10px 26px rgba(16,37,68,.07);
  }
  html[data-theme="dark"]{
    --pg:#0b1220; --card:#151d30; --ink:#eaf0ff; --sub:#9fb0cc; --line:#243149;
    --bar:#0a1526; --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;
    -webkit-font-smoothing:antialiased}
  svg{display:block}
  .shell{max-width:940px;margin:0 auto;padding:14px 16px 34px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0 8px;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .head .meta{margin-bottom:0}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}
  .prog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 4px}
  .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;min-height:340px}
  .step-ico{width:44px;height:44px;border-radius:12px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  h1{font-size:clamp(20px,3.3vw,26px);margin:0 0 8px;font-weight:700;line-height:1.2}
  h2{font-size:15.5px;margin:18px 0 8px;font-weight:600}
  p{margin:0 0 12px}
  .lead{color:var(--sub);font-size:15px}
  ul,ol{margin:6px 0 12px;padding-left:20px}
  li{margin:5px 0}
  .pill{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:5px 11px;border-radius:999px;margin-bottom:10px}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:12px;margin:8px 0}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,170px),1fr));gap:12px;margin:8px 0}
  .box{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px}
  .box h3{margin:0 0 6px;font-size:14.5px;font-weight:600}
  .box p{margin:0;font-size:13px;color:var(--sub)}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn.ghost{background:transparent;color:var(--accent)}
  .btn:disabled{opacity:.4;cursor:default}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:0;cursor:pointer;padding:0}
  .dot.on{background:var(--accent);transform:scale(1.3)}
  .note{font-size:13px;color:var(--sub);border-left:3px solid var(--accent);background:var(--tint);padding:9px 12px;margin:12px 0;border-radius:0 8px 8px 0}
  .warn{border-left-color:var(--amber);color:var(--amber);background:var(--ambt)}
  .good{border-left-color:var(--ok);color:var(--ink);background:var(--okt)}
  .good b{color:var(--ok)}
  .illus{position:relative;aspect-ratio:16/9;background:#0a1424;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .illus svg{width:100%;height:100%}
  .illus canvas{width:100%;height:100%;display:block}
  .illus img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#0a1424}
  .mcap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);margin:6px 2px 2px}
  .thumb{aspect-ratio:4/3}
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0}
  .tbl th,.tbl td{text-align:left;padding:8px 9px;border-bottom:1px solid var(--line)}
  .tbl th{color:var(--sub);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  .tbl td b{color:var(--accent)}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  .scale{position:relative;height:26px;border-radius:8px;margin:14px 0 30px;background:linear-gradient(90deg,var(--ok) 0%,var(--ok) 44%,var(--amber) 54%,var(--bad) 66%,var(--bad) 100%)}
  .scale .mk{position:absolute;top:-6px;width:2px;height:38px;background:var(--ink)}
  .scale .mk span{position:absolute;top:40px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--sub);white-space:nowrap}
  .pointer{position:absolute;top:-14px;transform:translateX(-50%);font-size:14px;color:var(--ink)}
  .row{display:flex;align-items:center;gap:12px;margin:12px 0}
  input[type=range]{flex:1;accent-color:var(--accent)}
  .val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;min-width:120px;text-align:right}
  .readout{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
  .stat{background:var(--pg);border:1px solid var(--line);border-radius:10px;padding:10px 14px;flex:1;min-width:110px}
  .stat b{display:block;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat span{font-size:11.5px;color:var(--sub)}
  .verdict{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-weight:700;font-size:15px}
  .verdict.ok{background:var(--okt);color:var(--ok)}
  .verdict.bad{background:var(--badt);color:var(--bad)}
  .chk{display:flex;gap:11px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:8px 0;cursor:pointer}
  .chk .bx{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;margin-top:1px}
  .chk.done .bx{background:var(--ok);border-color:var(--ok)}
  .chk.done .txt b{text-decoration:line-through;opacity:.7}
  .chk .txt b{font-size:13.5px}.chk .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .phase{border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden}
  .phase>h3{margin:0;font-size:14px;font-weight:700;background:var(--pg);padding:11px 13px;display:flex;gap:8px;align-items:center}
  .phase>h3 .n{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none}
  .phase .chk{border:0;border-top:1px solid var(--line);border-radius:0;margin:0;background:transparent}
  .scene{position:relative;background:var(--pg);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .hs{position:absolute;width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;border:0;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.25);animation:pulse 2s infinite;transform:translate(-50%,-50%)}
  .hs.seen{background:var(--ok);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,99,235,.5)}70%{box-shadow:0 0 0 12px rgba(37,99,235,0)}100%{box-shadow:0 0 0 0 rgba(37,99,235,0)}}
  .reveal{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:12px;min-height:64px;font-size:13.5px}
  .faults{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:12px;margin:8px 0}
  .fault{background:var(--pg);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;text-align:left;padding:0;font-family:inherit;color:inherit}
  .fault .illus{border:0;border-radius:0;border-bottom:1px solid var(--line)}
  .fault .ft{padding:10px 11px}.fault .ft b{font-size:13px}.fault .ft span{display:block;font-size:11.5px;color:var(--sub);margin-top:2px}
  .photo{display:flex;gap:12px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px;margin:9px 0}
  .photo .cam{width:44px;height:44px;border-radius:10px;background:var(--tint);color:var(--accent);flex:none;display:flex;align-items:center;justify-content:center}
  .photo.done .cam{background:var(--okt);color:var(--ok)}
  .photo .pt{flex:1;min-width:0}.photo .pt b{font-size:14px}.photo .pt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .photo .req{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--bad);background:var(--badt);padding:3px 8px;border-radius:999px;display:inline-block;margin-top:6px}
  .photo.done .req{color:var(--ok);background:var(--okt)}
  .snap{border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:9px;padding:8px 12px;font-size:12.5px;cursor:pointer;font-family:inherit;white-space:nowrap;min-height:40px}
  .photo.done .snap{background:var(--ok);border-color:var(--ok);color:#fff}
  .q{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
  .q h3{margin:0 0 10px;font-size:14px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 14px;border-radius:10px;margin:7px 0;cursor:pointer;font-size:14px;font-family:inherit}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad)}
  .opt:disabled{cursor:default}
  .score{font-size:16px;font-weight:700;text-align:center;padding:10px}
  @media(max-width:520px){ .card{padding:15px} .shell{padding:12px 12px 28px} .brand small{display:none} }
</style>
</head>

/* ===== Canvas animation engine ===== */
var _gen=0, _spike=0;
function stopAnim(){ _gen++; }
function fitCanvas(cv){ var r=cv.getBoundingClientRect(); var dpr=window.devicePixelRatio||1; cv.width=Math.max(1,Math.round(r.width*dpr)); cv.height=Math.max(1,Math.round(r.height*dpr)); var ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0); return {ctx:ctx,w:r.width,h:r.height}; }
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function screen(type, capEn, capEs, photoKey){
  var ph = photoKey && IMG[photoKey] ? '<img src="'+IMG[photoKey]+'" alt="" onerror="this.remove()">' : '';
  var cap = X(capEn,capEs) + (photoKey&&IMG[photoKey]?' · '+IMG[photoKey].replace("../",""):'');
  return '<div class="illus"><canvas class="cv" data-cv="'+type+'"></canvas>'+ph+'</div><div class="mcap">'+I.img+' '+cap+'</div>';
}
function imgSlot(key, svg, capEn, capEs, cls){
  var src=IMG[key]; var img = src ? '<img src="'+src+'" alt="" onerror="this.remove()">' : '';
  return '<div class="illus '+(cls||'')+'">'+svg+img+'</div><div class="mcap">'+I.img+' '+X(capEn,capEs)+(src?' · '+src.replace("../",""):'')+'</div>';
}
function screenBg(ctx,w,h){
  ctx.fillStyle="#08111f"; ctx.fillRect(0,0,w,h);
  var padL=40,padR=14,padT=18,padB=26, pw=w-padL-padR, ph=h-padT-padB, i;
  ctx.strokeStyle="rgba(90,120,175,.16)"; ctx.lineWidth=1;
  for(i=0;i<=8;i++){ var x=padL+pw*i/8+.5; ctx.beginPath(); ctx.moveTo(x,padT); ctx.lineTo(x,padT+ph); ctx.stroke(); }
  for(i=0;i<=5;i++){ var y=padT+ph*i/5+.5; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(padL+pw,y); ctx.stroke(); }
  ctx.strokeStyle="rgba(120,150,200,.35)"; ctx.strokeRect(padL+.5,padT+.5,pw,ph);
  return {padL:padL,padT:padT,pw:pw,ph:ph};
}
/* Spectrum: Tx tones + IM products, with Rx band shaded */
function specLines(mode){
  if(mode==="orders") return {rx:[0.36,0.98],lines:[
    {x:0.14,h:1.0,c:"#4d8bff",l:"f1"},{x:0.24,h:1.0,c:"#4d8bff",l:"f2"},
    {x:0.44,h:0.60,c:"#f87171",l:"IM3"},{x:0.60,h:0.42,c:"#fbbf24",l:"IM5"},
    {x:0.75,h:0.30,c:"#fbbf24",l:"IM7"},{x:0.88,h:0.20,c:"#fbbf24",l:"IM9"}]};
  return {rx:[0.58,0.98],lines:[
    {x:0.18,h:1.0,c:"#4d8bff",l:"f1"},{x:0.30,h:1.0,c:"#4d8bff",l:"f2"},
    {x:0.70,h:0.55,c:"#f87171",l:"IM3"},{x:0.82,h:0.33,c:"#fbbf24",l:"IM5"}]};
}
function animSpectrum(cv,mode){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, gen=_gen, start=performance.now(), S=specLines(mode);
  function frame(now){
    if(gen!==_gen) return;
    var t=(now-start)/1000, grow=Math.min(1,t/1.4), P=screenBg(ctx,w,h), i, base=P.padT+P.ph;
    /* Rx band shade */
    var rx0=P.padL+P.pw*S.rx[0], rx1=P.padL+P.pw*S.rx[1];
    ctx.fillStyle="rgba(220,38,38,.12)"; ctx.fillRect(rx0,P.padT,rx1-rx0,P.ph);
    ctx.strokeStyle="rgba(248,113,113,.5)"; ctx.setLineDash([4,3]); ctx.strokeRect(rx0+.5,P.padT+.5,rx1-rx0,P.ph); ctx.setLineDash([]);
    ctx.fillStyle="#f87171"; ctx.font="10px system-ui"; ctx.textAlign="center"; ctx.fillText("Rx band",(rx0+rx1)/2,P.padT+12);
    /* lines */
    for(i=0;i<S.lines.length;i++){ var L=S.lines[i]; var isTx=L.c==="#4d8bff"; var hh=(isTx?1:grow)*L.h*P.ph*0.86; var x=P.padL+P.pw*L.x; var y=base-hh;
      ctx.strokeStyle=L.c; ctx.lineWidth=3; ctx.shadowColor=L.c; ctx.shadowBlur=8; ctx.beginPath(); ctx.moveTo(x,base); ctx.lineTo(x,y); ctx.stroke(); ctx.shadowBlur=0;
      ctx.fillStyle=L.c; ctx.font="10px system-ui"; ctx.textAlign="center"; ctx.fillText(L.l,x,y-6); }
    ctx.fillStyle="#9fb0cc"; ctx.textAlign="left"; ctx.fillText(X("amplitude","amplitud")+" ▲   "+X("frequency","frecuencia")+" ▶", P.padL, base+18);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
/* PIM generation: two tones -> junction -> IM3 out */
function pulse(ctx,x,y,col){ var r=15, grd=ctx.createRadialGradient(x,y,0,x,y,r); grd.addColorStop(0,col); grd.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fill(); }
function animPimGen(cv){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, gen=_gen, start=performance.now();
  var y=h*0.55, x0=w*0.12, xj=w*0.62, xa=w*0.9;
  function frame(now){
    if(gen!==_gen) return;
    var t=((now-start)/1000)%2.6;
    ctx.fillStyle="#08111f"; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle="#2b3c63"; ctx.lineWidth=10; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(xj,y); ctx.stroke();
    ctx.strokeStyle="#2b3c63"; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(xj,y); ctx.lineTo(xa,y); ctx.stroke();
    /* junction (bad connector) */
    ctx.fillStyle="#b45309"; roundRect(ctx,xj-5,y-14,12,28,2); ctx.fill();
    /* antenna */
    ctx.strokeStyle="#546a90"; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(xa,y); ctx.lineTo(xa,y-30); ctx.moveTo(xa-8,y-24); ctx.lineTo(xa+8,y-24); ctx.stroke();
    ctx.fillStyle="#7fa8e8"; ctx.font="11px system-ui"; ctx.textAlign="center"; ctx.fillText(X("non-linear junction","unión no lineal"),xj,y+30);
    if(t<1.3){ var p=t/1.3, px=x0+(xj-x0)*p; pulse(ctx,px,y-4,"#4d8bff"); pulse(ctx,px-14,y+4,"#54e0c7"); ctx.fillStyle="#9fb0cc"; ctx.fillText("f1 + f2 →",(x0+xj)/2,y-30); }
    else { var p2=(t-1.3)/1.3; var pf=xj+(xa-xj)*p2; pulse(ctx,pf,y,"#f87171"); var pb=xj-(xj-x0)*p2; pulse(ctx,pb,y,"#f87171"); ctx.fillStyle="#f87171"; ctx.fillText("IM3 (PIM)",xj,y-30); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
/* Noise floor rising in Rx band (interactive) */
function drawNoise(cv,level){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, P=screenBg(ctx,w,h), base=P.padT+P.ph;
  /* wanted uplink signal */
  var sx=P.padL+P.pw*0.30; ctx.strokeStyle="#54e0c7"; ctx.lineWidth=3; ctx.shadowColor="#54e0c7"; ctx.shadowBlur=8; ctx.beginPath(); ctx.moveTo(sx,base); ctx.lineTo(sx,base-P.ph*0.7); ctx.stroke(); ctx.shadowBlur=0;
  ctx.fillStyle="#54e0c7"; ctx.font="10px system-ui"; ctx.textAlign="center"; ctx.fillText(X("user signal","señal usuario"),sx,base-P.ph*0.7-6);
  /* noise floor */
  var nf=base-P.ph*(0.12+level*0.62);
  ctx.fillStyle="rgba(248,113,113,.18)"; ctx.fillRect(P.padL,nf,P.pw,base-nf);
  ctx.strokeStyle="#f87171"; ctx.lineWidth=2; ctx.beginPath();
  for(var x=0;x<=P.pw;x+=6){ var jitter=(Math.random()-0.5)*6*(0.4+level); ctx.lineTo(P.padL+x, nf+jitter); } ctx.stroke();
  ctx.fillStyle="#f87171"; ctx.textAlign="left"; ctx.fillText(X("noise floor (PIM)","piso de ruido (PIM)"),P.padL+6,nf-6);
  ctx.fillStyle="#9fb0cc"; ctx.textAlign="left"; ctx.fillText("Rx band", P.padL, base+18);
}
/* PIM slope: IM3(dBm) vs Tx power(dBm) (interactive) */
function drawSlope(cv,P){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, R=screenBg(ctx,w,h), i;
  ctx.font="10px system-ui"; ctx.fillStyle="#7fa8e8"; ctx.textAlign="center"; ctx.textBaseline="top";
  ["30","37","43","46"].forEach(function(v,ix){ ctx.fillText(v, R.padL+R.pw*ix/3, R.padT+R.ph+6); });
  ctx.textAlign="left"; ctx.fillStyle="#9fb0cc"; ctx.textBaseline="alphabetic"; ctx.fillText("IM3 (dBm)  vs  Tx power (dBm)", R.padL, 13);
  function y(im){ return R.padT+R.ph*(1-((im+130)/50)); } /* im from -130..-80 */
  function im(p){ return -113+2.5*(p-43)+43; } /* absolute IM3 dBm approx: dBm=dBc+43; dBc=-113+2.5(p-43) */
  ctx.beginPath(); for(var p=30;p<=46;p+=0.5){ var x=R.padL+R.pw*(p-30)/16; var yy=y(im(p)); if(p===30)ctx.moveTo(x,yy); else ctx.lineTo(x,yy);} ctx.strokeStyle="#54e0c7"; ctx.lineWidth=2.5; ctx.shadowColor="#54e0c7"; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
  var mx=R.padL+R.pw*(P-30)/16, my=y(im(P));
  ctx.strokeStyle="rgba(255,255,255,.4)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(mx,R.padT); ctx.lineTo(mx,R.padT+R.ph); ctx.stroke();
  ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(mx,my,4,0,7); ctx.fill();
  ctx.fillStyle="#eaf0ff"; ctx.textAlign="center"; ctx.fillText(Math.round(im(P))+" dBm", mx, my-10);
  ctx.fillStyle="#fbbf24"; ctx.textAlign="right"; ctx.fillText("~2.5 dB / dB", R.padL+R.pw-4, R.padT+16);
}
/* Distance-to-PIM trace */
function gau(x,mu,s,a){ return a*Math.exp(-((x-mu)*(x-mu))/(2*s*s)); }
function animDpim(cv){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, gen=_gen, start=performance.now();
  function val(fx){ return 4+gau(fx,0.18,0.03,5)+gau(fx,0.52,0.02,24)+gau(fx,0.80,0.03,4)+0.5*Math.sin(fx*44); }
  function frame(now){
    if(gen!==_gen) return;
    var t=(now-start)/1000, prog=Math.min(1,t/2.0), P=screenBg(ctx,w,h), i;
    ctx.font="10px system-ui"; ctx.fillStyle="#7fa8e8"; ctx.textAlign="center"; ctx.textBaseline="top";
    ["0","20","40","60 m"].forEach(function(v,ix){ ctx.fillText(v, P.padL+P.pw*ix/3, P.padT+P.ph+6); });
    ctx.textAlign="left"; ctx.fillStyle="#9fb0cc"; ctx.textBaseline="alphabetic"; ctx.fillText(X("Distance-to-PIM (dBc) vs distance","Distancia al PIM (dBc) vs distancia"), P.padL, 13);
    var N=170; ctx.beginPath();
    for(i=0;i<=N*prog;i++){ var fx=i/N; var v=val(fx); var x=P.padL+P.pw*fx; var y=P.padT+P.ph*(1-v/30); if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);} ctx.strokeStyle="#4d8bff"; ctx.lineWidth=2; ctx.shadowColor="#4d8bff"; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
    if(prog>=1){ var fmu=0.52, mx=P.padL+P.pw*fmu, mv=val(fmu), my=P.padT+P.ph*(1-mv/30); ctx.fillStyle="#f87171"; ctx.beginPath(); ctx.arc(mx,my,4,0,7); ctx.fill(); ctx.textAlign="center"; ctx.fillText(X("PIM source  31 m","fuente PIM  31 m"), mx, my-8); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
/* Live PIM meter strip chart (dynamic test) */
function animMeter(cv){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, gen=_gen, buf=[], start=performance.now();
  function frame(now){
    if(gen!==_gen) return;
    var P=screenBg(ctx,w,h), base=-118;
    _spike*=0.90;
    var v=base + _spike*40 + (Math.random()-0.5)*1.5;
    buf.push(v); if(buf.length>140) buf.shift();
    ctx.font="10px system-ui"; ctx.fillStyle="#7fa8e8"; ctx.textAlign="right"; ctx.textBaseline="middle";
    [-80,-100,-120].forEach(function(d){ var y=P.padT+P.ph*(1-((d+130)/60)); ctx.fillText(d, P.padL-6, y); });
    /* pass line at -110 dBm */
    var yl=P.padT+P.ph*(1-((-110+130)/60)); ctx.strokeStyle="rgba(245,158,11,.9)"; ctx.setLineDash([6,4]); ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(P.padL,yl); ctx.lineTo(P.padL+P.pw,yl); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath();
    for(var i=0;i<buf.length;i++){ var x=P.padL+P.pw*i/139; var y=P.padT+P.ph*(1-((buf[i]+130)/60)); if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    var hot=_spike>0.15; ctx.strokeStyle=hot?"#f87171":"#54e0c7"; ctx.lineWidth=2; ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle="#9fb0cc"; ctx.textAlign="left"; ctx.textBaseline="alphabetic"; ctx.fillText(X("live IM3 (dBm)","IM3 en vivo (dBm)"), P.padL, 13);
    ctx.fillStyle=hot?"#f87171":"#4ade80"; ctx.textAlign="right"; ctx.fillText(hot?X("PIM spike!","¡pico de PIM!"):X("stable","estable"), P.padL+P.pw-4, 13);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function initCanvases(){
  document.querySelectorAll("#card canvas.cv").forEach(function(cv){
    var ty=cv.dataset.cv;
    if(ty==="spec") animSpectrum(cv,"pim");
    else if(ty==="orders") animSpectrum(cv,"orders");
    else if(ty==="pimgen") animPimGen(cv);
    else if(ty==="dpim") animDpim(cv);
    else if(ty==="meter") animMeter(cv);
  });
}

function i_proc(){ var total=document.querySelectorAll(".chk").length; function upd(){ var d=document.querySelectorAll(".chk.done").length; $("procMsg").textContent=d<total?(X("Actions: ","Acciones: ")+d+"/"+total):X("Procedure complete. Site certified.","Procedimiento completo. Sitio certificado."); } document.querySelectorAll(".chk").forEach(function(c){ c.onclick=function(){ c.classList.toggle("done"); upd(); }; }); upd(); }
/* 15 */
function s_dyn(){
  return tit("Dynamic test","Prueba dinámica")+
    '<p class="lead">'+X("Intermittent PIM may not show at rest. Apply light mechanical stress while watching the live meter. Press the buttons:","Un PIM intermitente puede no aparecer en reposo. Aplica estrés mecánico ligero mientras miras el medidor en vivo. Pulsa los botones:")+'</p>'+
    screen("meter","Live IM3 meter — a spike during tap/flex means an intermittent joint.","Medidor de IM3 en vivo — un pico durante tap/flex indica unión intermitente.")+
    '<div class="row" style="justify-content:center;gap:10px;margin-top:8px"><button class="btn" id="tap">Tap</button><button class="btn ghost" id="flex">Flex</button></div>'+
    '<div class="grid2"><div class="box"><h3>Tap</h3><p>'+X("Tap nut/back-shell with hard plastic. Never the coax.","Tap en tuerca/back-shell con plástico duro. Nunca el coaxial.")+'</p></div><div class="box"><h3>Flex</h3><p>'+X("Flex the cable ±25 mm ~300 mm from the connector.","Flexiona el cable ±25 mm a ~300 mm del conector.")+'</p></div></div>'+
    '<p class="note warn">'+X("Report a spike even if the static test passed.","Reporta un pico aunque el estático haya pasado.")+'</p>';
}
function i_dyn(){ var tp=$("tap"), fx=$("flex"); function spike(){ _spike=1; } if(tp)tp.onclick=spike; if(fx)fx.onclick=spike; }

function s_dpim(){

    screen("dpim","Distance-to-PIM trace: the spike marks the PIM source location.","Traza de Distancia al PIM: el pico marca la ubicación de la fuente.")+

}

var PHOTOS=[
  {en:"Analyzer screen (PASS/FAIL)",es:"Pantalla del analizador (PASA/FALLA)",d_en:"Kaelus screen with the result and IM3 value in dBc, readable.",d_es:"Pantalla Kaelus con el resultado y el valor IM3 en dBc, legible."},
  {en:"Distance-to-PIM (RTF)",es:"Distancia al PIM (RTF)",d_en:"RTF trace with distance to fault, or clean trace if it passed.",d_es:"Traza RTF con la distancia a la falla, o traza limpia si pasó."},
  {en:"Corrections made",es:"Correcciones hechas",d_en:"Before/after of the fix (connector cleaned, re-torqued or replaced).",d_es:"Antes/después del arreglo (conector limpio, re-torqueado o cambiado)."}
];
function s_photos(){

function i_photos(){ function upd(){ var n=document.querySelectorAll(".photo.done").length; $("phMsg").textContent=n<PHOTOS.length?(X("Photos: ","Fotos: ")+n+"/"+PHOTOS.length):X("All 3 photos ready. Attach them to the report.","Las 3 fotos listas. Adjúntalas al reporte."); } document.querySelectorAll(".photo").forEach(function(c){ c.querySelector(".snap").onclick=function(){ c.classList.toggle("done"); this.textContent=c.classList.contains("done")?X("✓ Taken","✓ Tomada"):X("Photo taken","Foto tomada"); upd(); }; }); upd(); }
/* 18 */
var QUIZ=[
  {en:"Which product is measured for PIM?",es:"¿Qué producto se mide para el PIM?",o_en:["IM2","IM3","IM5","IM7"],o_es:["IM2","IM3","IM5","IM7"],a:1},
  {en:"Which reading PASSES?",es:"¿Qué lectura PASA?",o_en:["−148 dBc","−156 dBc","−150 dBc","−145 dBc"],o_es:["−148 dBc","−156 dBc","−150 dBc","−145 dBc"],a:1},
  {en:"For a 2100 MHz sector, which analyzer?",es:"Para un sector de 2100 MHz, ¿qué analizador?",o_en:["iPA-0707A","iPA-0850A","iPA-2100A","iPA-0900A"],o_es:["iPA-0707A","iPA-0850A","iPA-2100A","iPA-0900A"],a:2},
  {en:"IM3 changes per 1 dB of test power by about…",es:"El IM3 cambia por cada 1 dB de potencia aprox…",o_en:["0.1 dB","2.2–3.0 dB","10 dB","0 dB"],o_es:["0.1 dB","2.2–3.0 dB","10 dB","0 dB"],a:1},
  {en:"Instrument residual PIM must be…",es:"El PIM residual del equipo debe ser…",o_en:["Equal to the limit","≥10 dB better (≤ −163 dBc)","Worse","Irrelevant"],o_es:["Igual al límite","≥10 dB mejor (≤ −163 dBc)","Peor","No importa"],a:1},
  {en:"External PIM comes from…",es:"El PIM externo viene de…",o_en:["A loose internal connector","Loose metal in the antenna beam","Low battery","A USB cable"],o_es:["Un conector interno flojo","Metal suelto en el haz de la antena","Batería baja","Un cable USB"],a:1},
  {en:"During the dynamic test you must NOT tap…",es:"En la prueba dinámica NO debes golpear…",o_en:["The nut","The coaxial cable","The back-shell","The analyzer"],o_es:["La tuerca","El cable coaxial","El back-shell","El analizador"],a:1}
];
function s_quiz(){

function i_quiz(){ var answered={}, correct=0; document.querySelectorAll(".opt").forEach(function(b){ b.onclick=function(){ var qi=+b.dataset.q; if(answered[qi])return; answered[qi]=1; var a=QUIZ[qi].a; document.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(function(x){ x.disabled=true; if(+x.dataset.o===a)x.classList.add("correct"); }); if(+b.dataset.o===a)correct++; else b.classList.add("wrong"); if(Object.keys(answered).length===QUIZ.length){ $("score").textContent=X("Score: ","Puntaje: ")+correct+"/"+QUIZ.length+(correct>=5?X(" · Passed"," · Aprobado"):X(" · Review"," · Repasa")); } }; }); }

    '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px"><span class="verdict ok">✓ '+X("Training completed","Entrenamiento completado")+'</span><a class="btn ghost" href="../index.html" target="_top">'+X("Back to portal","Volver al portal")+'</a></div>';
}

/* ===== Engine ===== */
function pintarChrome(){
  document.documentElement.lang=LANG;
  $("brand").textContent=X("PIM Testing","Prueba de PIM");
  $("brandsub").textContent=X("Telecom · Kaelus","Telecom · Kaelus");
  $("homeTxt").textContent=X("Home","Inicio");
  document.querySelectorAll("#lang button").forEach(function(b){ b.classList.toggle("on", b.dataset.l===LANG); });
  var dark=document.documentElement.getAttribute("data-theme")==="dark";
  $("temaIco").innerHTML=dark?I.sun:I.moon; $("temaTxt").textContent=dark?X("Light","Claro"):X("Dark","Oscuro");
  $("prev").innerHTML="‹ "+X("Back","Anterior");
  $("next").innerHTML=(cur>=STEPS.length-1?X("Restart","Reiniciar"):X("Next","Siguiente")+" ›");
}
function render(){
  stopAnim(); _spike=0;
  pintarChrome();
  var s=STEPS[cur];
  $("card").innerHTML=s.b();
  if(s.i) s.i();
  initCanvases();
  $("progbar").style.width=((cur+1)/STEPS.length*100)+"%";
  $("mStep").textContent=X("Step ","Paso ")+(cur+1)+" / "+STEPS.length+" · "+X(s.t[0],s.t[1]);
  $("mDur").textContent="≈ 8 min";
  $("prev").disabled=(cur===0);
  $("dots").innerHTML=STEPS.map(function(_,i){return '<button class="dot'+(i===cur?' on':'')+'" data-i="'+i+'" aria-label="'+(i+1)+'"></button>';}).join("");
  document.querySelectorAll(".dot").forEach(function(d){ d.onclick=function(){ cur=+d.dataset.i; render(); }; });
  window.scrollTo(0,0);
}
$("prev").onclick=function(){ if(cur>0){cur--;render();} };
$("next").onclick=function(){ cur=(cur>=STEPS.length-1)?0:cur+1; render(); };
document.querySelectorAll("#lang button").forEach(function(b){ b.onclick=function(){ LANG=b.dataset.l; render(); }; });
$("tema").onclick=function(){ var d=document.documentElement.getAttribute("data-theme")==="dark"; document.documentElement.setAttribute("data-theme", d?"light":"dark"); pintarChrome(); };
render();
</script>
