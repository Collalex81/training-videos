<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading an Ericsson RAN Health Check — Module 1 / Lectura del Health Check RAN Ericsson — Módulo 1</title>
<!--
  TELECOM (azul) — Cómo LEER un reporte "Health Check" de un nodo RAN Ericsson. Módulo 1 de 3: anatomía del reporte, alarmas y estados.
  TELECOM (blue) — How to READ an Ericsson RAN node "Health Check" report. Module 1 of 3: report anatomy, alarms & states.
  Fuentes / Sources: Ericsson RAN / node CPI (Customer Product Information) — COLI/MO command output, managed object model, alarm list; 3GPP TS 32.xxx (state management: administrativeState / operationalState) & NRM.
  Motor basado en grounding-bonding-cell-sites.html. Bilingüe EN/ES (EN por defecto).
-->
<style>
  :root{
    --pg:#f3f6fc; --card:#ffffff; --ink:#0c1c34; --sub:#51618a; --line:#dde5f3;
    --bar:#0b2e59; --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.12); --radius:14px;
    --shadow:0 1px 2px rgba(12,28,52,.05),0 10px 26px rgba(12,28,52,.08);
  }
  html[data-theme="dark"]{
    --pg:#0a1120; --card:#141d30; --ink:#e9f0ff; --sub:#9db0d6; --line:#243149;
    --bar:#0a1526; --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  .shell{max-width:940px;margin:0 auto;padding:14px 16px 34px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0 8px;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}
  .prog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 4px}
  .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;min-height:360px}
  .step-ico{width:44px;height:44px;border-radius:12px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  h1{font-size:clamp(20px,3.3vw,26px);margin:0 0 8px;font-weight:700;line-height:1.2}
  h2{font-size:15.5px;margin:16px 0 8px;font-weight:600}
  p{margin:0 0 12px}
  .lead{color:var(--sub);font-size:15px}
  ul,ol{margin:6px 0 12px;padding-left:20px}
  li{margin:6px 0}
  .pill{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:5px 11px;border-radius:999px;margin-bottom:10px}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:12px;margin:8px 0}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:12px;margin:8px 0}
  .box{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px}
  .box h3{margin:0 0 6px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
  .box p{margin:0;font-size:12.5px;color:var(--sub)}
  .num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:var(--accent);color:#fff;font-weight:800;font-size:14px;flex:none}
  .stat3{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0}
  .stat3 .s{flex:1;min-width:120px;background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;text-align:center}
  .stat3 .s b{display:block;font-size:24px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
  .stat3 .s span{font-size:12px;color:var(--sub)}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn.ghost{background:transparent;color:var(--accent)}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:0;cursor:pointer;padding:0}
  .dot.on{background:var(--accent);transform:scale(1.3)}
  .note{font-size:13px;color:var(--sub);border-left:3px solid var(--accent);background:var(--tint);padding:9px 12px;margin:12px 0;border-radius:0 8px 8px 0}
  .warn{border-left-color:var(--amber);color:var(--amber);background:var(--ambt)}
  .bad{border-left-color:var(--bad);color:var(--bad);background:var(--badt)}
  .good{border-left-color:var(--ok);color:var(--ink);background:var(--okt)}
  .good b{color:var(--ok)}
  .mcap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);margin:8px 2px 2px;justify-content:center}
  .chk{display:flex;gap:11px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:8px 0;cursor:pointer}
  .chk .bx{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;margin-top:1px}
  .chk.done .bx{background:var(--ok);border-color:var(--ok)}
  .q{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
  .q h3{margin:0 0 10px;font-size:14px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 14px;border-radius:10px;margin:7px 0;cursor:pointer;font-size:14px;font-family:inherit}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad)}
  .opt:disabled{cursor:default}
  .fb{display:none;font-size:13px;margin:8px 0 2px;padding:10px 12px;border-radius:0 8px 8px 0;border-left:3px solid var(--accent);background:var(--tint)}
  .fb.good{border-left-color:var(--ok);background:var(--okt)}
  .fb.good b{color:var(--ok)}
  .fb.bad{border-left-color:var(--bad);background:var(--badt);color:var(--ink)}
  .fb.bad b{color:var(--bad)}
  .fb .trap{display:block;margin-top:6px;font-style:italic;color:var(--sub)}
  .score{font-size:16px;font-weight:700;text-align:center;padding:10px}
  .verdict{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-weight:700;font-size:15px}
  .verdict.ok{background:var(--okt);color:var(--ok)}
  .verdict.no{background:var(--badt);color:var(--bad)}
  .ref{font-size:12.5px;color:var(--sub);border-bottom:1px solid var(--line);padding:8px 0}
  .ref b{color:var(--ink)}
  /* terminal / COLI console block */
  .termwrap{border:1px solid #1e2c48;border-radius:10px;overflow:hidden;margin:12px 0;background:#0a0f1a;box-shadow:0 6px 18px -10px rgba(0,0,0,.6)}
  .termbar{display:flex;align-items:center;gap:6px;padding:7px 11px;background:#111a2e;border-bottom:1px solid #1e2c48}
  .termbar i{width:10px;height:10px;border-radius:50%;display:block}
  .termbar span{margin-left:6px;font-size:11px;color:#8b98b8;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .term{padding:12px 14px;overflow-x:auto;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:12px;line-height:1.6;color:#7ee787;white-space:pre;-webkit-overflow-scrolling:touch}
  .term .td{color:#7d8bad}
  .term .ty{color:#ffd479}
  .term .tr{color:#ff6b6b;font-weight:700}
  .term .tm{color:#ffb454}
  .term .tb{color:#79b8ff}
  .term .tw{color:#e9f0ff}
  .term .th{color:#8b98b8;text-decoration:underline}
  .matrix{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,210px),1fr));gap:12px;margin:10px 0}
  .mcell{border:1px solid var(--line);border-radius:12px;padding:13px;background:var(--pg)}
  .mcell.g{border-color:var(--ok);background:var(--okt)}
  .mcell.r{border-color:var(--bad);background:var(--badt)}
  .mcell.a{border-color:var(--amber);background:var(--ambt)}
  .mcell b{font-size:13px;display:block;font-family:ui-monospace,monospace}
  .mcell span{font-size:12.5px;color:var(--sub);display:block;margin-top:4px}
  .mcell .tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:2px 8px;border-radius:999px;margin-top:6px}
  .mcell.g .tag{background:var(--ok);color:#fff}
  .mcell.r .tag{background:var(--bad);color:#fff}
  .mcell.a .tag{background:var(--amber);color:#fff}
  @media(max-width:520px){ .card{padding:15px} .shell{padding:12px 12px 28px} .brand small{display:none} .term{font-size:11px} }
</style>
</head>

function scnStep(idx){
  var sc=window.SCEN[idx];
  var opts=sc.opts.map(function(o,j){ return '<button class="opt" data-o="'+j+'">'+X(o.en,o.es)+'</button>'; }).join("");
  return term(sc.title, sc.body)+
    '<div class="q scn" data-idx="'+idx+'"><h3>'+X(sc.qEn,sc.qEs)+'</h3>'+opts+
    '<div class="fb"></div>'+
    '<div style="margin-top:8px;display:none" class="scnre"><button class="btn ghost" data-re="1">'+X("Try again","Reintentar")+'</button></div></div>';
}
function initScn(){
  document.querySelectorAll(".scn").forEach(function(scn){
    var sc=window.SCEN[+scn.dataset.idx];
    var opts=scn.querySelectorAll(".opt");
    var fb=scn.querySelector(".fb");
    var re=scn.querySelector(".scnre");
    function reset(){ opts.forEach(function(x){x.classList.remove("correct","wrong");x.disabled=false;}); fb.style.display="none"; re.style.display="none"; }
    re.querySelector("[data-re]").onclick=reset;
    opts.forEach(function(b){
      b.onclick=function(){
        var chosen=+b.dataset.o, o=sc.opts[chosen], right=(chosen===sc.correct);
        opts.forEach(function(x){ x.disabled=true; if(+x.dataset.o===sc.correct)x.classList.add("correct"); });
        if(!right) b.classList.add("wrong");
        fb.className="fb "+(right?"good":"bad");
        fb.innerHTML="<b>"+(right?X("Correct","Correcto"):X("Not quite","Casi"))+".</b> "+X(o.fbEn,o.fbEs)+'<span class="trap">'+X(o.trapEn,o.trapEs)+"</span>";
        fb.style.display="block";
        re.style.display=right?"none":"block";
      };
    });
  });
}

  /* 9-12 — scenarios */
  { ico:ICO.search, t:["Diagnose 1","Diagnóstico 1"], b:function(){
      return tit("Diagnose it: a locked cell","Diagnostícalo: una celda bloqueada")+
        '<p class="lead">'+X("Read the excerpt, then choose. This is practice, not a graded exam — read the feedback and retry.","Lee el extracto y elige. Es práctica, no un examen — lee la retroalimentación y reintenta.")+'</p>'+
        scnStep(0);

  /* 13 — Quiz */
  { ico:ICO.quiz, t:["Quiz","Evaluación"], b:function(){
      var QUIZ=[
        { q_en:"administrativeState 1 means:", q_es:"administrativeState 1 significa:",
          o_en:["LOCKED","UNLOCKED","DISABLED"], o_es:["LOCKED","UNLOCKED","DISABLED"], a:1,
          e_en:"Adm 1 = UNLOCKED (operator allows the object in service); 0 = LOCKED.",

        { q_en:"operationalState 0 means:", q_es:"operationalState 0 significa:",

          e_en:"Op 0 = DISABLED: the node reports it is not operational right now.",
          e_es:"Op 0 = DISABLED: el nodo reporta que no está operativo ahora." },
        { q_en:"A cell reads UNLOCKED + DISABLED. This is:", q_es:"Una celda muestra UNLOCKED + DISABLED. Esto es:",
          o_en:["Healthy","A problem to investigate (blocking fault)","Intentionally out of service"], o_es:["Sana","Un problema a investigar (falla bloqueante)","Fuera de servicio a propósito"], a:1,

        { q_en:"A cell reads LOCKED + DISABLED. Best first action:", q_es:"Una celda muestra LOCKED + DISABLED. Mejor primera acción:",

          e_en:"LOCKED + DISABLED is usually a deliberate admin lock — confirm intent before ticketing.",
          e_es:"LOCKED + DISABLED suele ser un lock administrativo deliberado — confirma la intención antes de levantar ticket." },
        { q_en:"In the alarm table, severity 'C' means:", q_es:"En la tabla de alarmas, la severidad 'C' significa:",
          o_en:["Cleared","Critical","Configuration"], o_es:["Despejada","Crítica","Configuración"], a:1,
          e_en:"C = Critical, M = Major, m = minor/warning.",
          e_es:"C = Crítica, M = Mayor, m = menor/advertencia." },
        { q_en:"Three alarms name the same Host FieldReplaceableUnit=RRU-49 at the same time. You should:", q_es:"Tres alarmas nombran el mismo Host FieldReplaceableUnit=RRU-49 a la misma hora. Debes:",
          o_en:["Open three separate tickets","Treat them as one likely root cause","Ignore them"], o_es:["Abrir tres tickets separados","Tratarlas como una causa raíz probable","Ignorarlas"], a:1,
          e_en:"Correlate by MO / host unit / timestamp: one root cause (RRU-49) produced several alarms.",
          e_es:"Correlaciona por MO / unidad host / marca de tiempo: una causa raíz (RRU-49) produjo varias alarmas." },
        { q_en:"The MO 'NRCellDU=...' refers to:", q_es:"El MO 'NRCellDU=...' se refiere a:",
          o_en:["An LTE FDD cell","A 5G NR cell (DU part of the DU/CU split)","A power supply unit"], o_es:["Una celda LTE FDD","Una celda 5G NR (parte DU del split DU/CU)","Una fuente de poder"], a:1,
          e_en:"NRCell* = 5G NR; DU is the distributed unit (radio/lower layers). EUtranCell* would be LTE.",
          e_es:"NRCell* = 5G NR; DU es la unidad distribuida (radio/capas bajas). EUtranCell* sería LTE." },
        { q_en:"A Critical 'External Link to GNodeB Failure (X2)' points at:", q_es:"Un 'External Link to GNodeB Failure (X2)' Crítico apunta a:",

          e_en:"X2/Xn are logical inter-node links over transport. Check IP/transport & neighbour config, not the antenna.",
          e_es:"X2/Xn son enlaces lógicos entre nodos sobre transporte. Revisa IP/transporte y config de vecino, no la antena." }
      ];

        return '<div class="q"><h3>'+(i+1)+'. '+X(q.q_en,q.q_es)+'</h3>'+o+'<div class="fb" data-fbq="'+i+'"></div></div>';
      }).join("");

        qs+'<div class="score" id="score"></div><div id="qv" style="text-align:center;margin-top:6px"></div>';
    }, i:function(){
      var QUIZ=window._QZ, ans={}, ok=0, N=QUIZ.length;
      document.querySelectorAll(".opt").forEach(function(b){
        b.onclick=function(){
          var qi=+b.dataset.q; if(ans[qi]!==undefined) return; ans[qi]=1;
          var a=QUIZ[qi].a, right=(+b.dataset.o===a);
          document.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(function(x){ x.disabled=true; if(+x.dataset.o===a)x.classList.add("correct"); });
          if(right) ok++; else b.classList.add("wrong");
          var fb=document.querySelector('.fb[data-fbq="'+qi+'"]');
          fb.className="fb "+(right?"good":"bad");
          fb.innerHTML="<b>"+(right?X("Correct","Correcto"):X("Review","Repasa"))+".</b> "+X(QUIZ[qi].e_en,QUIZ[qi].e_es);
          fb.style.display="block";
          if(Object.keys(ans).length===N){
            var pct=Math.round(ok/N*100), pass=pct>=80;

            $("qv").innerHTML='<span class="verdict '+(pass?"ok":"no")+'">'+(pass?ICO.check:"")+' '+

          }
        };
      });

          '<li>'+X("The MO + AdditionalText localize a fault; correlate alarms by host unit and timestamp to find one root cause.","El MO + AdditionalText localizan la falla; correlaciona alarmas por unidad host y marca de tiempo para hallar una causa raíz.")+'</li>'+

        '<div class="ref"><b>3GPP TS 32-series</b> — '+X("State management (administrativeState / operationalState) and the Network Resource Model behind EUtranCell*, NRCell*, and related MOs.","Gestión de estados (administrativeState / operationalState) y el Network Resource Model detrás de EUtranCell*, NRCell* y MOs relacionados.")+'</div>'+

        '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:16px"><span class="verdict ok">'+ICO.check+' '+X("Module 1 complete — next: alarms deep-dive","Módulo 1 completo — sigue: alarmas a fondo")+'</span><a class="btn ghost" href="../index.html" target="_top">'+X("Back to portal","Volver al portal")+'</a></div>'+

var cur=0;
var _gen=0;

function pintarChrome(){
  document.documentElement.lang=LANG;
  $("brand").textContent=X(CONFIG.brand[0],CONFIG.brand[1]);
  $("brandsub").textContent=X(CONFIG.subtitle[0],CONFIG.subtitle[1]);
  $("homeTxt").textContent=X("Home","Inicio");
  document.querySelectorAll("#lang button").forEach(function(b){ b.classList.toggle("on", b.dataset.l===LANG); });
  var dark=document.documentElement.getAttribute("data-theme")==="dark";
  $("temaIco").innerHTML=dark?ICO.sun:ICO.moon; $("temaTxt").textContent=dark?X("Light","Claro"):X("Dark","Oscuro");
  $("prev").innerHTML="‹ "+X("Back","Anterior");
  $("next").innerHTML=(cur>=STEPS.length-1?X("Restart","Reiniciar"):X("Next","Siguiente")+" ›");
}
function render(){
  _gen++;
  pintarChrome();
  var s=STEPS[cur];
  $("card").innerHTML=s.b();
  if(s.i) s.i();
  $("progbar").style.width=((cur+1)/STEPS.length*100)+"%";
  $("mStep").textContent=X("Step ","Paso ")+(cur+1)+" / "+STEPS.length+" · "+X(s.t[0],s.t[1]);
  $("mDur").textContent=CONFIG.duration;
  $("prev").disabled=(cur===0);
  $("dots").innerHTML=STEPS.map(function(_,i){return '<button class="dot'+(i===cur?' on':'')+'" data-i="'+i+'" aria-label="'+(i+1)+'"></button>';}).join("");
  document.querySelectorAll(".dot").forEach(function(d){ d.onclick=function(){ cur=+d.dataset.i; render(); }; });
  window.scrollTo(0,0);
}
$("prev").onclick=function(){ if(cur>0){cur--;render();} };
$("next").onclick=function(){ cur=(cur>=STEPS.length-1)?0:cur+1; render(); };
document.querySelectorAll("#lang button").forEach(function(b){ b.onclick=function(){ LANG=b.dataset.l; render(); }; });
$("tema").onclick=function(){ var d=document.documentElement.getAttribute("data-theme")==="dark"; document.documentElement.setAttribute("data-theme", d?"light":"dark"); pintarChrome(); };
document.addEventListener("keydown",function(e){ if(e.key==="ArrowRight")$("next").click(); if(e.key==="ArrowLeft")$("prev").click(); });
render();
</script>
