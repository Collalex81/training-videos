<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower Safety / Seguridad en Torres</title>
<!--
  =============================================================================
  SAFETY TRAINING — Working safely on telecom towers (OSHA + Crown Castle)
  Bilingual EN/ES (EN default) · Responsive · sticky header · canvas animations
  DISCLAIMER: training overview only. Not a substitute for certified NATE/OSHA
  training or the tower owner's (e.g. Crown Castle) EHS procedures.
  REAL PHOTOS: drop images in assets/ with the names in IMG (paths ../assets/).
  =============================================================================
-->
<style>
  :root{
    --pg:#f4f6fb; --card:#ffffff; --ink:#12261a; --sub:#5b7064; --line:#e4efe8;
    --bar:#0d3b23; --accent:#15803D; --tint:rgba(21,128,61,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.10); --radius:14px;
    --shadow:0 1px 2px rgba(16,37,68,.05),0 10px 26px rgba(16,45,30,.08);
  }
  html[data-theme="dark"]{
    --pg:#0a140e; --card:#132018; --ink:#e9f5ee; --sub:#9fbfae; --line:#213229;
    --bar:#07160d; --accent:#4ade80; --tint:rgba(74,222,128,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  .shell{max-width:940px;margin:0 auto;padding:14px 16px 34px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0 8px;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .head .meta{margin-bottom:0}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}
  .prog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 4px}
  .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;min-height:340px}
  .step-ico{width:44px;height:44px;border-radius:12px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  h1{font-size:clamp(20px,3.3vw,26px);margin:0 0 8px;font-weight:700;line-height:1.2}
  h2{font-size:15.5px;margin:18px 0 8px;font-weight:600}
  p{margin:0 0 12px}
  .lead{color:var(--sub);font-size:15px}
  ul,ol{margin:6px 0 12px;padding-left:20px}
  li{margin:5px 0}
  .pill{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:5px 11px;border-radius:999px;margin-bottom:10px}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:12px;margin:8px 0}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,160px),1fr));gap:12px;margin:8px 0}
  .box{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px}
  .box h3{margin:0 0 6px;font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:7px}
  .box p{margin:0;font-size:13px;color:var(--sub)}
  .box .ic{color:var(--accent)}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn.ghost{background:transparent;color:var(--accent)}
  .btn.on{outline:2px solid var(--accent);outline-offset:1px}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:0;cursor:pointer;padding:0}
  .dot.on{background:var(--accent);transform:scale(1.3)}
  .note{font-size:13px;color:var(--sub);border-left:3px solid var(--accent);background:var(--tint);padding:9px 12px;margin:12px 0;border-radius:0 8px 8px 0}
  .warn{border-left-color:var(--amber);color:var(--amber);background:var(--ambt)}
  .danger{border-left-color:var(--bad);color:var(--bad);background:var(--badt)}
  .good{border-left-color:var(--ok);color:var(--ink);background:var(--okt)}
  .good b{color:var(--ok)}
  .illus{position:relative;aspect-ratio:16/9;background:#0a1f14;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .illus svg{width:100%;height:100%}
  .illus canvas{width:100%;height:100%;display:block}
  .illus img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#0a1f14}
  .mcap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);margin:6px 2px 2px}
  .thumb{aspect-ratio:4/3}
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0}
  .tbl th,.tbl td{text-align:left;padding:8px 9px;border-bottom:1px solid var(--line)}
  .tbl th{color:var(--sub);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  .tbl td b{color:var(--accent)}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  .row{display:flex;align-items:center;gap:12px;margin:12px 0;flex-wrap:wrap}
  input[type=range]{flex:1;accent-color:var(--accent);min-width:140px}
  .val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;min-width:70px;text-align:right}
  .readout{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
  .stat{background:var(--pg);border:1px solid var(--line);border-radius:10px;padding:10px 14px;flex:1;min-width:110px}
  .stat b{display:block;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat span{font-size:11.5px;color:var(--sub)}
  .verdict{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-weight:700;font-size:15px}
  .verdict.ok{background:var(--okt);color:var(--ok)}
  .verdict.bad{background:var(--badt);color:var(--bad)}
  .chk{display:flex;gap:11px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:8px 0;cursor:pointer}
  .chk .bx{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;margin-top:1px}
  .chk.done .bx{background:var(--ok);border-color:var(--ok)}
  .chk.done .txt b{text-decoration:line-through;opacity:.7}
  .chk .txt b{font-size:13.5px}.chk .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .phase{border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden}
  .phase>h3{margin:0;font-size:14px;font-weight:700;background:var(--pg);padding:11px 13px;display:flex;gap:8px;align-items:center}
  .phase>h3 .n{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none}
  .phase .chk{border:0;border-top:1px solid var(--line);border-radius:0;margin:0;background:transparent}
  .abcd{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:10px;margin:8px 0}
  .ab{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .ab .l{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;font-weight:700;font-size:17px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
  .ab b{font-size:13.5px}.ab p{font-size:12px;color:var(--sub);margin:4px 0 0}
  .q{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
  .q h3{margin:0 0 10px;font-size:14px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 14px;border-radius:10px;margin:7px 0;cursor:pointer;font-size:14px;font-family:inherit}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad)}
  .opt:disabled{cursor:default}
  .score{font-size:16px;font-weight:700;text-align:center;padding:10px}
  @media(max-width:520px){ .card{padding:15px} .shell{padding:12px 12px 28px} .brand small{display:none} }
</style>
</head>

<div class="shell">
  <div class="head">
  <div class="top">
    <div class="brand">
      <span class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></span>
      <div><b id="brand"></b><small id="brandsub"></small></div>
    </div>

  </div>
  <div class="prog"><i id="progbar"></i></div>
  <div class="meta"><span id="mStep"></span><span id="mDur"></span></div>
  </div>

  <div class="card" id="card"></div>

  <div class="nav">
    <button class="btn ghost" id="prev"></button>
    <div class="dots" id="dots"></div>
    <button class="btn" id="next"></button>
  </div>
</div>

/* Fall arrest animation (tower + worker + SRL) */
function animFall(cv){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h, gen=_gen, start=performance.now();

  function frame(now){
    if(gen!==_gen) return;
    var t=((now-start)/1000)%3.4;
    sbg(ctx,w,h);
    /* tower legs */
    ctx.strokeStyle="#31513e"; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(tx-18,h*0.95); ctx.lineTo(tx,h*0.08); ctx.lineTo(tx+18,h*0.95); ctx.stroke();
    ctx.lineWidth=1.5; for(var yy=0.18;yy<0.95;yy+=0.14){ var y1=h*yy; var xw=18*(1-(0.08)/(yy)); ctx.beginPath(); ctx.moveTo(tx-18*(1-(yy-0.08)/0.9),y1); ctx.lineTo(tx+18*(1-(yy-0.08)/0.9),y1); ctx.stroke(); }

    ctx.fillStyle="#4ade80"; ctx.beginPath(); ctx.arc(ax,ay,4,0,7); ctx.fill();
    /* worker position: rest, fall, arrested */
    var wy, phase;
    if(t<1.2){ wy=h*0.42; phase=X("climbing (100% tied off)","subiendo (100% amarrado)"); }
    else if(t<1.7){ var p=(t-1.2)/0.5; wy=h*0.42+(h*0.66-h*0.42)*p; phase=X("FALL","CAÍDA"); }
    else { wy=h*0.66+Math.sin((t-1.7)*8)*2*(1-(t-1.7)); phase=X("ARRESTED by SRL","DETENIDO por SRL"); }

/* Fall clearance calculator */
function drawClear(cv,st){
  var g=fitCanvas(cv), ctx=g.ctx, w=g.w, h=g.h;
  sbg(ctx,w,h);
  var ff = st.conn==="srl"?2:6, dd=st.conn==="srl"?1:3.5, sf=3;
  var rfc = ff+dd+st.worker+sf;
  var pass = st.avail>=rfc;
  var maxft = Math.max(rfc, st.avail)+2;
  var top=h*0.12, bot=h*0.9, ppf=(bot-top)/maxft;
  var xA=w*0.28;

  ctx.strokeStyle="#31513e"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(w*0.05,bot); ctx.lineTo(w*0.95,bot); ctx.stroke();
  ctx.fillStyle="#7fb89a"; ctx.font="10px system-ui"; ctx.textAlign="left"; ctx.fillText(X("ground / next level","suelo / nivel inferior"), w*0.05, bot+14);

  ctx.fillText(X("working level / anchor","nivel de trabajo / anclaje"), w*0.05, top-4);

  ctx.strokeStyle="#f87171"; ctx.beginPath(); ctx.moveTo(xA+30,yR); ctx.lineTo(xA+95,yR); ctx.stroke();

  ctx.strokeStyle=pass?"#4ade80":"#f87171"; ctx.lineWidth=2.5; ctx.setLineDash([6,3]); ctx.beginPath(); ctx.moveTo(w*0.62,top); ctx.lineTo(w*0.62,yAv); ctx.stroke(); ctx.setLineDash([]);

    var ff=st.conn==="srl"?2:6, dd=st.conn==="srl"?1:3.5, rfc=ff+dd+st.worker+3, pass=st.avail>=rfc;
    $("wkv").textContent=st.worker.toFixed(1)+" ft"; $("avv").textContent=st.avail+" ft"; $("rfc").textContent=rfc.toFixed(1)+" ft";
    $("verd").innerHTML=pass?'<span class="verdict ok">✓ '+X("SAFE","SEGURO")+'</span>':'<span class="verdict bad">✕ '+X("NOT ENOUGH","INSUFICIENTE")+'</span>';
    if(cv) drawClear(cv,st); }
  $("bSrl").onclick=function(){ st.conn="srl"; this.classList.add("on"); $("bLan").classList.remove("on"); upd(); };

/* 11 inspect */
function s_inspect(){
  return tit("PPE inspection & retire","Inspección y retiro de EPP")+
    '<p class="lead">'+X("Inspect every piece before each use, and document formal inspections. Anything doubtful comes out of service.","Inspecciona cada pieza antes de cada uso y documenta inspecciones formales. Todo lo dudoso sale de servicio.")+'</p>'+
    '<ul><li>'+X("Harness/lanyard webbing: cuts, fraying, burns, UV fading, chemical stains.","Cintas de arnés/lanyard: cortes, deshilachado, quemaduras, decoloración UV, manchas químicas.")+'</li>'+
    '<li>'+X("Hardware: cracks, corrosion, deformation, sharp edges; gates snap shut.","Herrajes: grietas, corrosión, deformación, filos; compuertas cierran solas.")+'</li>'+
    '<li>'+X("SRL: lifeline pulls and retracts smoothly; locks when jerked; load indicator not tripped.","SRL: la línea sale y retrae suave; bloquea al jalón; indicador de carga sin activar.")+'</li>'+
    '<li>'+X("Labels and dates legible; within the manufacturer service life.","Etiquetas y fechas legibles; dentro de la vida útil del fabricante.")+'</li></ul>'+
    '<p class="note danger"><b>'+X("After ANY fall:","Tras CUALQUIER caída:")+'</b> '+X("remove the harness, lanyard/SRL and connectors from service. No exceptions.","retira arnés, lanyard/SRL y conectores de servicio. Sin excepciones.")+'</p>';

/* 12 rescue */
function s_rescue(){
  return tit("Rescue plan","Plan de rescate")+
    '<p class="lead">'+X("OSHA requires a rescue capability ON SITE before work starts. A suspended, injured worker cannot wait for 911 — suspension trauma can become dangerous within minutes.","OSHA exige capacidad de rescate EN EL SITIO antes de empezar. Un trabajador suspendido y lesionado no puede esperar al 911 — el trauma por suspensión puede volverse peligroso en minutos.")+'</p>'+
    imgSlot("rescue", G.rescue, "Tower rescue kit (controlled descent).","Kit de rescate en torre (descenso controlado).","thumb")+
    '<ul><li>'+X("A competent rescuer and rescue kit on site before anyone climbs.","Un rescatista competente y kit de rescate en el sitio antes de subir.")+'</li>'+
    '<li>'+X("Plan a prompt rescue — do not rely solely on emergency services.","Planea un rescate rápido — no dependas solo de los servicios de emergencia.")+'</li>'+
    '<li>'+X("Suspension trauma straps let a suspended worker relieve leg pressure.","Correas anti-trauma permiten al suspendido aliviar la presión en piernas.")+'</li>'+
    '<li>'+X("Practice the rescue for the specific tower type.","Practica el rescate para el tipo de torre específico.")+'</li></ul>'+
    '<p class="note danger">'+X("No rescue plan = no climb. Full stop.","Sin plan de rescate = no se sube. Punto.")+'</p>';
}
/* 13 RF */
function s_rf(){
  return tit("RF safety awareness","Seguridad RF")+
    '<p class="lead">'+X("Antennas transmit RF energy. Above the Maximum Permissible Exposure (MPE) it can heat body tissue. Exposure rises fast as you get close. Move the worker:","Las antenas transmiten energía RF. Por encima de la Exposición Máxima Permitida (MPE) puede calentar el tejido. La exposición sube rápido al acercarse. Mueve al trabajador:")+'</p>'+
    screen("rf","","")+
    '<div class="row"><span style="min-width:120px;font-size:13px;color:var(--sub)">'+X("Distance from antenna","Distancia a la antena")+'</span><input type="range" id="rd" min="5" max="100" value="70"><span class="val" id="rdv"></span></div>'+
    '<ul><li>'+X("Sign in with the carriers; request power-down / LOTO where needed.","Regístrate con los operadores; solicita apagado / LOTO donde haga falta.")+'</li>'+
    '<li>'+X("Wear a personal RF monitor that alarms near the limit.","Usa un monitor RF personal que alarme cerca del límite.")+'</li>'+
    '<li>'+X("Obey posted signs; keep distance and minimize time in front of antennas.","Obedece la señalización; guarda distancia y minimiza el tiempo frente a antenas.")+'</li></ul>';
}
function i_rf(){ var rd=$("rd"), cv=document.querySelector('#card .illus canvas');
  function upd(){ var d=+rd.value; $("rdv").textContent=d+"%"; if(cv) drawRf(cv, d/100); }
  rd.oninput=upd; if(cv){upd();} else upd();
}
/* 14 dropped */
function s_drop(){
  return tit("Dropped objects & tool tie-off","Objetos que caen y amarre de herramientas")+
    '<p class="lead">'+X("A small tool from height can kill someone below. Everything that goes up must be secured.","Una herramienta pequeña desde altura puede matar a alguien abajo. Todo lo que sube debe ir asegurado.")+'</p>'+
    '<ul><li>'+X("100% tool tie-off — tethers and tool bags rated for the load (ANSI/ISEA 121).","100% amarre de herramientas — cintas y bolsas con capacidad (ANSI/ISEA 121).")+'</li>'+
    '<li>'+X("Establish a drop zone / exclusion zone; no one underneath the work.","Establece zona de caída / exclusión; nadie debajo del trabajo.")+'</li>'+
    '<li>'+X("Hard hats (chin strap) for everyone on site; barricades and signage.","Cascos (con barbiquejo) para todos; barricadas y señalización.")+'</li>'+
    '<li>'+X("Raise/lower tools with a hand line or hoist, never toss or free-drop.","Sube/baja herramientas con cuerda o izaje, nunca las lances ni las sueltes.")+'</li></ul>'+
    '<p class="note warn">'+X("Empty your pockets of loose items before climbing.","Vacía tus bolsillos de objetos sueltos antes de subir.")+'</p>';
}
/* 15 weather */
function s_weather(){
  return tit("Weather","Clima")+
    '<div class="grid2">'+
      '<div class="box"><h3>'+X("Lightning","Rayos")+'</h3><p>'+X("30/30 rule: get down if thunder is within 30 s of lightning; wait 30 min after the last strike.","Regla 30/30: baja si el trueno llega en 30 s del rayo; espera 30 min tras el último.")+'</p></div>'+
      '<div class="box"><h3>'+X("Wind","Viento")+'</h3><p>'+X("Stop climbing at your employer wind limit (often ~30–40 mph). Wind rises with height.","Deja de subir al límite de tu empresa (a menudo ~30–40 mph). El viento sube con la altura.")+'</p></div>'+
      '<div class="box"><h3>'+X("Heat / cold","Calor / frío")+'</h3><p>'+X("Hydrate; watch heat illness. Cold reduces grip and dexterity.","Hidrátate; cuida el golpe de calor. El frío reduce agarre y destreza.")+'</p></div>'+
      '<div class="box"><h3>'+X("Ice / visibility","Hielo / visibilidad")+'</h3><p>'+X("No climbing on iced steel or in poor visibility.","No subas en acero con hielo ni con mala visibilidad.")+'</p></div>'+
    '</div>'+
    '<p class="note warn">'+X("When in doubt, come down. No job is worth a life.","Ante duda, baja. Ningún trabajo vale una vida.")+'</p>';
}
/* 16 rigging */
function s_rig(){
  return tit("Rigging & hoisting","Rigging e izaje")+
    '<p class="lead">'+X("Lifting materials on a tower is engineered work, governed by ANSI/ASSP A10.48 and TIA-322. Use rated gear and a plan.","Izar materiales en torre es trabajo de ingeniería, regido por ANSI/ASSP A10.48 y TIA-322. Usa equipo con capacidad y un plan.")+'</p>'+
    '<ul><li>'+X("Rated rigging (slings, blocks, gin pole, capstan) inspected before use.","Rigging con capacidad (eslingas, poleas, gin pole, cabrestante) inspeccionado.")+'</li>'+
    '<li>'+X("Never exceed the rigging plan / load chart; know the structure limits.","Nunca excedas el plan de izaje / tabla de cargas; conoce los límites de la estructura.")+'</li>'+
    '<li>'+X("Tag lines to control the load; keep out of the fall/drop zone.","Vientos (tag lines) para controlar la carga; fuera de la zona de caída.")+'</li>'+
    '<li>'+X("A qualified rigger/engineer signs off complex lifts.","Un rigger/ingeniero calificado aprueba izajes complejos.")+'</li></ul>'+
    '<p class="note">'+X("Structural analysis first: a tower can be overloaded by rigging or new appurtenances.","Análisis estructural primero: una torre puede sobrecargarse por el izaje o nuevos apéndices.")+'</p>';
}

var CHK=[
  {en:"Certifications current; ID cards on site.",es:"Certificaciones vigentes; credenciales en el sitio."},
  {en:"JHA, EAP and rescue plan reviewed by the crew.",es:"JHA, EAP y plan de rescate revisados por la cuadrilla."},
  {en:"Competent rescuer + rescue kit on site.",es:"Rescatista competente + kit de rescate en el sitio."},
  {en:"Weather within limits; structure OK to climb.",es:"Clima dentro de límites; estructura apta."},
  {en:"RF: signed in, power-down/LOTO coordinated, monitor on.",es:"RF: registrado, apagado/LOTO coordinado, monitor encendido."},
  {en:"PPE complete and inspected (harness, connectors, helmet…).",es:"EPP completo e inspeccionado (arnés, conectores, casco…)."},
  {en:"Tools tethered; drop zone set below.",es:"Herramientas amarradas; zona de caída abajo."},
  {en:"2-person crew minimum; comms working.",es:"Cuadrilla mínima de 2; comunicaciones funcionando."}
];
function s_check(){
  var items=CHK.map(function(c,i){return '<div class="chk" data-i="'+i+'"><span class="bx">✓</span><span class="txt"><b>'+X(c.en,c.es)+'</b></span></div>';}).join("");
  return tit("Pre-climb checklist & best practices","Checklist previo y mejores prácticas")+
    '<p class="lead">'+X("Run this every time. Tap each item.","Hazlo siempre. Toca cada punto.")+'</p>'+items+'<p class="note" id="chkMsg"></p>';

function i_check(){ var total=CHK.length; function upd(){ var d=document.querySelectorAll(".chk.done").length; $("chkMsg").textContent=d<total?(X("Checked: ","Verificados: ")+d+"/"+total):X("All clear — safe to climb.","Todo listo — seguro para subir."); } document.querySelectorAll(".chk").forEach(function(c){ c.onclick=function(){ c.classList.toggle("done"); upd(); }; }); upd(); }
/* 18 emergency */
function s_emerg(){
  return tit("Emergency response","Respuesta a emergencias")+
    '<p class="lead">'+X("If something goes wrong, seconds count. Everyone must know the plan before the climb.","Si algo sale mal, los segundos cuentan. Todos deben conocer el plan antes de subir.")+'</p>'+
    '<ul><li>'+X("Know the exact site address and gate/lat-long for responders.","Conoce la dirección exacta y coordenadas del sitio para los rescatistas.")+'</li>'+
    '<li>'+X("Nearest hospital and route identified before climbing.","Hospital más cercano y ruta identificados antes de subir.")+'</li>'+
    '<li>'+X("First aid kit + AED on site; charged radios/phones.","Botiquín + DEA en el sitio; radios/teléfonos cargados.")+'</li>'+
    '<li>'+X("Ground person initiates rescue and calls 911 in parallel.","La persona en tierra inicia el rescate y llama al 911 en paralelo.")+'</li>'+
    '<li>'+X("Account for everyone; establish a muster point.","Verifica a todos; establece un punto de reunión.")+'</li></ul>'+
    '<p class="note good"><b>'+X("Best practice:","Mejor práctica:")+'</b> '+X("brief the EAP out loud during the pre-job meeting, every day.","repasa el EAP en voz alta en la reunión previa, cada día.")+'</p>';
}
/* 19 quiz */
var QUIZ=[
  {en:"What is the #1 cause of death in tower work?",es:"¿Causa #1 de muerte en trabajo en torres?",o_en:["Heat","Falls","RF","Noise"],o_es:["Calor","Caídas","RF","Ruido"],a:1},
  {en:"Anchor points must support at least…",es:"Los anclajes deben resistir al menos…",o_en:["500 lbf","5,000 lbf per worker","50 lbf","No requirement"],o_es:["500 lbf","5,000 lbf por trabajador","50 lbf","Sin requisito"],a:1},
  {en:"Before anyone climbs, the site must have…",es:"Antes de que alguien suba, el sitio debe tener…",o_en:["Only a phone","A rescue plan + competent rescuer","Nothing","Just a harness"],o_es:["Solo un teléfono","Plan de rescate + rescatista competente","Nada","Solo un arnés"],a:1},
  {en:"After a harness arrests a fall, you should…",es:"Tras detener una caída, el arnés debe…",o_en:["Keep using it","Remove it from service","Wash it","Lend it"],o_es:["Seguir usándolo","Retirarlo de servicio","Lavarlo","Prestarlo"],a:1},
  {en:"The lightning rule is…",es:"La regla de rayos es…",o_en:["10/10","30/30","5/5","60/60"],o_es:["10/10","30/30","5/5","60/60"],a:1},
  {en:"Which needs LESS fall clearance?",es:"¿Qué necesita MENOS distancia de caída?",o_en:["6-ft lanyard","SRL","No difference","A rope"],o_es:["Lanyard de 6 ft","SRL","Sin diferencia","Una cuerda"],a:1},
  {en:"RF exposure as you approach an antenna…",es:"La exposición RF al acercarte a una antena…",o_en:["Drops","Rises quickly","Stays flat","Disappears"],o_es:["Baja","Sube rápido","Se mantiene","Desaparece"],a:1}
];
function s_quiz(){
  var qs=QUIZ.map(function(q,i){var opts=(LANG==="es"?q.o_es:q.o_en).map(function(o,j){return '<button class="opt" data-q="'+i+'" data-o="'+j+'">'+o+'</button>';}).join("");return '<div class="q"><h3>'+(i+1)+'. '+X(q.en,q.es)+'</h3>'+opts+'</div>';}).join("");
  return tit("Quiz","Evaluación")+'<p class="lead">'+X("7 safety questions.","7 preguntas de seguridad.")+'</p>'+qs+'<div class="score" id="score"></div>';
}
function i_quiz(){ var answered={}, correct=0; document.querySelectorAll(".opt").forEach(function(b){ b.onclick=function(){ var qi=+b.dataset.q; if(answered[qi])return; answered[qi]=1; var a=QUIZ[qi].a; document.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(function(x){ x.disabled=true; if(+x.dataset.o===a)x.classList.add("correct"); }); if(+b.dataset.o===a)correct++; else b.classList.add("wrong"); if(Object.keys(answered).length===QUIZ.length){ $("score").textContent=X("Score: ","Puntaje: ")+correct+"/"+QUIZ.length+(correct>=6?X(" · Passed"," · Aprobado"):X(" · Review"," · Repasa")); } }; }); }

function s_end(){
  return tit("Wrap-up","Cierre")+
    '<ul><li>'+X("100% tie-off at all times — falls are the #1 killer.","100% amarrado siempre — las caídas son la causa #1.")+'</li>'+

    '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px"><span class="verdict ok">✓ '+X("Training completed","Entrenamiento completado")+'</span><a class="btn ghost" href="../index.html" target="_top">'+X("Back to portal","Volver al portal")+'</a></div>';

/* ===== Engine ===== */
function pintarChrome(){
  document.documentElement.lang=LANG;
  $("brand").textContent=X("Tower Safety","Seguridad en Torres");
  $("brandsub").textContent=X("Safety · OSHA + Crown Castle","Seguridad · OSHA + Crown Castle");
  $("homeTxt").textContent=X("Home","Inicio");
  document.querySelectorAll("#lang button").forEach(function(b){ b.classList.toggle("on", b.dataset.l===LANG); });
  var dark=document.documentElement.getAttribute("data-theme")==="dark";
  $("temaIco").innerHTML=dark?I.sun:I.moon; $("temaTxt").textContent=dark?X("Light","Claro"):X("Dark","Oscuro");
  $("prev").innerHTML="‹ "+X("Back","Anterior");
  $("next").innerHTML=(cur>=STEPS.length-1?X("Restart","Reiniciar"):X("Next","Siguiente")+" ›");
}
function render(){
  stopAnim();
  pintarChrome();
  var s=STEPS[cur];
  $("card").innerHTML=s.b();
  if(s.i) s.i();
  initCanvases();
  $("progbar").style.width=((cur+1)/STEPS.length*100)+"%";
  $("mStep").textContent=X("Step ","Paso ")+(cur+1)+" / "+STEPS.length+" · "+X(s.t[0],s.t[1]);
  $("mDur").textContent="≈ 9 min";
  $("prev").disabled=(cur===0);
  $("dots").innerHTML=STEPS.map(function(_,i){return '<button class="dot'+(i===cur?' on':'')+'" data-i="'+i+'" aria-label="'+(i+1)+'"></button>';}).join("");
  document.querySelectorAll(".dot").forEach(function(d){ d.onclick=function(){ cur=+d.dataset.i; render(); }; });
  window.scrollTo(0,0);
}
$("prev").onclick=function(){ if(cur>0){cur--;render();} };
$("next").onclick=function(){ cur=(cur>=STEPS.length-1)?0:cur+1; render(); };
document.querySelectorAll("#lang button").forEach(function(b){ b.onclick=function(){ LANG=b.dataset.l; render(); }; });
$("tema").onclick=function(){ var d=document.documentElement.getAttribute("data-theme")==="dark"; document.documentElement.setAttribute("data-theme", d?"light":"dark"); pintarChrome(); };
render();
</script>
