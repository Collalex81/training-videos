<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome — How to use this training platform</title>
<!--
  INDUCCIÓN (morado) — Módulo de bienvenida: cómo usar la plataforma de entrenamiento.
  ONBOARDING (purple) — Welcome module: how to use the training platform.
  Bilingüe EN/ES (EN por defecto), tema claro/oscuro, navegación por secciones + dots.
  Self-contained. Motor de diseño alineado al proyecto.
-->
<style>
  :root{
    --pg:#f5f3fc; --card:#ffffff; --ink:#1c1030; --sub:#5c5378; --line:#e7e1f3;
    --accent:#7c3aed; --tint:rgba(124,58,237,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10);
    --seg:#15803D; --tel:#2563EB; --ele:#b45309; --con:#ea580c; --ind:#7c3aed;
    --radius:16px; --shadow:0 1px 2px rgba(28,16,48,.05),0 10px 26px rgba(28,16,48,.10);
  }
  html[data-theme="dark"]{
    --pg:#0e0a1a; --card:#181228; --ink:#efeaff; --sub:#a99fc6; --line:#2a2140;
    --accent:#a78bfa; --tint:rgba(167,139,250,.15);
    --ok:#4ade80; --okt:rgba(74,222,128,.14);
    --seg:#4ade80; --tel:#4d8bff; --ele:#fbbf24; --con:#fb923c; --ind:#a78bfa;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  a{color:inherit;text-decoration:none}
  .shell{max-width:820px;margin:0 auto;padding:14px 18px 40px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#4c1d95);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:700;display:block;line-height:1.15}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}

  /* progress dots */
  .dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:14px 0 6px}
  .dots button{width:9px;height:9px;border-radius:50%;border:0;background:var(--line);cursor:pointer;padding:0}
  .dots button.on{background:var(--accent);transform:scale(1.25)}
  .counter{text-align:center;font-size:12px;color:var(--sub);margin-bottom:12px}

  .slide{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 24px;min-height:340px}
  .kicker{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:4px 11px;border-radius:999px;margin-bottom:14px}
  .slide h1{font-size:clamp(21px,3.4vw,27px);margin:0 0 10px;font-weight:800;line-height:1.15}
  .slide p{font-size:15px;color:var(--sub);margin:0 0 14px;max-width:640px}
  .slide p.big{font-size:16px;color:var(--ink)}
  .hero-ic{width:60px;height:60px;border-radius:16px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:16px}

  .rows{display:flex;flex-direction:column;gap:10px;margin:6px 0 4px}
  .rw{display:flex;gap:12px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .rw .ic{width:34px;height:34px;border-radius:9px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;flex:none}
  .rw b{font-size:14.5px} .rw span{display:block;font-size:13px;color:var(--sub);margin-top:2px}

  .areas{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:10px;margin-top:6px}
  .area{border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--pg)}
  .area .d{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle}
  .area b{font-size:13.5px;vertical-align:middle}
  .area span{display:block;font-size:12px;color:var(--sub);margin-top:5px}

  .steps{counter-reset:s;display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .step{position:relative;padding-left:42px;min-height:30px}
  .step:before{counter-increment:s;content:counter(s);position:absolute;left:0;top:0;width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center}
  .step b{font-size:14.5px} .step span{display:block;font-size:13px;color:var(--sub);margin-top:1px}

  .callout{display:flex;gap:11px;align-items:flex-start;border-left:3px solid var(--accent);background:var(--tint);border-radius:0 10px 10px 0;padding:12px 14px;margin-top:14px;font-size:13.5px}
  .callout .ic{color:var(--accent);flex:none;margin-top:1px}

  .cta{display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#fff;border:0;cursor:pointer;padding:13px 22px;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;text-decoration:none;margin-top:8px}

  /* nav */
  .nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:16px}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;padding:11px 18px;border-radius:11px;font-size:14px;font-weight:600;font-family:inherit;min-height:44px;display:inline-flex;align-items:center;gap:8px}
  .btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{color:#fff;opacity:.94}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .foot{margin-top:22px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--sub);text-align:center}
  @media(max-width:520px){ .shell{padding:12px 12px 30px} .slide{padding:20px 16px} }
</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <div class="top">
      <div class="brand">
        <span class="logo"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 16l9 5 9-5"/></svg></span>
        <div><b id="brand"></b><small id="brandsub"></small></div>
      </div>
      <div class="tools">
        <a class="tbtn" id="home" href="../index.html" target="_top"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg><span id="homeTxt"></span></a>
        <button class="tbtn" id="tema"><span id="temaIco"></span><span id="temaTxt"></span></button>
        <div class="lang" id="lang"><button data-l="en">EN</button><button data-l="es">ES</button></div>
      </div>
    </div>
  </div>

  <div class="dots" id="dots"></div>
  <div class="counter" id="counter"></div>

  <div class="slide" id="slide"></div>

  <div class="nav">
    <button class="btn" id="prev"></button>
    <button class="btn primary" id="next"></button>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
(function(){
  function $(id){ return document.getElementById(id); }
  var LS_LANG="fot_lang", LS_THEME="fot_theme"; // comparte preferencia si existe
  function get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  var LANG = (get(LS_LANG)==="es"||get(LS_LANG)==="en") ? get(LS_LANG) : "en";
  var THEME = (get(LS_THEME)==="dark"||get(LS_THEME)==="light") ? get(LS_THEME) : "light";
  function X(en,es){ return LANG==="es"?es:en; }

  var ICO={
    sun:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    moon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    wave:'<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11V6a1.5 1.5 0 0 1 3 0v4"/><path d="M10 10V4.5a1.5 1.5 0 0 1 3 0V10"/><path d="M13 10V5.5a1.5 1.5 0 0 1 3 0V12"/><path d="M16 11.5V8a1.5 1.5 0 0 1 3 0v6a6 6 0 0 1-6 6h-1.5a5 5 0 0 1-4-2l-3-4a1.6 1.6 0 0 1 2.5-2l1.5 1.5"/></svg>',
    grid:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
    book:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
    play:'<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
    arrowR:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
    arrowL:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>',
    check:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    info:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>',
    tools:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0 5 5l-8.4 8.4a2 2 0 0 1-2.8-2.8z"/><path d="M7 7l3 3"/></svg>',
    id:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="12" r="2.4"/><path d="M14 10h4M14 14h4M5.5 16.5a3.5 3.5 0 0 1 7 0"/></svg>',
    bulb:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.7.7 1 1.3 1 2.5h6c0-1.2.3-1.8 1-2.5A6 6 0 0 0 12 3z"/></svg>'
  };

  // ---------- slides ----------
  var SLIDES = [
    // 0 — welcome
    function(){ return ''+
      '<span class="kicker">'+X("Onboarding","Inducción")+'</span>'+
      '<div class="hero-ic">'+ICO.wave+'</div>'+
      '<h1>'+X("Welcome to the training platform","Bienvenido a la plataforma de entrenamiento")+'</h1>'+
      '<p class="big">'+X("This is a bilingual (English/Spanish) training portal for field technicians and engineers. It gathers short videos and hands-on interactive modules, organized by work area, plus a full fiber-optic program with quizzes and a certificate.",
                        "Este es un portal de entrenamiento bilingüe (inglés/español) para técnicos e ingenieros de campo. Reúne videos cortos y módulos interactivos prácticos, organizados por área de trabajo, más un programa completo de fibra óptica con evaluaciones y certificado.")+'</p>'+
      '<p>'+X("This short guide shows you how everything works. Use Next to move through it — it takes about two minutes.",
              "Esta guía corta te muestra cómo funciona todo. Usa Siguiente para avanzar — toma unos dos minutos.")+'</p>'; },

    // 1 — areas / gallery
    function(){ return ''+
      '<span class="kicker">'+X("The gallery","La galería")+'</span>'+
      '<h1>'+X("Everything is organized by work area","Todo está organizado por área de trabajo")+'</h1>'+
      '<p>'+X("On the home page each card is a module. The colored accent tells you which area it belongs to. Use the EN / ES switch at the top to change language at any time — it is remembered.",
              "En la página principal cada tarjeta es un módulo. El color de acento indica a qué área pertenece. Usa el interruptor EN / ES de arriba para cambiar el idioma en cualquier momento — se recuerda.")+'</p>'+
      '<div class="areas">'+
        area("--seg", X("Safety","Seguridad"), X("Towers, LOTO, tool tethering","Torres, LOTO, amarre de herramientas"))+
        area("--tel", X("Telecom","Telecom"), X("Fiber, PIM, coax sweep, grounding","Fibra, PIM, barrido coax, tierra"))+
        area("--ele", X("Electrical","Electricidad"), X("Multimeter, DC/AC, -48V","Multímetro, DC/AC, -48V"))+
        area("--con", X("Construction","Construcción"), X("Aerial lifts (MEWP)","Plataformas (MEWP)"))+
        area("--ind", X("Onboarding","Inducción"), X("This guide, Fieldclix app","Esta guía, app Fieldclix"))+
      '</div>'; },

    // 2 — how a module works
    function(){ return ''+
      '<span class="kicker">'+X("Inside a module","Dentro de un módulo")+'</span>'+
      '<h1>'+X("How each module works","Cómo funciona cada módulo")+'</h1>'+
      '<div class="rows">'+
        row(ICO.play, X("Move at your pace","Avanza a tu ritmo"), X("Use the Next / Previous buttons and the dots to move between sections.","Usa los botones Siguiente / Anterior y los puntos para moverte entre secciones."))+
        row(ICO.grid, X("Interactive animations","Animaciones interactivas"), X("Many modules include analyzer-style animations, calculators and diagrams you can play with.","Muchos módulos incluyen animaciones tipo analizador, calculadoras y diagramas con los que puedes interactuar."))+
        row(ICO.sun, X("Light or dark","Claro u oscuro"), X("Tap the theme button to switch between light and dark; it is remembered too.","Toca el botón de tema para cambiar entre claro y oscuro; también se recuerda."))+
        row(ICO.check, X("Quick quizzes","Evaluaciones rápidas"), X("Some modules end with a short quiz so you can check what you learned.","Algunos módulos terminan con una evaluación corta para comprobar lo aprendido."))+
      '</div>'; },

    // 3 — fiber platform
    function(){ return ''+
      '<span class="kicker">'+X("Featured program","Programa destacado")+'</span>'+
      '<h1>'+X("The Fiber Optic Training program","El programa de Entrenamiento de Fibra Óptica")+'</h1>'+
      '<p>'+X("In the Telecom area you will find a full 5-module program that works like a course, not a single clip:",
              "En el área de Telecom encontrarás un programa completo de 5 módulos que funciona como un curso, no como un clip suelto:")+'</p>'+
      '<div class="rows">'+
        row(ICO.check, X("Progressive unlocking","Desbloqueo progresivo"), X("Each module unlocks when you pass the previous quiz with 80% or more.","Cada módulo se desbloquea cuando apruebas la evaluación anterior con 80% o más."))+
        row(ICO.grid, X("Progress dashboard","Panel de progreso"), X("A dashboard tracks your modules, scores and overall progress.","Un panel registra tus módulos, notas y progreso general."))+
        row(ICO.book, X("Final exam & certificate","Examen final y certificado"), X("After the 5 modules, a cumulative final exam issues a printable certificate.","Tras los 5 módulos, un examen final acumulativo emite un certificado imprimible."))+
      '</div>'; },

    // 4 — labs & glossary
    function(){ return ''+
      '<span class="kicker">'+X("Practice & reference","Práctica y referencia")+'</span>'+
      '<h1>'+X("Labs and glossary","Laboratorios y glosario")+'</h1>'+
      '<div class="rows">'+
        row(ICO.tools, X("Hands-on labs","Laboratorios prácticos"), X("Field-realistic simulators (OTDR, optical budget, connector inspection, troubleshooting). Each has a free Sandbox and a Scenarios mode that injects real faults and coaches your reasoning.","Simuladores realistas de campo (OTDR, presupuesto óptico, inspección de conectores, troubleshooting). Cada uno tiene un Sandbox libre y un modo Escenarios que inyecta fallas reales y guía tu razonamiento."))+
        row(ICO.book, X("Searchable glossary","Glosario con buscador"), X("A bilingual glossary of key fiber terms you can search or filter by topic.","Un glosario bilingüe de términos clave de fibra que puedes buscar o filtrar por tema."))+
      '</div>'+
      '<div class="callout"><span class="ic">'+ICO.info+'</span><span>'+
        X("Labs are ungraded on purpose — the goal is exploration and critical thinking, not a passing score.",
          "Los laboratorios no se califican a propósito — el objetivo es explorar y pensar críticamente, no sacar una nota.")+'</span></div>'; },

    // 5 — account & progress
    function(){ return ''+
      '<span class="kicker">'+X("Your account","Tu cuenta")+'</span>'+
      '<h1>'+X("Register and save your progress","Regístrate y guarda tu progreso")+'</h1>'+
      '<div class="steps">'+
        step(X("Enter your name and email","Escribe tu nombre y email"), X("On the Fiber program dashboard you register once with your full name and a valid email.","En el panel del programa de Fibra te registras una vez con tu nombre completo y un email válido."))+
        step(X("Your progress is saved as you go","Tu progreso se guarda mientras avanzas"), X("Scores, completed modules and your last lesson are stored so you can continue where you left off.","Las notas, los módulos completados y tu última lección se guardan para continuar donde lo dejaste."))+
        step(X("Your certificate carries your name and email","Tu certificado lleva tu nombre y email"), X("When you pass the final exam, the certificate is issued with your details.","Cuando apruebas el examen final, el certificado se emite con tus datos."))+
      '</div>'+
      '<div class="callout"><span class="ic">'+ICO.info+'</span><span>'+
        X("Progress is saved in the browser on the device you use. To continue later, use the same device and browser. Your name and email may also be recorded for your employer's training records.",
          "El progreso se guarda en el navegador del dispositivo que uses. Para continuar después, usa el mismo dispositivo y navegador. Tu nombre y email también pueden registrarse para el control de capacitación de tu empleador.")+'</span></div>'; },

    // 6 — tips
    function(){ return ''+
      '<span class="kicker">'+X("Good to know","Bueno saber")+'</span>'+
      '<h1>'+X("A few tips","Algunos consejos")+'</h1>'+
      '<div class="rows">'+
        row(ICO.grid, X("Works on phone and computer","Funciona en teléfono y computadora"), X("Everything is responsive — buttons are tappable and there is no sideways scrolling on mobile.","Todo es responsivo — los botones son tocables y no hay scroll horizontal en móvil."))+
        row(ICO.id, X("Use a modern browser","Usa un navegador moderno"), X("Chrome, Edge, Safari or Firefox, kept up to date, give the best experience.","Chrome, Edge, Safari o Firefox, actualizados, dan la mejor experiencia."))+
        row(ICO.bulb, X("Take your time","Tómate tu tiempo"), X("There is no clock on the learning modules. Re-open a module any time to review.","No hay reloj en los módulos de aprendizaje. Reabre un módulo cuando quieras para repasar."))+
      '</div>'; },

    // 7 — start
    function(){ return ''+
      '<span class="kicker">'+X("You are ready","Estás listo")+'</span>'+
      '<div class="hero-ic">'+ICO.check+'</div>'+
      '<h1>'+X("That's it — start learning","Eso es todo — empieza a aprender")+'</h1>'+
      '<p class="big">'+X("Head back to the gallery, pick an area and open your first module. If this is your first time, the Fiber Optic Training program is a great place to start.",
                        "Vuelve a la galería, elige un área y abre tu primer módulo. Si es tu primera vez, el programa de Entrenamiento de Fibra Óptica es un gran punto de partida.")+'</p>'+
      '<a class="cta" href="../index.html" target="_top">'+ICO.play+' '+X("Go to the gallery","Ir a la galería")+'</a>'; }
  ];

  function area(varname, name, desc){
    return '<div class="area"><span class="d" style="background:var('+varname+')"></span>'+
           '<b>'+name+'</b><span>'+desc+'</span></div>';
  }
  function row(ic, title, desc){
    return '<div class="rw"><span class="ic">'+ic+'</span><div><b>'+title+'</b><span>'+desc+'</span></div></div>';
  }
  function step(title, desc){
    return '<div class="step"><b>'+title+'</b><span>'+desc+'</span></div>';
  }

  var idx=0;

  function applyTheme(){ document.documentElement.setAttribute("data-theme",THEME);
    $("temaIco").innerHTML=THEME==="dark"?ICO.sun:ICO.moon;
    $("temaTxt").textContent=THEME==="dark"?X("Light","Claro"):X("Dark","Oscuro"); }

  function renderDots(){
    var h="";
    for(var i=0;i<SLIDES.length;i++){ h+='<button data-i="'+i+'" class="'+(i===idx?"on":"")+'" aria-label="'+(i+1)+'"></button>'; }
    $("dots").innerHTML=h;
    $("dots").querySelectorAll("button").forEach(function(b){
      b.onclick=function(){ idx=+b.getAttribute("data-i"); render(); };
    });
  }

  function render(){
    applyTheme(); document.documentElement.lang=LANG;
    $("brand").textContent=X("Welcome","Bienvenida");
    $("brandsub").textContent=X("How to use this platform","Cómo usar esta plataforma");
    $("homeTxt").textContent=X("Gallery","Galería");
    $("lang").querySelectorAll("button").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-l")===LANG); });

    renderDots();
    $("counter").textContent=X("Step","Paso")+" "+(idx+1)+" / "+SLIDES.length;
    $("slide").innerHTML=SLIDES[idx]();

    $("prev").innerHTML=ICO.arrowL+" "+X("Back","Atrás");
    $("prev").disabled = idx===0;
    var last = idx===SLIDES.length-1;
    $("next").innerHTML = last ? (X("Finish","Terminar")+" "+ICO.check) : (X("Next","Siguiente")+" "+ICO.arrowR);

    $("foot").textContent=X("Onboarding · you can reopen this guide any time from the gallery.",
                            "Inducción · puedes reabrir esta guía en cualquier momento desde la galería.");
    window.scrollTo(0,0);
  }

  // nav events
  $("prev").onclick=function(){ if(idx>0){ idx--; render(); } };
  $("next").onclick=function(){ if(idx<SLIDES.length-1){ idx++; render(); }
    else { window.top.location.href="../index.html"; } };
  document.addEventListener("keydown",function(e){
    if(e.key==="ArrowRight"){ if(idx<SLIDES.length-1){ idx++; render(); } }
    else if(e.key==="ArrowLeft"){ if(idx>0){ idx--; render(); } }
  });
  $("tema").onclick=function(){ THEME=THEME==="dark"?"light":"dark"; set(LS_THEME,THEME); render(); };
  $("lang").querySelectorAll("button").forEach(function(b){
    b.onclick=function(){ LANG=b.getAttribute("data-l"); set(LS_LANG,LANG); render(); };
  });

  render();
})();
</script>
<script src="../assets/narration.js"></script>
</body>
</html>
