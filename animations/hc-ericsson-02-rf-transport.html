<title>HC Ericsson 2 — RF &amp; Transport Health / RF y transporte</title>
<!--
  TELECOM (azul) — Leer un Health Check de nodo RAN Ericsson. Módulo 2 de 3.
  TELECOM (blue) — Reading an Ericsson RAN node Health Check report. Module 2 of 3.
  Alcance / Scope: RADIO INFO (RRU inventory), RiLink/CPRI fronthaul, LIGHT LEVEL INFO (SFP optics),
  VSWR / return loss, antennas / MIMO branches, TX power, 5G uplink interference.
  Fuentes / Sources: Ericsson RAN CPI (radio / RiLink / VSWR supervision descriptions), general RF/VSWR theory,
  IEC 61300-3-35 fiber inspection practice, SFP/CPRI optical link concepts. Datos de ejemplo / sample excerpts.
  Motor reutilizado de / Engine reused from: animations/grounding-bonding-cell-sites.html. Bilingüe EN/ES (EN por defecto).
-->
<style>
  :root{
    --pg:#f3f6fc; --card:#ffffff; --ink:#0c1c34; --sub:#51618a; --line:#dde5f3;
    --bar:#0b2e59; --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.12); --radius:14px;
    --shadow:0 1px 2px rgba(12,28,52,.05),0 10px 26px rgba(12,28,52,.08);
  }
  html[data-theme="dark"]{
    --pg:#0a1120; --card:#141d30; --ink:#e9f0ff; --sub:#9db0d6; --line:#243149;
    --bar:#0a1526; --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  .shell{max-width:940px;margin:0 auto;padding:14px 16px 34px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0 8px;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}
  .prog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 4px}
  .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;min-height:360px}
  .step-ico{width:44px;height:44px;border-radius:12px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  h1{font-size:clamp(20px,3.3vw,26px);margin:0 0 8px;font-weight:700;line-height:1.2}
  h2{font-size:15.5px;margin:16px 0 8px;font-weight:600}
  p{margin:0 0 12px}
  .lead{color:var(--sub);font-size:15px}
  ul,ol{margin:6px 0 12px;padding-left:20px}
  li{margin:6px 0}
  .pill{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:5px 11px;border-radius:999px;margin-bottom:10px}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:12px;margin:8px 0}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:12px;margin:8px 0}
  .box{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px}
  .box h3{margin:0 0 6px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
  .box p{margin:0;font-size:12.5px;color:var(--sub)}
  .num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:var(--accent);color:#fff;font-weight:800;font-size:14px;flex:none}
  .stat3{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0}
  .stat3 .s{flex:1;min-width:120px;background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;text-align:center}
  .stat3 .s b{display:block;font-size:24px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
  .stat3 .s span{font-size:12px;color:var(--sub)}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn.ghost{background:transparent;color:var(--accent)}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:0;cursor:pointer;padding:0}
  .dot.on{background:var(--accent);transform:scale(1.3)}
  .note{font-size:13px;color:var(--sub);border-left:3px solid var(--accent);background:var(--tint);padding:9px 12px;margin:12px 0;border-radius:0 8px 8px 0}
  .warn{border-left-color:var(--amber);color:var(--amber);background:var(--ambt)}
  .bad{border-left-color:var(--bad);color:var(--bad);background:var(--badt)}
  .good{border-left-color:var(--ok);color:var(--ink);background:var(--okt)}
  .good b{color:var(--ok)}
  .illus{position:relative;aspect-ratio:16/10;background:#071120;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .illus svg{width:100%;height:100%}
  .mcap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);margin:8px 2px 2px;justify-content:center}
  .steps .st{display:flex;gap:12px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:7px 0}
  .steps .st .txt b{font-size:13.5px}.steps .st .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .chk{display:flex;gap:11px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:8px 0;cursor:pointer}
  .chk .bx{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;margin-top:1px}
  .chk.done .bx{background:var(--ok);border-color:var(--ok)}
  .chk.done .txt b{text-decoration:line-through;opacity:.7}
  .chk .txt b{font-size:13.5px}.chk .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .row{display:flex;align-items:center;gap:12px;margin:10px 0;flex-wrap:wrap}
  .row span.lbl{min-width:120px;font-size:13px;color:var(--sub)}
  input[type=range]{flex:1;accent-color:var(--accent)}
  .val{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;min-width:80px;text-align:right}
  .q{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
  .q h3{margin:0 0 10px;font-size:14px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 14px;border-radius:10px;margin:7px 0;cursor:pointer;font-size:14px;font-family:inherit}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad)}
  .opt:disabled{cursor:default}
  .score{font-size:16px;font-weight:700;text-align:center;padding:10px}
  .verdict{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-weight:700;font-size:15px}
  .verdict.ok{background:var(--okt);color:var(--ok)}
  .verdict.no{background:var(--badt);color:var(--bad)}
  .ref{font-size:12.5px;color:var(--sub);border-bottom:1px solid var(--line);padding:8px 0}
  .ref b{color:var(--ink)}
  /* monospace report console */
  .console{background:#0a0f1c;border:1px solid #21304d;border-radius:11px;margin:12px 0;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
  .console .bar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#0d1526;border-bottom:1px solid #21304d}
  .console .bar i{width:10px;height:10px;border-radius:50%;display:inline-block}
  .console .bar .t{margin-left:8px;font-size:11px;color:#7891bd;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.02em}
  .console pre{margin:0;padding:12px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.65;color:#c3d0e6;overflow-x:auto;white-space:pre}
  .console .k{color:#7dd3fc}
  .console .ok{color:#4ade80;font-weight:600}
  .console .bad{color:#f87171;font-weight:600}
  .console .warn{color:#fbbf24;font-weight:600}
  .console .dim{color:#64748b}
  .console .hl{color:#f1f5ff;font-weight:600}
  .console .mag{color:#c084fc}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
  .legend span{font-size:11.5px;color:var(--sub);display:inline-flex;align-items:center;gap:5px;background:var(--pg);border:1px solid var(--line);border-radius:999px;padding:4px 10px}
  .legend b{font-family:ui-monospace,monospace}
  .tag{display:inline-block;font-family:ui-monospace,monospace;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
  .tag.g{color:#15803D;background:rgba(21,128,61,.12)}
  .tag.r{color:#dc2626;background:rgba(220,38,38,.12)}
  .tag.a{color:#b45309;background:rgba(180,83,9,.14)}
  .tag.b{color:#2563EB;background:rgba(37,99,235,.12)}
  @media(max-width:520px){ .card{padding:15px} .shell{padding:12px 12px 28px} .brand small{display:none} .console pre{font-size:11px} }
</style>
</head>

/* ---- scenario builder (excerpt -> question -> feedback -> retry/next) ---- */
function scen(cfg){
  return { ico:cfg.ico, t:cfg.t, b:function(){
      var opts=cfg.opts.map(function(o,j){ return '<button class="opt" data-o="'+j+'">'+X(o.en,o.es)+'</button>'; }).join("");
      return tit(cfg.tEn,cfg.tEs)+
        '<span class="pill">'+X("Diagnosis scenario","Escenario de diagnóstico")+'</span>'+
        '<p class="lead">'+X(cfg.pEn,cfg.pEs)+'</p>'+
        cfg.excerpt()+
        '<div class="q"><h3>'+X(cfg.qEn,cfg.qEs)+'</h3>'+opts+'</div>'+
        '<div id="fb" class="note" style="display:none"></div>'+
        '<div class="row" id="scRow" style="display:none;justify-content:flex-end">'+
          '<button class="btn ghost" id="retry"></button>'+
          '<button class="btn" id="goNext"></button>'+
        '</div>';
    }, i:function(){
      var answered=false;
      document.querySelectorAll(".opt").forEach(function(b){
        b.onclick=function(){ if(answered)return; answered=true; var j=+b.dataset.o; var o=cfg.opts[j];
          document.querySelectorAll(".opt").forEach(function(x,k){ x.disabled=true; if(cfg.opts[k].correct)x.classList.add("correct"); });
          if(!o.correct)b.classList.add("wrong");
          var fb=$("fb"); fb.style.display="block"; fb.className="note "+(o.correct?"good":"bad");
          fb.innerHTML="<b>"+X(o.correct?"Correct.":"Not quite.",o.correct?"Correcto.":"Casi.")+"</b> "+X(o.fbEn,o.fbEs);
          $("scRow").style.display="flex";
        };
      });
      $("retry").textContent=X("↺ Try again","↺ Reintentar");
      $("retry").onclick=function(){ render(); };
      $("goNext").textContent=X("Next ›","Siguiente ›");
      $("goNext").onclick=function(){ $("next").click(); };
    }};
}

          bx(ICO.warn,"Unseated / bent fiber","Fibra floja / doblada","Not fully clicked in, or a macro-bend past the min radius.","No conectada a fondo, o un macro-doblez pasando el radio mínimo.")+

        '<p class="lead">'+X("VSWR supervision watches the RF path (jumper, connectors, feeder, antenna) for reflected power. The report gives returnLoss in dB per RfPort. KEY RULE: higher dB is better.","La supervisión de VSWR vigila el camino RF (jumper, conectores, feeder, antena) buscando potencia reflejada. El reporte da returnLoss en dB por RfPort. REGLA CLAVE: más dB es mejor.")+'</p>'+
        con("HealthCheck :: VSWR INFO","HealthCheck :: VSWR INFO",
          '<span class="dim">MO ...RfPort=X                 returnLoss   supervActive  sensitivity</span>\n'+
          'RRU-12 RfPort=A..H  <span class="ok">23.3 25.4 26.3</span> <span class="warn">19.5</span> <span class="ok">24.8 31.5 35.0 27.6</span>  <span class="k">true</span>   80\n'+
          'RRU-19 RfPort=A/B   <span class="ok">30.9 30.7</span>                              <span class="k">true</span>   80\n'+

        '</div>'+
        '<p class="note">'+X("Return loss and VSWR are two views of the SAME reflection. High return loss = little power reflected = low VSWR (near 1.0) = good match. A blank value on RRU-49 = not measured because it is locked — do not chase a VSWR fault on an off radio.","El return loss y el VSWR son dos vistas de la MISMA reflexión. Return loss alto = poca potencia reflejada = VSWR bajo (cerca de 1.0) = buen acople. Un valor en blanco en RRU-49 = no medido porque está bloqueado — no persigas una falla de VSWR en un radio apagado.")+'</p>';
  }},
  /* 8 — interactive VSWR slider */
  { ico:ICO.wave, t:["Interactive","Interactivo"], b:function(){
      var svg=''+
      '<svg viewBox="0 0 320 150" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%;display:block" xmlns="http://www.w3.org/2000/svg">'+
      '<rect width="320" height="150" fill="#071120"/>'+
      '<rect x="20" y="60" width="46" height="30" rx="4" fill="#12233f" stroke="#facc15" stroke-width="1.5"/><text x="43" y="79" fill="#facc15" font-family="ui-monospace,monospace" font-size="9" text-anchor="middle">RRU</text>'+
      '<line x1="66" y1="75" x2="250" y2="75" stroke="#3a5478" stroke-width="4"/>'+
      '<path d="M250 60 L272 60 L261 96 Z" fill="#38507a" stroke="#8fb4ff" stroke-width="1.2"/>'+
      /* forward dot */
      '<circle id="vFwd" cx="70" cy="75" r="4" fill="#4ade80"/>'+
      /* reflected dot */
      '<circle id="vRef" cx="250" cy="75" r="0" fill="#f87171"/>'+
      '<text id="vBig" x="160" y="34" fill="#67e8f9" font-family="ui-monospace,monospace" font-size="22" text-anchor="middle">23 dB</text>'+
      '<text id="vVswr" x="160" y="122" fill="#8fb4ff" font-family="system-ui" font-size="10" text-anchor="middle"></text>'+
      '</svg>';
      return tit("Interactive: return loss ↔ reflection","Interactivo: return loss ↔ reflexión")+
        '<p class="lead">'+X("Slide the return loss. Watch how much power reflects back from the antenna. High dB = clean match, almost nothing bounces back.","Mueve el return loss. Observa cuánta potencia se refleja desde la antena. dB alto = buen acople, casi nada rebota.")+'</p>'+
        '<div class="illus" style="aspect-ratio:16/8;background:#071120">'+svg+'</div>'+
        '<div class="row"><span class="lbl">'+X("Return loss","Return loss")+'</span><input type="range" id="vS" min="6" max="36" value="23"><span class="val" id="vV"></span></div>'+
        '<div class="note" id="vBand"></div>';
    }, i:function(){ var gen=_gen; var s=$("vS"),val=$("vV");
        function vswrOf(rl){ var g=Math.pow(10,-rl/20); return (1+g)/(1-g); }
        function band(){ var rl=+s.value; val.textContent=rl+" dB"; var vswr=vswrOf(rl);
          var big=$("vBig"); if(big)big.textContent=rl+" dB";
          var vv=$("vVswr"); if(vv)vv.textContent="VSWR ≈ "+vswr.toFixed(2)+":1";
          var b=$("vBand");
          if(rl>=20){ b.className="note good"; b.innerHTML="<b>"+X("Good","Bueno")+"</b> — "+X("clean match, little reflected power.","buen acople, poca potencia reflejada."); }
          else if(rl>=14){ b.className="note warn"; b.innerHTML="<b>"+X("Marginal","Marginal")+"</b> — "+X("watch it / trend it; inspect connectors.","vigilar / tendencia; inspecciona conectores."); }
          else { b.className="note bad"; b.innerHTML="<b>"+X("Problem","Problema")+"</b> — "+X("feeder / jumper / connector / antenna fault likely.","probable falla de feeder / jumper / conector / antena."); }
        }
        s.oninput=band; band();
        var t0=performance.now();
        (function fr(now){ if(gen!==_gen)return; var rl=+s.value; var g=Math.pow(10,-rl/20);
          var fwd=$("vFwd"),ref=$("vRef"); var T=(now-t0)/1400;
          if(fwd){ var pf=(T%1); fwd.setAttribute("cx",(70+pf*180).toFixed(1)); }
          if(ref){ if(g<0.05){ ref.setAttribute("r","0"); } else { var pr=(T%1); ref.setAttribute("r",(2+g*6).toFixed(1)); ref.setAttribute("cx",(250-pr*180).toFixed(1)); ref.setAttribute("opacity",Math.min(1,g*3).toFixed(2)); } }
          requestAnimationFrame(fr); })(performance.now());
    }
  },
  /* 9 — Antennas / MIMO branches */
  { ico:ICO.ant, t:["Antennas / MIMO","Antenas / MIMO"], b:function(){
      return tit("Antenna branch counts (MIMO)","Conteo de ramas de antena (MIMO)")+
        '<p class="lead">'+X("SectorCarrier / NRSectorCarrier list the branch counts: noOfRx/TxAntennas, noOfUsedRx/Tx, noOfMutedTxAntennas. Compare carriers — a reduced or muted count vs its peers hints at a radio branch problem.","SectorCarrier / NRSectorCarrier listan el conteo de ramas: noOfRx/TxAntennas, noOfUsedRx/Tx, noOfMutedTxAntennas. Compara portadoras — un conteo reducido o silenciado frente a sus pares sugiere un problema de rama del radio.")+'</p>'+
        con("HealthCheck :: ANTENNA BRANCHES","HealthCheck :: ANTENNA BRANCHES",
          '<span class="dim">MO                 Rx / Tx / usedRx / usedTx / mutedTx</span>\n'+
          'NRSectorCarrier=20   <span class="ok">4 / 4 / 4 / 4 / 0</span>\n'+
          'NRSectorCarrier=36   <span class="ok">4 / 4 / 4 / 4 / 0</span>\n'+
          'NRSectorCarrier=52   <span class="ok">4 / 4 / 4 / 4 / 0</span>\n'+
          'SectorCarrier=19     <span class="ok">2 / 2 / 2 / 2 / 0</span>\n'+
          'SectorCarrier=29     <span class="ok">2 / 2 / 2 / 2 / 0</span>\n'+
          'SectorCarrier=49     <span class="warn">2 / 2 / .. reduced entries ..</span>  <span class="dim">(locked unit)</span>')+
        '<p class="note">'+X("Consistency is what you check. Three 4T4R NR carriers matching each other is healthy. If one showed 4/4/2/4 (only 2 used Rx), that branch/path is suspect — but confirm the unit is actually in service first.","Lo que revisas es la consistencia. Tres portadoras NR 4T4R iguales entre sí es sano. Si una mostrara 4/4/2/4 (solo 2 Rx usados), esa rama/camino es sospechosa — pero confirma primero que la unidad está en servicio.")+'</p>'+
        '<p class="note warn">'+X("SectorCarrier=49 shows reduced entries because it belongs to the LOCKED RRU-49. That is expected, not a MIMO fault.","SectorCarrier=49 muestra entradas reducidas porque pertenece a la RRU-49 LOCKED. Eso es esperado, no una falla de MIMO.")+'</p>';
  }},
  /* 10 — TX power */
  { ico:ICO.power, t:["TX power","Potencia TX"], b:function(){
      return tit("TX power &amp; power state","Potencia TX y estado de potencia")+

        '<div class="ref"><b>Ericsson RAN CPI / Node documentation</b> — '+X("Managed Object descriptions for FieldReplaceableUnit, RiLink (CPRI fronthaul), VSWR supervision (returnLoss, vswrSupervisionActive/Sensitivity), SectorCarrier / NRSectorCarrier antenna and TX power attributes.","Descripciones de Managed Object para FieldReplaceableUnit, RiLink (fronthaul CPRI), supervisión de VSWR (returnLoss, vswrSupervisionActive/Sensitivity), atributos de antena y potencia TX de SectorCarrier / NRSectorCarrier.")+'</div>'+
        '<div class="ref"><b>CPRI Specification (Common Public Radio Interface)</b> — '+X("fronthaul line rates and link concepts between baseband and radio.","tasas de línea de fronthaul y conceptos de enlace entre banda base y radio.")+'</div>'+
        '<div class="ref"><b>'+X("RF fundamentals: VSWR &amp; return loss","Fundamentos RF: VSWR y return loss")+'</b> — '+X("relationship between reflection coefficient, VSWR and return loss (dB); higher return loss = better match.","relación entre coeficiente de reflexión, VSWR y return loss (dB); mayor return loss = mejor acople.")+'</div>'+
        '<div class="ref"><b>IEC 61300-3-35 / '+X("fiber-optic connector inspection practice","práctica de inspección de conectores de fibra")+'</b> — '+X("Inspect–Clean–Inspect method and LC endface acceptance for optical links.","método Inspeccionar–Limpiar–Inspeccionar y aceptación de cara LC para enlaces ópticos.")+'</div>'+
        '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:16px"><span class="verdict ok">'+ICO.check+' '+X("Module 2 complete","Módulo 2 completo")+'</span><a class="btn ghost" href="../index.html" target="_top">'+X("Back to portal","Volver al portal")+'</a></div>'+
        '<p class="note">'+X("Training overview only, using representative sample data. Always follow the live node output, current Ericsson CPI, and your carrier's Method of Procedure.","Solo es un resumen de entrenamiento con datos de ejemplo representativos. Sigue siempre la salida real del nodo, la CPI de Ericsson vigente y el Method of Procedure de tu carrier.")+'</p>';

];
var cur=0;
var _gen=0;
function stepRow(n,en,es,den,des){ return '<div class="st"><span class="num">'+n+'</span><span class="txt"><b>'+X(en,es)+'</b><span>'+X(den,des)+'</span></span></div>'; }

function pintarChrome(){
  document.documentElement.lang=LANG;
  $("brand").innerHTML=X(CONFIG.brand[0],CONFIG.brand[1]);
  $("brandsub").textContent=X(CONFIG.subtitle[0],CONFIG.subtitle[1]);
  $("homeTxt").textContent=X("Home","Inicio");
  document.querySelectorAll("#lang button").forEach(function(b){ b.classList.toggle("on", b.dataset.l===LANG); });
  var dark=document.documentElement.getAttribute("data-theme")==="dark";
  $("temaIco").innerHTML=dark?ICO.sun:ICO.moon; $("temaTxt").textContent=dark?X("Light","Claro"):X("Dark","Oscuro");
  $("prev").innerHTML="‹ "+X("Back","Anterior");
  $("next").innerHTML=(cur>=STEPS.length-1?X("Restart","Reiniciar"):X("Next","Siguiente")+" ›");
}
function render(){
  _gen++;
  pintarChrome();
  var s=STEPS[cur];
  $("card").innerHTML=s.b();
  if(s.i) s.i();
  $("progbar").style.width=((cur+1)/STEPS.length*100)+"%";
  $("mStep").textContent=X("Step ","Paso ")+(cur+1)+" / "+STEPS.length+" · "+X(s.t[0],s.t[1]);
  $("mDur").textContent=CONFIG.duration;
  $("prev").disabled=(cur===0);
  $("dots").innerHTML=STEPS.map(function(_,i){return '<button class="dot'+(i===cur?' on':'')+'" data-i="'+i+'" aria-label="'+(i+1)+'"></button>';}).join("");
  document.querySelectorAll(".dot").forEach(function(d){ d.onclick=function(){ cur=+d.dataset.i; render(); }; });
  window.scrollTo(0,0);
}
$("prev").onclick=function(){ if(cur>0){cur--;render();} };
$("next").onclick=function(){ cur=(cur>=STEPS.length-1)?0:cur+1; render(); };
document.querySelectorAll("#lang button").forEach(function(b){ b.onclick=function(){ LANG=b.dataset.l; render(); }; });
$("tema").onclick=function(){ var d=document.documentElement.getAttribute("data-theme")==="dark"; document.documentElement.setAttribute("data-theme", d?"light":"dark"); pintarChrome(); };
document.addEventListener("keydown",function(e){ if(e.key==="ArrowRight")$("next").click(); if(e.key==="ArrowLeft")$("prev").click(); });
render();
</script>
<script src="../assets/narration.js"></script>
