<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF Awareness at Cell Sites / Exposición a RF en sitios celulares</title>
<!--
  SEGURIDAD (verde) — RF Awareness / Exposición a RF en sitios celulares.
  SAFETY (green) — RF energy awareness on towers & rooftops: MPE, exclusion zones, signage, sector power-down.
  Motor basado en animations/defensive-driving-fatigue.html (deriva de loto-lockout-tagout.html). Bilingüe EN/ES (EN por defecto).
  NO se inventaron datos. Fuentes / Sources:
   · FCC OET Bulletin 65 & 47 CFR 1.1310 — MPE: occupational 5 mW/cm² (6-min avg) vs general population 1 mW/cm² (30-min avg) above 1500 MHz; 300–1500 MHz = f/300 vs f/1500. Occupational limit 5× higher.
   · Industry RF signage (ANSI Z535 signal words + FCC/OSHA): NOTICE / CAUTION / WARNING / DANGER tied to % of MPE; RF "radiating antenna" pictogram.
   · OSHA / NATE — tower worker RF safety, exclusion zones, personal RF monitors, power-down / maintenance mode coordination.
-->
<style>
  :root{
    --pg:#f2f7f3; --card:#ffffff; --ink:#0c2417; --sub:#4f6a5b; --line:#dfeae3;
    --bar:#0b3a22; --accent:#15803D; --tint:rgba(21,128,61,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.12); --radius:14px;
    --shadow:0 1px 2px rgba(12,36,23,.05),0 10px 26px rgba(12,36,23,.08);
    --z-red:#dc2626; --z-orange:#ea6a0a; --z-yellow:#eab308; --z-blue:#1d4ed8;
  }
  html[data-theme="dark"]{
    --pg:#0a1310; --card:#12201a; --ink:#e9f6ee; --sub:#a3c2b1; --line:#22352b;
    --bar:#07130c; --accent:#4ade80; --tint:rgba(74,222,128,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  .shell{max-width:940px;margin:0 auto;padding:14px 16px 34px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0 8px;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}
  .prog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 4px}
  .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;min-height:360px}
  .step-ico{width:44px;height:44px;border-radius:12px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  h1{font-size:clamp(20px,3.3vw,26px);margin:0 0 8px;font-weight:700;line-height:1.2}
  h2{font-size:15.5px;margin:16px 0 8px;font-weight:600}
  p{margin:0 0 12px}
  .lead{color:var(--sub);font-size:15px}
  ul,ol{margin:6px 0 12px;padding-left:20px}
  li{margin:6px 0}
  .pill{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:5px 11px;border-radius:999px;margin-bottom:10px}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:12px;margin:8px 0}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:12px;margin:8px 0}
  .box{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px}
  .box h3{margin:0 0 6px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
  .box p{margin:0;font-size:12.5px;color:var(--sub)}
  .num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:var(--accent);color:#fff;font-weight:800;font-size:14px;flex:none}
  .stat3{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0}
  .stat3 .s{flex:1;min-width:120px;background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;text-align:center}
  .stat3 .s b{display:block;font-size:24px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
  .stat3 .s span{font-size:12px;color:var(--sub)}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn.ghost{background:transparent;color:var(--accent)}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:0;cursor:pointer;padding:0}
  .dot.on{background:var(--accent);transform:scale(1.3)}
  .note{font-size:13px;color:var(--sub);border-left:3px solid var(--accent);background:var(--tint);padding:9px 12px;margin:12px 0;border-radius:0 8px 8px 0}
  .warn{border-left-color:var(--amber);color:var(--amber);background:var(--ambt)}
  .bad{border-left-color:var(--bad);color:var(--bad);background:var(--badt)}
  .good{border-left-color:var(--ok);color:var(--ink);background:var(--okt)}
  .good b{color:var(--ok)}
  .illus{position:relative;aspect-ratio:16/10;background:#08140d;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .illus svg,.illus canvas{width:100%;height:100%}
  .illus.tall{aspect-ratio:4/3}
  .mcap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);margin:8px 2px 2px;justify-content:center}
  .steps{counter-reset:s;margin:8px 0}
  .steps .st{display:flex;gap:12px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:7px 0}
  .steps .st .txt b{font-size:13.5px}.steps .st .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .chk{display:flex;gap:11px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:8px 0;cursor:pointer}
  .chk .bx{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;margin-top:1px}
  .chk.done .bx{background:var(--ok);border-color:var(--ok)}
  .chk.done .txt b{text-decoration:line-through;opacity:.7}
  .chk .txt b{font-size:13.5px}.chk .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .row{display:flex;align-items:center;gap:12px;margin:10px 0;flex-wrap:wrap}
  .ctrl{display:flex;flex-direction:column;gap:4px;margin:10px 0}
  .ctrl label{font-size:12.5px;color:var(--sub);display:flex;justify-content:space-between;gap:10px}
  .ctrl label b{color:var(--ink);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:var(--accent);height:26px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{border:0;background:var(--card);color:var(--sub);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;min-height:38px}
  .seg button.on{background:var(--accent);color:#fff}
  .zbadge{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-weight:800;font-size:15px;color:#fff;letter-spacing:.03em}
  .q{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
  .q h3{margin:0 0 10px;font-size:14px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 14px;border-radius:10px;margin:7px 0;cursor:pointer;font-size:14px;font-family:inherit}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad)}
  .opt:disabled{cursor:default}
  .score{font-size:16px;font-weight:700;text-align:center;padding:10px}
  .verdict{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-weight:700;font-size:15px}
  .verdict.ok{background:var(--okt);color:var(--ok)}
  .ref{font-size:12.5px;color:var(--sub);border-bottom:1px solid var(--line);padding:8px 0}
  .ref b{color:var(--ink)}
  .signgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:12px;margin:10px 0}
  .signcard{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .signcard svg{width:96px;height:120px;margin:0 auto 6px}
  .signcard b{display:block;font-size:13px}
  .signcard span{font-size:11.5px;color:var(--sub);display:block;margin-top:3px}
  @media(max-width:520px){ .card{padding:15px} .shell{padding:12px 12px 28px} .brand small{display:none} }
</style>
</head>
<body>
<div class="shell">
  <div class="head">
  <div class="top">
    <div class="brand">
      <span class="logo"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M7 21h10"/><path d="M5 9a9 9 0 0 1 14 0"/><path d="M8 12a5 5 0 0 1 8 0"/></svg></span>
      <div><b id="brand"></b><small id="brandsub"></small></div>

      <a class="tbtn" id="home" href="../index.html" target="_top"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span id="homeTxt"></span></a>
      <button class="tbtn" id="tema"><span id="temaIco"></span><span id="temaTxt"></span></button>

  </div>
  <div class="prog"><i id="progbar"></i></div>
  <div class="meta"><span id="mStep"></span><span id="mDur"></span></div>
  </div>
  <div class="card" id="card"></div>
  <div class="nav">
    <button class="btn ghost" id="prev"></button>
    <div class="dots" id="dots"></div>
    <button class="btn" id="next"></button>
  </div>
</div>

function X(en,es){ return LANG==="es"?es:en; }

var ICO={

  people:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 6a3 3 0 0 1 0 6M21 20a6 6 0 0 0-4-5.6"/></svg>',

function stepRow(n,en,es,den,des){ return '<div class="st"><span class="num">'+n+'</span><span class="txt"><b>'+X(en,es)+'</b><span>'+X(den,des)+'</span></span></div>'; }
function bx(icon,tEn,tEs,dEn,dEs){ return '<div class="box"><h3>'+icon+X(tEn,tEs)+'</h3><p>'+X(dEn,dEs)+'</p></div>'; }
function raf(gen,step){ (function fr(){ if(gen!==_gen) return; step(); requestAnimationFrame(fr); })(); }

/* ===================== RF ART (SVG) ===================== */
function rfSymbol(cx,cy,s,col){ col=col||"#111"; s=s||1;
  function arc(r){ return '<path d="M '+(cx-r*0.62)+' '+(cy-14*s - r*0.55)+' A '+r+' '+r+' 0 0 1 '+(cx+r*0.62)+' '+(cy-14*s - r*0.55)+'" fill="none" stroke="'+col+'" stroke-width="'+(2.1*s)+'" stroke-linecap="round"/>'; }
  var mastTop=cy-14*s;
  return '<g>'+
    '<line x1="'+cx+'" y1="'+cy+'" x2="'+cx+'" y2="'+mastTop+'" stroke="'+col+'" stroke-width="'+(2.6*s)+'" stroke-linecap="round"/>'+
    '<path d="M '+(cx-5*s)+' '+cy+' L '+cx+' '+(cy-4*s)+' L '+(cx+5*s)+' '+cy+'" fill="none" stroke="'+col+'" stroke-width="'+(2.1*s)+'" stroke-linejoin="round"/>'+
    '<circle cx="'+cx+'" cy="'+mastTop+'" r="'+(2.2*s)+'" fill="'+col+'"/>'+
    arc(9*s)+arc(15*s)+arc(21*s)+'</g>';
}
function panelAntenna(k,x,y,w,h,tilt){ tilt=tilt||0;
  return '<defs><linearGradient id="pa'+k+'" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f7f9fb"/><stop offset="0.5" stop-color="#e3e8ee"/><stop offset="1" stop-color="#c2cbd5"/></linearGradient></defs>'+
    '<g transform="rotate('+tilt+' '+(x+w/2)+' '+(y+h/2)+')">'+
      '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="'+(w*0.28)+'" fill="url(#pa'+k+')" stroke="#9aa7b4" stroke-width="1.2"/>'+

      '<line x1="'+(x+w*0.5)+'" y1="'+(y+h*0.05)+'" x2="'+(x+w*0.5)+'" y2="'+(y+h*0.95)+'" stroke="#d7dde3" stroke-width="0.8"/>'+
    '</g>';
}
function cellTower(k){

}

var STEPS = [

  { ico:ICO.tower, t:["Overview","Introducción"], b:function(){

          '<g opacity="0.5"><path d="M120 60 q60 -6 120 20" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-dasharray="4 5"/></g>'+
        '</svg></div>'+
        '<p class="lead" style="margin-top:12px">'+X("Antennas on a tower or rooftop are radio transmitters that are almost always ON. The RF energy they put out is invisible, silent, and you usually feel nothing until damage is done. This module builds real awareness: what RF is, the exposure limits, exclusion zones and signs, and how to work safely — with interactive tools.","Las antenas de una torre o azotea son transmisores de radio que casi siempre están ENCENDIDOS. La energía RF que emiten es invisible, silenciosa y normalmente no sientes nada hasta que el daño ya ocurrió. Este módulo crea conciencia real: qué es la RF, los límites de exposición, las zonas de exclusión y las señales, y cómo trabajar seguro — con herramientas interactivas.")+'</p>'+
        '<p class="note">'+X("RF awareness training is required before working on towers or near rooftop antennas. This is an overview — always follow your employer’s RF program and the site-specific RF study.","La capacitación de conciencia RF es obligatoria antes de trabajar en torres o cerca de antenas de azotea. Esto es un resumen — sigue siempre el programa RF de tu empleador y el estudio RF específico del sitio.")+'</p>';
  }},
  /* 2 — What is RF */
  { ico:ICO.wave, t:["What is RF","Qué es la RF"], b:function(){
      return tit("RF energy: non-ionizing radiation","Energía RF: radiación no ionizante")+
        '<p class="lead">'+X("Radiofrequency (RF) is the same kind of energy that carries radio, TV and cell signals. It is non-ionizing — it does NOT break chemical bonds or cause radiation sickness like X-rays or gamma rays. Its main effect on the body is heating.","La radiofrecuencia (RF) es el mismo tipo de energía que lleva las señales de radio, TV y celular. Es no ionizante — NO rompe enlaces químicos ni causa enfermedad por radiación como los rayos X o gamma. Su efecto principal en el cuerpo es el calentamiento.")+'</p>'+
        '<div class="grid2">'+
          bx(ICO.wave,"Non-ionizing (RF)","No ionizante (RF)","Radio, cellular, Wi-Fi, microwave. Heats tissue at high enough levels.","Radio, celular, Wi-Fi, microondas. Calienta el tejido a niveles altos.")+
          bx(ICO.bolt,"Ionizing (different)","Ionizante (distinto)","X-rays, gamma. Not what antennas emit — do not confuse the two.","Rayos X, gamma. No es lo que emiten las antenas — no los confundas.")+
        '</div>'+
        '<p class="note warn">'+X("“Non-ionizing” does not mean harmless. Enough RF energy will cook tissue — the exact way a microwave oven heats food. The risk on towers is real and it is thermal.","“No ionizante” no significa inofensivo. Suficiente energía RF cocina el tejido — igual que un microondas calienta la comida. El riesgo en torres es real y es térmico.")+'</p>';
  }},
  /* 3 — How it affects the body */
  { ico:ICO.body, t:["Effect on body","Efecto en el cuerpo"], b:function(){

        '<p class="lead">'+X("At exposure above the limits, RF deposits energy and heats you from the inside. You often feel nothing at first because the heating is deep and there are few heat sensors inside the body.","Por encima de los límites, la RF deposita energía y te calienta desde adentro. Muchas veces no sientes nada al principio porque el calentamiento es profundo y hay pocos sensores de calor dentro del cuerpo.")+'</p>'+
        '<div class="grid3">'+
          bx(ICO.body,"Deep heating","Calor profundo","Warms muscle and organs; damage before you feel pain.","Calienta músculo y órganos; daño antes de sentir dolor.")+
          bx(ICO.eye,"Sensitive parts","Partes sensibles","Eyes and testes cool poorly and are more vulnerable.","Ojos y testículos disipan mal el calor y son más vulnerables.")+
          bx(ICO.warn,"RF burns","Quemaduras RF","Touching metal in a strong field can cause deep burns.","Tocar metal en un campo fuerte puede causar quemaduras profundas.")+
        '</div>'+

        '<div class="row"><div class="seg" id="mpeSeg"><button data-b="occ" class="on">'+X("Occupational","Ocupacional")+'</button><button data-b="gen">'+X("General public","Público general")+'</button></div></div>'+
        '<div class="illus" style="aspect-ratio:16/6;background:#08140d"><svg id="mpeSvg" viewBox="0 0 340 120" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg></div>'+

        '<div class="note" id="zmMsg"></div>';
    }, i:function(){ var gen=_gen; var svg=$("zmSvg"),r=$("zmR"); if(!svg)return;

  /* 8 — The four signs */
  { ico:ICO.sign, t:["The 4 signs","Las 4 señales"], b:function(){
      return tit("Read the RF signs","Lee las señales RF")+
        '<p class="lead">'+X("Sites use four color-coded signs (ANSI signal words + the RF antenna symbol) tied to how much of the limit you could reach. Learn them cold — the color tells you what to do before you step past it.","Los sitios usan cuatro señales por color (palabras ANSI + el símbolo de antena RF) según cuánto del límite podrías alcanzar. Apréndelas de memoria — el color te dice qué hacer antes de pasar.")+'</p>'+

          '<div class="signcard">'+rfSign("caution")+'<b style="color:#a16207">CAUTION</b><span>'+X("May exceed the general-public limit. Wear your RF monitor; keep it brief.","Puede superar el límite del público. Usa tu monitor RF; sé breve.")+'</span></div>'+

          '<div class="signcard">'+rfSign("danger")+'<b style="color:#c1121f">DANGER</b><span>'+X("Well above the limit. Do not enter without a power-down.","Muy por encima del límite. No entres sin un power-down.")+'</span></div>'+
        '</div>'+
        '<p class="note">'+X("Signal-word colors follow ANSI Z535. The exact % thresholds and required actions are set by the operator’s RF program and the site study.","Los colores de las palabras siguen ANSI Z535. Los % exactos y las acciones las define el programa RF del operador y el estudio del sitio.")+'</p>';

  /* 9 — Where signs are posted */

          '<li>'+X("At the <b>gate/access</b>: an information/notice sign with the operator and a contact number.","En la <b>entrada/acceso</b>: una señal de información/aviso con el operador y un número de contacto.")+'</li>'+
          '<li>'+X("At the <b>base of the tower or roof access</b>: what to expect above.","En la <b>base de la torre o acceso a la azotea</b>: qué esperar arriba.")+'</li>'+
          '<li>'+X("<b>On or beside the antennas</b>: caution/warning/danger at the exclusion zone itself.","<b>En o junto a las antenas</b>: precaución/advertencia/peligro en la zona de exclusión.")+'</li>'+

  /* 10 — Personal RF monitor */
  { ico:ICO.monitor, t:["RF monitor","Monitor RF"], b:function(){

          '<div style="width:96px;flex:none">'+rfMonitorSVG("MON")+'</div>'+
          '<div style="flex:1;min-width:180px"><p class="lead" style="margin:0">'+X("A personal RF monitor is a body-worn device that measures the field around you and alarms (sound + vibration + light) as you approach a set fraction of the MPE. In caution/warning zones it is required, not optional.","Un monitor RF personal es un dispositivo que llevas puesto y que mide el campo a tu alrededor y alarma (sonido + vibración + luz) al acercarte a cierta fracción de la MPE. En zonas de precaución/advertencia es obligatorio, no opcional.")+'</p></div>'+
        '</div>'+

  /* 11 — Plan before you climb */

  /* 12 — Sector power-down concept */
  { ico:ICO.power, t:["Power-down","Power-down"], b:function(){
      return tit("Sector shutdown / maintenance mode","Apagado de sector / modo mantenimiento")+
        '<p class="lead">'+X("When work must happen inside an exclusion zone or in front of an antenna, the fix is to reduce or remove the RF — the operator powers the sector(s) down or puts them in maintenance mode. This is coordinated through the carrier’s network operations, like an electrical lockout for RF.","Cuando hay que trabajar dentro de una zona de exclusión o frente a una antena, la solución es reducir o quitar la RF — el operador apaga los sectores o los pone en modo mantenimiento. Se coordina con las operaciones de red del carrier, como un bloqueo eléctrico pero para RF.")+'</p>'+
        '<div class="grid2">'+
          bx(ICO.people,"Coordinate, don’t assume","Coordina, no supongas","Only the operator can confirm a sector is down. Get it in writing / a ticket.","Solo el operador confirma que un sector está apagado. Que quede por escrito / ticket.")+
          bx(ICO.monitor,"Then verify","Luego verifica","Trust but verify with your RF monitor at the work position.","Confía pero verifica con tu monitor RF en la posición de trabajo.")+
        '</div>'+

        '<div class="row"><button class="btn" id="pdBtn"></button><span class="lead" id="pdStat" style="margin:0"></span></div>'+

  /* 14 — Working rules */
  { ico:ICO.shield, t:["Working rules","Reglas de trabajo"], b:function(){

          bx(ICO.wave,"Never face the antenna","Nunca de frente","Never put your body/head in front of an energized antenna face.","Nunca pongas cuerpo/cabeza frente a la cara de una antena viva.")+
          bx(ICO.tower,"Work behind or beside","Trabaja detrás o al lado","Approach from the back or side where the field is weakest.","Acércate por detrás o el lado donde el campo es más débil.")+
          bx(ICO.clock,"Minimize time","Minimiza el tiempo","Less time in the field = less dose. Plan the task, be efficient, keep moving.","Menos tiempo en el campo = menos dosis. Planea, sé eficiente, no te quedes quieto.")+

  /* 15 — Time averaging */
  { ico:ICO.clock, t:["Time averaging","Promediado"], b:function(){

        '<p class="lead">'+X("The MPE is a time-average: 6 minutes for occupational, 30 for the public. That means a brief exposure at a higher level can average out — but only if you truly limit the time. It is a control, not a loophole.","La MPE es un promedio de tiempo: 6 minutos ocupacional, 30 para el público. Eso significa que una exposición breve a nivel alto puede promediarse — pero solo si de verdad limitas el tiempo. Es un control, no un truco.")+'</p>'+

        '<p class="note bad">'+X("Do not rely on the clock in a hot zone. Distance and power-down come first; time-averaging is the backstop when brief, planned work is unavoidable.","No confíes en el reloj en una zona caliente. La distancia y el power-down van primero; el promediado es el respaldo cuando el trabajo breve y planeado es inevitable.")+'</p>';

  /* 16 — Collocation */
  { ico:ICO.tower, t:["Many carriers","Varios operadores"], b:function(){

        '<p class="note warn">'+X("Account for every antenna near your work position — including the ones behind you and on nearby structures. When in doubt, request power-downs from every operator whose exclusion zone you enter.","Cuenta cada antena cerca de tu posición — incluidas las de atrás y las de estructuras vecinas. Si dudas, pide power-down a cada operador cuya zona de exclusión pises.")+'</p>';
  }},
  /* 17 — Symptoms */
  { ico:ICO.body, t:["Overexposure","Sobreexposición"], b:function(){

        '<div class="grid2">'+
          bx(ICO.warn,"Warmth / tingling","Calor / hormigueo","Skin warming or a prickling feeling, often face or hands.","Piel que se calienta o cosquilleo, a menudo cara o manos.")+
          bx(ICO.warn,"Later effects","Efectos tardíos","Headache, deep heating; symptoms may lag the exposure.","Dolor de cabeza, calor profundo; los síntomas pueden retrasarse.")+
        '</div>'+
        '<div class="steps">'+
          stepRow(1,"Get out of the field","Sal del campo","Back away the way you came, out of the beam.","Retrocede por donde viniste, fuera del haz.")+

        '</div>'+
        '<p class="note">'+X("Sensitive topic: if you think you were overexposed, do not tough it out — report and get checked.","Tema sensible: si crees que te sobreexpusiste, no lo aguantes — repórtalo y hazte revisar.")+'</p>';
  }},
  /* 18 — Rooftops */
  { ico:ICO.bldg, t:["Rooftops","Azoteas"], b:function(){
      return tit("Rooftops & hidden antennas","Azoteas y antenas ocultas")+
        '<p class="lead">'+X("Rooftop sites are often the most dangerous because antennas are at head height and sometimes hidden — behind screening walls, painted to blend in, or on adjacent buildings. You can walk straight into a main beam without seeing it.","Las azoteas suelen ser lo más peligroso porque las antenas están a la altura de la cabeza y a veces ocultas — tras muros de ocultamiento, pintadas para camuflarse, o en edificios contiguos. Puedes caminar directo a un haz principal sin verlo.")+'</p>'+
        '<p class="note bad">'+X("Treat every rooftop antenna as live. Stay behind screening walls, follow marked walk paths, keep your monitor on, and never lean over or reach in front of a panel to work.","Trata cada antena de azotea como viva. Quédate tras los muros, sigue los caminos marcados, mantén el monitor encendido, y nunca te asomes ni pases el brazo frente a un panel para trabajar.")+'</p>';
  }},

  { ico:ICO.eye, t:["Myths","Mitos"], b:function(){

          bx(ICO.warn,"Myth: it’s like X-rays","Mito: es como rayos X","Fact: RF is non-ionizing. The proven hazard is heating, not radiation sickness.","Hecho: la RF es no ionizante. El peligro probado es el calor, no la enfermedad por radiación.")+
          bx(ICO.warn,"Myth: if I feel nothing I’m fine","Mito: si no siento nada, estoy bien","Fact: deep heating and RF burns can happen before you feel warmth.","Hecho: el calor profundo y las quemaduras RF pueden ocurrir antes de sentir calor.")+
          bx(ICO.warn,"Myth: the sign means it’s off","Mito: la señal significa apagado","Fact: signs mark the hazard, not the state. Antennas are on unless confirmed down.","Hecho: las señales marcan el peligro, no el estado. Las antenas están encendidas salvo confirmación.")+

var cur=0;
var _gen=0;

/* ===================== engine ===================== */
function pintarChrome(){
  document.documentElement.lang=LANG;
  $("brand").textContent=X(CONFIG.brand[0],CONFIG.brand[1]);
  $("brandsub").textContent=X(CONFIG.subtitle[0],CONFIG.subtitle[1]);
  $("homeTxt").textContent=X("Home","Inicio");
  document.querySelectorAll("#lang button").forEach(function(b){ b.classList.toggle("on", b.dataset.l===LANG); });
  var dark=document.documentElement.getAttribute("data-theme")==="dark";
  $("temaIco").innerHTML=dark?ICO.sun:ICO.moon; $("temaTxt").textContent=dark?X("Light","Claro"):X("Dark","Oscuro");
  $("prev").innerHTML="‹ "+X("Back","Anterior");
  $("next").innerHTML=(cur>=STEPS.length-1?X("Restart","Reiniciar"):X("Next","Siguiente")+" ›");
}
function render(){
  _gen++;
  pintarChrome();
  var s=STEPS[cur];
  $("card").innerHTML=s.b();
  if(s.i) s.i();
  $("progbar").style.width=((cur+1)/STEPS.length*100)+"%";
  $("mStep").textContent=X("Step ","Paso ")+(cur+1)+" / "+STEPS.length+" · "+X(s.t[0],s.t[1]);
  $("mDur").textContent=CONFIG.duration;
  $("prev").disabled=(cur===0);
  $("dots").innerHTML=STEPS.map(function(_,i){return '<button class="dot'+(i===cur?' on':'')+'" data-i="'+i+'" aria-label="'+(i+1)+'"></button>';}).join("");
  document.querySelectorAll(".dot").forEach(function(d){ d.onclick=function(){ cur=+d.dataset.i; render(); }; });
  window.scrollTo(0,0);
}
$("prev").onclick=function(){ if(cur>0){cur--;render();} };
$("next").onclick=function(){ cur=(cur>=STEPS.length-1)?0:cur+1; render(); };
document.querySelectorAll("#lang button").forEach(function(b){ b.onclick=function(){ LANG=b.dataset.l; render(); }; });
$("tema").onclick=function(){ var d=document.documentElement.getAttribute("data-theme")==="dark"; document.documentElement.setAttribute("data-theme", d?"light":"dark"); pintarChrome(); };
document.addEventListener("keydown",function(e){ if(e.key==="ArrowRight")$("next").click(); if(e.key==="ArrowLeft")$("prev").click(); });
render();
