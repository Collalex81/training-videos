<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module Template / Plantilla de módulo</title>
<!--
  =============================================================================
  MODULE TEMPLATE — copy this file for each new interactive module.
  PLANTILLA DE MÓDULO — copia este archivo para cada módulo interactivo nuevo.
  -----------------------------------------------------------------------------
  TO ADAPT / PARA ADAPTAR:
    1) CONFIG  -> brand, subtitle, accent color, default language.
    2) IMG     -> real photo file names in ../assets/ (JPG). Missing => illustration.
    3) STEPS   -> your slides. Each slide is a function returning HTML; optional init.
  Slide patterns included below: text, photo, canvas animation, interactive, checklist, quiz.
  Engine (do not change unless needed): sticky header, prev/next+dots, theme, EN/ES,
  canvas helpers (fitCanvas, screen, stopAnim, initCanvases).
  =============================================================================
-->
<style>
  :root{
    --pg:#f4f6fb; --card:#ffffff; --ink:#0f2544; --sub:#5b6b84; --line:#e6ebf5;
    --bar:#0b2e59; --accent:#2563EB; --tint:rgba(37,99,235,.10);
    --ok:#15803D; --okt:rgba(21,128,61,.10); --bad:#dc2626; --badt:rgba(220,38,38,.10);
    --amber:#b45309; --ambt:rgba(180,83,9,.10); --radius:14px;
    --shadow:0 1px 2px rgba(16,37,68,.05),0 10px 26px rgba(16,37,68,.07);
  }
  html[data-theme="dark"]{
    --pg:#0b1220; --card:#151d30; --ink:#eaf0ff; --sub:#9fb0cc; --line:#243149;
    --bar:#0a1526; --accent:#4d8bff; --tint:rgba(77,139,255,.14);
    --ok:#4ade80; --okt:rgba(74,222,128,.14); --bad:#f87171; --badt:rgba(248,113,113,.14);
    --amber:#fbbf24; --ambt:rgba(251,191,36,.14);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--pg);color:var(--ink);min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  svg{display:block}
  .shell{max-width:940px;margin:0 auto;padding:14px 16px 34px}
  .head{position:sticky;top:0;z-index:30;background:var(--pg);padding:10px 0 8px;box-shadow:0 6px 12px -8px rgba(0,0,0,.25)}
  .head .meta{margin-bottom:0}
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{font-size:11px;color:var(--sub);letter-spacing:.04em}
  .tools{display:flex;gap:8px;align-items:center}
  .tbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;text-decoration:none;height:36px;padding:0 12px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:6px;font-family:inherit}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .lang{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--sub);cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}
  .prog{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:6px 0 4px}
  .prog>i{display:block;height:100%;background:var(--accent);width:0;transition:width .35s}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;min-height:340px}
  .step-ico{width:44px;height:44px;border-radius:12px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  h1{font-size:clamp(20px,3.3vw,26px);margin:0 0 8px;font-weight:700;line-height:1.2}
  h2{font-size:15.5px;margin:18px 0 8px;font-weight:600}
  p{margin:0 0 12px}
  .lead{color:var(--sub);font-size:15px}
  ul,ol{margin:6px 0 12px;padding-left:20px}
  li{margin:5px 0}
  .pill{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--tint);padding:5px 11px;border-radius:999px;margin-bottom:10px}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,220px),1fr));gap:12px;margin:8px 0}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,170px),1fr));gap:12px;margin:8px 0}
  .box{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:13px}
  .box h3{margin:0 0 6px;font-size:14.5px;font-weight:600}
  .box p{margin:0;font-size:13px;color:var(--sub)}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;min-height:42px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn.ghost{background:transparent;color:var(--accent)}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);border:0;cursor:pointer;padding:0}
  .dot.on{background:var(--accent);transform:scale(1.3)}
  .note{font-size:13px;color:var(--sub);border-left:3px solid var(--accent);background:var(--tint);padding:9px 12px;margin:12px 0;border-radius:0 8px 8px 0}
  .warn{border-left-color:var(--amber);color:var(--amber);background:var(--ambt)}
  .good{border-left-color:var(--ok);color:var(--ink);background:var(--okt)}
  .good b{color:var(--ok)}
  .illus{position:relative;aspect-ratio:16/9;background:#0a1424;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .illus svg{width:100%;height:100%}
  .illus canvas{width:100%;height:100%;display:block}
  .illus img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#0a1424}
  .mcap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);margin:6px 2px 2px}
  .thumb{aspect-ratio:4/3}
  .row{display:flex;align-items:center;gap:12px;margin:12px 0}
  input[type=range]{flex:1;accent-color:var(--accent)}
  .val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;min-width:90px;text-align:right}
  .readout{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
  .stat{background:var(--pg);border:1px solid var(--line);border-radius:10px;padding:10px 14px;flex:1;min-width:110px}
  .stat b{display:block;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat span{font-size:11.5px;color:var(--sub)}
  .verdict{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-weight:700;font-size:15px}
  .verdict.ok{background:var(--okt);color:var(--ok)}
  .chk{display:flex;gap:11px;align-items:flex-start;background:var(--pg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:8px 0;cursor:pointer}
  .chk .bx{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;margin-top:1px}
  .chk.done .bx{background:var(--ok);border-color:var(--ok)}
  .chk.done .txt b{text-decoration:line-through;opacity:.7}
  .chk .txt b{font-size:13.5px}.chk .txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:2px}
  .q{background:var(--pg);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
  .q h3{margin:0 0 10px;font-size:14px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 14px;border-radius:10px;margin:7px 0;cursor:pointer;font-size:14px;font-family:inherit}
  .opt.correct{border-color:var(--ok);background:var(--okt);color:var(--ok);font-weight:600}
  .opt.wrong{border-color:var(--bad);background:var(--badt);color:var(--bad)}
  .opt:disabled{cursor:default}
  .score{font-size:16px;font-weight:700;text-align:center;padding:10px}
  @media(max-width:520px){ .card{padding:15px} .shell{padding:12px 12px 28px} .brand small{display:none} }
</style>
</head>
<body>
<div class="shell">
  <div class="head">
  <div class="top">
    <div class="brand">
      <span class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
      <div><b id="brand"></b><small id="brandsub"></small></div>
    </div>
    <div class="tools">
      <a class="tbtn" id="home" href="../index.html" target="_top"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span id="homeTxt"></span></a>
      <button class="tbtn" id="tema"><span id="temaIco"></span><span id="temaTxt"></span></button>
      <div class="lang" id="lang"><button data-l="en">EN</button><button data-l="es">ES</button></div>
    </div>
  </div>
  <div class="prog"><i id="progbar"></i></div>
  <div class="meta"><span id="mStep"></span><span id="mDur"></span></div>
  </div>
  <div class="card" id="card"></div>
  <div class="nav">
    <button class="btn ghost" id="prev"></button>
    <div class="dots" id="dots"></div>
    <button class="btn" id="next"></button>
  </div>
</div>

<script>
/* ===================== 1) CONFIG — edit this ===================== */
var CONFIG = {
  brand:   ["Module title","Título del módulo"],   // [EN, ES]
  subtitle:["Area · topic","Área · tema"],
  duration:"≈ 6 min",
  defaultLang:"en"                                  // "en" or "es"
};
/* Accent color: change --accent in the :root/dark CSS above to match the area. */

/* ===================== 2) IMG — real photos (../assets/) ===================== */
/* If the file exists it shows your photo; if not, the fallback illustration shows. */
var IMG = { example:"../assets/example-photo.jpg" };

/* ===================== helpers ===================== */
var params=new URLSearchParams(location.search);
var LANG=params.get("lang")?(params.get("lang").toLowerCase().startsWith("es")?"es":"en"):CONFIG.defaultLang;
function X(en,es){ return LANG==="es"?es:en; }
function $(id){ return document.getElementById(id); }
function tit(en,es){ return '<div class="step-ico">'+STEPS[cur].ico+'</div><h1>'+X(en,es)+'</h1>'; }
function imgSlot(key, svg, capEn, capEs, cls){
  var src=IMG[key]; var img=src?'<img src="'+src+'" alt="" onerror="this.remove()">':'';
  return '<div class="illus '+(cls||'')+'">'+svg+img+'</div><div class="mcap">'+ICO.img+' '+X(capEn,capEs)+(src?' · '+src.replace("../",""):'')+'</div>';
}
var ICO={
  dot:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>',
  img:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>',
  sun:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  moon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
};
var G_example='<svg viewBox="0 0 160 90"><rect x="40" y="24" width="80" height="42" rx="6" fill="#22304f" stroke="#3a4a72"/><text x="80" y="80" fill="#7fa8e8" font-size="9" text-anchor="middle">your illustration</text></svg>';

/* ===================== canvas engine (reusable) ===================== */
var _gen=0;
function stopAnim(){ _gen++; }
function fitCanvas(cv){ var r=cv.getBoundingClientRect(); var dpr=window.devicePixelRatio||1; cv.width=Math.max(1,Math.round(r.width*dpr)); cv.height=Math.max(1,Math.round(r.height*dpr)); var ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0); return {ctx:ctx,w:r.width,h:r.height}; }
function screen(type, capEn, capEs){ return '<div class="illus"><canvas class="cv" data-cv="'+type+'"></canvas></div><div class="mcap">'+ICO.img+' '+X(capEn,capEs)+'</div>'; }
function screenBg(ctx,w,h){ ctx.fillStyle="#08111f"; ctx.fillRect(0,0,w,h);
  var padL=40,padR=14,padT=18,padB=26,pw=w-padL-padR,ph=h-padT-padB,i;
  ctx.strokeStyle="rgba(90,120,175,.16)"; ctx.lineWidth=1;
  for(i=0;i<=8;i++){var x=padL+pw*i/8+.5;ctx.beginPath();ctx.moveTo(x,padT);ctx.lineTo(x,padT+ph);ctx.stroke();}
  for(i=0;i<=5;i++){var y=padT+ph*i/5+.5;ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+pw,y);ctx.stroke();}
  ctx.strokeStyle="rgba(120,150,200,.35)"; ctx.strokeRect(padL+.5,padT+.5,pw,ph);
  return {padL:padL,padT:padT,pw:pw,ph:ph};
}
/* Demo animation: a live sine trace that draws itself (analyzer style) */
function animDemo(cv){
  var g=fitCanvas(cv),ctx=g.ctx,w=g.w,h=g.h,gen=_gen,start=performance.now();
  function frame(now){ if(gen!==_gen)return; var t=(now-start)/1000,P=screenBg(ctx,w,h),i;
    ctx.beginPath(); for(i=0;i<=160;i++){var fx=i/160;var v=0.5+0.32*Math.sin(fx*10+t*1.6)+0.12*Math.sin(fx*23+t*2.4);var x=P.padL+P.pw*fx;var y=P.padT+P.ph*(1-v);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.strokeStyle="#54e0c7";ctx.lineWidth=2;ctx.shadowColor="#54e0c7";ctx.shadowBlur=8;ctx.stroke();ctx.shadowBlur=0;
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
}
/* Demo interactive: bar chart driven by a slider (static redraw) */
function drawDemo(cv,val){
  var g=fitCanvas(cv),ctx=g.ctx,w=g.w,h=g.h,P=screenBg(ctx,w,h),base=P.padT+P.ph;
  for(var i=0;i<6;i++){var hh=(0.2+0.13*i)*(val/100)*P.ph;var x=P.padL+P.pw*(i+0.5)/6;ctx.strokeStyle="#4d8bff";ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(x,base);ctx.lineTo(x,base-hh);ctx.stroke();}
  ctx.fillStyle="#9fb0cc";ctx.font="11px system-ui";ctx.textAlign="left";ctx.fillText("value = "+val,P.padL,13);
}
function initCanvases(){
  document.querySelectorAll("#card canvas.cv").forEach(function(cv){ if(cv.dataset.cv==="demo") animDemo(cv); });
}

/* ===================== 3) STEPS — your slides ===================== */
/* Each step: { ico, t:[EN,ES], b: buildFn, i: optionalInitFn }.
   Add/remove/reorder freely. Copy a pattern below. */
var STEPS = [
  /* --- text slide --- */
  { ico:ICO.dot, t:["Text slide","Slide de texto"], b:function(){
      return tit("A text slide","Un slide de texto")+
        '<span class="pill">'+X("Example","Ejemplo")+'</span>'+
        '<p class="lead">'+X("Write your explanation here. Keep it short and clear.","Escribe tu explicación aquí. Córtala y clara.")+'</p>'+
        '<div class="grid3"><div class="box"><h3>A</h3><p>'+X("point one","punto uno")+'</p></div><div class="box"><h3>B</h3><p>'+X("point two","punto dos")+'</p></div><div class="box"><h3>C</h3><p>'+X("point three","punto tres")+'</p></div></div>'+
        '<p class="note warn">'+X("Use notes for warnings or key rules.","Usa notas para advertencias o reglas clave.")+'</p>';
  }},
  /* --- photo / illustration slide (drops in ../assets/example-photo.jpg if present) --- */
  { ico:ICO.dot, t:["Photo slide","Slide de foto"], b:function(){
      return tit("Photo or illustration","Foto o ilustración")+
        '<p class="lead">'+X("Add a real photo to assets/ named example-photo.jpg, or keep the illustration.","Pon una foto real en assets/ con el nombre example-photo.jpg, o deja la ilustración.")+'</p>'+
        imgSlot("example", G_example, "Caption for the image.","Descripción de la imagen.");
  }},
  /* --- canvas animation slide --- */
  { ico:ICO.dot, t:["Canvas animation","Animación en canvas"], b:function(){
      return tit("Canvas animation","Animación en canvas")+
        '<p class="lead">'+X("A live analyzer-style animation. Add your own draw function in the engine.","Una animación en vivo tipo analizador. Agrega tu propia función de dibujo en el motor.")+'</p>'+
        screen("demo","Live demo trace.","Traza demo en vivo.");
  }},
  /* --- interactive slide (slider drives a canvas + readout) --- */
  { ico:ICO.dot, t:["Interactive","Interactivo"], b:function(){
      return tit("Interactive control","Control interactivo")+
        '<p class="lead">'+X("Move the slider; the canvas and the number update.","Mueve el control; el canvas y el número se actualizan.")+'</p>'+
        '<div class="illus"><canvas id="demoCv"></canvas></div>'+
        '<div class="row"><span style="min-width:90px;font-size:13px;color:var(--sub)">'+X("Value","Valor")+'</span><input type="range" id="sld" min="0" max="100" value="60"><span class="val" id="sldv"></span></div>';
    }, i:function(){ var s=$("sld"),cv=$("demoCv"); function upd(){ $("sldv").textContent=s.value; if(cv)drawDemo(cv,+s.value);} s.oninput=upd; if(cv)upd(); }
  },
  /* --- checklist slide --- */
  { ico:ICO.dot, t:["Checklist","Checklist"], b:function(){
      var items=[["Step one","Paso uno"],["Step two","Paso dos"],["Step three","Paso tres"]];
      return tit("Checklist","Checklist")+'<p class="lead">'+X("Tap each item.","Toca cada punto.")+'</p>'+
        items.map(function(it){return '<div class="chk"><span class="bx">✓</span><span class="txt"><b>'+X(it[0],it[1])+'</b></span></div>';}).join("")+'<p class="note" id="ckMsg"></p>';
    }, i:function(){ var t=document.querySelectorAll(".chk").length; function upd(){var d=document.querySelectorAll(".chk.done").length;$("ckMsg").textContent=X("Done: ","Hecho: ")+d+"/"+t;} document.querySelectorAll(".chk").forEach(function(c){c.onclick=function(){c.classList.toggle("done");upd();};}); upd(); }
  },
  /* --- quiz slide --- */
  { ico:ICO.dot, t:["Quiz","Evaluación"], b:function(){
      var QUIZ=[{en:"Sample question?",es:"¿Pregunta de ejemplo?",o_en:["Wrong","Right","Wrong"],o_es:["Mal","Bien","Mal"],a:1}];
      window._QZ=QUIZ;
      var qs=QUIZ.map(function(q,i){var o=(LANG==="es"?q.o_es:q.o_en).map(function(x,j){return '<button class="opt" data-q="'+i+'" data-o="'+j+'">'+x+'</button>';}).join("");return '<div class="q"><h3>'+(i+1)+'. '+X(q.en,q.es)+'</h3>'+o+'</div>';}).join("");
      return tit("Quiz","Evaluación")+qs+'<div class="score" id="score"></div>';
    }, i:function(){ var QUIZ=window._QZ,ans={},ok=0; document.querySelectorAll(".opt").forEach(function(b){b.onclick=function(){var qi=+b.dataset.q;if(ans[qi])return;ans[qi]=1;var a=QUIZ[qi].a;document.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(function(x){x.disabled=true;if(+x.dataset.o===a)x.classList.add("correct");});if(+b.dataset.o===a)ok++;else b.classList.add("wrong");if(Object.keys(ans).length===QUIZ.length)$("score").textContent=X("Score: ","Puntaje: ")+ok+"/"+QUIZ.length;};}); }
  },
  /* --- wrap-up slide --- */
  { ico:ICO.dot, t:["Wrap-up","Cierre"], b:function(){
      return tit("Wrap-up","Cierre")+
        '<ul><li>'+X("Key takeaway one.","Idea clave uno.")+'</li><li>'+X("Key takeaway two.","Idea clave dos.")+'</li></ul>'+
        '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px"><span class="verdict ok">✓ '+X("Completed","Completado")+'</span><a class="btn ghost" href="../index.html" target="_top">'+X("Back to portal","Volver al portal")+'</a></div>';
  }}
];
var cur=0;

/* ===================== engine (usually no need to edit) ===================== */
function pintarChrome(){
  document.documentElement.lang=LANG;
  $("brand").textContent=X(CONFIG.brand[0],CONFIG.brand[1]);
  $("brandsub").textContent=X(CONFIG.subtitle[0],CONFIG.subtitle[1]);
  $("homeTxt").textContent=X("Home","Inicio");
  document.querySelectorAll("#lang button").forEach(function(b){ b.classList.toggle("on", b.dataset.l===LANG); });
  var dark=document.documentElement.getAttribute("data-theme")==="dark";
  $("temaIco").innerHTML=dark?ICO.sun:ICO.moon; $("temaTxt").textContent=dark?X("Light","Claro"):X("Dark","Oscuro");
  $("prev").innerHTML="‹ "+X("Back","Anterior");
  $("next").innerHTML=(cur>=STEPS.length-1?X("Restart","Reiniciar"):X("Next","Siguiente")+" ›");
}
function render(){
  stopAnim(); pintarChrome();
  var s=STEPS[cur];
  $("card").innerHTML=s.b();
  if(s.i) s.i();
  initCanvases();
  $("progbar").style.width=((cur+1)/STEPS.length*100)+"%";
  $("mStep").textContent=X("Step ","Paso ")+(cur+1)+" / "+STEPS.length+" · "+X(s.t[0],s.t[1]);
  $("mDur").textContent=CONFIG.duration;
  $("prev").disabled=(cur===0);
  $("dots").innerHTML=STEPS.map(function(_,i){return '<button class="dot'+(i===cur?' on':'')+'" data-i="'+i+'" aria-label="'+(i+1)+'"></button>';}).join("");
  document.querySelectorAll(".dot").forEach(function(d){ d.onclick=function(){ cur=+d.dataset.i; render(); }; });
  window.scrollTo(0,0);
}
$("prev").onclick=function(){ if(cur>0){cur--;render();} };
$("next").onclick=function(){ cur=(cur>=STEPS.length-1)?0:cur+1; render(); };
document.querySelectorAll("#lang button").forEach(function(b){ b.onclick=function(){ LANG=b.dataset.l; render(); }; });
$("tema").onclick=function(){ var d=document.documentElement.getAttribute("data-theme")==="dark"; document.documentElement.setAttribute("data-theme", d?"light":"dark"); pintarChrome(); };
render();
</script>
</body>
</html>
