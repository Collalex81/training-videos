<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Portadas / Poster Generator</title>
<!--
  =============================================================================
  GENERADOR DE PORTADAS para el Centro de Capacitación
  Cómo usar: 1) Escribe título y subtítulo. 2) Elige área (color) y motivo.
  3) Descarga el SVG. 4) Guárdalo en assets/  5) En videos.json pon:
     "poster": "assets/TU-ARCHIVO.svg"
  -----------------------------------------------------------------------------
  POSTER GENERATOR — How to use: fill title/subtitle, pick area + motif,
  download the SVG, drop it in assets/, and set "poster" in videos.json.
  =============================================================================
-->
<style>
  :root{--pg:#f4f6fb;--card:#fff;--ink:#0f2544;--sub:#5b6b84;--line:#e6ebf5;--bar:#0b2e59;--accent:#2563EB;--tint:rgba(37,99,235,.1);--radius:14px;--shadow:0 1px 2px rgba(16,37,68,.05),0 10px 26px rgba(16,37,68,.07)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--pg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;line-height:1.5}
  .topbar{background:var(--bar);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.1}
  .brand small{font-size:11px;opacity:.7}
  .lang{display:flex;gap:3px;background:rgba(255,255,255,.12);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:#fff;cursor:pointer;min-width:36px;height:28px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--accent)}
  .wrap{max-width:920px;margin:0 auto;padding:22px 18px 40px}
  h1{font-size:22px;margin:0 0 4px}
  .lead{color:var(--sub);margin:0 0 18px;font-size:14px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:720px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--sub);margin:12px 0 5px}
  input[type=text],select{width:100%;background:var(--pg);border:1px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:10px;font-size:14px;font-family:inherit;outline:none}
  input[type=text]:focus,select:focus{border-color:var(--accent)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px}
  .chip{border:1px solid var(--line);background:var(--pg);border-radius:999px;padding:7px 13px;cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:7px}
  .chip.on{border-color:var(--accent);background:var(--tint);color:var(--accent);font-weight:600}
  .sw{width:14px;height:14px;border-radius:50%}
  .preview{background:#0a1526;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .preview svg{display:block;width:100%;height:auto}
  .phint{font-size:11.5px;color:var(--sub);margin:8px 2px 0}
  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;padding:11px 16px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit}
  .btn.ghost{background:transparent;color:var(--accent)}
  code{background:var(--pg);border:1px solid var(--line);border-radius:6px;padding:2px 6px;font-size:12.5px}
  .steps{font-size:13px;color:var(--sub);margin-top:16px;line-height:1.7}
  .steps b{color:var(--ink)}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <span class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg></span>
    <div><b id="tb"></b><small id="tbs"></small></div>
  </div>
  <div class="lang" id="lang"><button data-l="es">ES</button><button data-l="en">EN</button></div>
</div>

<div class="wrap">
  <h1 id="h1"></h1>
  <p class="lead" id="lead"></p>
  <div class="grid">
    <div class="panel">
      <label id="lTit"></label>
      <input type="text" id="fTitle" value="Nuevo módulo">
      <label id="lSub"></label>
      <input type="text" id="fSub" value="TELECOM · DESCRIPCIÓN CORTA">
      <label id="lArea"></label>
      <div class="chips" id="areas"></div>
      <label id="lMot"></label>
      <div class="chips" id="motifs"></div>
      <label id="lFile"></label>
      <input type="text" id="fFile" value="poster-nuevo">
      <div class="btns">
        <button class="btn" id="dl"></button>
        <button class="btn ghost" id="cp"></button>
      </div>
      <div class="steps" id="steps"></div>
    </div>
    <div class="panel">
      <label id="lPrev"></label>
      <div class="preview" id="preview"></div>
      <p class="phint" id="phint"></p>
    </div>
  </div>
</div>

<script>
var LANG="es";
function X(es,en){return LANG==="es"?es:en;}
function $(id){return document.getElementById(id);}
var AREAS=[
  {k:"telecom",c:"#2563EB",es:"Telecom",en:"Telecom"},
  {k:"seguridad",c:"#15803D",es:"Seguridad",en:"Safety"},
  {k:"electricidad",c:"#F59E0B",es:"Electricidad",en:"Electrical"},
  {k:"construccion",c:"#EA580C",es:"Construcción",en:"Construction"},
  {k:"induccion",c:"#7C3AED",es:"Inducción",en:"Onboarding"}
];
var MOTIFS=[
  {k:"spectrum",es:"Espectro (PIM/RF)",en:"Spectrum (PIM/RF)"},
  {k:"trace",es:"Traza de analizador",en:"Analyzer trace"},
  {k:"wave",es:"Onda",en:"Waveform"},
  {k:"none",es:"Simple",en:"Plain"}
];
var accent=AREAS[0].c, motif="spectrum";

function motifSVG(m){
  if(m==="spectrum") return '<rect x="196" y="46" width="104" height="112" fill="#dc2626" opacity="0.12"/><rect x="196" y="46" width="104" height="112" fill="none" stroke="#f87171" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.7"/><text x="248" y="58" fill="#f4a3a3" font-size="8" text-anchor="middle" letter-spacing="1">Rx BAND</text><g stroke-linecap="round"><line x1="70" y1="158" x2="70" y2="74" stroke="#4d8bff" stroke-width="4"/><line x1="104" y1="158" x2="104" y2="74" stroke="#4d8bff" stroke-width="4"/><line x1="228" y1="158" x2="228" y2="104" stroke="#f87171" stroke-width="4"/><line x1="262" y1="158" x2="262" y2="124" stroke="#fbbf24" stroke-width="4"/></g><text x="70" y="70" fill="#9db4ff" font-size="8" text-anchor="middle">f1</text><text x="104" y="70" fill="#9db4ff" font-size="8" text-anchor="middle">f2</text><text x="228" y="100" fill="#f4a3a3" font-size="8" text-anchor="middle">IM3</text>';
  if(m==="trace") return '<line x1="16" y1="132" x2="304" y2="132" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.85"/><text x="300" y="128" fill="#f0b24a" font-size="8" text-anchor="end">limit</text><polyline points="16,96 52,90 78,78 108,86 140,70 172,84 206,74 240,96 276,86 304,92" fill="none" stroke="#54e0c7" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  if(m==="wave") return '<path d="M8 108 Q44 60 80 108 T152 108 T224 108 T296 108" fill="none" stroke="#54e0c7" stroke-width="2.5" stroke-linecap="round"/><path d="M8 118 Q44 150 80 118 T152 118 T224 118 T296 118" fill="none" stroke="#4d8bff" stroke-width="1.6" opacity="0.5" stroke-linecap="round"/>';
  return '';
}
function buildSVG(o){
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" font-family="system-ui,Segoe UI,Roboto,sans-serif">'+
    '<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#143a6e"/><stop offset="1" stop-color="#0a1526"/></linearGradient></defs>'+
    '<rect width="320" height="180" fill="url(#bg)"/>'+
    '<g stroke="#3a5488" stroke-width="0.6" opacity="0.4"><line x1="0" y1="70" x2="320" y2="70"/><line x1="0" y1="110" x2="320" y2="110"/><line x1="0" y1="150" x2="320" y2="150"/><line x1="80" y1="40" x2="80" y2="165"/><line x1="160" y1="40" x2="160" y2="165"/><line x1="240" y1="40" x2="240" y2="165"/></g>'+
    motifSVG(o.motif)+
    '<rect x="0" y="0" width="320" height="4" fill="'+o.accent+'"/>'+
    '<text x="22" y="44" fill="#ffffff" font-size="'+(o.title.length>16?22:26)+'" font-weight="700">'+esc(o.title)+'</text>'+
    '<text x="22" y="62" fill="#b9c6e6" font-size="10" letter-spacing="1.2">'+esc(o.sub)+'</text>'+
  '</svg>';
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderChips(){
  $("areas").innerHTML=AREAS.map(function(a){return '<button class="chip'+(a.c===accent?' on':'')+'" data-c="'+a.c+'"><span class="sw" style="background:'+a.c+'"></span>'+X(a.es,a.en)+'</button>';}).join("");
  $("motifs").innerHTML=MOTIFS.map(function(m){return '<button class="chip'+(m.k===motif?' on':'')+'" data-m="'+m.k+'">'+X(m.es,m.en)+'</button>';}).join("");
  document.querySelectorAll("#areas .chip").forEach(function(b){b.onclick=function(){accent=b.dataset.c;document.documentElement.style.setProperty("--accent",accent);renderChips();draw();};});
  document.querySelectorAll("#motifs .chip").forEach(function(b){b.onclick=function(){motif=b.dataset.m;renderChips();draw();};});
}
function opts(){return {title:$("fTitle").value||"Título",sub:$("fSub").value||"",accent:accent,motif:motif};}
function draw(){ $("preview").innerHTML=buildSVG(opts()); }

function ui(){
  $("tb").textContent=X("Centro de Capacitación","Training Center");
  $("tbs").textContent=X("Generador de portadas","Poster generator");
  $("h1").textContent=X("Generador de portadas","Poster generator");
  $("lead").textContent=X("Crea la portada de un módulo en segundos. Escribe, elige y descarga.","Create a module poster in seconds. Type, pick and download.");
  $("lTit").textContent=X("Título","Title");
  $("lSub").textContent=X("Subtítulo (mayúsculas cortas)","Subtitle (short, caps)");
  $("lArea").textContent=X("Área (color)","Area (color)");
  $("lMot").textContent=X("Motivo","Motif");
  $("lFile").textContent=X("Nombre de archivo","File name");
  $("lPrev").textContent=X("Vista previa (16:9)","Preview (16:9)");
  $("phint").textContent=X("Nota: en la galería, el botón de play, la etiqueta y la duración se dibujan encima del centro.","Note: in the gallery the play button, tag and duration are drawn over the center.");
  $("dl").textContent=X("Descargar SVG","Download SVG");
  $("cp").textContent=X("Copiar código","Copy code");
  $("steps").innerHTML=X(
    "<b>Pasos:</b> 1) Descarga el SVG. 2) Guárdalo en <code>assets/</code>. 3) En <code>videos.json</code> pon <code>\"poster\": \"assets/tu-archivo.svg\"</code>.",
    "<b>Steps:</b> 1) Download the SVG. 2) Save it in <code>assets/</code>. 3) In <code>videos.json</code> set <code>\"poster\": \"assets/your-file.svg\"</code>.");
  document.querySelectorAll("#lang button").forEach(function(b){b.classList.toggle("on",b.dataset.l===LANG);});
  renderChips();
}

["fTitle","fSub"].forEach(function(id){ $(id).addEventListener("input",draw); });
$("dl").onclick=function(){
  var name=($("fFile").value||"poster").replace(/[^a-z0-9\-_]/gi,"-"); if(!/\.svg$/i.test(name)) name+=".svg";
  var blob=new Blob([buildSVG(opts())],{type:"image/svg+xml"}); var url=URL.createObjectURL(blob);
  var a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
};
$("cp").onclick=function(){ navigator.clipboard.writeText(buildSVG(opts())).then(function(){ $("cp").textContent=X("¡Copiado!","Copied!"); setTimeout(function(){ $("cp").textContent=X("Copiar código","Copy code"); },1200); }); };
document.querySelectorAll("#lang button").forEach(function(b){ b.onclick=function(){ LANG=b.dataset.l; ui(); draw(); }; });

ui(); draw();
</script>
</body>
</html>
