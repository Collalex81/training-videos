<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Capacitación / Training Center</title>
<meta name="description" content="Bilingual (ES/EN) interactive safety & technical training modules. Built and designed by Luis Estevez.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231f6feb'/><text x='32' y='44' font-family='Segoe UI,Arial,sans-serif' font-size='30' font-weight='700' fill='white' text-anchor='middle'>LE</text></svg>">
<meta property="og:title" content="Training Center · by Luis Estevez">
<meta property="og:description" content="Bilingual interactive safety & technical training modules.">
<meta property="og:type" content="website">
<meta property="og:image" content="assets/poster-tool-tethering.jpg">
<meta name="twitter:card" content="summary_large_image">
<script>try{var _t=localStorage.getItem("tema");document.documentElement.setAttribute("data-theme",_t==="dark"?"dark":"light");}catch(e){}</script>
<style>
  :root{
    --pg:#f4f6fb; --card:#ffffff; --ink:#0f2544; --sub:#5b6b84;
    --line:#e6ebf5; --bar:#0b2e59; --barink:#ffffff; --brand:#1f6feb;
    --tint:rgba(31,111,235,.10); --shadow:0 1px 2px rgba(16,37,68,.05),0 10px 26px rgba(16,37,68,.07);
    --radius:14px;
  }
  html[data-theme="dark"]{
    --pg:#0b1220; --card:#151d30; --ink:#eaf0ff; --sub:#9fb0cc;
    --line:#243149; --bar:#0a1526; --barink:#ffffff; --brand:#4d8bff;
    --tint:rgba(77,139,255,.14); --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--pg);color:var(--ink);min-height:100vh;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;transition:background .2s,color .2s}
  svg{display:block}
  a{color:var(--brand)}
  /* Top bar */
  .topbar{position:sticky;top:0;z-index:40;background:linear-gradient(100deg,var(--bar),#124a86);color:var(--barink);
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px 20px;flex-wrap:wrap;box-shadow:0 2px 14px rgba(0,0,0,.18)}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--brand),#4f46e5);
    display:flex;align-items:center;justify-content:center;flex:none;color:#fff;
    font-weight:800;font-size:15px;letter-spacing:.5px}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{font-size:10.5px;opacity:.7;letter-spacing:.06em}
  .tb-left{display:flex;align-items:center;gap:14px;min-width:0}
  .credit{font-size:12px;color:rgba(255,255,255,.74);border-left:1px solid rgba(255,255,255,.22);
    padding-left:14px;white-space:nowrap;font-weight:500;letter-spacing:.02em}
  .tb-actions{display:flex;align-items:center;gap:8px}
  .btn-ico{border:1px solid rgba(255,255,255,.25);background:transparent;color:var(--barink);
    cursor:pointer;padding:0 12px;height:36px;border-radius:9px;font-size:12.5px;
    display:flex;align-items:center;gap:6px;font-family:inherit}
  .btn-ico:hover{background:rgba(255,255,255,.1)}
  a.btn-ico{text-decoration:none}
  a.btn-ico svg{width:15px;height:15px}
  .lang{display:flex;gap:3px;background:rgba(255,255,255,.12);border-radius:999px;padding:3px}
  .lang button{border:0;background:transparent;color:var(--barink);cursor:pointer;
    min-width:38px;height:30px;border-radius:999px;font-size:12.5px;font-weight:600;font-family:inherit}
  .lang button.on{background:var(--brand);color:#fff}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
  /* Hero */
  .hero{text-align:center;padding:40px 20px 6px}
  .badge{display:inline-block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--brand);background:var(--tint);padding:6px 13px;border-radius:999px;
    margin-bottom:14px;font-weight:600}
  .hero h1{font-size:clamp(24px,4.5vw,34px);margin:0 0 10px;font-weight:700;line-height:1.15}
  .hero p{color:var(--sub);font-size:clamp(14px,2.4vw,16px);max-width:560px;margin:0 auto;line-height:1.55}
  .stats{display:flex;gap:clamp(18px,5vw,34px);justify-content:center;margin-top:22px;flex-wrap:wrap}
  .stat b{display:block;font-size:24px;font-weight:700}
  .stat span{font-size:12px;color:var(--sub);letter-spacing:.03em}
  /* Section head */
  .shead{display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin:26px 0 4px;flex-wrap:wrap}
  .shead h2{font-size:18px;margin:0;font-weight:600}
  /* Area cards */
  .areas{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,230px),1fr));
    gap:16px;padding:14px 0 36px}
  .acard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;text-align:left;font-family:inherit;color:inherit;padding:0;
    box-shadow:var(--shadow);transition:transform .16s,box-shadow .16s;display:flex;flex-direction:column}
  .acard:hover{transform:translateY(-4px);box-shadow:0 16px 34px rgba(16,37,68,.14)}
  .acard .top{height:4px}
  .acard .in{padding:16px 16px 15px;display:flex;flex-direction:column;flex:1}
  .aico{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
  .acard h3{font-size:16px;font-weight:600;margin:0 0 5px}
  .acard .d{font-size:13px;color:var(--sub);line-height:1.5;margin:0 0 14px;flex:1}
  .acard .foot{display:flex;align-items:center;justify-content:space-between;font-size:12.5px}
  .acard .cnt{color:var(--sub);display:flex;align-items:center;gap:5px}
  .acard .go{font-weight:600;display:flex;align-items:center;gap:5px}
  /* Breadcrumb + area header */
  .crumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--sub);
    margin:20px 0 2px;flex-wrap:wrap}
  .crumb button{border:0;background:transparent;color:var(--brand);cursor:pointer;
    font-family:inherit;font-size:13px;padding:6px 8px;border-radius:8px;display:flex;align-items:center;gap:5px}
  .crumb button:hover{background:var(--tint)}
  .ahead{display:flex;align-items:center;gap:14px;margin:6px 0 4px}
  .ahead .aico{margin:0;width:52px;height:52px}
  .ahead h2{font-size:clamp(20px,4vw,26px);margin:0 0 3px;font-weight:700}
  .ahead p{margin:0;color:var(--sub);font-size:14px}
  /* Controls */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:18px 0 4px}
  .search{position:relative;flex:1;min-width:200px;max-width:440px}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--sub)}
  #buscar{width:100%;background:var(--card);border:1px solid var(--line);color:var(--ink);
    padding:11px 14px 11px 40px;border-radius:11px;font-size:15px;outline:none;font-family:inherit}
  #buscar:focus{border-color:var(--brand)}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{background:var(--card);border:1px solid var(--line);color:var(--sub);
    padding:9px 15px;border-radius:999px;cursor:pointer;font-size:13.5px;font-family:inherit;min-height:38px}
  .chip:hover{color:var(--ink)}
  .chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
  /* Home hero search (enterprise) */
  .hsearch{position:relative;max-width:640px;margin:22px auto 2px}
  .hsearch input{width:100%;height:56px;background:var(--card);border:1px solid var(--line);
    border-radius:16px;color:var(--ink);font-size:16px;font-family:inherit;
    padding:0 48px 0 54px;outline:none;box-shadow:var(--shadow);
    transition:border-color .18s,box-shadow .18s}
  .hsearch input::placeholder{color:var(--sub);opacity:.9}
  .hsearch input:focus{border-color:var(--brand);
    box-shadow:0 0 0 4px var(--tint),0 16px 36px rgba(16,37,68,.16)}
  .hsearch .hs-ico{position:absolute;left:19px;top:50%;transform:translateY(-50%);
    color:var(--brand);display:flex;pointer-events:none}
  .hsearch .hs-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);
    width:28px;height:28px;border-radius:50%;border:0;background:var(--tint);color:var(--brand);
    font-size:17px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;font-family:inherit}
  .hsearch .hs-clear.show{display:flex}
  .hsearch .hs-clear:hover{background:var(--brand);color:#fff}
  .hsearch .hs-kbd{position:absolute;right:14px;top:50%;transform:translateY(-50%);
    font-family:inherit;font-size:11px;color:var(--sub);border:1px solid var(--line);
    border-radius:6px;padding:3px 7px;background:var(--pg);letter-spacing:.04em;pointer-events:none}
  .hsearch .hs-kbd.hide{display:none}
  .rescount{max-width:640px;margin:12px auto 0;color:var(--sub);font-size:13px;text-align:center}
  mark{background:var(--tint);color:var(--brand);padding:0 2px;border-radius:3px;font-weight:600}
  /* Video grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,270px),1fr));
    gap:20px;padding:22px 0 40px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;box-shadow:var(--shadow);transition:transform .16s;text-align:left}
  .card:hover{transform:translateY(-4px);box-shadow:0 16px 34px rgba(16,37,68,.14)}
  .thumb{position:relative;aspect-ratio:16/9;background:var(--pg);
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .play{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(31,111,235,.94);
    display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 22px rgba(0,0,0,.28)}
  .tag{position:absolute;top:10px;left:10px;color:#fff;font-size:10.5px;letter-spacing:.06em;
    text-transform:uppercase;padding:5px 10px;border-radius:999px;font-weight:600}
  .dur{position:absolute;bottom:10px;right:10px;background:rgba(6,14,28,.78);color:#fff;
    font-size:12px;padding:3px 8px;border-radius:6px}
  .cbody{padding:14px 16px 17px}
  .cbody h3{margin:0 0 7px;font-size:15.5px;line-height:1.3;font-weight:600}
  .cbody p{margin:0;color:var(--sub);font-size:13.5px;line-height:1.5}
  .vacio{grid-column:1/-1;text-align:center;color:var(--sub);padding:50px 16px;
    background:var(--card);border:1px dashed var(--line);border-radius:var(--radius)}
  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(6,10,20,.78);backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;padding:18px;z-index:60}
  .modal.on{display:flex}
  .visor{width:min(940px,100%);max-height:92vh;overflow:auto;background:var(--card);
    border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .media{aspect-ratio:16/9;background:#000}
  .media video,.media iframe{width:100%;height:100%;border:0;display:block}
  .vinfo{padding:16px 20px 20px}
  .vinfo h2{margin:0 0 7px;font-size:19px;font-weight:600}
  .vinfo p{margin:0;color:var(--sub);line-height:1.55;font-size:14.5px}
  .visor.full{position:fixed;inset:0;width:auto;height:auto;max-height:none;border:0;border-radius:0;display:flex;flex-direction:column;z-index:60}
  .visor.full .media{aspect-ratio:auto;flex:1;background:var(--card)}
  .visor.full .vinfo{display:none}
  .cerrar{position:fixed;top:16px;right:18px;width:42px;height:42px;border-radius:50%;
    border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:22px;cursor:pointer;z-index:61}
  footer{text-align:center;color:var(--sub);font-size:12.5px;padding:26px 20px 40px;border-top:1px solid var(--line)}
  footer a{color:var(--brand)}
  @media(max-width:560px){
    .topbar{padding:10px 14px}
    .wrap{padding:0 14px}
    .brand small{display:none}
    .credit{display:none}
    .ahead .aico{width:44px;height:44px}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <div class="brand">
      <span class="logo" id="logo"></span>
      <div><b id="brand"></b><small id="brandsub"></small></div>
    </div>
    <span class="credit" id="credit"></span>
  </div>
  <div class="tb-actions">
    <a class="btn-ico" id="portal" href="https://collalex81.github.io/JCE-Field/" aria-label="JCE"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg><span id="portalTxt"></span></a>
    <button class="btn-ico" id="tema"><span id="temaIco"></span><span id="temaTxt"></span></button>
    <div class="lang" id="lang">
      <button data-l="es">ES</button>
      <button data-l="en">EN</button>
    </div>
  </div>
</div>

<main id="app"></main>

<div class="modal" id="modal" role="dialog" aria-modal="true">
  <button class="cerrar" id="cerrar" aria-label="Cerrar">&times;</button>
  <div class="visor" id="visor">
    <div class="media" id="media"></div>
    <div class="vinfo"><h2 id="mTit"></h2><p id="mDesc"></p></div>
  </div>
</div>

<footer id="footer"></footer>

<script>
/* ---------- Iconos (SVG inline) ---------- */
const IC = {
  play:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4v16l13-8z"/></svg>',
  play2:'<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
  shield:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>',
  antenna:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>',
  bolt:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>',
  tools:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
  user:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>',
  search:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  arrow:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>',
  back:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>',
  moon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
  sun:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>'
};

/* ---------- Áreas (secciones) ---------- */
const AREAS = [
  {key:"seguridad",   color:"#15803D", ico:"shield",  nombre:{es:"Seguridad",en:"Safety"},        desc:{es:"EHS, prevención de riesgos y protocolos.",en:"EHS, risk prevention and protocols."}},
  {key:"telecom",     color:"#2563EB", ico:"antenna", nombre:{es:"Telecom",en:"Telecom"},          desc:{es:"Redes, fibra e instalaciones.",en:"Networks, fiber and installations."}},
  {key:"electricidad",color:"#F59E0B", ico:"bolt",    nombre:{es:"Electricidad",en:"Electrical"},  desc:{es:"Alta y baja tensión, normas.",en:"High and low voltage, standards."}},
  {key:"construccion",color:"#EA580C", ico:"tools",   nombre:{es:"Construcción",en:"Construction"},desc:{es:"Obra, altura, soldadura y maquinaria.",en:"Civil works, heights, welding and machinery."}},
  {key:"induccion",   color:"#7C3AED", ico:"user",    nombre:{es:"Inducción",en:"Onboarding"},     desc:{es:"Bienvenida y capacitación inicial.",en:"Welcome and initial training."}}
];
const AMAP = Object.fromEntries(AREAS.map(a=>[a.key,a]));

/* ---------- Textos de interfaz ---------- */
const UI = {
  es:{brand:"Centro de Capacitación", brandsub:"CAPACITACIÓN CORPORATIVA",
      badge:"Portal de Entrenamiento", titulo:"Capacitación por área de trabajo",
      intro:"Selecciona tu área para ver los módulos de entrenamiento, o busca en todos. Contenido disponible en español e inglés.",
      areas:"Áreas de capacitación", inicio:"Inicio", buscar:"Buscar un módulo...",
      buscarHome:"Buscar en todos los módulos...", vacioSearch:"Ningún módulo coincide con tu búsqueda.",
      todos:"Todos", modulos:"módulos", modulo:"módulo", ver:"Ver módulos", tema:"Oscuro",
      stArea:"Áreas", stVid:"Módulos", stIdi:"Idiomas",
      vacio:"Aún no hay módulos en esta área.",
      error:"No se pudo cargar videos.json. Abre el sitio con un servidor local o en GitHub Pages.",
      portal:"Portal", credit:"Construido y diseñado por Luis Estevez", footer:''},
  en:{brand:"Training Center", brandsub:"CORPORATE TRAINING",
      badge:"Training Portal", titulo:"Training by work area",
      intro:"Select your area to see the training modules, or search across all of them. Content available in Spanish and English.",
      areas:"Training areas", inicio:"Home", buscar:"Search a module...",
      buscarHome:"Search all modules...", vacioSearch:"No modules match your search.",
      todos:"All", modulos:"modules", modulo:"module", ver:"View modules", tema:"Dark",
      stArea:"Areas", stVid:"Modules", stIdi:"Languages",
      vacio:"No modules in this area yet.",
      error:"Could not load videos.json. Open the site with a local server or on GitHub Pages.",
      portal:"Portal", credit:"Built and designed by Luis Estevez", footer:''}
};

/* ---------- Estado ---------- */
let VIDEOS = [];
let LANG = "en";
let areaActiva = null;      // null = inicio
let catActiva = "__all__";
try{ const l=localStorage.getItem("lang"); if(l) LANG=l; }catch(e){}
if(!LANG){ LANG = (navigator.language||"es").toLowerCase().startsWith("en") ? "en" : "es"; }

function t(c){ return (c && typeof c==="object") ? (c[LANG] ?? c.es ?? c.en ?? "") : (c ?? ""); }
function $(id){ return document.getElementById(id); }
function countArea(k){ return VIDEOS.filter(v=>v.area===k).length; }

/* ---------- Carga ---------- */
async function cargar(){
  try{
    const r = await fetch("videos.json",{cache:"no-store"});
    VIDEOS = await r.json();
  }catch(e){
    pintarChrome();
    $("app").innerHTML = '<div class="wrap"><div class="vacio" style="margin:40px 0">'+UI[LANG].error+'</div></div>';
    return;
  }
  fromHash();
  render();
}

/* ---------- Chrome (barra, footer, idioma, tema) ---------- */
function pintarChrome(){
  const u = UI[LANG];
  document.documentElement.lang = LANG;
  $("logo").textContent = "LE";
  $("brand").textContent = u.brand;
  $("brandsub").textContent = u.brandsub;
  $("temaTxt").textContent = u.tema;
  const dark = document.documentElement.getAttribute("data-theme")==="dark";
  $("temaIco").innerHTML = dark ? IC.sun : IC.moon;
  $("temaTxt").textContent = dark ? (LANG==="es"?"Claro":"Light") : u.tema;
  var _c=$("credit"); if(_c) _c.textContent = u.credit || "";
  var _p=$("portalTxt"); if(_p) _p.textContent = u.portal || "";
  var _pa=$("portal"); if(_pa){ var _tt=(LANG==="es"?"Ir al portal principal de JCE":"Go to the main JCE portal"); _pa.setAttribute("title",_tt); _pa.setAttribute("aria-label",_tt); }
  $("footer").innerHTML = u.footer || "";
  $("footer").style.display = u.footer ? "" : "none";
  document.querySelectorAll("#lang button").forEach(b=>b.classList.toggle("on", b.dataset.l===LANG));
  document.title = u.brand + " / Training Center";
}

/* ---------- Render principal ---------- */
function render(){
  pintarChrome();
  if(!areaActiva || !AMAP[areaActiva]) renderInicio();
  else renderArea();
}

function renderInicio(){
  const u = UI[LANG];
  const cards = AREAS.map(a=>{
    const n = countArea(a.key);
    const etq = n===1 ? u.modulo : u.modulos;
    return '<button class="acard" data-area="'+a.key+'">'+
      '<span class="top" style="background:'+a.color+'"></span>'+
      '<span class="in">'+
        '<span class="aico" style="background:'+hex(a.color,.12)+';color:'+a.color+'">'+IC[a.ico]+'</span>'+
        '<h3>'+t(a.nombre)+'</h3>'+
        '<span class="d">'+t(a.desc)+'</span>'+
        '<span class="foot"><span class="cnt">'+IC.play+' '+n+' '+etq+'</span>'+
        '<span class="go" style="color:'+a.color+'">'+u.ver+' '+IC.arrow+'</span></span>'+
      '</span></button>';
  }).join("");
  $("app").innerHTML =
    '<section class="hero"><span class="badge">'+u.badge+'</span>'+
      '<h1>'+u.titulo+'</h1><p>'+u.intro+'</p>'+
      '<div class="stats">'+
        '<div class="stat"><b>'+AREAS.length+'</b><span>'+u.stArea+'</span></div>'+
        '<div class="stat"><b>'+VIDEOS.length+'</b><span>'+u.stVid+'</span></div>'+
        '<div class="stat"><b>2</b><span>'+u.stIdi+'</span></div>'+
      '</div>'+
    '</section>'+
    '<div class="wrap">'+
      '<div class="hsearch"><span class="hs-ico">'+IC.search+'</span><input id="buscarHome" type="search" placeholder="'+u.buscarHome+'" autocomplete="off"><kbd class="hs-kbd" id="hsKbd"></kbd><button class="hs-clear" id="hsClear" aria-label="clear">&times;</button></div>'+
      '<div class="rescount" id="resCount" style="display:none"></div>'+
      '<div id="homeAreasWrap"><div class="shead"><h2>'+u.areas+'</h2></div>'+
      '<div class="areas">'+cards+'</div></div>'+
      '<div class="grid" id="homeGrid" style="display:none"></div>'+
    '</div>';
  document.querySelectorAll(".acard").forEach(b=>b.onclick=()=>{ irA(b.dataset.area); });
  var _bh=$("buscarHome"); if(_bh) _bh.addEventListener("input", homeSearch);
  var _hc=$("hsClear"); if(_hc) _hc.onclick=()=>{ var b=$("buscarHome"); if(b){ b.value=""; b.focus(); } homeSearch(); };
  var _hk=$("hsKbd"); if(_hk) _hk.textContent = (navigator.platform&&/Mac|iPhone|iPad/.test(navigator.platform))?"⌘K":"Ctrl K";
}

function homeSearch(){
  const u = UI[LANG];
  const q = ($("buscarHome")?$("buscarHome").value:"").trim().toLowerCase();
  const clr = $("hsClear"); if(clr) clr.classList.toggle("show", !!q);
  const kb = $("hsKbd"); if(kb) kb.classList.toggle("hide", !!q);
  const rc = $("resCount");
  const wrap = $("homeAreasWrap"), grid = $("homeGrid");
  if(!wrap || !grid) return;
  if(!q){ wrap.style.display=""; grid.style.display="none"; grid.innerHTML=""; if(rc) rc.style.display="none"; return; }
  wrap.style.display="none"; grid.style.display="";
  const lista = VIDEOS.filter(v=>{
    const a = AMAP[v.area];
    const hay = (t(v.titulo)+" "+t(v.descripcion)+" "+t(v.categoria)+" "+(a?t(a.nombre):"")).toLowerCase();
    return hay.includes(q);
  });
  if(rc){ rc.style.display=""; rc.textContent = lista.length+" "+(lista.length===1?u.modulo:u.modulos); }
  if(!lista.length){ grid.innerHTML='<div class="vacio">'+u.vacioSearch+'</div>'; return; }
  grid.innerHTML = lista.map(v=>{
    const i = VIDEOS.indexOf(v);
    const a = AMAP[v.area] || {color:"#888"};
    return '<button class="card" data-i="'+i+'"><div class="thumb">'+
      (v.poster?'<img src="'+v.poster+'" alt="" onerror="this.style.display=\'none\'">':'')+
      (v.categoria?'<span class="tag" style="background:'+a.color+'">'+t(v.categoria)+'</span>':'')+
      '<span class="play">'+IC.play+'</span>'+
      (v.duracion?'<span class="dur">'+v.duracion+'</span>':'')+
    '</div><div class="cbody"><h3>'+hl(t(v.titulo),q)+'</h3><p>'+hl(t(v.descripcion),q)+'</p></div></button>';
  }).join("");
  grid.querySelectorAll(".card").forEach(c=>c.onclick=()=>abrir(VIDEOS[c.dataset.i]));
}

function renderArea(){
  const u = UI[LANG];
  const a = AMAP[areaActiva];
  const cats = [...new Set(VIDEOS.filter(v=>v.area===a.key).map(v=>t(v.categoria)).filter(Boolean))];
  const chips = [{k:"__all__",l:u.todos},...cats.map(c=>({k:c,l:c}))];
  $("app").innerHTML =
    '<div class="wrap">'+
      '<div class="crumb"><button id="bInicio">'+IC.back+' '+u.inicio+'</button><span>/</span><span>'+t(a.nombre)+'</span></div>'+
      '<div class="ahead"><span class="aico" style="background:'+hex(a.color,.12)+';color:'+a.color+'">'+IC[a.ico]+'</span>'+
        '<div><h2>'+t(a.nombre)+'</h2><p>'+t(a.desc)+'</p></div></div>'+
      '<div class="controls"><div class="search">'+IC.search+'<input id="buscar" type="search" placeholder="'+u.buscar+'"></div>'+
        '<div class="chips" id="chips">'+chips.map(c=>'<button class="chip'+(c.k===catActiva?' on':'')+'" data-cat="'+esc(c.k)+'">'+c.l+'</button>').join("")+'</div>'+
      '</div>'+
      '<div class="grid" id="grid"></div>'+
    '</div>';
  $("bInicio").onclick=()=>{ irInicio(); };
  $("buscar").addEventListener("input",renderGrid);
  document.querySelectorAll("#chips .chip").forEach(b=>b.onclick=()=>{ catActiva=b.dataset.cat; document.querySelectorAll("#chips .chip").forEach(x=>x.classList.toggle("on",x.dataset.cat===catActiva)); renderGrid(); });
  renderGrid();
}

function renderGrid(){
  const u = UI[LANG];
  const a = AMAP[areaActiva];
  const q = ($("buscar")?$("buscar").value:"").toLowerCase();
  const lista = VIDEOS.filter(v=>{
    if(v.area!==a.key) return false;
    if(catActiva!=="__all__" && t(v.categoria)!==catActiva) return false;
    if(q && !(t(v.titulo)+t(v.descripcion)).toLowerCase().includes(q)) return false;
    return true;
  });
  const grid = $("grid");
  if(!lista.length){ grid.innerHTML='<div class="vacio">'+u.vacio+'</div>'; return; }
  grid.innerHTML = lista.map(v=>{
    const i = VIDEOS.indexOf(v);
    return '<button class="card" data-i="'+i+'"><div class="thumb">'+
      (v.poster?'<img src="'+v.poster+'" alt="" onerror="this.style.display=\'none\'">':'')+
      (v.categoria?'<span class="tag" style="background:'+a.color+'">'+t(v.categoria)+'</span>':'')+
      '<span class="play">'+IC.play+'</span>'+
      (v.duracion?'<span class="dur">'+v.duracion+'</span>':'')+
    '</div><div class="cbody"><h3>'+t(v.titulo)+'</h3><p>'+t(v.descripcion)+'</p></div></button>';
  }).join("");
  document.querySelectorAll("#grid .card").forEach(c=>c.onclick=()=>abrir(VIDEOS[c.dataset.i]));
}

/* ---------- Navegación ---------- */
function irA(k){ areaActiva=k; catActiva="__all__"; location.hash="area/"+k; window.scrollTo(0,0); render(); }
function irInicio(){ areaActiva=null; catActiva="__all__"; location.hash=""; window.scrollTo(0,0); render(); }
function fromHash(){ const m=(location.hash||"").match(/area\/(\w+)/); areaActiva = m&&AMAP[m[1]] ? m[1] : null; }
window.addEventListener("hashchange",()=>{ fromHash(); render(); });

/* ---------- Modal ---------- */
function abrir(v){
  $("mTit").textContent = t(v.titulo);
  $("mDesc").textContent = t(v.descripcion);
  const media = $("media");
  var anim = v.tipo==="animacion" || /\.html?$/.test(v.video);
  $("visor").classList.toggle("full", anim);
  if(anim){
    media.innerHTML = '<iframe src="'+v.video+'?lang='+LANG+'" allowfullscreen></iframe>';
  }else{
    media.innerHTML = '<video src="'+v.video+'" controls autoplay '+(v.poster?'poster="'+v.poster+'"':'')+'></video>';
  }
  $("modal").classList.add("on");
}
function cerrar(){ $("modal").classList.remove("on"); $("media").innerHTML=""; }
$("cerrar").onclick=cerrar;
$("modal").onclick=e=>{ if(e.target.id==="modal") cerrar(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") cerrar(); });
document.addEventListener("keydown",e=>{ if((e.ctrlKey||e.metaKey) && (e.key==="k"||e.key==="K")){ const b=$("buscarHome"); if(b){ e.preventDefault(); b.focus(); b.select(); } } });

/* ---------- Idioma + tema ---------- */
document.querySelectorAll("#lang button").forEach(b=>b.onclick=()=>{
  LANG=b.dataset.l; try{localStorage.setItem("lang",LANG);}catch(e){} render();
});
$("tema").onclick=()=>{
  const dark = document.documentElement.getAttribute("data-theme")==="dark";
  const next = dark?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  try{localStorage.setItem("tema",next);}catch(e){}
  pintarChrome();
};

/* ---------- Utilidades ---------- */
function hex(c,a){ const n=parseInt(c.slice(1),16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }
function esc(s){ return String(s).replace(/"/g,'&quot;'); }
function hl(s,q){ s=String(s); if(!q) return s; const i=s.toLowerCase().indexOf(q); if(i<0) return s; return s.slice(0,i)+'<mark>'+s.slice(i,i+q.length)+'</mark>'+s.slice(i+q.length); }

cargar();
</script>
</body>
</html>
